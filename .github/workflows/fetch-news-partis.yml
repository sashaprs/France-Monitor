name: Fetch Partis News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-news-partis
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch news
        run: node scripts/fetch-news-partis.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news_partis.json
          git diff --staged --quiet || git commit -m "data: update news partis $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
