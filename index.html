/* ============================================================
   CIBLAGE MODULE — moteur de recherche multi-critères
   ------------------------------------------------------------
   577 députés = petit volume : tout le filtrage se fait côté
   client sur l'index pré-calculé public/data/ciblage/index.json
   (chargé une fois, cache mémoire). Seul le filtre "position sur
   un scrutin" charge à la demande un shard de positions
   (positions/<NN>.json, NN = centaine du numéro de scrutin).
   ============================================================ */

/* ── Caches mémoire au niveau app (un seul fetch par session) ── */
let _ciblageIndexPromise = null;
function useCiblageIndex() {
  const [state, setState] = React.useState({ loading: true, deputes: [], groupes: {}, updatedAt: null, error: false });
  React.useEffect(() => {
    const load = _ciblageIndexPromise
      || (_ciblageIndexPromise = fetch('public/data/ciblage/index.json')
          .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
          .catch(e => { _ciblageIndexPromise = null; throw e; }));
    let alive = true;
    load.then(d => { if (alive) setState({ loading: false, deputes: d.deputes || [], groupes: d.groupes || {}, updatedAt: d.updatedAt, error: false }); })
        .catch(() => { if (alive) setState({ loading: false, deputes: [], groupes: {}, updatedAt: null, error: true }); });
    return () => { alive = false; };
  }, []);
  return state;
}

let _cibScrutinsPromise = null;
function loadCibScrutins() {
  return _cibScrutinsPromise
    || (_cibScrutinsPromise = fetch('public/data/ciblage/scrutins-index.json')
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(d => (d.scrutins || []).map(s => ({ num: s[0], date: s[1], titre: s[2], sort: s[3], pour: s[4], contre: s[5], abst: s[6] })))
        .catch(e => { _cibScrutinsPromise = null; throw e; }));
}

const _cibPositionsCache = {};
function loadCibPositions(num) {
  const shard = String(Math.floor(num / 100));
  const p = _cibPositionsCache[shard]
    || (_cibPositionsCache[shard] = fetch('public/data/ciblage/positions/' + shard + '.json')
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .catch(e => { delete _cibPositionsCache[shard]; throw e; }));
  return p.then(d => {
    const raw = d[num];
    if (!raw) return null;
    return { p: new Set(raw.p), c: new Set(raw.c), a: new Set(raw.a), n: new Set(raw.n) };
  });
}

/* Groupes d'études (Partie D) : filtre affiché seulement si le fichier existe. */
let _cibGePromise = null;
function useCibGroupesEtudes() {
  const [groupes, setGroupes] = React.useState(null);
  React.useEffect(() => {
    const load = _cibGePromise
      || (_cibGePromise = fetch('public/data/ciblage/groupes-etudes.json')
          .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
          .catch(e => { _cibGePromise = null; throw e; }));
    let alive = true;
    load.then(d => { if (alive) setGroupes(d.groupes || []); }).catch(() => {});
    return () => { alive = false; };
  }, []);
  return groupes;
}

function useCibDebounced(value, ms = 300) {
  const [v, setV] = React.useState(value);
  React.useEffect(() => { const t = setTimeout(() => setV(value), ms); return () => clearTimeout(t); }, [value, ms]);
  return v;
}

const CIB_POS = {
  p: { label: 'Pour',       color: 'var(--pos)',           bg: 'var(--green-50)' },
  c: { label: 'Contre',     color: 'var(--neg)',           bg: 'var(--red-50)'   },
  a: { label: 'Abstention', color: '#C9760D',              bg: '#FDF3E7'         },
  x: { label: 'Absent',     color: 'var(--text-tertiary)', bg: 'var(--gray-100)' },
};
const CIB_SECTEURS = {
  agriculture:      'Agriculture',
  industrie:        'Industrie',
  construction:     'Construction',
  commerceServices: 'Commerce, transports, services',
  adminSanteSocial: 'Administration, santé, social',
};

/* État par défaut des filtres. Les curseurs sont "off" à leurs bornes. */
const CIB_F0 = {
  g: [], com: '', ge: '', dept: '', circo: '',
  loyMin: 0, loyMax: 100, margeMax: 50, chomMin: 0,
  sect: '', sectMode: 'ind', sectSeuil: '',
  scrutins: [], // [{ num, date, titre, pos: 'p'|'c'|'a'|'x' }] — 3 max
};

/* ── État (filtres + onglet + cartographie) ↔ URL, pour le partage par lien ── */
const CIB_CARTO0 = { scrutins: [], kw: '' }; // scrutins: [{ num, date, titre, sens: 1|-1 }] — 3 max

function cibParseHash() {
  const m = (window.location.hash || '').match(/^#ciblage\??(.*)$/);
  if (!m) return null;
  const q = new URLSearchParams(m[1]);
  const f = { ...CIB_F0, scrutins: [] };
  if (q.get('g')) f.g = q.get('g').split(',').filter(Boolean);
  if (q.get('com')) f.com = q.get('com');
  if (q.get('ge')) f.ge = q.get('ge');
  if (q.get('dept')) f.dept = q.get('dept');
  if (q.get('circo')) f.circo = q.get('circo');
  const num = (k, d) => { const v = parseFloat(q.get(k)); return isNaN(v) ? d : v; };
  f.loyMin = num('lmin', 0); f.loyMax = num('lmax', 100);
  f.margeMax = num('marge', 50); f.chomMin = num('chom', 0);
  if (q.get('sect')) { f.sect = q.get('sect'); f.sectMode = q.get('smode') === 'nb' ? 'nb' : 'ind'; f.sectSeuil = q.get('seuil') || ''; }
  for (const part of (q.get('s') || '').split(',').filter(Boolean).slice(0, 3)) {
    const [n, pos] = part.split(':');
    if (parseInt(n, 10) && CIB_POS[pos]) f.scrutins.push({ num: parseInt(n, 10), date: null, titre: null, pos });
  }
  const carto = { ...CIB_CARTO0, scrutins: [] };
  for (const part of (q.get('cs') || '').split(',').filter(Boolean).slice(0, 3)) {
    const [n, sens] = part.split(':');
    if (parseInt(n, 10)) carto.scrutins.push({ num: parseInt(n, 10), date: null, titre: null, sens: sens === '-1' ? -1 : 1 });
  }
  carto.kw = q.get('kw') || '';
  const tab = q.get('tab') === 'carto' ? 'carto' : q.get('tab') === 'reseau' ? 'reseau' : 'recherche';
  return { f, tab, carto };
}

function cibWriteHash(f, tab, carto) {
  const q = new URLSearchParams();
  if (tab && tab !== 'recherche') q.set('tab', tab);
  if (f.g.length) q.set('g', f.g.join(','));
  if (f.com) q.set('com', f.com);
  if (f.ge) q.set('ge', f.ge);
  if (f.dept) q.set('dept', f.dept);
  if (f.circo) q.set('circo', f.circo);
  if (f.loyMin > 0) q.set('lmin', f.loyMin);
  if (f.loyMax < 100) q.set('lmax', f.loyMax);
  if (f.margeMax < 50) q.set('marge', f.margeMax);
  if (f.chomMin > 0) q.set('chom', f.chomMin);
  if (f.sect && f.sectSeuil !== '') { q.set('sect', f.sect); q.set('smode', f.sectMode); q.set('seuil', f.sectSeuil); }
  if (f.scrutins.length) q.set('s', f.scrutins.map(s => s.num + ':' + s.pos).join(','));
  if (carto && carto.scrutins.length) q.set('cs', carto.scrutins.map(s => s.num + ':' + s.sens).join(','));
  if (carto && carto.kw) q.set('kw', carto.kw);
  const qs = q.toString();
  window.history.replaceState(null, '', window.location.pathname + window.location.search + '#ciblage' + (qs ? '?' + qs : ''));
}

/* Normalisation pour la recherche plein texte (casse + accents). */
function cibNorm(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}

/* Export CSV côté client (séparateur ";" pour Excel FR, BOM UTF-8). */
function cibExportCsv(rows, header, filename) {
  const esc = (v) => {
    const s = v === null || v === undefined ? '' : String(v);
    return /[;"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const csv = '\uFEFF' + [header, ...rows].map(r => r.map(esc).join(';')).join('\r\n');
  triggerDownload(new Blob([csv], { type: 'text/csv;charset=utf-8' }), filename);
}

/* ── Onglet Réseau : cosignatures d'amendements ───────────────────────
   Graphe pré-filtré côté pipeline (paires ≥ 10 amendements communs).
   Layout SVG pur React, calculé à la volée : clusters circulaires par
   groupe politique (disque en phyllotaxie par groupe, groupes disposés
   en couronne) — pas de simulation de forces, inutile en Babel inline.
   Les cosignatures de masse rendent les liens intra-groupe triviaux :
   le mode "inter-groupes uniquement" est donc actif par défaut. */
let _cibReseauPromise = null;
function loadCibReseau() {
  return _cibReseauPromise
    || (_cibReseauPromise = fetch('public/data/ciblage/reseau-cosignatures.json')
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .catch(e => { _cibReseauPromise = null; throw e; }));
}

const CIB_SEUILS_RESEAU = [10, 20, 30, 50, 80, 120, 200, 300, 500, 1000, 2000]; // curseur non linéaire
const CIB_MAX_LIENS_AFFICHES = 2500;

function CibReseauTab({ groupes, baseById, openDep }) {
  const [data, setData] = React.useState(null);
  const [erreur, setErreur] = React.useState(false);
  const [seuilIdx, setSeuilIdx] = React.useState(3);            // 50 cosignatures par défaut
  const [interSeul, setInterSeul] = React.useState(true);       // ponts trans-groupes = info stratégique
  const [focusId, setFocusId] = React.useState('');
  const [focusQuery, setFocusQuery] = React.useState('');
  const [hover, setHover] = React.useState(null);
  const seuil = CIB_SEUILS_RESEAU[useCibDebounced(seuilIdx, 300)];
  const focusQ = useCibDebounced(focusQuery, 300);

  React.useEffect(() => { loadCibReseau().then(setData).catch(() => setErreur(true)); }, []);

  /* Positions des nœuds : couronne de clusters, phyllotaxie intra-cluster. */
  const layout = React.useMemo(() => {
    if (!data) return null;
    const W = 920, H = 660, cx = W / 2, cy = H / 2;
    const parGroupe = {};
    data.noeuds.forEach((n, i) => (parGroupe[n.g] = parGroupe[n.g] || []).push(i));
    const sigles = Object.keys(parGroupe).sort((a, b) => parGroupe[b].length - parGroupe[a].length);
    const pos = new Array(data.noeuds.length);
    const centres = {};
    sigles.forEach((s, gi) => {
      const membres = parGroupe[s];
      const angle = (gi / sigles.length) * 2 * Math.PI - Math.PI / 2;
      const Rc = Math.min(W, H) / 2 - 105;
      const gx = cx + Math.cos(angle) * Rc, gy = cy + Math.sin(angle) * Rc;
      centres[s] = [gx, gy];
      const R = 12 + Math.sqrt(membres.length) * 6.5;
      membres.forEach((ni, i) => {
        const r = R * Math.sqrt((i + 0.5) / membres.length);
        const a = i * 2.399963; // angle d'or : disque régulier sans calcul itératif
        pos[ni] = [gx + Math.cos(a) * r, gy + Math.sin(a) * r];
      });
    });
    return { pos, centres, W, H };
  }, [data]);

  const focusIdx = React.useMemo(() => {
    if (!data || !focusId) return -1;
    return data.noeuds.findIndex(n => n.id === focusId);
  }, [data, focusId]);

  /* Liens visibles selon seuil / inter-groupes / focus (plafonnés). */
  const liens = React.useMemo(() => {
    if (!data) return { liste: [], tronque: false, total: 0 };
    let l = data.liens.filter(x => x[2] >= seuil);
    if (focusIdx >= 0) l = l.filter(x => x[0] === focusIdx || x[1] === focusIdx);
    else if (interSeul) l = l.filter(x => data.noeuds[x[0]].g !== data.noeuds[x[1]].g);
    const total = l.length;
    l.sort((a, b) => b[2] - a[2]);
    return { liste: l.slice(0, CIB_MAX_LIENS_AFFICHES), tronque: total > CIB_MAX_LIENS_AFFICHES, total };
  }, [data, seuil, interSeul, focusIdx]);

  /* Degré visible de chaque nœud (tooltip + estompage des isolés). */
  const degres = React.useMemo(() => {
    const d = {};
    for (const [a, b] of liens.liste) { d[a] = (d[a] || 0) + 1; d[b] = (d[b] || 0) + 1; }
    return d;
  }, [liens]);

  const suggestions = React.useMemo(() => {
    if (!data || !focusQ.trim() || focusId) return [];
    const q = cibNorm(focusQ);
    return data.noeuds.filter(n => cibNorm(n.nom).includes(q)).slice(0, 8);
  }, [data, focusQ, focusId]);

  const poidsMax = liens.liste.length ? liens.liste[0][2] : 1;

  if (erreur) return (
    <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'42px 24px', textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>
      Le graphe de cosignatures n'est pas encore disponible (reseau-cosignatures.json manquant).
    </div>
  );
  if (!data || !layout) return (
    <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'42px 24px', textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>
      Chargement du graphe de cosignatures…
    </div>
  );

  const focusNoeud = focusIdx >= 0 ? data.noeuds[focusIdx] : null;
  const voisins = new Set();
  if (focusIdx >= 0) for (const [a, b] of liens.liste) voisins.add(a === focusIdx ? b : a);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {/* ── Contrôles ── */}
      <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'12px 16px', display:'flex', alignItems:'center', gap:18, flexWrap:'wrap' }}>
        <div style={{ minWidth:220 }}>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:11.5, marginBottom:3 }}>
            <span style={{ color:'var(--text-secondary)', fontWeight:500 }}>Poids minimal des liens</span>
            <span style={{ fontFamily:'var(--font-mono)', fontWeight:700, color:'var(--blue-france)' }}>≥ {CIB_SEUILS_RESEAU[seuilIdx]}</span>
          </div>
          <input type="range" min={0} max={CIB_SEUILS_RESEAU.length - 1} step={1} value={seuilIdx}
            onChange={e => setSeuilIdx(parseInt(e.target.value, 10))} style={{ width:'100%', accentColor:'var(--blue-france)' }} />
        </div>
        <label style={{ display:'flex', alignItems:'center', gap:7, fontSize:12.5, fontWeight:600, color:'var(--ink)', cursor:'pointer' }}>
          <input type="checkbox" checked={interSeul} onChange={e => setInterSeul(e.target.checked)} style={{ accentColor:'var(--blue-france)' }} disabled={focusIdx >= 0} />
          Liens inter-groupes uniquement
        </label>
        <div style={{ position:'relative', minWidth:230 }}>
          {focusNoeud ? (
            <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12.5, fontWeight:600, color:'var(--ink)', background:'var(--gray-100)', borderRadius:999, padding:'6px 12px' }}>
              <Icon n="crosshair" s={12} />
              <span>{focusNoeud.nom}</span>
              <button onClick={() => { setFocusId(''); setFocusQuery(''); }} style={{ border:'none', background:'none', cursor:'pointer', color:'var(--text-tertiary)', padding:0, display:'flex' }}><Icon n="x" s={12} /></button>
            </div>
          ) : (
            <>
              <input className="cib-input" type="text" value={focusQuery} onChange={e => setFocusQuery(e.target.value)}
                placeholder="Focus sur un député (ego-network)…" />
              {suggestions.length > 0 && (
                <div style={{ position:'absolute', top:'100%', left:0, right:0, zIndex:30, marginTop:4, border:'1px solid var(--border)', borderRadius:'var(--radius-md)', background:'var(--surface)', boxShadow:'var(--shadow-md)', overflow:'hidden' }}>
                  {suggestions.map(n => (
                    <div key={n.id} className="cib-scr-row" style={{ fontSize:12 }} onClick={() => { setFocusId(n.id); }}>
                      {n.nom} <span style={{ color:'var(--text-tertiary)' }}>({n.g})</span>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
        <span style={{ fontSize:11.5, color:'var(--text-tertiary)', marginLeft:'auto' }}>
          {liens.total.toLocaleString('fr-FR')} lien{liens.total > 1 ? 's' : ''}{liens.tronque ? ' (les ' + CIB_MAX_LIENS_AFFICHES.toLocaleString('fr-FR') + ' plus forts affichés)' : ''}
        </span>
      </div>

      {/* ── Graphe ── */}
      <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'8px', position:'relative' }}>
        <svg viewBox={'0 0 ' + layout.W + ' ' + layout.H} style={{ width:'100%', height:'auto', display:'block' }}>
          {/* Liens (dessinés d'abord, sous les nœuds) */}
          {liens.liste.map(([a, b, w], i) => {
            const inter = data.noeuds[a].g !== data.noeuds[b].g;
            return (
              <line key={i}
                x1={layout.pos[a][0]} y1={layout.pos[a][1]} x2={layout.pos[b][0]} y2={layout.pos[b][1]}
                stroke={inter ? 'var(--blue-france)' : '#9AA3AF'}
                strokeWidth={0.5 + 2.2 * Math.sqrt(w / poidsMax)}
                strokeOpacity={focusIdx >= 0 ? 0.5 : inter ? 0.3 : 0.12} />
            );
          })}
          {/* Nœuds */}
          {data.noeuds.map((n, i) => {
            const g = groupes[n.g] || { couleur: '#9AA3AF' };
            const estompe = focusIdx >= 0 ? (i !== focusIdx && !voisins.has(i)) : false;
            return (
              <circle key={n.id}
                cx={layout.pos[i][0]} cy={layout.pos[i][1]}
                r={i === focusIdx ? 7 : 3.4}
                fill={g.couleur} stroke="#fff" strokeWidth={i === focusIdx ? 1.6 : 0.8}
                opacity={estompe ? 0.12 : 0.92} style={{ cursor:'pointer' }}
                onMouseEnter={(e) => setHover({ n, i, x: e.clientX, y: e.clientY })}
                onMouseLeave={() => setHover(null)}
                onClick={() => { if (focusIdx < 0) { setFocusId(n.id); return; } const b = baseById[n.id]; if (b) openDep(b); }} />
            );
          })}
          {/* Étiquettes des clusters */}
          {Object.entries(layout.centres).map(([s, [x, y]]) => {
            const g = groupes[s] || { couleur: '#9AA3AF' };
            return <text key={s} x={x} y={y - (12 + Math.sqrt((data.noeuds.filter(n => n.g === s).length)) * 6.5) - 8}
              textAnchor="middle" style={{ font:'700 12px var(--font-sans)', fill:g.couleur }}>{s}</text>;
          })}
        </svg>
        <div style={{ padding:'4px 10px 8px', fontSize:10.5, color:'var(--text-tertiary)' }}>
          1er clic sur un nœud : ego-network du député (liens à 1 degré) · 2e clic : fiche. Liens bleus = inter-groupes, gris = intra-groupe.
        </div>

        {hover && (
          <div style={{ position:'fixed', left:Math.min(hover.x + 14, window.innerWidth - 250), top:hover.y + 12, zIndex:50, width:230, background:'var(--ink)', color:'#fff', borderRadius:8, padding:'9px 11px', pointerEvents:'none', boxShadow:'var(--shadow-md)' }}>
            <div style={{ fontSize:12.5, fontWeight:700 }}>{hover.n.nom} <span style={{ opacity:0.7, fontWeight:600 }}>· {hover.n.g}</span></div>
            <div style={{ fontSize:10.5, opacity:0.85, marginTop:3 }}>
              {(degres[hover.i] || 0)} lien{(degres[hover.i] || 0) > 1 ? 's' : ''} visible{(degres[hover.i] || 0) > 1 ? 's' : ''} au seuil ≥ {seuil}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Onglet Cartographie : alliés / persuadables / opposants ──────────
   Score de position par député sur 1 à 3 scrutins de référence :
   pour = +1, contre = −1, abstention = 0, absent = non compté (moyenne).
   Chaque scrutin porte un "sens" (±1) : si voter CONTRE le texte sert la
   cause étudiée (ex. amendement hostile), l'utilisateur inverse le scrutin.
   Classification : allié ≥ +0,5 ; opposant ≤ −0,5 ; persuadable entre les
   deux, OU allié/opposant faible (|score| < 0,75) avec loyauté < 85 %.
   Axe Y (influençabilité) : loyauté inversée (65 %) + fragilité électorale
   (35 %, marge 2024 rapportée à 30 pts). Le mot-clé d'amendements ne change
   pas le score : c'est un signal d'activité (taille du point + colonne). */
const CIB_CLASSES = {
  allie:       { label: 'Allié',       color: 'var(--pos)',           bg: 'var(--green-50)' },
  persuadable: { label: 'Persuadable', color: '#C9760D',              bg: '#FDF3E7'         },
  opposant:    { label: 'Opposant',    color: 'var(--neg)',           bg: 'var(--red-50)'   },
  aucun:       { label: 'Non positionné', color: 'var(--text-tertiary)', bg: 'var(--gray-100)' },
};

function cibClassifie(score, loyaute) {
  if (score === null) return 'aucun';
  if (Math.abs(score) < 0.5) return 'persuadable';
  if (Math.abs(score) < 0.75 && loyaute !== null && loyaute < 0.85) return 'persuadable';
  return score > 0 ? 'allie' : 'opposant';
}

function CibCartoTab({ deputes, groupes, baseById, openDep, carto, setCarto }) {
  const [posData, setPosData] = React.useState({});
  const [pickerOpen, setPickerOpen] = React.useState(false);
  const [amdtIdx, setAmdtIdx] = React.useState(null);   // null | 'chargement' | 'erreur' | { textes, deputes, norm }
  const [hover, setHover] = React.useState(null);       // { d, x, y }
  const [sortCol, setSortCol] = React.useState('score');
  const [sortDir, setSortDir] = React.useState(-1);
  const kw = useCibDebounced(carto.kw, 300);

  /* Positions des scrutins de référence (mêmes shards que l'onglet Recherche). */
  React.useEffect(() => {
    for (const s of carto.scrutins) {
      if (posData[s.num] !== undefined) continue;
      setPosData(prev => ({ ...prev, [s.num]: null }));
      loadCibPositions(s.num)
        .then(pos => setPosData(prev => ({ ...prev, [s.num]: pos })))
        .catch(() => setPosData(prev => ({ ...prev, [s.num]: false })));
    }
  }, [carto.scrutins, posData]);

  /* Index d'amendements : chargé au premier mot-clé uniquement (~2 Mo gzippés). */
  React.useEffect(() => {
    if (!kw.trim() || (amdtIdx && typeof amdtIdx === 'object')) return;
    setAmdtIdx('chargement');
    loadCibAmdtRecherche()
      .then(d => setAmdtIdx({ ...d, norm: d.textes.map(cibNorm) }))
      .catch(() => setAmdtIdx('erreur'));
  }, [kw]);

  /* Nombre d'amendements contenant le mot-clé, par député. */
  const activite = React.useMemo(() => {
    if (!kw.trim() || !amdtIdx || typeof amdtIdx !== 'object') return null;
    const n = cibNorm(kw.trim());
    const matches = new Set();
    amdtIdx.norm.forEach((t, i) => { if (t.includes(n)) matches.add(i); });
    const par = {};
    for (const [id, liste] of Object.entries(amdtIdx.deputes)) {
      const c = liste.reduce((s, ti) => s + (matches.has(ti) ? 1 : 0), 0);
      if (c > 0) par[id] = c;
    }
    return par;
  }, [kw, amdtIdx]);

  const scrutinsPrets = carto.scrutins.filter(s => posData[s.num]);
  const enChargement = carto.scrutins.some(s => posData[s.num] === null);

  /* Score, influençabilité et classification par député. */
  const rows = React.useMemo(() => {
    if (!scrutinsPrets.length) return [];
    return deputes.map(d => {
      const idNum = parseInt(d.id, 10);
      let somme = 0, n = 0;
      const votes = {};
      for (const s of scrutinsPrets) {
        const pos = posData[s.num];
        const v = pos.p.has(idNum) ? 1 : pos.c.has(idNum) ? -1 : pos.a.has(idNum) ? 0 : null;
        votes[s.num] = v === 1 ? 'p' : v === -1 ? 'c' : v === 0 ? 'a' : 'x';
        if (v !== null) { somme += v * s.sens; n++; }
      }
      const score = n ? somme / n : null;
      const loyaute = d.stats.loyaute;
      const marge = d.ci ? d.ci.marge : null;
      const infl = 0.65 * Math.min(1, Math.max(0, (1 - (loyaute === null ? 0.9 : loyaute)) / 0.35))
                 + 0.35 * (marge === null ? 0.4 : Math.min(1, Math.max(0, 1 - marge / 30)));
      return { d, score, votes, nbVotes: n, infl, classe: cibClassifie(score, loyaute), act: activite ? (activite[d.id] || 0) : 0 };
    });
  }, [deputes, scrutinsPrets.map(s => s.num + ':' + s.sens).join(','), posData, activite]);

  const positionnes = rows.filter(r => r.score !== null);
  const compte = { allie: 0, persuadable: 0, opposant: 0 };
  for (const r of positionnes) compte[r.classe]++;

  const tri = React.useMemo(() => {
    const v = (r) => sortCol === 'nom' ? r.d.nom : sortCol === 'groupe' ? r.d.groupe
      : sortCol === 'score' ? (r.score === null ? -99 : r.score)
      : sortCol === 'loyaute' ? (r.d.stats.loyaute === null ? -1 : r.d.stats.loyaute)
      : sortCol === 'marge' ? (r.d.ci && r.d.ci.marge !== null ? r.d.ci.marge : 999)
      : sortCol === 'infl' ? r.infl : r.act;
    return [...rows].sort((a, b) => {
      const x = v(a), y = v(b);
      return (typeof x === 'string' ? x.localeCompare(y, 'fr') : x - y) * sortDir;
    });
  }, [rows, sortCol, sortDir]);

  const exportCsv = () => {
    const header = ['Nom', 'Prénom', 'Groupe', 'Score', 'Classification', 'Loyauté (%)', 'Marge 2024 (pts)', 'Influençabilité'];
    for (const s of scrutinsPrets) header.push('Scrutin #' + s.num + (s.sens === -1 ? ' (inversé)' : ''));
    if (activite) header.push('Amendements « ' + kw.trim() + ' »');
    const posLabel = { p: 'Pour', c: 'Contre', a: 'Abstention', x: 'Absent' };
    const rws = tri.filter(r => r.score !== null).map(r => {
      const row = [r.d.nom, r.d.prenom, r.d.groupe,
        r.score === null ? '' : Math.round(r.score * 100) / 100, CIB_CLASSES[r.classe].label,
        r.d.stats.loyaute !== null ? Math.round(r.d.stats.loyaute * 1000) / 10 : '',
        r.d.ci && r.d.ci.marge !== null ? r.d.ci.marge : '',
        Math.round(r.infl * 100) / 100];
      for (const s of scrutinsPrets) row.push(posLabel[r.votes[s.num]]);
      if (activite) row.push(r.act || 0);
      return row;
    });
    cibExportCsv(rws, header, 'cartographie-nomoslab-' + new Date().toISOString().slice(0, 10) + '.csv');
  };

  /* ── Plan SVG (rendu pur React, pas de librairie graphique) ── */
  const W = 860, H = 480, padL = 46, padR = 16, padT = 18, padB = 40;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const sx = (score) => padL + ((score + 1) / 2) * plotW;
  const sy = (infl) => padT + (1 - infl) * plotH;
  /* Décalage déterministe pour désempiler les points de même score. */
  const jitter = (id) => { let h = 0; for (const c of String(id)) h = (h * 31 + c.charCodeAt(0)) % 997; return (h / 997 - 0.5) * 0.055; };

  const scrutinChip = (s) => (
    <div key={s.num} style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:'8px 10px', background:'var(--surface-sunken)', flex:'1 1 240px', minWidth:220 }}>
      <div style={{ display:'flex', gap:6, alignItems:'flex-start' }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:10.5, fontWeight:700, color:'var(--blue-france)' }}>#{s.num}{s.date ? ' · ' + s.date : ''}</div>
          <div style={{ fontSize:11.5, color:'var(--ink)', lineHeight:1.35, marginTop:2, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{s.titre || 'Scrutin n° ' + s.num}</div>
        </div>
        <button onClick={() => setCarto(c => ({ ...c, scrutins: c.scrutins.filter(x => x.num !== s.num) }))}
          style={{ border:'none', background:'none', cursor:'pointer', color:'var(--text-tertiary)', padding:0, display:'flex', flex:'none' }}><Icon n="x" s={13} /></button>
      </div>
      <label title="À activer quand voter CONTRE ce texte sert votre cause (ex. amendement hostile) : le score du scrutin est inversé."
        style={{ display:'flex', alignItems:'center', gap:6, marginTop:7, fontSize:10.5, fontWeight:600, color: s.sens === -1 ? 'var(--neg)' : 'var(--text-tertiary)', cursor:'pointer' }}>
        <input type="checkbox" checked={s.sens === -1}
          onChange={e => setCarto(c => ({ ...c, scrutins: c.scrutins.map(x => x.num === s.num ? { ...x, sens: e.target.checked ? -1 : 1 } : x) }))}
          style={{ accentColor:'var(--neg)' }} />
        Sens inversé (contre = allié)
      </label>
      {posData[s.num] === false && <div style={{ fontSize:10.5, color:'var(--neg)', marginTop:5 }}>Positions indisponibles.</div>}
    </div>
  );

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      {/* ── Contrôles ── */}
      <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'14px 16px' }}>
        <CibLabel extra={<span style={{ fontSize:10.5, color:'var(--text-tertiary)' }}>{carto.scrutins.length}/3</span>}>Scrutins de référence sur votre sujet</CibLabel>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'stretch' }}>
          {carto.scrutins.map(scrutinChip)}
          {carto.scrutins.length < 3 && !pickerOpen && (
            <button onClick={() => setPickerOpen(true)}
              style={{ border:'1px dashed var(--border-strong)', background:'none', borderRadius:'var(--radius-md)', padding:'8px 14px', fontSize:12, fontWeight:600, color:'var(--text-secondary)', cursor:'pointer', display:'flex', alignItems:'center', gap:6, flex:'0 0 auto' }}>
              <Icon n="plus" s={13} /> Ajouter un scrutin
            </button>
          )}
        </div>
        {pickerOpen && (
          <div style={{ marginTop:8, maxWidth:640 }}>
            <CibScrutinPicker onClose={() => setPickerOpen(false)}
              onSelect={(s) => {
                setPickerOpen(false);
                if (carto.scrutins.some(x => x.num === s.num)) return;
                setCarto(c => ({ ...c, scrutins: [...c.scrutins, { num: s.num, date: s.date, titre: s.titre, sens: 1 }] }));
              }} />
          </div>
        )}
        <div style={{ display:'flex', gap:10, alignItems:'center', marginTop:12, flexWrap:'wrap' }}>
          <span style={{ fontSize:10.5, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--text-tertiary)' }}>Mot-clé d'amendements (optionnel)</span>
          <input className="cib-input" style={{ maxWidth:260 }} type="text" value={carto.kw}
            onChange={e => setCarto(c => ({ ...c, kw: e.target.value }))} placeholder="vin, nucléaire, haies…" />
          {amdtIdx === 'chargement' && <span style={{ fontSize:11, color:'var(--text-tertiary)' }}>Chargement de l'index d'amendements…</span>}
          {amdtIdx === 'erreur' && <span style={{ fontSize:11, color:'var(--neg)' }}>Index d'amendements indisponible.</span>}
          {activite && <span style={{ fontSize:11, color:'var(--text-secondary)' }}>{Object.keys(activite).length} députés actifs sur « {kw.trim()} » (taille des points)</span>}
        </div>
      </div>

      {/* ── Plan + liste ── */}
      {!carto.scrutins.length ? (
        <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'42px 24px', textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>
          Choisissez 1 à 3 scrutins de référence sur votre sujet pour cartographier l'hémicycle en alliés, persuadables et opposants.
        </div>
      ) : enChargement ? (
        <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'42px 24px', textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>
          Chargement des positions de vote…
        </div>
      ) : (
        <>
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'16px 16px 8px', position:'relative' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:8, marginBottom:6 }}>
              <div style={{ display:'flex', gap:14, flexWrap:'wrap' }}>
                {['opposant', 'persuadable', 'allie'].map(k => (
                  <span key={k} style={{ fontSize:12, fontWeight:700, color: CIB_CLASSES[k].color }}>
                    {compte[k]} {CIB_CLASSES[k].label.toLowerCase()}{compte[k] > 1 ? 's' : ''}
                  </span>
                ))}
                <span style={{ fontSize:12, color:'var(--text-tertiary)' }}>{rows.length - positionnes.length} non positionnés (absents)</span>
              </div>
              <button onClick={exportCsv} disabled={!positionnes.length}
                style={{ display:'flex', alignItems:'center', gap:6, border:'none', background: positionnes.length ? 'var(--blue-france)' : 'var(--gray-100)', color: positionnes.length ? '#fff' : 'var(--text-tertiary)', borderRadius:'var(--radius-md)', padding:'7px 13px', fontSize:12, fontWeight:700, cursor: positionnes.length ? 'pointer' : 'default', fontFamily:'var(--font-sans)' }}>
                <Icon n="download" s={13} /> Exporter (CSV)
              </button>
            </div>

            <svg viewBox={'0 0 ' + W + ' ' + H} style={{ width:'100%', height:'auto', display:'block' }}>
              {/* Zones opposants / persuadables / alliés */}
              <rect x={sx(-1)} y={padT} width={sx(-0.5) - sx(-1)} height={plotH} fill="#FEF2F2" />
              <rect x={sx(-0.5)} y={padT} width={sx(0.5) - sx(-0.5)} height={plotH} fill="var(--gray-50)" />
              <rect x={sx(0.5)} y={padT} width={sx(1) - sx(0.5)} height={plotH} fill="#EFFAF3" />
              <text x={sx(-0.75)} y={padT + 16} textAnchor="middle" style={{ font:'700 11px var(--font-sans)', fill:'#E1000F', opacity:0.55 }}>OPPOSANTS</text>
              <text x={sx(0)} y={padT + 16} textAnchor="middle" style={{ font:'700 11px var(--font-sans)', fill:'#565D67', opacity:0.55 }}>PERSUADABLES</text>
              <text x={sx(0.75)} y={padT + 16} textAnchor="middle" style={{ font:'700 11px var(--font-sans)', fill:'#0E8A52', opacity:0.55 }}>ALLIÉS</text>
              {/* Axes */}
              {[-1, -0.5, 0, 0.5, 1].map(v => (
                <g key={v}>
                  <line x1={sx(v)} y1={padT} x2={sx(v)} y2={padT + plotH} stroke="var(--border)" strokeDasharray={v === 0 ? '' : '3 4'} strokeWidth="1" />
                  <text x={sx(v)} y={H - padB + 16} textAnchor="middle" style={{ font:'600 10px var(--font-mono)', fill:'#8B93A0' }}>{v > 0 ? '+' + v : v}</text>
                </g>
              ))}
              <text x={sx(0)} y={H - 6} textAnchor="middle" style={{ font:'600 10.5px var(--font-sans)', fill:'#565D67' }}>Score de position (opposant → allié)</text>
              <text x={12} y={padT + plotH / 2} textAnchor="middle" transform={'rotate(-90 12 ' + (padT + plotH / 2) + ')'} style={{ font:'600 10.5px var(--font-sans)', fill:'#565D67' }}>Influençabilité (loyauté basse + siège disputé)</text>
              {/* Points */}
              {positionnes.map(r => {
                const g = groupes[r.d.groupe] || { couleur: '#9AA3AF' };
                const rayon = 3.5 + Math.min(4, r.act / 3);
                return (
                  <circle key={r.d.id}
                    cx={sx(Math.max(-1, Math.min(1, r.score + jitter(r.d.id))))} cy={sy(r.infl)} r={rayon}
                    fill={g.couleur} stroke="#fff" strokeWidth="1" opacity="0.88" style={{ cursor:'pointer' }}
                    onMouseEnter={(e) => setHover({ r, x: e.clientX, y: e.clientY })}
                    onMouseLeave={() => setHover(null)}
                    onClick={() => { const b = baseById[r.d.id]; if (b) openDep(b); }} />
                );
              })}
            </svg>

            {hover && (
              <div style={{ position:'fixed', left:Math.min(hover.x + 14, window.innerWidth - 280), top:hover.y + 12, zIndex:50, width:260, background:'var(--ink)', color:'#fff', borderRadius:8, padding:'10px 12px', pointerEvents:'none', boxShadow:'var(--shadow-md)' }}>
                <div style={{ fontSize:12.5, fontWeight:700 }}>{hover.r.d.prenom} {hover.r.d.nom} <span style={{ opacity:0.7, fontWeight:600 }}>· {hover.r.d.groupe}</span></div>
                <div style={{ fontSize:11, opacity:0.85, marginTop:3 }}>
                  Score {hover.r.score > 0 ? '+' : ''}{Math.round(hover.r.score * 100) / 100} — {CIB_CLASSES[hover.r.classe].label}
                  {hover.r.d.stats.loyaute !== null ? ' · loyauté ' + Math.round(hover.r.d.stats.loyaute * 100) + ' %' : ''}
                </div>
                <div style={{ marginTop:5, display:'flex', flexDirection:'column', gap:2 }}>
                  {scrutinsPrets.map(s => (
                    <div key={s.num} style={{ fontSize:10.5, opacity:0.85 }}>
                      #{s.num}{s.sens === -1 ? ' (inv.)' : ''} : <b>{CIB_POS[hover.r.votes[s.num]].label}</b>
                    </div>
                  ))}
                  {activite && <div style={{ fontSize:10.5, opacity:0.85 }}>{hover.r.act} amendement{hover.r.act > 1 ? 's' : ''} sur « {kw.trim()} »</div>}
                </div>
              </div>
            )}
          </div>

          {/* ── Liste triable ── */}
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', overflow:'hidden' }}>
            <div style={{ overflowX:'auto' }}>
              <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12.5 }}>
                <thead>
                  <tr style={{ borderBottom:'1px solid var(--border)' }}>
                    {[['nom', 'Député'], ['groupe', 'Groupe'], ['score', 'Score'], ['classe', 'Classification'], ['loyaute', 'Loyauté'], ['marge', 'Marge 2024'], ['infl', 'Influençabilité'], ...(activite ? [['act', 'Amdts « ' + kw.trim() + ' »']] : [])].map(([col, label]) => (
                      <th key={col} onClick={() => { if (col === 'classe') return; setSortDir(sortCol === col ? -sortDir : (col === 'nom' || col === 'groupe' ? 1 : -1)); setSortCol(col); }}
                        style={{ textAlign:'left', padding:'10px 14px', fontSize:10.5, fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', color: sortCol === col ? 'var(--ink)' : 'var(--text-tertiary)', cursor: col === 'classe' ? 'default' : 'pointer', whiteSpace:'nowrap', userSelect:'none' }}>
                        {label}{sortCol === col ? (sortDir === 1 ? ' ↑' : ' ↓') : ''}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {tri.filter(r => r.score !== null).slice(0, 200).map(r => {
                    const g = groupes[r.d.groupe] || { couleur: '#9AA3AF' };
                    const cl = CIB_CLASSES[r.classe];
                    return (
                      <tr key={r.d.id} onClick={() => { const b = baseById[r.d.id]; if (b) openDep(b); }}
                        style={{ borderBottom:'1px solid var(--border-subtle)', cursor:'pointer' }}
                        onMouseEnter={e => e.currentTarget.style.background = 'var(--surface-hover)'}
                        onMouseLeave={e => e.currentTarget.style.background = ''}>
                        <td style={{ padding:'8px 14px', fontWeight:600, color:'var(--ink)', whiteSpace:'nowrap' }}>{r.d.prenom} {r.d.nom}</td>
                        <td style={{ padding:'8px 14px' }}><span style={{ fontSize:10.5, fontWeight:700, color:g.couleur, background:g.couleur + '18', borderRadius:999, padding:'2px 8px' }}>{r.d.groupe}</span></td>
                        <td style={{ padding:'8px 14px', fontFamily:'var(--font-mono)', fontWeight:700, color: r.score > 0.2 ? 'var(--pos)' : r.score < -0.2 ? 'var(--neg)' : 'var(--text-secondary)' }}>{r.score > 0 ? '+' : ''}{(Math.round(r.score * 100) / 100).toLocaleString('fr-FR')}</td>
                        <td style={{ padding:'8px 14px' }}><span style={{ fontSize:10.5, fontWeight:700, color:cl.color, background:cl.bg, borderRadius:999, padding:'2px 8px' }}>{cl.label}</span></td>
                        <td style={{ padding:'8px 14px', fontFamily:'var(--font-mono)', color:'var(--text-secondary)' }}>{r.d.stats.loyaute !== null ? Math.round(r.d.stats.loyaute * 100) + ' %' : '—'}</td>
                        <td style={{ padding:'8px 14px', fontFamily:'var(--font-mono)', color:'var(--text-secondary)' }}>{r.d.ci && r.d.ci.marge !== null ? r.d.ci.marge.toLocaleString('fr-FR') + ' pts' : '—'}</td>
                        <td style={{ padding:'8px 14px' }}>
                          <div style={{ width:70, height:5, borderRadius:3, background:'var(--gray-100)', overflow:'hidden' }}>
                            <div style={{ width:Math.round(r.infl * 100) + '%', height:'100%', background:'var(--blue-france)' }} />
                          </div>
                        </td>
                        {activite && <td style={{ padding:'8px 14px', fontFamily:'var(--font-mono)', fontWeight:700, color: r.act ? 'var(--ink)' : 'var(--text-tertiary)' }}>{r.act || '—'}</td>}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* Libellé court d'une section du panneau de filtres. */
function CibLabel({ children, extra }) {
  return (
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', margin:'0 0 7px' }}>
      <span style={{ fontSize:10.5, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--text-tertiary)' }}>{children}</span>
      {extra}
    </div>
  );
}

function CiblageModule() {
  const { loading, deputes, groupes, updatedAt, error } = useCiblageIndex();
  const { deputes: baseDeputes } = useANDeputes();       // fiches "riches" pour ouvrir DeputeView
  const geList = useCibGroupesEtudes();                  // null tant que le fichier n'existe pas
  const initial = React.useRef(cibParseHash()).current;  // état initial depuis l'URL partagée
  const [filters, setFilters] = React.useState(() => (initial && initial.f) || { ...CIB_F0 });
  const [tab, setTab] = React.useState(() => (initial && initial.tab) || 'recherche');
  const [carto, setCarto] = React.useState(() => (initial && initial.carto) || { ...CIB_CARTO0 });
  const [selectedDep, setSelectedDep] = React.useState(null);
  const [scrutinPickerOpen, setScrutinPickerOpen] = React.useState(false);
  const [geQuery, setGeQuery] = React.useState('');
  const [posData, setPosData] = React.useState({});      // num scrutin → {p,c,a,n} (Sets)
  const [visibleCount, setVisibleCount] = React.useState(60);

  const set = (patch) => setFilters(f => ({ ...f, ...patch }));

  /* Curseurs et champs texte : la valeur "vive" pilote l'UI, la valeur
     debouncée (300 ms) pilote le filtrage et l'URL. */
  const debounced = useCibDebounced(filters, 300);
  const cartoDebounced = useCibDebounced(carto, 300);

  /* URL partageable : l'état des filtres est encodé dans le hash. */
  React.useEffect(() => { cibWriteHash(debounced, tab, cartoDebounced); }, [debounced, tab, cartoDebounced]);
  React.useEffect(() => () => {
    if ((window.location.hash || '').startsWith('#ciblage')) {
      window.history.replaceState(null, '', window.location.pathname + window.location.search);
    }
  }, []);

  /* Chargement des positions pour les scrutins filtrés (shards à la demande). */
  React.useEffect(() => {
    for (const s of filters.scrutins) {
      if (posData[s.num] !== undefined) continue;
      setPosData(prev => ({ ...prev, [s.num]: null })); // null = en cours
      loadCibPositions(s.num)
        .then(pos => setPosData(prev => ({ ...prev, [s.num]: pos })))
        .catch(() => setPosData(prev => ({ ...prev, [s.num]: false }))); // false = échec
    }
  }, [filters.scrutins, posData]);

  /* Titres des scrutins arrivés par URL (le hash ne stocke que les numéros). */
  React.useEffect(() => {
    if (!filters.scrutins.some(s => !s.titre) && !carto.scrutins.some(s => !s.titre)) return;
    loadCibScrutins().then(all => {
      const complete = (s) => {
        if (s.titre) return s;
        const found = all.find(x => x.num === s.num);
        return found ? { ...s, titre: found.titre, date: found.date } : s;
      };
      setFilters(f => ({ ...f, scrutins: f.scrutins.map(complete) }));
      setCarto(c => ({ ...c, scrutins: c.scrutins.map(complete) }));
    }).catch(() => {});
  }, [filters.scrutins.map(s => s.num + (s.titre ? 't' : '')).join(','),
      carto.scrutins.map(s => s.num + (s.titre ? 't' : '')).join(',')]);

  const baseById = React.useMemo(() => {
    const m = {};
    for (const d of baseDeputes) m[d.id] = d;
    return m;
  }, [baseDeputes]);

  /* Options des sélecteurs, dérivées de l'index. */
  const commissionOptions = React.useMemo(
    () => [...new Set(deputes.flatMap(d => d.commissions))].sort((a, b) => a.localeCompare(b, 'fr')),
    [deputes]);
  const deptOptions = React.useMemo(() => {
    const m = {};
    for (const d of deputes) if (d.circo.numDept) m[d.circo.numDept] = d.circo.dept;
    return Object.entries(m).sort((a, b) => (a[1] || '').localeCompare(b[1] || '', 'fr'));
  }, [deputes]);
  const circoOptions = React.useMemo(() => {
    if (!debounced.dept) return [];
    return deputes.filter(d => d.circo.numDept === debounced.dept && d.circo.id)
      .map(d => ({ id: d.circo.id, nom: d.circo.nom }))
      .sort((a, b) => a.id.localeCompare(b.id));
  }, [deputes, debounced.dept]);
  const groupeCounts = React.useMemo(() => {
    const m = {};
    for (const d of deputes) m[d.groupe] = (m[d.groupe] || 0) + 1;
    return m;
  }, [deputes]);
  const geMatches = React.useMemo(() => {
    if (!geList || !geQuery.trim()) return [];
    const q = geQuery.trim().toLowerCase();
    return geList.filter(g => g.nom.toLowerCase().includes(q)).slice(0, 12);
  }, [geList, geQuery]);
  const geById = React.useMemo(() => {
    const m = {}; for (const g of (geList || [])) m[g.id] = g; return m;
  }, [geList]);

  /* ── Filtrage : combinaison en ET de tous les critères actifs ── */
  const f = debounced;
  const loyOn = f.loyMin > 0 || f.loyMax < 100;
  const margeOn = f.margeMax < 50;
  const chomOn = f.chomMin > 0;
  const sectOn = !!(f.sect && f.sectSeuil !== '' && !isNaN(parseFloat(f.sectSeuil)));
  const scrutinsReady = f.scrutins.filter(s => posData[s.num]); // shard chargé
  const scrutinsPending = f.scrutins.some(s => posData[s.num] === null || posData[s.num] === undefined);

  const results = React.useMemo(() => {
    let res = deputes;
    if (f.g.length) { const gs = new Set(f.g); res = res.filter(d => gs.has(d.groupe)); }
    if (f.com) res = res.filter(d => d.commissions.includes(f.com));
    if (f.ge) res = res.filter(d => d.ge.some(x => x.id === f.ge));
    if (f.dept) res = res.filter(d => d.circo.numDept === f.dept);
    if (f.circo) res = res.filter(d => d.circo.id === f.circo);
    if (loyOn) res = res.filter(d => d.stats.loyaute !== null
      && d.stats.loyaute * 100 >= f.loyMin && d.stats.loyaute * 100 <= f.loyMax);
    if (margeOn) res = res.filter(d => d.ci && d.ci.marge !== null && d.ci.marge <= f.margeMax);
    if (chomOn) res = res.filter(d => d.ci && d.ci.chomage !== null && d.ci.chomage >= f.chomMin);
    if (sectOn) {
      const seuil = parseFloat(f.sectSeuil);
      res = res.filter(d => {
        const s = d.ci && d.ci.secteurs[f.sect];
        if (!s) return false;
        return f.sectMode === 'nb' ? s.nb >= seuil : s.ind !== null && s.ind >= seuil;
      });
    }
    for (const sc of scrutinsReady) {
      const pos = posData[sc.num];
      const id = (d) => parseInt(d.id, 10);
      if (sc.pos === 'x') {
        res = res.filter(d => !pos.p.has(id(d)) && !pos.c.has(id(d)) && !pos.a.has(id(d)) && !pos.n.has(id(d))
          && (!d.md || !sc.date || d.md <= sc.date)); // pas encore élu ≠ absent
      } else {
        res = res.filter(d => pos[sc.pos].has(id(d)));
      }
    }
    return [...res].sort((a, b) => a.nom.localeCompare(b.nom, 'fr'));
  }, [deputes, f, posData]);

  React.useEffect(() => { setVisibleCount(60); }, [f]);

  const nbActifs = (f.g.length ? 1 : 0) + (f.com ? 1 : 0) + (f.ge ? 1 : 0) + (f.dept || f.circo ? 1 : 0)
    + (loyOn ? 1 : 0) + (margeOn ? 1 : 0) + (chomOn ? 1 : 0) + (sectOn ? 1 : 0) + f.scrutins.length;

  /* Badges affichés sur chaque carte : uniquement les critères actifs. */
  const badges = (d) => {
    const out = [];
    if (loyOn && d.stats.loyaute !== null) out.push({ t: 'Loyauté ' + Math.round(d.stats.loyaute * 100) + ' %' });
    if (margeOn && d.ci) out.push({ t: 'Marge ' + d.ci.marge.toLocaleString('fr-FR') + ' pts' });
    if (chomOn && d.ci) out.push({ t: 'Chômage ' + d.ci.chomage.toLocaleString('fr-FR') + ' %' });
    if (sectOn && d.ci && d.ci.secteurs[f.sect]) {
      const s = d.ci.secteurs[f.sect];
      out.push({ t: CIB_SECTEURS[f.sect].split(',')[0] + (f.sectMode === 'nb' ? ' ' + s.nb.toLocaleString('fr-FR') + ' empl.' : ' ×' + s.ind.toLocaleString('fr-FR')) });
    }
    for (const sc of scrutinsReady) out.push({ t: CIB_POS[sc.pos].label + ' #' + sc.num, color: CIB_POS[sc.pos].color, bg: CIB_POS[sc.pos].bg });
    return out;
  };

  const exportCsv = () => {
    const header = ['Nom', 'Prénom', 'Groupe', 'Commissions', 'Département', 'Circonscription', 'Email'];
    if (loyOn) header.push('Loyauté (%)');
    if (margeOn) header.push('Marge électorale 2024 (pts)');
    if (chomOn) header.push('Taux de chômage (%)');
    if (sectOn) header.push(CIB_SECTEURS[f.sect] + (f.sectMode === 'nb' ? ' (emplois)' : ' (indice de spécialisation)'));
    if (f.ge && geById[f.ge]) header.push('Groupe d’études — ' + geById[f.ge].nom);
    for (const sc of scrutinsReady) header.push('Scrutin #' + sc.num);
    const rows = results.map(d => {
      const row = [d.nom, d.prenom, d.groupe, d.commissions.join(' / '), d.circo.dept || '', d.circo.nom || '', d.email || ''];
      if (loyOn) row.push(d.stats.loyaute !== null ? Math.round(d.stats.loyaute * 1000) / 10 : '');
      if (margeOn) row.push(d.ci ? d.ci.marge : '');
      if (chomOn) row.push(d.ci ? d.ci.chomage : '');
      if (sectOn) row.push(d.ci && d.ci.secteurs[f.sect] ? (f.sectMode === 'nb' ? d.ci.secteurs[f.sect].nb : d.ci.secteurs[f.sect].ind) : '');
      if (f.ge && geById[f.ge]) { const m = d.ge.find(x => x.id === f.ge); row.push(m ? m.f : ''); }
      for (const sc of scrutinsReady) row.push(CIB_POS[sc.pos].label);
      return row;
    });
    cibExportCsv(rows, header, 'ciblage-nomoslab-' + new Date().toISOString().slice(0, 10) + '.csv');
  };

  if (selectedDep) {
    return <DeputeView dep={selectedDep} onBack={() => setSelectedDep(null)} />;
  }

  const range = (label, value, min, max, step, unit, onChange, off) => (
    <div style={{ marginBottom:10 }}>
      <div style={{ display:'flex', justifyContent:'space-between', fontSize:11.5, marginBottom:3 }}>
        <span style={{ color:'var(--text-secondary)', fontWeight:500 }}>{label}</span>
        <span style={{ fontFamily:'var(--font-mono)', fontWeight:700, color: off ? 'var(--text-tertiary)' : 'var(--blue-france)' }}>
          {off ? '—' : value.toLocaleString('fr-FR') + unit}
        </span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(parseFloat(e.target.value))} style={{ width:'100%', accentColor:'var(--blue-france)' }} />
    </div>
  );

  return (
    <div style={{ maxWidth:1480, margin:'0 auto', padding:'36px 24px 64px' }}>
      <style>{`
        .cib-layout{display:grid;grid-template-columns:296px 1fr;gap:18px;align-items:start}
        @media(max-width:980px){.cib-layout{grid-template-columns:1fr}}
        .cib-panel{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto}
        @media(max-width:980px){.cib-panel{position:static;max-height:none}}
        .cib-sec{padding:14px 16px;border-bottom:1px solid var(--border-subtle)}
        .cib-sec:last-child{border-bottom:none}
        .cib-gpill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:4px 10px;font-family:var(--font-sans);font-size:11.5px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all 100ms}
        .cib-gpill:hover{border-color:var(--border-strong);color:var(--ink)}
        .cib-gpill.on{color:var(--white)}
        .cib-select{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-md);padding:7px 10px;font-family:var(--font-sans);font-size:12.5px;color:var(--ink);width:100%;cursor:pointer}
        .cib-input{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-md);padding:7px 10px;font-family:var(--font-sans);font-size:12.5px;color:var(--ink);width:100%;outline:none}
        .cib-input:focus{border-color:var(--blue-france)}
        .cib-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;cursor:pointer;transition:box-shadow 140ms,border-color 140ms}
        .cib-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-md)}
        .cib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
        .cib-scr-row{padding:9px 12px;border-bottom:1px solid var(--border-subtle);cursor:pointer}
        .cib-scr-row:hover{background:var(--surface-hover)}
        .cib-badge{font-size:10px;font-weight:700;border-radius:999px;padding:2px 7px;white-space:nowrap}
        .cib-mode-btn{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:3px 9px;font-size:10.5px;font-weight:600;color:var(--text-secondary);cursor:pointer}
        .cib-mode-btn.on{background:var(--ink);border-color:var(--ink);color:var(--white)}
        .cib-more{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-md);padding:8px 18px;font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all 120ms}
        .cib-more:hover{border-color:var(--border-strong);color:var(--ink)}
        .cib-tab{background:none;border:none;cursor:pointer;padding:7px 16px;border-radius:var(--radius-pill);font-family:var(--font-sans);font-size:13px;font-weight:500;transition:background 120ms,color 120ms}
        .cib-tab.on{background:var(--ink);color:var(--white)}
        .cib-tab:not(.on){color:var(--text-secondary)}
        .cib-tab:not(.on):hover{background:var(--surface-hover);color:var(--ink)}
      `}</style>

      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.09em', textTransform:'uppercase', color:'var(--blue-france)', marginBottom:6 }}>Module · Influence</div>
        <h1 style={{ fontFamily:'var(--font-sans)', fontSize:34, fontWeight:800, letterSpacing:'-0.025em', color:'var(--ink)', margin:'0 0 6px' }}>Ciblage</h1>
        <p style={{ fontFamily:'var(--font-sans)', fontSize:15, color:'var(--text-secondary)', margin:0, maxWidth:720 }}>
          Recherche multi-critères sur les 577 députés : mandats, votes, ancrage territorial. Les filtres se cumulent (ET) et la recherche est partageable par lien.
        </p>
      </div>

      {error && (
        <div style={{ padding:'18px', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', color:'var(--text-secondary)', fontSize:13 }}>
          L'index de ciblage n'est pas encore disponible (le build quotidien n'a pas produit public/data/ciblage/index.json).
        </div>
      )}

      {!error && (
        <div style={{ display:'flex', gap:3, background:'var(--gray-100)', borderRadius:'var(--radius-pill)', padding:3, width:'fit-content', marginBottom:16 }}>
          {[['recherche', 'Recherche', 'list-filter'], ['carto', 'Cartographie', 'scatter-chart'], ['reseau', 'Réseau', 'share-2']].map(([id, label, ic]) => (
            <button key={id} className={'cib-tab' + (tab === id ? ' on' : '')} onClick={() => setTab(id)}
              style={{ display:'flex', alignItems:'center', gap:6 }}>
              <Icon n={ic} s={13} />{label}
            </button>
          ))}
        </div>
      )}

      {!error && tab === 'carto' && (
        <CibCartoTab deputes={deputes} groupes={groupes} baseById={baseById}
          openDep={setSelectedDep} carto={carto} setCarto={setCarto} />
      )}

      {!error && tab === 'reseau' && (
        <CibReseauTab groupes={groupes} baseById={baseById} openDep={setSelectedDep} />
      )}

      {!error && tab === 'recherche' && (
      <div className="cib-layout">
        {/* ══ Panneau de filtres ══ */}
        <aside className="cib-panel">
          <div className="cib-sec" style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontSize:12.5, fontWeight:700, color:'var(--ink)' }}>Filtres{nbActifs ? ' (' + nbActifs + ')' : ''}</span>
            {nbActifs > 0 && (
              <button onClick={() => { setFilters({ ...CIB_F0 }); setGeQuery(''); }}
                style={{ border:'none', background:'none', cursor:'pointer', fontSize:11.5, fontWeight:600, color:'var(--blue-france)', padding:0 }}>
                Réinitialiser
              </button>
            )}
          </div>

          <div className="cib-sec">

function SourceTag(props) {
  const C = window.FranceMonitorDesignSystem_5343d8 && window.FranceMonitorDesignSystem_5343d8.SourceTag;
  return C ? React.createElement(C, props) : null;
}
function hexRgba(hex, a) {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function Eyebrow({ children, style }) {
  return <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em', color:'var(--text-tertiary)', marginBottom:6, ...style }}>{children}</div>;
}
function Spark({ series, tone, width=60, height=24 }) {
  if (!series || series.length < 2) return null;
  const mn = Math.min(...series), mx = Math.max(...series);
  const rng = mx - mn || 1;
  const pts = series.map((v,i) => {
    const x = (i / (series.length-1)) * width;
    const y = height - ((v - mn) / rng) * height;
    return `${x},${y}`;
  }).join(' ');
  const color = tone === 'pos' ? '#0E8A52' : tone === 'neg' ? '#E1000F' : '#9AA3AF';
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display:'block' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

function buildSenatSeats() {
  const CX=420, CY=432, rI=158, rO=402, ROWS=11;
  const seats = [];
  let idx = 0;
  const groupOrder = ['crce','gest','ser','rdse','rdpi','indep','uc','lr','ni'];
  const allSeats = [];
  for (let row = 0; row < ROWS; row++) {
    const t = row / (ROWS - 1);
    const r = rI + (rO - rI) * t;
    const seatsInRow = Math.round(22 + 20 * t);
    const spanAng = Math.PI * 0.92;
    const startAng = Math.PI + (Math.PI - spanAng) / 2;
    for (let s = 0; s < seatsInRow; s++) {
      const ang = startAng + (s / (seatsInRow - 1)) * spanAng;
      allSeats.push({ x: CX + r * Math.cos(ang), y: CY + r * Math.sin(ang) });
    }
  }
  let seatIdx = 0;
  return groupOrder.flatMap(gid => {
    const g = SENAT_GROUPS.find(x => x.id === gid);
    return Array.from({length: g.seats}, () => ({ ...allSeats[seatIdx++], group: gid, color: g.color }));
  });
}

function SenatHemicycle({ seats, hoveredGroup, onHoverGroup }) {
  const W=840, H=440;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', maxWidth:560, display:'block', margin:'0 auto' }}>
      {seats.map((s,i) => {
        const dim = hoveredGroup && s.group !== hoveredGroup;
        return (
          <circle key={i} cx={s.x} cy={s.y} r={7.2}
            fill={dim ? hexRgba(s.color, 0.22) : s.color}
            stroke="white" strokeWidth="1"
            style={{ cursor:'pointer', transition:'fill 0.15s' }}
            onMouseEnter={() => onHoverGroup(s.group)}
            onMouseLeave={() => onHoverGroup(null)}
          />
        );
      })}
      <text x={420} y={428} textAnchor="middle" fontSize={11} fill="#9AA3AF" fontFamily="var(--font-sans)">Plateau</text>
    </svg>
  );
}

function GouvAvatar({ membre, size = 52 }) {
  const [err, setErr] = React.useState(false);
  const partiColor = GOUV_PARTI_COLORS[membre.parti] || '#9AA3AF';
  const ring = GOUV_RING[membre.statut] || partiColor;
  const initiales = (membre.prenom[0] + membre.nom[0]).toUpperCase();
  const thickness = size >= 90 ? 4 : 3;
  const gap = 3;
  const outer = size + (thickness + gap) * 2;
  const inner = (
    membre.photo && !err
      ? <img src={membre.photo} alt={membre.prenom + ' ' + membre.nom} onError={() => setErr(true)}
          style={{ width:size, height:size, borderRadius:'50%', objectFit:'cover', objectPosition:'top center', display:'block', flex:'none' }} />
      : <div style={{ width:size, height:size, borderRadius:'50%', background:partiColor+'20', display:'flex', alignItems:'center', justifyContent:'center', flex:'none' }}>
          <span style={{ fontFamily:'var(--font-sans)', fontSize:Math.round(size*0.3), fontWeight:700, color:partiColor }}>{initiales}</span>
        </div>
  );
  return (
    <div style={{ position:'relative', width:outer, height:outer, flex:'none' }}>
      <div style={{ position:'absolute', inset:0, borderRadius:'50%', border:`${thickness}px solid ${ring}`, opacity:0.85 }} />
      <div style={{ position:'absolute', inset:thickness+gap, borderRadius:'50%', overflow:'hidden' }}>
        {inner}
      </div>
    </div>
  );
}

                onMouseEnter={() => setHoveredGroup(g.id)}
                onMouseLeave={() => setHoveredGroup(null)}
                style={{ display:'flex', alignItems:'center', gap:10, padding:'7px 8px', borderRadius:6, marginBottom:2, background: isHov ? hexRgba(g.color,0.08) : 'transparent', cursor:'default', transition:'background 0.15s' }}>
                <span style={{ width:10, height:10, borderRadius:99, background:g.color, flexShrink:0 }} />
                <span style={{ flex:1, fontSize:12, color:'var(--text-primary)', fontWeight: isHov ? 600 : 400 }}>{g.label}</span>
                <span style={{ fontSize:12, fontWeight:700, color:g.color }}>{g.seats}</span>
                <span style={{ fontSize:11, color:'var(--text-tertiary)', minWidth:36, textAlign:'right' }}>{pct}%</span>
              </div>
            );
          })}
          <div style={{ marginTop:10, padding:'8px', background:'var(--gray-50)', borderRadius:6, display:'flex', justifyContent:'space-between' }}>
            <span style={{ fontSize:11, color:'var(--text-tertiary)' }}>Total</span>
            <span style={{ fontSize:12, fontWeight:700, color:'var(--text-primary)' }}>{SENAT_TOTAL} sièges</span>
          </div>
        </div>
      </div>

      {/* Next vote intentions */}
      <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'20px', marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:4 }}>Prochain vote — intentions de vote</div>
        <div style={{ fontSize:12, color:'var(--text-tertiary)', marginBottom:16 }}>Projet de loi de programme de recherche · Positions déclarées par groupe</div>

        {/* Tally bar */}
        <div style={{ display:'flex', height:12, borderRadius:6, overflow:'hidden', marginBottom:12 }}>
          {Object.entries(nextTally).map(([pos, n]) => n > 0 && (
            <div key={pos} style={{ flex:n, background:SENAT_POS[pos].c, transition:'flex 0.3s' }} title={`${SENAT_POS[pos].label}: ${n}`} />
          ))}
        </div>

        {/* Legend */}
        <div style={{ display:'flex', gap:16, flexWrap:'wrap', marginBottom:16 }}>
          {Object.entries(nextTally).map(([pos, n]) => n > 0 && (
            <div key={pos} style={{ display:'flex', alignItems:'center', gap:5 }}>
              <span style={{ width:8, height:8, borderRadius:99, background:SENAT_POS[pos].c, display:'inline-block' }} />
              <span style={{ fontSize:11, color:'var(--text-secondary)' }}>{SENAT_POS[pos].label}: <b>{n}</b></span>
            </div>
          ))}
        </div>

        {/* Group intentions table */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:6 }}>
          {SENAT_GROUPS.map(g => {
            const pos = SENAT_NEXT_INTENTIONS[g.id];
            const posData = SENAT_POS[pos];
            return (
              <div key={g.id} style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 10px', borderRadius:6, background:'var(--gray-50)', border:'1px solid var(--border-subtle)' }}>
                <span style={{ width:8, height:8, borderRadius:99, background:g.color, flexShrink:0 }} />
                <span style={{ flex:1, fontSize:11, color:'var(--text-primary)', fontWeight:500 }}>{g.label}</span>
                <span style={{ fontSize:10, fontWeight:700, color:posData.c, background:hexRgba(posData.c,0.1), padding:'2px 6px', borderRadius:99 }}>{posData.label}</span>
              </div>
            );
          })}
        </div>

        {/* Projected result */}
        <div style={{ marginTop:14, padding:'10px 14px', background: nextTally.pour > SENAT_TOTAL/2 ? '#F0FDF4' : '#FFF1F2', border:`1px solid ${nextTally.pour > SENAT_TOTAL/2 ? '#BBF7D0' : '#FECDD3'}`, borderRadius:8, display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ fontSize:20 }}>{nextTally.pour > SENAT_TOTAL/2 ? '✓' : '✗'}</span>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color: nextTally.pour > SENAT_TOTAL/2 ? '#0E8A52' : '#E1000F' }}>
              Résultat projeté : {nextTally.pour > SENAT_TOTAL/2 ? 'Adoption probable' : 'Rejet probable'}
            </div>
            <div style={{ fontSize:11, color:'var(--text-tertiary)' }}>Pour : {nextTally.pour} · Contre : {nextTally.contre} · Majorité absolue : {Math.ceil(SENAT_TOTAL/2)}</div>
          </div>
        </div>
      </div>

      {/* Scrutins */}
      <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'20px' }}>
        <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', marginBottom:14 }}>Derniers scrutins publics</div>
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:'2px solid var(--border-subtle)' }}>
              {['Date','Texte','Pour','Contre','Résultat'].map(h => (
                <th key={h} style={{ textAlign:'left', padding:'6px 10px', fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', color:'var(--text-tertiary)' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {SENAT_SCRUTINS.map((s,i) => (
              <tr key={i} style={{ borderBottom:'1px solid var(--border-subtle)' }}>
                <td style={{ padding:'9px 10px', fontSize:12, color:'var(--text-tertiary)', whiteSpace:'nowrap' }}>{s.date}</td>
                <td style={{ padding:'9px 10px', fontSize:12, color:'var(--text-primary)', fontWeight:500 }}>{s.title}</td>
                <td style={{ padding:'9px 10px', fontSize:12, fontWeight:700, color:'#0E8A52' }}>{s.pour}</td>
                <td style={{ padding:'9px 10px', fontSize:12, fontWeight:700, color:'#E1000F' }}>{s.contre}</td>
                <td style={{ padding:'9px 10px' }}>
                  <span style={{ fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:99, background: s.result==='Adopté' ? '#F0FDF4' : '#FFF1F2', color: s.result==='Adopté' ? '#0E8A52' : '#E1000F', border:`1px solid ${s.result==='Adopté' ? '#BBF7D0' : '#FECDD3'}` }}>
                    {s.result}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ marginTop:16 }}>
        <SourceTag source="Sénat · senat.fr · scrutins publics" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />
      </div>
    </div>
  );
}

const PARTI_LOGOS = {
  re:'public/logos/re.svg',    rn:'public/logos/rn.svg',    lfi:'public/logos/lfi.png',
  lr:'public/logos/lr.svg',    ps:'public/logos/ps.svg',    eco:'public/logos/eco.png',

function PartiLogo({ parti, maxH = 40, fallbackSize = 14 }) {
  const [err, setErr] = React.useState(false);
  const src = PARTI_LOGOS[parti.id];
  if (src && !err) {
    return <img src={src} alt={'Logo ' + parti.name} onError={() => setErr(true)}
      style={{ maxHeight:maxH, maxWidth:'100%', objectFit:'contain', display:'block' }} />;
  }
  return <span style={{ fontSize:fallbackSize, fontWeight:800, color:parti.color }}>{parti.abbr}</span>;
}

  const [hov, setHov] = React.useState(false);
  return (
    <div
      onClick={() => onClick(parti.id)}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{ background:'white', borderRadius:'var(--radius-lg)', border:`1px solid ${hov ? parti.color : 'var(--border-subtle)'}`, padding:'18px', cursor:'pointer', transition:'all 0.15s', transform: hov ? 'translateY(-2px)' : 'none', boxShadow: hov ? '0 4px 16px rgba(0,0,0,0.08)' : 'none' }}>

        <div style={{ fontSize:11, color:'var(--text-tertiary)', marginTop:2 }}>{parti.orientation}</div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>

          <div key={label} style={{ textAlign:'center', padding:'8px 4px', background:'var(--gray-50)', borderRadius:6 }}>
            <div style={{ fontSize:14, fontWeight:700, color:parti.color }}>{val}</div>

      <div style={{ marginTop:12, display:'flex', alignItems:'center', gap:6 }}>
        <span style={{ fontSize:11, color:'var(--text-secondary)' }}>Leader : <b style={{ color:'var(--text-primary)' }}>{parti.leader}</b></span>
      </div>
    </div>
  );
}

function PartiDetail({ parti, onBack, deputes = [], deputesLoading = false }) {
  const [membreSearch, setMembreSearch] = React.useState('');
  const [membreTab, setMembreTab] = React.useState('an');
  const [selectedPerso, setSelectedPerso] = React.useState(null);
  const { news: allPartiNews, loading: partiNewsLoading } = usePartisNews();
  const partiNews = (allPartiNews && allPartiNews[parti.id] && allPartiNews[parti.id].length) ? allPartiNews[parti.id] : (parti.news || []);

  const partiDeps = React.useMemo(() => {
    if (!parti.groupeAN || !deputes.length) return [];
    return deputes
      .filter(d => d.groupe && d.groupe.id === parti.groupeAN)
      .filter(d => !membreSearch || d.nomComplet.toLowerCase().includes(membreSearch.toLowerCase()) || (d.dept || '').toLowerCase().includes(membreSearch.toLowerCase()))
      .sort((a, b) => a.nom.localeCompare(b.nom, 'fr'));
  }, [parti.groupeAN, deputes, membreSearch]);

  if (selectedPerso) {
    return <PPDetail f={selectedPerso} onBack={() => setSelectedPerso(null)} />;
  }

  return (
    <div style={{ padding:'20px 28px', maxWidth:1100, margin:'0 auto' }}>
      {/* Sticky sub-bar */}

        <button onClick={onBack} style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'white', cursor:'pointer', fontSize:12, color:'var(--text-secondary)', fontFamily:'var(--font-sans)' }}>
          <Icon n="arrow-left" s={12} /> Retour

        <SourceTag source="Partis politiques · france-politique.fr" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />

          <div style={{ width:110, height:64, borderRadius:12, background:'#fff', border:'1px solid var(--border-subtle)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, padding:'8px 12px' }}>
            <PartiLogo parti={parti} maxH={44} fallbackSize={20} />

          <div style={{ flex:1 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>

              <span style={{ fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:99, background:hexRgba(parti.color,0.1), color:parti.color, border:`1px solid ${hexRgba(parti.color,0.25)}` }}>{parti.orientation}</span>
            </div>
            <div style={{ display:'flex', gap:16, marginTop:10, flexWrap:'wrap' }}>

                <div key={l} style={{ fontSize:12, color:'var(--text-secondary)' }}><span style={{ color:'var(--text-tertiary)' }}>{l} : </span><b style={{ color:'var(--text-primary)' }}>{v}</b></div>
              ))}
            </div>
            <div style={{ display:'flex', gap:12, marginTop:12 }}>

            { key:'senat', label:`Sénat · ${parti.seatsSenat} sénateurs` },
          ].map(tab => (
            <button key={tab.key} onClick={() => setMembreTab(tab.key)}
              style={{ padding:'12px 16px', background:'none', border:'none', borderBottom:`2px solid ${membreTab === tab.key ? parti.color : 'transparent'}`, cursor:'pointer', fontSize:12.5, fontWeight: membreTab === tab.key ? 700 : 500, color: membreTab === tab.key ? parti.color : 'var(--text-tertiary)', fontFamily:'var(--font-sans)', marginBottom:'-1px', transition:'all 120ms' }}>

            <div style={{ marginLeft:'auto', position:'relative' }}>
              <Icon n="search" s={12} style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)' }} />

              <div style={{ fontSize:12, color:'var(--text-tertiary)', textAlign:'center', padding:'24px 0' }}>Chargement des données…</div>
            ) : partiDeps.length === 0 ? (
              <div style={{ fontSize:12, color:'var(--text-tertiary)', textAlign:'center', padding:'24px 0' }}>Aucun résultat.</div>
            ) : (
              <div style={{ maxHeight:480, overflowY:'auto', paddingRight:4 }}>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))', gap:10 }}>
                  {partiDeps.map(dep => {
                    const color = dep.groupe ? dep.groupe.color : parti.color;
                    return (
                      <div key={dep.id} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:5, padding:'10px 6px', borderRadius:8, border:'1px solid var(--border-subtle)', background:'var(--gray-50)', textAlign:'center' }}>
                        <DepAvatar dep={dep} size={52} />
                        <div>
                          <div style={{ fontSize:10.5, fontWeight:700, color:'var(--text-primary)', lineHeight:1.2 }}>{dep.prenom}</div>
                          <div style={{ fontSize:10.5, fontWeight:700, color:'var(--text-primary)', lineHeight:1.2 }}>{dep.nom}</div>
                          <div style={{ fontSize:9.5, color:'var(--text-tertiary)', marginTop:2, lineHeight:1.2 }}>{dep.dept}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}

        {membreTab === 'senat' && (
          <div style={{ padding:'28px 18px', textAlign:'center' }}>
            <div style={{ fontSize:36, fontWeight:800, color:parti.color, marginBottom:8 }}>{parti.seatsSenat}</div>
            <div style={{ fontSize:13, color:'var(--text-secondary)', marginBottom:16 }}>sénateurs appartenant à {parti.name}</div>
            <div style={{ maxWidth:480, margin:'0 auto', fontSize:12, color:'var(--text-tertiary)', lineHeight:1.7, background:'var(--gray-50)', borderRadius:8, padding:'14px 18px', border:'1px solid var(--border-subtle)' }}>
              Les données nominatives individuelles des sénateurs ne sont pas encore disponibles dans ce portail. Rendez-vous sur&nbsp;
              <span style={{ color:parti.color, fontWeight:600 }}>senat.fr</span> pour consulter la liste complète.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PartisModule() {
  const [view, setView] = React.useState('list');
  const [selectedId, setSelectedId] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [sort, setSort] = React.useState('seats');
  const { deputes, loading: deputesLoading } = useANDeputes();

  const filtered = PARTIS_DATA
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.abbr.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => sort === 'seats' ? b.seatsAN - a.seatsAN : a.name.localeCompare(b.name));

  if (view === 'detail') {
    const parti = PARTIS_DATA.find(p => p.id === selectedId);
    return <PartiDetail parti={parti} onBack={() => setView('list')} deputes={deputes} deputesLoading={deputesLoading} />;
  }

  return (
    <div style={{ padding:'24px 28px', maxWidth:1100, margin:'0 auto' }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)' }}>Partis politiques</div>
        <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>Principaux partis représentés au Parlement</div>
      </div>

      <div style={{ display:'flex', gap:10, marginBottom:20 }}>
        <div style={{ position:'relative', flex:1 }}>
          <Icon n="search" s={13} style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)' }} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher un parti…"
            style={{ width:'100%', padding:'8px 10px 8px 30px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', outline:'none', boxSizing:'border-box' }} />
        </div>
        <select value={sort} onChange={e => setSort(e.target.value)}
          style={{ padding:'8px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', background:'white', cursor:'pointer', outline:'none' }}>
          <option value="seats">Trier par sièges AN</option>
          <option value="alpha">Trier par ordre alphabétique</option>
        </select>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14 }}>
        {filtered.map(p => <PartiCard key={p.id} parti={p} onClick={id => { setSelectedId(id); setView('detail'); }} />)}
      </div>

      <div style={{ marginTop:20 }}>
        <SourceTag source="Partis politiques · france-politique.fr · Assemblée nationale" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />
      </div>
    </div>
  );
}

function ppPositionLabel(themeKey, val) {
  const m = {
    imm:  ['Très ouvert','Ouvert','Modéré','Modéré restrictif','Restrictif','Très restrictif'],
    eco:  ['Ultra-étatiste','Étatiste','Mixte gauche','Centre','Libéral modéré','Libéral','Ultra-libéral'],
    ecol: ['Indifférent','Faible','Tiède','Modéré','Sensible','Prioritaire','Écologiste'],
    eur:  ['Anti-UE','Eurosceptique','Souverainiste','Prudent','Pro-européen','Européiste','Fédéraliste'],
    soc:  ['Inégalitaire','Libéral','Modéré','Centre-gauche','Solidaire','Redistributif'],
    auth: ['Libertaire','Permissif','Souple','Équilibré','Ferme','Sécuritaire','Autoritaire'],
  };
  const arr = m[themeKey] || [];
  const idx = Math.round(((val + 5) / 10) * (arr.length - 1));
  return arr[Math.min(arr.length - 1, Math.max(0, idx))] || '';
}
