<style>
/* ── Color tokens ─────────────────────────────────────────── */
:root {
  --white:#FFFFFF; --gray-50:#F7F8FA; --gray-100:#EFF1F4; --gray-150:#E8EBEF;
  --gray-200:#E1E5EA; --gray-300:#D0D5DD; --gray-400:#AEB4BE; --gray-500:#7B828D;
  --gray-600:#565D67; --gray-700:#3B414A; --gray-800:#242931; --gray-900:#12161C;
  --ink:#0B0E14;
  --blue-france:#000091; --blue-900:#0A1F66; --blue-700:#1B43C4; --blue-600:#2563EB;
  --blue-500:#4178F0; --blue-200:#BCD0FB; --blue-100:#DEE8FE; --blue-50:#F1F5FF;
  --red-700:#B00910; --red-600:#E1000F; --red-500:#EF2D3B; --red-100:#FBDDDF; --red-50:#FEF2F2;
  --green-700:#0A6B43; --green-600:#0E8A52; --green-500:#12A862; --green-100:#C8EFD8; --green-50:#EFFAF3;
  --amber-700:#92500B; --amber-600:#C9760D; --amber-100:#FBE6C2; --amber-50:#FEF8EC;
  --bg:var(--white); --surface:var(--white); --surface-sunken:var(--gray-50);
  --surface-raised:var(--white); --surface-hover:var(--gray-50); --surface-active:var(--gray-100);
  --surface-inverse:var(--ink);
  --text:var(--ink); --text-secondary:var(--gray-600); --text-tertiary:var(--gray-500);
  --text-disabled:var(--gray-400); --text-inverse:var(--white); --text-link:var(--blue-600);
  --text-brand:var(--blue-france);
  --border:var(--gray-200); --border-strong:var(--gray-300); --border-subtle:var(--gray-150);
  --border-focus:var(--blue-600); --divider:var(--gray-150);
  --accent:var(--blue-600); --accent-hover:var(--blue-700); --accent-tint:var(--blue-50);
  --accent-tint-strong:var(--blue-100); --on-accent:var(--white);
  --pos:var(--green-600); --pos-tint:var(--green-50); --neg:var(--red-600); --neg-tint:var(--red-50);
  --warn:var(--amber-600); --warn-tint:var(--amber-50); --info:var(--blue-600); --info-tint:var(--blue-50);
  --viz-1:#2563EB; --viz-2:#12A862; --viz-3:#C9760D; --viz-4:#7C5CFC; --viz-5:#E1000F; --viz-6:#0E9BA8;
  --seq-1:#F1F5FF; --seq-2:#DEE8FE; --seq-3:#BCD0FB; --seq-4:#84A8F6;
  --seq-5:#4178F0; --seq-6:#2563EB; --seq-7:#1B43C4; --seq-8:#0A1F66;
}
/* ── Typography tokens ────────────────────────────────────── */
:root {
  --font-sans:'Schibsted Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --fs-display:56px; --fs-h1:36px; --fs-h2:26px; --fs-h3:20px; --fs-h4:17px;
  --fs-body-lg:17px; --fs-body:15px; --fs-sm:13px; --fs-caption:12px; --fs-label:11px;
  --fs-data-xl:44px; --fs-data-lg:30px; --fs-data-md:20px; --fs-data-sm:14px;
  --lh-tight:1.04; --lh-snug:1.2; --lh-normal:1.45; --lh-relaxed:1.65;
  --ls-tighter:-0.03em; --ls-tight:-0.02em; --ls-snug:-0.01em; --ls-normal:0;
  --ls-wide:0.04em; --ls-label:0.08em;
}
/* ── Spacing / radii / shadows / motion ───────────────────── */
:root {
  --space-0:0; --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:20px; --space-6:24px; --space-8:32px; --space-10:40px;
  --space-12:48px; --space-16:64px; --space-20:80px; --space-24:96px;
  --radius-xs:4px; --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
  --radius-xl:20px; --radius-pill:999px;
  --bw-hair:1px; --bw-thick:1.5px;
  --shadow-xs:0 1px 2px rgba(11,14,20,.04);
  --shadow-sm:0 1px 3px rgba(11,14,20,.06),0 1px 2px rgba(11,14,20,.04);
  --shadow-md:0 4px 12px rgba(11,14,20,.06),0 1px 3px rgba(11,14,20,.04);
  --shadow-lg:0 12px 32px rgba(11,14,20,.10),0 2px 6px rgba(11,14,20,.05);
  --shadow-pop:0 16px 48px rgba(11,14,20,.14);
  --ring-focus:0 0 0 3px rgba(37,99,235,.22);
  --sidebar-w:248px; --topbar-h:56px; --panel-w:360px; --container-max:1240px;
  --ease-out:cubic-bezier(.22,1,.36,1); --ease-in-out:cubic-bezier(.65,0,.35,1);
  --dur-fast:120ms; --dur-base:180ms; --dur-slow:280ms;
}
/* ── Base reset ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--font-sans);font-size:var(--fs-body);line-height:var(--lh-relaxed);
  color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
h1,h2,h3,h4,h5,h6,p,figure{margin:0}
a{color:var(--text-link);text-decoration:none}
a:hover{text-decoration:underline}
table,.tabular,[data-numeric]{font-variant-numeric:tabular-nums}
::selection{background:var(--blue-100);color:var(--ink)}
:focus-visible{outline:none;box-shadow:var(--ring-focus);border-radius:var(--radius-sm)}

/* ── App shell ────────────────────────────────────────────── */
html,body{margin:0;background:var(--bg)}
#root{min-height:100vh}
a{text-decoration:none}
.fixed-screen{height:100vh;overflow:hidden}

/* ── Landing ──────────────────────────────────────────────── */
.landing{background:var(--bg)}
.ln-wrap{max-width:var(--container-max);margin:0 auto;padding:0 32px}
.ln-nav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--border)}
.ln-nav-in{max-width:var(--container-max);margin:0 auto;padding:0 32px;height:60px;display:flex;align-items:center;gap:28px}
.ln-links{display:flex;gap:26px;margin-left:14px}
.ln-links a{font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);font-weight:500}
.ln-links a:hover{color:var(--text)}
.ln-nav-cta{margin-left:auto;display:flex;gap:8px;align-items:center}
.ln-hero{padding:76px 0 40px;display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
.ln-pill{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--blue-700);background:var(--blue-50);border:1px solid var(--blue-100);padding:5px 11px;border-radius:999px}
.ln-pill.dark{color:#fff;background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.2)}
.ln-h1{font-family:var(--font-sans);font-size:56px;line-height:1.04;font-weight:700;letter-spacing:-.035em;color:var(--ink);margin:20px 0 0;text-wrap:balance}
.ln-h1 .accent{color:var(--blue-france)}
.ln-h1 .accent-light{color:var(--blue-200)}
.ln-h1.ondark{color:#fff}
.ln-lead{font-family:var(--font-sans);font-size:18px;line-height:1.6;color:var(--text-secondary);margin:20px 0 0;max-width:520px}
.ln-lead.ondark{color:var(--gray-400)}
.ln-hero-cta{display:flex;gap:12px;margin-top:30px}
.ln-nots{display:flex;gap:18px;margin-top:26px}
.ln-not{font-family:var(--font-sans);font-size:13px;color:var(--text-tertiary);display:flex;align-items:center;gap:7px}
.ln-not svg{color:var(--accent)}
.ln-not.ondark{color:var(--gray-400)}
.ln-hero-centered{padding:70px 0 32px;display:flex;flex-direction:column;align-items:center;text-align:center}
.ln-hero-centered .ln-h1{max-width:880px}
.ln-hero-centered .ln-lead{margin-left:auto;margin-right:auto}
.ln-hero-centered .ln-hero-cta,.ln-hero-centered .ln-nots{justify-content:center}
.ln-hero-centered-vis{width:100%;max-width:720px;margin-top:40px}
.ln-hero-dark{margin:24px 0 8px;background:var(--ink);border-radius:var(--radius-xl);padding:56px 48px}
.ln-hero-dark-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center}
.ln-herovis{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:22px}
.ln-hv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ln-hv-lbl{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-tertiary)}
.ln-sources{padding:30px 0 8px;border-top:1px solid var(--border-subtle)}
.ln-src-h{text-align:center;font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary)}
.ln-src-row{display:flex;flex-wrap:wrap;justify-content:center;gap:12px 14px;margin-top:18px}
.ln-src{font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-md);padding:8px 14px}
.ln-section{padding:64px 0}
.ln-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);text-align:center}
.ln-sec-title{font-family:var(--font-sans);font-size:34px;font-weight:700;letter-spacing:-.025em;color:var(--text);text-align:center;margin:10px 0 0;text-wrap:balance}
.ln-sec-sub{font-family:var(--font-sans);font-size:16px;color:var(--text-secondary);text-align:center;max-width:580px;margin:14px auto 0;line-height:1.6}
.ln-feat{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:42px}
.ln-fcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px}
.ln-ficon{width:40px;height:40px;border-radius:var(--radius-md);background:var(--blue-50);color:var(--accent);display:flex;align-items:center;justify-content:center}
.ln-ftitle{font-family:var(--font-sans);font-size:17px;font-weight:600;color:var(--text);margin:16px 0 0}
.ln-ftext{font-family:var(--font-sans);font-size:14px;line-height:1.6;color:var(--text-secondary);margin:8px 0 0}
.ln-pos{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:38px}
.ln-poscard{border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px}
.ln-poscard.yes{background:var(--ink)}
.ln-pos-k{font-family:var(--font-mono);font-size:12px;letter-spacing:.04em}
.ln-poscard.no .ln-pos-k{color:var(--neg)}
.ln-poscard.yes .ln-pos-k{color:var(--blue-200)}
.ln-pos-t{font-family:var(--font-sans);font-size:19px;font-weight:600;margin-top:10px;letter-spacing:-.01em}
.ln-poscard.no .ln-pos-t{color:var(--text)}
.ln-poscard.yes .ln-pos-t{color:#fff}
.ln-pos-d{font-family:var(--font-sans);font-size:14px;line-height:1.55;margin-top:8px}
.ln-poscard.no .ln-pos-d{color:var(--text-secondary)}
.ln-poscard.yes .ln-pos-d{color:var(--gray-400)}
.ln-users{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:38px}
.ln-ucard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:10px}
.ln-uicon{color:var(--accent)}
.ln-uname{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--text)}
.ln-udesc{font-family:var(--font-sans);font-size:13px;color:var(--text-tertiary);line-height:1.5}
.ln-cta{background:var(--ink);border-radius:var(--radius-xl);padding:56px 48px;text-align:center;margin:16px 0 64px}
.ln-cta-t{font-family:var(--font-sans);font-size:36px;font-weight:700;letter-spacing:-.03em;color:#fff;text-wrap:balance}
.ln-cta-s{font-family:var(--font-sans);font-size:16px;color:var(--gray-400);margin:14px auto 0;max-width:480px;line-height:1.6}
.ln-cta-b{display:flex;gap:12px;justify-content:center;margin-top:28px}
.ln-foot{border-top:1px solid var(--border);padding:32px 0;display:flex;align-items:center;justify-content:space-between}
.ln-meta{font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary)}

/* ── Auth ─────────────────────────────────────────────────── */
.auth{display:grid;grid-template-columns:minmax(0,1fr) 1.05fr;height:100vh}
.auth-form-col{display:flex;flex-direction:column;background:var(--bg);overflow-y:auto}
.auth-form-top{padding:28px 40px;flex-shrink:0}
.auth-form-mid{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 40px}
.auth-form-inner{width:100%;max-width:380px}
.auth-form-foot{padding:22px 40px;font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary);flex-shrink:0}
.auth-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.auth-title{font-family:var(--font-sans);font-size:30px;font-weight:700;letter-spacing:-.025em;color:var(--text);margin:8px 0 0}
.auth-sub{font-family:var(--font-sans);font-size:15px;line-height:1.55;color:var(--text-secondary);margin:10px 0 0}
.sso-group{display:flex;flex-direction:column;gap:10px;margin-top:26px}
.auth-or{display:flex;align-items:center;gap:14px;margin:22px 0;font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary)}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-fields{display:flex;flex-direction:column;gap:16px;margin-top:4px}
.af{display:flex;flex-direction:column;gap:6px}
.af-label{font-family:var(--font-sans);font-size:12px;font-weight:500;color:var(--text-secondary)}
.af-box{display:flex;align-items:center;height:44px;padding:0 12px;border-radius:var(--radius-md);background:var(--surface);border:1px solid var(--border);transition:border-color var(--dur-fast),box-shadow var(--dur-fast)}
.af-input{flex:1;border:none;outline:none;background:none;font-family:var(--font-sans);font-size:14px;color:var(--text);height:100%}
.af-eye{border:none;background:none;cursor:pointer;color:var(--text-tertiary);display:inline-flex;padding:4px}
.af-eye:hover{color:var(--text-secondary)}
.auth-row-between{display:flex;align-items:center;justify-content:space-between}
.auth-check{display:flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);cursor:pointer}
.auth-check.terms{align-items:flex-start;line-height:1.5}
.auth-check input{accent-color:var(--accent);width:15px;height:15px;margin-top:1px}
.auth-link{border:none;background:none;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:var(--accent);font-weight:500;padding:0}
.auth-link:hover{color:var(--accent-hover)}
.auth-link.strong{font-weight:600}
.auth-switch{margin-top:24px;font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);text-align:center}
.auth-back{display:inline-flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);padding:0;margin-bottom:18px}
.auth-back:hover{color:var(--text)}
.auth-confirm-icon{width:52px;height:52px;border-radius:50%;background:var(--blue-50);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.auth-status{height:100vh;background:var(--blue-france);display:flex;align-items:center;justify-content:center}
.auth-status-inner{display:flex;flex-direction:column;align-items:center;text-align:center}
.auth-status-t{font-family:var(--font-sans);font-size:22px;font-weight:700;color:#fff;margin-top:28px;letter-spacing:-.02em}
.auth-status-s{font-family:var(--font-sans);font-size:14px;color:var(--blue-200);margin-top:8px}
.auth-spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;animation:fmspin .8s linear infinite;margin-top:40px}
@keyframes fmspin{to{transform:rotate(360deg)}}
.auth-check-circle{width:64px;height:64px;border-radius:50%;background:var(--green-500);display:flex;align-items:center;justify-content:center;margin-top:36px;animation:fmpop .4s var(--ease-out)}
@keyframes fmpop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Dashboard ────────────────────────────────────────────── */
.db-app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden;background:var(--surface-sunken)}
.db-side{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
.db-brand{display:flex;align-items:center;padding:0 16px;height:var(--topbar-h);border-bottom:1px solid var(--border);flex-shrink:0}
.db-side-scroll{overflow-y:auto;padding:12px 10px;flex:1}
.db-side-cat{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary);padding:8px 10px 6px}
.db-mod{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:8px 10px;border:none;background:none;border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);transition:background var(--dur-fast),color var(--dur-fast)}
.db-mod:hover{background:var(--surface-hover);color:var(--text)}
.db-mod.on{background:var(--blue-50);color:var(--blue-700);font-weight:600}
.db-mod svg{flex-shrink:0}
.db-main{display:flex;flex-direction:column;min-width:0;min-height:0}
.db-top{display:flex;align-items:center;gap:16px;height:var(--topbar-h);padding:0 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.db-search{max-width:460px;flex:1}
.db-spacer{flex:1}
.db-actions{display:flex;align-items:center;gap:6px}
.db-dot{position:relative}
.db-dot::after{content:'';position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--red-600);border:1.5px solid var(--surface)}
.db-div{width:1px;height:24px;background:var(--border);margin:0 4px}
.db-avatar-btn{border:none;background:none;cursor:pointer;padding:0;display:inline-flex}
.db-menu-scrim{position:fixed;inset:0;z-index:30}
.db-menu{position:absolute;right:0;top:calc(100% + 8px);width:244px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:8px;z-index:31}
.db-menu-head{display:flex;align-items:center;gap:10px;padding:8px 8px 12px;border-bottom:1px solid var(--border-subtle);margin-bottom:6px}
.db-menu-nm{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--text)}
.db-menu-em{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
.db-menu-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px;border:none;background:none;cursor:pointer;border-radius:var(--radius-md);font-family:var(--font-sans);font-size:14px;color:var(--text-secondary)}
.db-menu-item:hover{background:var(--surface-hover);color:var(--text)}
.db-menu-item.danger{color:var(--neg)}
.db-menu-item.danger:hover{background:var(--red-50)}
.db-menu-sep{height:1px;background:var(--border-subtle);margin:6px 0}
.db-stage{display:grid;grid-template-columns:1fr var(--panel-w);flex:1;min-height:0}
.db-mapwrap{position:relative;padding:22px;min-width:0;display:flex;flex-direction:column;gap:14px;overflow:hidden}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
        </select>
      </TweakRow>
    );
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function Icon({ n, s = 18, color, style = {} }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", n);
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs: { width: s, height: s } });
    }
  }, [n, s]);
  return <span ref={ref} style={{ display: "inline-flex", color, ...style }} />;
}

const frpct1 = (n) => n.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

// Area chart — recreated per handoff spec (not part of the DS bundle).
function AreaChart({ series, labels = [], color = "var(--accent)", h = 230, id = "c" }) {
  const w = 720, padL = 40, padR = 14, padT = 14, padB = 26;
  const min = Math.min(...series, 0), max = Math.max(...series);
  const span = (max - min) || 1;
  const X = (i) => padL + i * ((w - padL - padR) / (series.length - 1 || 1));
  const Y = (v) => padT + (1 - (v - min) / span) * (h - padT - padB);
  const pts = series.map((v, i) => [X(i), Y(v)]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = `${line} L ${X(series.length - 1)} ${h - padB} L ${padL} ${h - padB} Z`;
  const ticks = 4;
  const gridY = Array.from({ length: ticks + 1 }, (_, i) => min + (span * i) / ticks);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height: 'auto', display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={id + '-g'} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {gridY.map((gv, i) => (
        <g key={'g' + i}>
          <line x1={padL} x2={w - padR} y1={Y(gv)} y2={Y(gv)} stroke="var(--border-subtle)" strokeWidth="1" />
          <text x={padL - 8} y={Y(gv) + 3} textAnchor="end" style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--text-tertiary)' }}>{frpct1(gv)}</text>
        </g>
      ))}
      <path d={area} fill={`url(#${id}-g)`} />
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="3.4" fill={color} stroke="var(--surface)" strokeWidth="2" />
      {labels.map((lb, i) => (
        <text key={'t' + i} x={X(i * (series.length - 1) / (labels.length - 1))} y={h - 8}
              textAnchor={i === 0 ? 'start' : i === labels.length - 1 ? 'end' : 'middle'}
              style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--text-tertiary)' }}>{lb}</text>
      ))}
    </svg>
  );
}

const MOIS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MOIS_SHORT = ['Janv.','Févr.','Mars','Avr.','Mai','Juin','Juil.','Août','Sept.','Oct.','Nov.','Déc.'];

function fmtPeriod(p, short) {
  const [y, m] = p.split('-');
  const idx = parseInt(m) - 1;
  return (short ? MOIS_SHORT[idx] : MOIS_FR[idx]) + ' ' + y;
}

function parseSDMX(json) {
  try {
    const timeDim = json.structure.dimensions.observation.find(d => d.id === 'TIME_PERIOD');
    if (!timeDim) return {};
    const periods = timeDim.values.map(v => v.id);
    const seriesKey = Object.keys(json.dataSets[0].series)[0];
    const obs = json.dataSets[0].series[seriesKey].observations;
    const result = {};
    Object.entries(obs).forEach(([idx, vals]) => {
      const period = periods[parseInt(idx)];
      if (period && vals[0] != null) result[period] = Math.round(vals[0] * 10) / 10;
    });
    return result;
  } catch(e) { return {}; }
}

function useInflData() {
  const [state, setState] = React.useState({ loading: true, error: false, data: {} });
  React.useEffect(() => {
    let alive = true;
    fetch('https://data-api.ecb.europa.eu/service/data/ICP/M.FR.N.000000.4.ANR?lastNObservations=84&format=jsondata')
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(json => { if (alive) setState({ loading: false, error: false, data: parseSDMX(json) }); })
      .catch(() => { if (alive) setState({ loading: false, error: true, data: {} }); });
    return () => { alive = false; };
  }, []);
  return state;
}

function getMonthly(apiData, apiError) {
  return (apiError || Object.keys(apiData).length === 0) ? STATIC_MONTHLY : apiData;
}

function getAnnualAvg(monthly, year) {
  const vals = Object.entries(monthly)
    .filter(([k]) => k.startsWith(year + '-'))
    .map(([, v]) => v);
  if (!vals.length) return null;
  return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length * 10) / 10;
}

function getLatestPeriod(monthly) {
  return Object.keys(monthly).sort().slice(-1)[0] || null;
}

function parseInflQuery(q) {
  const yearMatch = String(q).match(/\b(19|20)\d{2}\b/);
  const year = yearMatch ? yearMatch[0] : null;
  const low = String(q).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  let indicator = 'IPC ensemble';
  if (/energ/.test(low)) indicator = 'Énergie';
  else if (/aliment|nourrit/.test(low)) indicator = 'Alimentation';
  else if (/sous.jacent|coeur|hors energ/.test(low)) indicator = 'Inflation sous-jacente';
  else if (/service/.test(low)) indicator = 'Services';
  else if (/logement|loyer/.test(low)) indicator = 'Logement';
  else if (/transport/.test(low)) indicator = 'Transports';
  else if (/sante|medical|soin/.test(low)) indicator = 'Santé';
  const wantsLatest = /dernier|recent|actuel|maintenant|aujourd/.test(low) && !year;
  return { year, indicator, wantsLatest };
}

function InflInterroger({ monthly, apiSource }) {
  const { Button: Btn, SourceTag, DataTable } = window.FranceMonitorDesignSystem_5343d8;
  const [query, setQuery] = React.useState('');
  const [parsed, setParsed] = React.useState(null);

  const run = () => { const q = query.trim(); if (q) setParsed(parseInflQuery(q)); };
  const onKey = (e) => { if (e.key === 'Enter') run(); };

  const latestPeriod = getLatestPeriod(monthly || STATIC_MONTHLY);
  const safeMonthly = monthly || STATIC_MONTHLY;

  let result = null;
  if (parsed) {
    const { year, indicator, wantsLatest } = parsed;
    if (wantsLatest && latestPeriod) {
      const val = safeMonthly[latestPeriod];
      result = { type: 'latest', period: latestPeriod, val, indicator };
    } else if (year) {
      const annualVal = getAnnualAvg(safeMonthly, year);
      const monthRows = Object.entries(safeMonthly)
        .filter(([k]) => k.startsWith(year + '-'))
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([period, v]) => ({ m: fmtPeriod(period, false), v: (v >= 0 ? '+' : '') + v.toFixed(1).replace('.', ',') + ' %' }));
      result = { type: 'year', year, annualVal, monthRows, indicator };
    } else {
      result = { type: 'unknown', indicator };
    }
  }

  const EXAMPLES = ['inflation 2022', 'inflation 2024', 'dernier chiffre', 'alimentation 2023', 'énergie 2022'];

  return (
    <div className="infl-body">
      <div className="infl-eyebrow" style={{ marginBottom: 10 }}>Chercher une donnée</div>
      <div className="infl-q-row">
        <div className="infl-q-field">
          <span className="ico"><InflSearchIcon /></span>
          <input className="infl-q-input" value={query} placeholder="Ex. inflation 2022, énergie 2023, dernier chiffre…"
                 onChange={(e) => setQuery(e.target.value)} onKeyDown={onKey} />
        </div>
        <Btn variant="primary" onClick={run}>Rechercher</Btn>
      </div>
      <div className="infl-q-help">
        Exemples : {EXAMPLES.map((ex, i) => (
          <span key={ex}>
            <button style={{ background:'none',border:'none',padding:0,color:'var(--accent)',cursor:'pointer',font:'inherit',fontSize:13 }}
              onClick={() => { setQuery(ex); setParsed(parseInflQuery(ex)); }}>{ex}</button>
            {i < EXAMPLES.length - 1 ? ' · ' : ''}
          </span>
        ))}
      </div>

      {result && (
        <>
          <div className="infl-eyebrow" style={{ margin: '28px 0 10px' }}>Résultat</div>
          <div className="infl-resp">
            <div className="infl-resp-h">
              <div className="infl-chips">
                <span className="infl-chip"><i>Indicateur · </i><b>{result.indicator}</b></span>
                <span className="infl-chip"><i>Territoire · </i><b>France</b></span>
                {result.type === 'year' && <span className="infl-chip"><i>Année · </i><b>{result.year}</b></span>}
                {result.type === 'latest' && <span className="infl-chip"><i>Période · </i><b>{fmtPeriod(result.period, false)}</b></span>}
              </div>
              <SourceTag source={apiSource || 'INSEE'} date={result.type === 'latest' ? fmtPeriod(result.period, false) : result.year} />
            </div>

            {result.type === 'latest' && (
              <div className="infl-resp-num">
                <div className="n">{(result.val >= 0 ? '+' : '') + result.val.toFixed(1).replace('.', ',')}<span>%</span></div>
                <p>Dernier taux d'inflation disponible (<b>{fmtPeriod(result.period, false)}</b>) — glissement annuel, indice des prix à la consommation, France.</p>
              </div>
            )}

            {result.type === 'year' && result.annualVal !== null && (
              <>
                <div className="infl-resp-num">
                  <div className="n">{(result.annualVal >= 0 ? '+' : '') + result.annualVal.toFixed(1).replace('.', ',')}<span>%</span></div>
                  <p>Moyenne de l'inflation sur l'année <b>{result.year}</b> — calculée sur {result.monthRows.length} mois disponibles.</p>
                </div>
                {result.monthRows.length > 0 && (
                  <DataTable dense
                    columns={[
                      { key: 'm', header: 'Mois ' + result.year, strong: true },
                      { key: 'v', header: 'Inflation sur un an', align: 'right', mono: true },
                    ]}
                    rows={result.monthRows} />
                )}
              </>
            )}

            {result.type === 'year' && result.annualVal === null && (
              <div className="infl-note">Aucune donnée pour {result.year}. Les données disponibles vont de 2019 à aujourd'hui. Essayez « inflation 2022 » ou « dernier chiffre ».</div>
            )}

            {result.type === 'unknown' && (
              <div className="infl-note">Précisez une année (ex. « inflation 2022 ») ou tapez « dernier chiffre » pour la valeur la plus récente.</div>
            )}
          </div>
          <div className="infl-resp-actions">
            <Btn variant="secondary">Exporter CSV</Btn>
          </div>
        </>
      )}

      {!result && (
        <div style={{ marginTop:28,padding:'24px',background:'var(--surface-sunken)',borderRadius:'var(--radius-lg)',textAlign:'center',color:'var(--text-tertiary)',fontSize:14 }}>
          Tapez votre question ci-dessus et appuyez sur Entrée, ou cliquez sur un exemple.
        </div>
      )}
    </div>
  );
}

const EU_PROJ = { minLon:-12, maxLon:45, minLat:33, maxLat:72, w:640, h:480 };
const EU27_SET = new Set(['AT','BE','BG','CY','CZ','DE','DK','EE','ES','FI','FR','GR','HR','HU','IE','IT','LT','LU','LV','MT','NL','PL','PT','RO','SE','SI','SK']);

function euXY(lon, lat) {
  const x = (lon - EU_PROJ.minLon) / (EU_PROJ.maxLon - EU_PROJ.minLon) * EU_PROJ.w;
  const y = (EU_PROJ.maxLat - lat) / (EU_PROJ.maxLat - EU_PROJ.minLat) * EU_PROJ.h;
  return [x, y];
}

function ringToSVGD(coords) {
  const pts = coords.filter((_, i) => i % 2 === 0); // thin by skipping every other for perf
  return pts.map((c, i) => {
    const [x, y] = euXY(c[0], c[1]);
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ') + 'Z';
}

function geomToSVGD(geometry) {
  if (!geometry) return '';
  if (geometry.type === 'Polygon') return ringToSVGD(geometry.coordinates[0]);
  if (geometry.type === 'MultiPolygon') return geometry.coordinates.map(p => ringToSVGD(p[0])).join(' ');
  return '';
}

}

function parseEUSDMX(json) {
  try {
    const seriesDims = json.structure.dimensions.series;
    const obsDims = json.structure.dimensions.observation;
    const timeDim = obsDims.find(d => d.id === 'TIME_PERIOD');
    const periods = timeDim.values.map(v => v.id);
    const refAreaDim = seriesDims.find(d => d.id === 'REF_AREA');
    const countries = refAreaDim.values.map(v => v.id);
    const refAreaIdx = seriesDims.indexOf(refAreaDim);
    const result = {};
    Object.entries(json.dataSets[0].series).forEach(([key, series]) => {
      const parts = key.split(':').map(Number);
      const code = countries[parts[refAreaIdx]];
      if (!code) return;
      result[code] = {};
      Object.entries(series.observations).forEach(([oi, vals]) => {
        const p = periods[parseInt(oi)];
        if (p && vals[0] != null) result[code][p] = Math.round(vals[0] * 10) / 10;
      });
    });
    return result;
  } catch(e) { return {}; }
}

function inflColor(v) {
  if (v == null) return 'var(--gray-200)';
  if (v < 0)    return '#0A6B43';
  if (v < 2)    return '#12A862';
  if (v < 3.5)  return '#C9760D';
  if (v < 6)    return '#E1000F';
  return '#7B0008';
}

function getEUValue(euData, code, period, useStatic) {
  if (!useStatic && euData[code] && euData[code][period] != null) return euData[code][period];
  const year = period ? parseInt(period.slice(0, 4)) : null;
  return (year && EU_STATIC_ANNUAL[code]?.[year]) ?? null;
}

function genPeriods(fromYear) {
  const result = [];
  const now = new Date();
  for (let y = fromYear; y <= now.getFullYear(); y++) {
    const maxM = y === now.getFullYear() ? now.getMonth() + 1 : 12;
    for (let m = 1; m <= maxM; m++) result.push(y + '-' + String(m).padStart(2, '0'));
  }
  return result.reverse();
}

function SortableEUTable({ rows, euAvg }) {
  const [sortKey, setSortKey] = React.useState('val');
  const [sortDir, setSortDir] = React.useState('desc');

  function handleSort(key) {
    if (key === sortKey) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(key); setSortDir(key === 'pays' ? 'asc' : 'desc'); }
  }

  const sorted = [...rows].sort((a, b) => {
    if (sortKey === 'pays') return sortDir === 'asc' ? a._raw.name.localeCompare(b._raw.name) : b._raw.name.localeCompare(a._raw.name);
    const va = sortKey === 'diff' ? (a._raw.v - euAvg) : a._raw.v;
    const vb = sortKey === 'diff' ? (b._raw.v - euAvg) : b._raw.v;
    return sortDir === 'asc' ? va - vb : vb - va;
  }).map((r, i) => ({ ...r, rang: i + 1 }));

  const cols = [
    { key:'rang', label:'#', numeric:true },
    { key:'pays', label:'Pays', numeric:false },
    { key:'val', label:'Inflation IPCH', numeric:true },
    { key:'diff', label:'vs moy. UE', numeric:true },
  ];

  const SortIcon = ({ col }) => {
    if (col !== sortKey) return <span style={{ opacity:0.3, fontSize:9 }}>⇅</span>;
    return <span style={{ fontSize:9 }}>{sortDir === 'desc' ? '▼' : '▲'}</span>;
  };

  return (
    <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', overflow:'hidden' }}>
      <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
        <thead>
          <tr style={{ background:'var(--gray-50)', borderBottom:'1px solid var(--border)' }}>
            {cols.map(col => (
              <th key={col.key} onClick={() => handleSort(col.key)}
                  style={{ padding:'8px 12px', textAlign: col.numeric ? 'right' : 'left',
                           fontWeight:600, fontSize:11, color:'var(--text-secondary)',
                           textTransform:'uppercase', letterSpacing:'0.06em', cursor:'pointer',
                           userSelect:'none', whiteSpace:'nowrap' }}>
                {col.label} <SortIcon col={col.key} />
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.map((row, i) => (
            <tr key={row._raw.code} style={{ borderBottom: i < sorted.length-1 ? '1px solid var(--border-subtle)' : 'none',
                                              background: i % 2 === 0 ? 'white' : 'var(--gray-50)' }}>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text-tertiary)' }}>{row.rang}</td>
              <td style={{ padding:'7px 12px', fontWeight:600 }}>{row._raw.flag} {row._raw.name}</td>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontWeight:700, color: inflColor(row._raw.v) }}>{row.val}</td>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontSize:12,

  const nationalVal = monthly[period] ?? null;
  const regionValues = React.useMemo(() => {
    if (nationalVal == null) return {};
    const r = {};

    return r;
  }, [nationalVal]);

  const selRegion = selected ? FRANCE_REGIONS.find(r => r.code === selected) : null;
  const selVal = selRegion ? regionValues[selRegion.code] : null;

  function handleDeptSort(key) {
    if (key === deptSortKey) setDeptSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setDeptSortKey(key); setDeptSortDir(key === 'name' ? 'asc' : 'desc'); }

  const regionRows = React.useMemo(() => {
    return [...FRANCE_REGIONS]
      .map(r => ({ code: r.code, name: r.nom, v: regionValues[r.code] ?? null }))

        if (deptSortKey === 'name') return deptSortDir === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
        const va = deptSortKey === 'diff' ? (a.v != null && nationalVal != null ? a.v - nationalVal : null) : a.v;
        const vb = deptSortKey === 'diff' ? (b.v != null && nationalVal != null ? b.v - nationalVal : null) : b.v;
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;

function parseMultiCatSDMX(json) {
  try {
    const serDims = json.structure.dimensions.series;
    const obsDims = json.structure.dimensions.observation;
    const timeDim = obsDims.find(d => d.id === 'TIME_PERIOD');
    const periods = timeDim.values.map(v => v.id);
    const catDim = serDims.find(d => d.id === 'ICP_ITEM');
    const result = {};
    Object.entries(json.dataSets[0].series).forEach(([key, s]) => {
      const parts = key.split(':').map(Number);
      const catIdx = serDims.indexOf(catDim);
      const cat = catDim.values[parts[catIdx]]?.id;
      if (!cat) return;
      result[cat] = {};
      Object.entries(s.observations).forEach(([oi, vals]) => {
        const p = periods[parseInt(oi)];
        if (p && vals[0] != null) result[cat][p] = Math.round(vals[0] * 10) / 10;
      });
    });
    return result;
  } catch(e) { return {}; }
}

function useInflCats() {
  const [state, setState] = React.useState({ loading: true, data: {} });
  React.useEffect(() => {
    let alive = true;
    fetch('https://data-api.ecb.europa.eu/service/data/ICP/M.FR.N.010000+045000+070000+060000+110000.4.ANR?lastNObservations=3&format=jsondata')
      .then(r => r.json())
      .then(json => { if (alive) setState({ loading: false, data: parseMultiCatSDMX(json) }); })
      .catch(() => { if (alive) setState({ loading: false, data: {} }); });
    return () => { alive = false; };
  }, []);
  return state;
}

function ExportMenu({ filename, title, columns, getRows }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    function onDown(e) { if (!ref.current?.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, [open]);

  function exportCSV() {
    setOpen(false);
    const rows = getRows();
    const hdr = columns.map(c => '"' + c.label + '"').join(',');
    const body = rows.map(r => columns.map(c => '"' + String(r[c.key] ?? '') + '"').join(',')).join('\n');
    const blob = new Blob(['﻿' + hdr + '\n' + body], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename + '.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function exportPDF() {
    setOpen(false);
    const rows = getRows();
    const w = window.open('', '_blank', 'width=900,height=700');
    const thRow = columns.map(c => '<th>' + c.label + '</th>').join('');
    const trRows = rows.map(r => '<tr>' + columns.map(c => '<td>' + String(r[c.key] ?? '') + '</td>').join('') + '</tr>').join('');
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${filename}</title>
    <style>
      body{font-family:Arial,sans-serif;font-size:12px;margin:28px;color:#111}
      h2{font-size:17px;color:#000091;margin:0 0 4px}
      .sub{font-size:11px;color:#666;margin:0 0 18px}
      table{width:100%;border-collapse:collapse}
      th{background:#f0f4ff;padding:7px 10px;text-align:left;border:1px solid #c8d0e8;font-size:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
      td{padding:6px 10px;border:1px solid #ddd;font-size:12px}
      tr:nth-child(even){background:#f8f9ff}
      .footer{margin-top:18px;font-size:10px;color:#999;border-top:1px solid #eee;padding-top:8px}
    </style></head><body>
    <h2>${title || filename}</h2>
    <div class="sub">France Monitor · Source : BCE / INSEE · ${new Date().toLocaleDateString('fr-FR',{year:'numeric',month:'long',day:'numeric'})}</div>
    <table><thead><tr>${thRow}</tr></thead><tbody>${trRows}</tbody></table>
    <div class="footer">Données officielles — Banque Centrale Européenne (BCE) / INSEE</div>
    <script>window.onload=function(){setTimeout(function(){window.print();},500);}<\/script>
    </body></html>`);
    w.document.close();
  }

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={() => setOpen(!open)}
        style={{ display:'flex', alignItems:'center', gap:5, padding:'5px 10px', borderRadius:'var(--radius-sm)',
                 border:'1px solid var(--border)', background:'white', cursor:'pointer', fontSize:12,
                 fontFamily:'var(--font-sans)', color:'var(--text-secondary)', whiteSpace:'nowrap' }}>
        <Icon n="download" s={13} /> Exporter ▾
      </button>
      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 4px)', right:0, background:'white',
                      border:'1px solid var(--border)', borderRadius:'var(--radius-md)',
                      boxShadow:'var(--shadow-md)', zIndex:100, minWidth:170, overflow:'hidden' }}>
          <button onClick={exportCSV}
            style={{ display:'flex', alignItems:'center', gap:8, width:'100%', padding:'9px 14px',
                     background:'none', border:'none', cursor:'pointer', fontSize:12, textAlign:'left',
                     fontFamily:'var(--font-sans)', color:'var(--text)' }}>
            <Icon n="table-2" s={14} color="#0E8A52" /> Excel (CSV)
          </button>
          <div style={{ height:1, background:'var(--border)' }} />
          <button onClick={exportPDF}
            style={{ display:'flex', alignItems:'center', gap:8, width:'100%', padding:'9px 14px',
                     background:'none', border:'none', cursor:'pointer', fontSize:12, textAlign:'left',
                     fontFamily:'var(--font-sans)', color:'var(--text)' }}>
            <Icon n="file-text" s={14} color="#E1000F" /> PDF (impression)
          </button>
        </div>
      )}
    </div>
  );
}

function parseStationRecord(rec) {
  const lat = parseFloat(rec.latitude || rec.lat || (rec.geom && rec.geom.lat) || 0);
  const lon = parseFloat(rec.longitude || rec.lon || (rec.geom && rec.geom.lon) || 0);
  const prix = {};
  const keys = { Gazole:'prix_gazole_valeur', SP95:'prix_sp95_valeur', SP98:'prix_sp98_valeur', E10:'prix_e10_valeur', E85:'prix_e85_valeur', GPLc:'prix_gplc_valeur' };
  Object.entries(keys).forEach(([ft, k]) => { if (rec[k] != null) prix[ft] = parseFloat(rec[k]); });
  if (rec.prix && Array.isArray(rec.prix)) rec.prix.forEach(p => { if (p.nom && p.valeur) prix[p.nom] = parseFloat(p.valeur); });
  return {
    id: String(rec.id),
    nom: rec.nom || rec.ensigne || ('Station ' + rec.id),
    adresse: rec.adresse || '',
    ville: rec.ville || '',
    cp: rec.cp || '',
    dept: rec.dep_code || rec.code_dep || (rec.cp || '').slice(0, 2),
    lat, lon, prix,
    h24: rec.automate_24_24 === 'Oui' || rec.automate_24_24 === '1',
  };
}

function useCarburantData() {
  const [state, setState] = React.useState({ loading: true, stations: [], progress: 0, total: 0, error: false, fromApi: false });
  React.useEffect(() => {
    let alive = true;
    const LIMIT = 100;
    const FIELDS = 'id,adresse,ville,cp,dep_code,latitude,longitude,prix_gazole_valeur,prix_sp95_valeur,prix_sp98_valeur,prix_e10_valeur,prix_e85_valeur,prix_gplc_valeur,automate_24_24';

    async function loadAll() {
      try {
        const r0 = await fetch(`${CARB_API_URL}?limit=${LIMIT}&offset=0&select=${FIELDS}`);
        if (!r0.ok) throw new Error(r0.status);
        const d0 = await r0.json();
        const total = d0.total_count || 0;
        let all = (d0.results || []).map(parseStationRecord).filter(s => s.lat && s.lon);
        if (!alive) return;
        setState({ loading: total > LIMIT, stations: [...all], total, progress: all.length, error: false, fromApi: true });

        if (total > LIMIT) {
          const offsets = [];
          for (let o = LIMIT; o < total; o += LIMIT) offsets.push(o);
          for (let i = 0; i < offsets.length; i += 10) {
            if (!alive) return;
            const chunk = offsets.slice(i, i + 10);
            const batches = await Promise.all(chunk.map(o =>
              fetch(`${CARB_API_URL}?limit=${LIMIT}&offset=${o}&select=${FIELDS}`)
                .then(r => r.json())
                .then(d => (d.results || []).map(parseStationRecord).filter(s => s.lat && s.lon))
                .catch(() => [])
            ));
            all = [...all, ...batches.flat()];
            if (!alive) return;
            setState(s => ({ ...s, stations: [...all], progress: all.length }));
          }
        }
        if (!alive) return;
        setState(s => ({ ...s, loading: false }));
      } catch(e) {
        if (alive) setState({ loading: false, stations: STATIC_CARB, error: true, fromApi: false, progress: 0, total: 0 });
      }
    }

    loadAll();
    return () => { alive = false; };
  }, []);
  return state;
}

function carbPriceColor(price, allPrices) {
  if (price == null || allPrices.length === 0) return 'var(--gray-300)';
  const mn = Math.min(...allPrices), mx = Math.max(...allPrices);
  const r = (price - mn) / ((mx - mn) || 1);
  if (r < 0.15) return '#0A6B43';
  if (r < 0.35) return '#12A862';
  if (r < 0.65) return '#C9760D';
  if (r < 0.85) return '#E1000F';
  return '#7B0008';
}

function CarbMap({ stations, fuelId, selected, onSelect }) {
  const { FranceMap } = window.FranceMonitorDesignSystem_5343d8;
  const allPrices = stations.map(s => s.prix[fuelId]).filter(v => v != null);

  const dots = React.useMemo(() => stations.map(s => {
    const { x, y } = stationToSvg(s.lon, s.lat);
    if (isNaN(x) || isNaN(y) || x < -200 || x > 1200 || y < -200 || y > 1163) return null;
    return { s, x, y, v: s.prix[fuelId] };
  }).filter(Boolean), [stations, fuelId]);

  return (
    <div style={{ position:'relative', flex:1, minWidth:0, overflow:'hidden' }}>
      <FranceMap height="100%" />
      <svg viewBox="0 0 1000 963" preserveAspectRatio="xMidYMid meet"
           style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none' }}>
        {dots.map(({ s, x, y, v }) => {
          const isSel = selected === s.id;
          return (
            <circle key={s.id} cx={x} cy={y} r={isSel ? 8 : 3.5}
              fill={carbPriceColor(v, allPrices)}
              stroke="white" strokeWidth={isSel ? 2.5 : 0.8}
              pointerEvents="all"
              onClick={() => onSelect(s.id === selected ? null : s.id)}
              style={{ cursor:'pointer', transition:'r 120ms' }}>
              <title>{s.nom} · {s.ville} · {v ? v.toFixed(3) + ' €/L' : 'N/D'}</title>
            </circle>
          );
        })}
      </svg>
    </div>
  );
}

    if (key === sortKey) setSortDir(d => d === 'asc' ? 'desc' : 'asc');

    </div>
  );
}

function CarburantHistorique({ stations, fuelId, fuelTypes, initStation }) {
  const { Alert } = window.FranceMonitorDesignSystem_5343d8;
  const [histStn, setHistStn] = React.useState(initStation || null);
  const [search, setSearch] = React.useState('');
  const [results, setResults] = React.useState([]);

  React.useEffect(() => { if (initStation) setHistStn(initStation); }, [initStation && initStation.id]);

  function doSearch(q) {
    setSearch(q);
    if (q.length < 2) { setResults([]); return; }
    setResults(stations.filter(s =>
      s.nom.toLowerCase().includes(q.toLowerCase()) || s.ville.toLowerCase().includes(q.toLowerCase())
    ).slice(0, 8));
  }

  const mockHistory = React.useMemo(() => {
    if (!histStn) return [];
    const base = histStn.prix[fuelId] || 1.75;
    return Array.from({ length: 30 }, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (29 - i));
      const noise = Math.sin(i * 0.8) * 0.012 + (Math.random() - 0.5) * 0.006;
      const trend = i < 15 ? -0.001 * i : 0.001 * (i - 15);
      return { date: d.toISOString().slice(0, 10), price: Math.max(1.3, Math.round((base + noise + trend) * 1000) / 1000) };
    });
  }, [histStn && histStn.id, fuelId]);

  const chartSeries = mockHistory.map(d => d.price);
  const chartLabels = mockHistory.filter((_, i) => i % 7 === 0 || i === 29).map(d => d.date.slice(5));
  const minH = chartSeries.length ? Math.min(...chartSeries) : 0;
  const maxH = chartSeries.length ? Math.max(...chartSeries) : 0;

  const ftColor = (FUEL_TYPES.find(f => f.id === fuelId) || {}).color || 'var(--accent)';

  return (
    <div className="infl-body">
      <div style={{ marginBottom:16 }}>
        <div className="infl-eyebrow" style={{ marginBottom:6 }}>Rechercher une station</div>
        <div style={{ position:'relative', maxWidth:380 }}>
          <input value={search} onChange={e => doSearch(e.target.value)} placeholder="Nom de la station ou ville…"
            style={{ width:'100%', height:36, padding:'0 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', fontSize:13, fontFamily:'var(--font-sans)', outline:'none', boxSizing:'border-box' }} />
          {results.length > 0 && (
            <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, background:'white', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', boxShadow:'var(--shadow-md)', zIndex:50, overflow:'hidden' }}>
              {results.map(s => (
                <button key={s.id} onClick={() => { setHistStn(s); setSearch(''); setResults([]); }}
                  style={{ display:'block', width:'100%', textAlign:'left', padding:'8px 12px', border:'none', borderBottom:'1px solid var(--border-subtle)', background:'none', cursor:'pointer', fontSize:12, fontFamily:'var(--font-sans)' }}>
                  <div style={{ fontWeight:600 }}>{s.nom}</div>
                  <div style={{ color:'var(--text-tertiary)', fontSize:11 }}>{s.adresse} · {s.cp} {s.ville}</div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {!histStn ? (
        <div style={{ textAlign:'center', padding:'56px 24px', color:'var(--text-tertiary)' }}>
          <Icon n="chart-line" s={32} color="var(--gray-300)" />
          <div style={{ marginTop:12, fontSize:13, lineHeight:1.5 }}>Tapez le nom d'une station ou d'une ville<br />pour afficher l'évolution de ses prix</div>
        </div>
      ) : (
        <div>
          <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:8 }}>
            <div>
              <div style={{ fontWeight:700, fontSize:14 }}>{histStn.nom}</div>
              <div style={{ fontSize:12, color:'var(--text-tertiary)' }}>{histStn.adresse} · {histStn.cp} {histStn.ville}</div>
            </div>
            <button onClick={() => setHistStn(null)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-tertiary)', fontSize:16, padding:0 }}>✕</button>
          </div>

          <div style={{ background:'var(--gray-50)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', padding:'12px 16px', marginBottom:16 }}>
            <div style={{ fontSize:11, fontWeight:700, color:'var(--text-secondary)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:10 }}>Prix actuels</div>
            <div style={{ display:'flex', gap:14, flexWrap:'wrap' }}>
              {fuelTypes.map(ft => {
                const v = histStn.prix[ft.id];
                if (v == null) return null;
                return (
                  <div key={ft.id} style={{ display:'flex', alignItems:'center', gap:6 }}>
                    <span style={{ width:9, height:9, borderRadius:99, background:ft.color, display:'inline-block', flexShrink:0 }} />
                    <span style={{ fontSize:11, color:'var(--text-secondary)' }}>{ft.short}</span>
                    <span className="infl-mono" style={{ fontSize:13, fontWeight:700, color: ft.id === fuelId ? ftColor : 'var(--text)' }}>{v.toFixed(3)} €/L</span>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8, flexWrap:'wrap', gap:8 }}>
            <div className="infl-eyebrow">{(FUEL_TYPES.find(f=>f.id===fuelId)||{}).label} — évolution sur 30 jours</div>
            <div style={{ display:'flex', gap:14, fontSize:11, color:'var(--text-tertiary)' }}>
              <span>Min : <b className="infl-mono" style={{ color:'#0A6B43' }}>{minH.toFixed(3)} €/L</b></span>
              <span>Max : <b className="infl-mono" style={{ color:'#E1000F' }}>{maxH.toFixed(3)} €/L</b></span>
              <span>Var : <b className="infl-mono">{((maxH - minH)).toFixed(3)} €/L</b></span>
            </div>
          </div>
          <AreaChart id={'carb-hist-' + histStn.id + '-' + fuelId} series={chartSeries} labels={chartLabels} color={ftColor} />

          <div style={{ marginTop:14 }}>
            <Alert kind="info" title="Données simulées">L'historique réel sera automatiquement affiché dès connexion de l'API gouvernementale officielle. Les valeurs affichées ici sont simulées pour illustration.</Alert>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hero": "Split",
  "dashboard": "Carte",
  "accent": "#2563EB"
}/*EDITMODE-END*/;

const HERO_MAP = { "Split": "split", "Centré": "centered", "Sombre": "dark" };
const PERSIST = "fm_screen_v1";
const ENTRY_SCREENS = ["landing", "login", "signup", "forgot", "dashboard"];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState(() => {
    const s = localStorage.getItem(PERSIST);
    return ENTRY_SCREENS.includes(s) ? s : "landing";
  });
  const go = React.useCallback((s) => setScreen(s), []);

  React.useEffect(() => {
    if (ENTRY_SCREENS.includes(screen)) localStorage.setItem(PERSIST, screen);
  }, [screen]);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--accent", t.accent);
  }, [t.accent]);

  React.useEffect(() => {
    if (screen === "loading") { const id = setTimeout(() => setScreen("success"), 1500); return () => clearTimeout(id); }
    if (screen === "success") { const id = setTimeout(() => setScreen("dashboard"), 1400); return () => clearTimeout(id); }
  }, [screen]);

  const fixed = screen !== "landing";
  React.useEffect(() => {
    document.getElementById("root").className = fixed ? "fixed-screen" : "";
  }, [fixed]);

  let view;
  if (screen === "landing")   view = <Landing heroVariant={HERO_MAP[t.hero] || "split"} go={go} />;
  else if (screen === "login")    view = <LoginScreen go={go} />;
  else if (screen === "signup")   view = <SignupScreen go={go} />;
  else if (screen === "forgot")   view = <ForgotScreen go={go} />;
  else if (screen === "loading")  view = <AuthStatus phase="loading" />;
  else if (screen === "success")  view = <AuthStatus phase="success" />;
  else if (screen === "dashboard") view = <Dashboard variant={t.dashboard === "Modules" ? "modules" : "terminal"} go={go} />;

  return (
    <>
      {view}
      <TweaksPanel>
        <TweakSection label="Landing — hero" />
        <TweakRadio label="Disposition" value={t.hero} options={["Split", "Centré", "Sombre"]} onChange={(v) => setTweak("hero", v)} />
        <TweakSection label="Dashboard" />
        <TweakRadio label="Vue" value={t.dashboard} options={["Carte", "Modules"]} onChange={(v) => setTweak("dashboard", v)} />
        <TweakSection label="Marque" />
        <TweakColor label="Accent" value={t.accent} options={["#2563EB", "#000091", "#1B43C4", "#0E9BA8"]} onChange={(v) => setTweak("accent", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
