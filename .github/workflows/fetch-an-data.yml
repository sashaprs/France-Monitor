name: Fetch Assemblée Nationale Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install adm-zip

      - name: Fetch & process scrutins
        run: |
          curl -sL "https://data.assemblee-nationale.fr/static/openData/repository/17/loi/scrutins/Scrutins.json.zip" -o scrutins.zip
          node scripts/process-scrutins.js

      - name: Fetch & process agenda
        run: |
          curl -sL "https://data.assemblee-nationale.fr/static/openData/repository/17/vp/reunions/Agenda.json.zip" -o agenda.zip
          node scripts/process-agenda.js

      - name: Build calendrier parlementaire
        # Réutilise agenda.zip téléchargé ci-dessus ; télécharge AMO10 (~5 Mo)
        # pour les libellés d'organes. Non bloquant.
        run: node scripts/legislatif/build-calendrier.js || echo "::warning::build-calendrier en échec"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "data: update AN $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
