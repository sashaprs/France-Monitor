                <td style={{ padding:'9px 10px', fontSize:12, color:'var(--text-tertiary)', whiteSpace:'nowrap' }}>{s.date}</td>
                <td style={{ padding:'9px 10px', fontSize:12, color:'var(--text-primary)', fontWeight:500 }}>{s.title}</td>
                <td style={{ padding:'9px 10px', fontSize:12, fontWeight:700, color:'#0E8A52' }}>{s.pour}</td>
                <td style={{ padding:'9px 10px', fontSize:12, fontWeight:700, color:'#E1000F' }}>{s.contre}</td>
                <td style={{ padding:'9px 10px' }}>
                  <span style={{ fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:99, background: s.result==='Adopté' ? '#F0FDF4' : '#FFF1F2', color: s.result==='Adopté' ? '#0E8A52' : '#E1000F', border:`1px solid ${s.result==='Adopté' ? '#BBF7D0' : '#FECDD3'}` }}>
                    {s.result}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ marginTop:16 }}>
        <SourceTag source="Sénat · senat.fr · scrutins publics" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />
      </div>
    </div>
  );
}

function PartiCard({ parti, onClick }) {

      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}

          <span style={{ fontSize:13, fontWeight:800, color:parti.color }}>{parti.abbr}</span>
        </div>
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)' }}>{parti.name}</div>
          <div style={{ fontSize:11, color:'var(--text-tertiary)', marginTop:2 }}>{parti.orientation}</div>
        </div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
        {[{label:'Députés AN',val:parti.seatsAN},{label:'Sénateurs',val:parti.seatsSenat},{label:'Adhérents',val:(parti.members/1000).toFixed(0)+'k'}].map(({label,val}) => (
          <div key={label} style={{ textAlign:'center', padding:'8px 4px', background:'var(--gray-50)', borderRadius:6 }}>
            <div style={{ fontSize:14, fontWeight:700, color:parti.color }}>{val}</div>

        <span style={{ fontSize:11, color:'var(--text-secondary)' }}>Leader : <b style={{ color:'var(--text-primary)' }}>{parti.leader}</b></span>

  );
}

function PartiDetail({ parti, onBack, deputes = [], deputesLoading = false }) {
  const [membreSearch, setMembreSearch] = React.useState('');
  const [membreTab, setMembreTab] = React.useState('an');

  const partiDeps = React.useMemo(() => {
    if (!parti.groupeAN || !deputes.length) return [];
    return deputes
      .filter(d => d.groupe && d.groupe.id === parti.groupeAN)
      .filter(d => !membreSearch || d.nomComplet.toLowerCase().includes(membreSearch.toLowerCase()) || (d.dept || '').toLowerCase().includes(membreSearch.toLowerCase()))
      .sort((a, b) => a.nom.localeCompare(b.nom, 'fr'));
  }, [parti.groupeAN, deputes, membreSearch]);

  return (
    <div style={{ padding:'20px 28px', maxWidth:1100, margin:'0 auto' }}>
      {/* Sticky sub-bar */}
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
        <button onClick={onBack} style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'white', cursor:'pointer', fontSize:12, color:'var(--text-secondary)', fontFamily:'var(--font-sans)' }}>
          <Icon n="arrow-left" s={12} /> Retour
        </button>
        <SourceTag source="Partis politiques · france-politique.fr" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />
      </div>

      {/* Hero */}
      <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'24px', marginBottom:20 }}>
        <div style={{ display:'flex', alignItems:'flex-start', gap:20 }}>
          <div style={{ width:64, height:64, borderRadius:14, background:hexRgba(parti.color,0.12), border:`2px solid ${hexRgba(parti.color,0.3)}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <span style={{ fontSize:18, fontWeight:800, color:parti.color }}>{parti.abbr}</span>

          <div style={{ flex:1 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
              <h2 style={{ fontSize:22, fontWeight:800, color:'var(--text-primary)', margin:0 }}>{parti.name}</h2>

              {[{l:'Fondé en',v:parti.founded},{l:'Leader',v:`${parti.leader} (${parti.leaderRole})`},{l:'Adhérents',v:parti.members.toLocaleString('fr-FR')}].map(({l,v}) => (

        </div>

                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))', gap:10 }}>

                    const color = dep.groupe ? dep.groupe.color : parti.color;
                    return (
                      <div key={dep.id} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:5, padding:'10px 6px', borderRadius:8, border:'1px solid var(--border-subtle)', background:'var(--gray-50)', textAlign:'center' }}>

                        </div>
                      </div>

              </div>
            )}
          </div>
        )}

        {membreTab === 'senat' && (
          <div style={{ padding:'28px 18px', textAlign:'center' }}>

            </div>
          </div>
        )}

    </div>
  );
}

function PartisModule() {
  const [view, setView] = React.useState('list');
  const [selectedId, setSelectedId] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [sort, setSort] = React.useState('seats');
  const { deputes, loading: deputesLoading } = useANDeputes();

  const filtered = PARTIS_DATA
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.abbr.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => sort === 'seats' ? b.seatsAN - a.seatsAN : a.name.localeCompare(b.name));

  if (view === 'detail') {
    const parti = PARTIS_DATA.find(p => p.id === selectedId);
    return <PartiDetail parti={parti} onBack={() => setView('list')} deputes={deputes} deputesLoading={deputesLoading} />;
  }

  return (
    <div style={{ padding:'24px 28px', maxWidth:1100, margin:'0 auto' }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)' }}>Partis politiques</div>
        <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>Principaux partis représentés au Parlement</div>
      </div>

      <div style={{ display:'flex', gap:10, marginBottom:20 }}>
        <div style={{ position:'relative', flex:1 }}>
          <Icon n="search" s={13} style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)' }} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher un parti…"
            style={{ width:'100%', padding:'8px 10px 8px 30px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', outline:'none', boxSizing:'border-box' }} />
        </div>
        <select value={sort} onChange={e => setSort(e.target.value)}
          style={{ padding:'8px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', background:'white', cursor:'pointer', outline:'none' }}>
          <option value="seats">Trier par sièges AN</option>
          <option value="alpha">Trier par ordre alphabétique</option>
        </select>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:14 }}>
        {filtered.map(p => <PartiCard key={p.id} parti={p} onClick={id => { setSelectedId(id); setView('detail'); }} />)}
      </div>

      <div style={{ marginTop:20 }}>
        <SourceTag source="Partis politiques · france-politique.fr · Assemblée nationale" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />
      </div>
    </div>
  );
}

function PPAvatar({ f, size=56 }) {
  const [err, setErr] = React.useState(false);
  if (f.photo && !err) {
    return (
      <img src={f.photo} alt={f.name} onError={() => setErr(true)}
        style={{ width:size, height:size, borderRadius:'50%', objectFit:'cover', objectPosition:'top center',
          border:`2.5px solid ${hexRgba(f.color,0.4)}`, flexShrink:0, display:'block' }} />
    );
  }
  return (
    <div style={{ width:size, height:size, borderRadius:99, background:hexRgba(f.color,0.12), border:`2.5px solid ${hexRgba(f.color,0.35)}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
      <span style={{ fontSize:size*0.3, fontWeight:800, color:f.color }}>{f.initials}</span>
    </div>
  );
}

function PPCrest({ term }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4, padding:'10px 16px', background:'linear-gradient(135deg,#f9f7f3,#ede9e0)', border:'1px solid #d4c9a8', borderRadius:10 }}>
      <div style={{ fontSize:22 }}>🔵</div>
      <div style={{ fontSize:9, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'#5a4e3a', textAlign:'center', lineHeight:1.4 }}>Présidence<br/>de la République</div>
      <div style={{ fontSize:10, color:'#8a7a5a', fontWeight:600 }}>{term}</div>
    </div>
  );
}

function BilanGrid({ bilan }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, marginBottom:16 }}>
      {bilan.map((tile,i) => (
        <div key={i} style={{ background:'white', borderRadius:8, border:'1px solid var(--border-subtle)', padding:'12px 14px' }}>
          <Eyebrow style={{ marginBottom:4 }}>{tile.label}</Eyebrow>
          <div style={{ display:'flex', alignItems:'flex-end', gap:8, marginBottom:6 }}>
            <span style={{ fontSize:22, fontWeight:800, color:'var(--text-primary)', lineHeight:1 }}>{tile.value}</span>
            <span style={{ fontSize:11, color:'var(--text-tertiary)', paddingBottom:2 }}>{tile.unit}</span>
            {tile.delta && (
              <span style={{ fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:99, background: tile.tone==='pos' ? '#F0FDF4' : tile.tone==='neg' ? '#FFF1F2' : 'var(--gray-50)', color: tile.tone==='pos' ? '#0E8A52' : tile.tone==='neg' ? '#E1000F' : 'var(--text-tertiary)', marginLeft:'auto' }}>{tile.delta}</span>
            )}
          </div>
          <Spark series={tile.series} tone={tile.tone} width={80} height={22} />
          <div style={{ fontSize:10, color:'var(--text-tertiary)', marginTop:4 }}>{tile.caption}</div>
        </div>
      ))}
    </div>
  );
}

function PPTimeline({ items }) {
  return (
    <div>
      {items.map((item,i) => {
        const isOk = item.result === 'Adopté' || item.result === 'Promulguée';
        const isPour = item.position === 'Pour' || item.position === 'Promulguée';
        return (
          <div key={i} style={{ display:'flex', gap:10, padding:'9px 0', borderBottom: i < items.length-1 ? '1px solid var(--border-subtle)' : 'none', alignItems:'flex-start' }}>
            <div style={{ flexShrink:0, width:6, height:6, borderRadius:99, background: isPour ? '#0E8A52' : '#E1000F', marginTop:5 }} />
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, color:'var(--text-primary)', fontWeight:500 }}>{item.title}</div>
              {item.date && item.date !== '—' && <div style={{ fontSize:10, color:'var(--text-tertiary)', marginTop:2 }}>{item.date}</div>}
            </div>
            <div style={{ display:'flex', gap:4, flexShrink:0 }}>
              <span style={{ fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:99, background: isPour ? '#F0FDF4' : '#FFF1F2', color: isPour ? '#0E8A52' : '#E1000F' }}>{item.position}</span>
              <span style={{ fontSize:10, padding:'1px 6px', borderRadius:99, background: isOk ? '#F0FDF4' : '#FFF1F2', color: isOk ? '#0E8A52' : '#E1000F' }}>{item.result}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function PPDetailA({ f }) {
  return (
    <div>
      {/* Hero */}
      <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'24px', marginBottom:16, display:'flex', alignItems:'flex-start', gap:20 }}>
        <PPAvatar f={f} size={72} />
        <div style={{ flex:1 }}>
          <div style={{ fontSize:20, fontWeight:800, color:'var(--text-primary)' }}>{f.name}</div>
          <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>{f.role}</div>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:8, flexWrap:'wrap' }}>
            <span style={{ fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:99, background:hexRgba(f.color,0.1), color:f.color, border:`1px solid ${hexRgba(f.color,0.25)}` }}>{f.party}</span>
            <span style={{ fontSize:11, color:'var(--text-tertiary)' }}>Né·e en {f.born}</span>
            <span style={{ fontSize:11, color:'var(--text-tertiary)' }}>Score d'influence : <b style={{ color:'var(--text-primary)' }}>{f.score}/100</b></span>
          </div>
          <p style={{ margin:'12px 0 0', fontSize:13, color:'var(--text-secondary)', lineHeight:1.7 }}>{f.bio}</p>
        </div>
        {f.president && <PPCrest term={f.president.term} />}
      </div>
      {/* Bilan */}
      {f.bilan && <BilanGrid bilan={f.bilan} />}
      {/* News + votes */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
        <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'18px' }}>
          <Eyebrow>Actualités récentes</Eyebrow>
          {f.news.map((n,i) => (
            <div key={i} style={{ padding:'8px 0', borderBottom: i < f.news.length-1 ? '1px solid var(--border-subtle)' : 'none' }}>
              <div style={{ fontSize:10, color:'var(--text-tertiary)', marginBottom:2 }}>{n.date}</div>
              <div style={{ fontSize:12, color:'var(--text-primary)', lineHeight:1.5 }}>{n.title}</div>
            </div>
          ))}
        </div>
        {f.votes && f.votes.length > 0 && (
          <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'18px' }}>
            <Eyebrow>Votes récents</Eyebrow>
            <PPTimeline items={f.votes} />
          </div>
        )}
      </div>
    </div>
  );
}

          <div style={{ fontSize:11, color:'rgba(255,255,255,0.75)', marginTop:1 }}>{f.role} · {f.party}</div>
        </div>
        <div style={{ marginLeft:'auto', background:'rgba(255,255,255,0.15)', borderRadius:8, padding:'6px 12px', textAlign:'center' }}>
          <div style={{ fontSize:18, fontWeight:800, color:'white' }}>{f.score}</div>
          <div style={{ fontSize:9, color:'rgba(255,255,255,0.7)', textTransform:'uppercase', letterSpacing:'0.05em' }}>Influence</div>
        </div>
      </div>
      {/* Bilan ticker */}
      {f.bilan && (
        <div style={{ background:'var(--gray-50)', borderBottom:'1px solid var(--border-subtle)', padding:'8px 18px', display:'flex', gap:20, overflowX:'auto' }}>
          {f.bilan.map((tile,i) => (
            <div key={i} style={{ flexShrink:0, textAlign:'center' }}>
              <div style={{ fontSize:16, fontWeight:800, color: tile.tone==='pos' ? '#0E8A52' : tile.tone==='neg' ? '#E1000F' : 'var(--text-primary)' }}>{tile.value}<span style={{ fontSize:10 }}>{tile.unit}</span></div>
              <div style={{ fontSize:9, color:'var(--text-tertiary)', textTransform:'uppercase' }}>{tile.label}</div>
            </div>
          ))}
        </div>
      )}
      {/* 3 cols */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:0 }}>
        <div style={{ padding:'16px', borderRight:'1px solid var(--border-subtle)' }}>
          <Eyebrow>Actualités</Eyebrow>
          {f.news.map((n,i) => (
            <div key={i} style={{ marginBottom:10 }}>
              <div style={{ fontSize:9, color:'var(--text-tertiary)', marginBottom:2 }}>{n.date}</div>
              <div style={{ fontSize:11, color:'var(--text-primary)', lineHeight:1.5 }}>{n.title}</div>
            </div>
          ))}
        </div>
        <div style={{ padding:'16px', borderRight:'1px solid var(--border-subtle)' }}>
          <Eyebrow>Votes</Eyebrow>
          {f.votes && f.votes.length > 0 ? <PPTimeline items={f.votes} /> : <div style={{ fontSize:11, color:'var(--text-tertiary)' }}>Aucun vote enregistré</div>}
        </div>
        <div style={{ padding:'16px' }}>
          <Eyebrow>Biographie</Eyebrow>
          <p style={{ margin:0, fontSize:11, color:'var(--text-secondary)', lineHeight:1.7 }}>{f.bio}</p>
          <div style={{ marginTop:10 }}>
            <div style={{ fontSize:10, color:'var(--text-tertiary)' }}>Né·e en {f.born} · Score {f.score}/100</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function PPDetailC({ f }) {
  return (
    <div>
      <div style={{ display:'grid', gridTemplateColumns:'280px 1fr', gap:16 }}>
        {/* Identity card */}
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'20px', textAlign:'center' }}>
            <PPAvatar f={f} size={80} />
            <div style={{ marginTop:12, fontSize:16, fontWeight:800, color:'var(--text-primary)' }}>{f.name}</div>
            <div style={{ fontSize:12, color:'var(--text-secondary)', marginTop:4 }}>{f.role}</div>
            <span style={{ display:'inline-block', marginTop:8, fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:99, background:hexRgba(f.color,0.1), color:f.color, border:`1px solid ${hexRgba(f.color,0.25)}` }}>{f.party}</span>
            <div style={{ marginTop:12, padding:'8px', background:'var(--gray-50)', borderRadius:6 }}>
              <div style={{ fontSize:11, color:'var(--text-tertiary)' }}>Né·e en {f.born}</div>
              <div style={{ fontSize:12, fontWeight:700, color:f.color, marginTop:2 }}>Score {f.score}/100</div>
            </div>
            {f.president && <div style={{ marginTop:10 }}><PPCrest term={f.president.term} /></div>}
          </div>
          <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'16px' }}>
            <Eyebrow>Biographie</Eyebrow>
            <p style={{ margin:0, fontSize:11, color:'var(--text-secondary)', lineHeight:1.7 }}>{f.bio}</p>
          </div>
        </div>

        {/* Cards col */}
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {/* Bilan */}
          {f.bilan && (
            <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'16px' }}>
              <Eyebrow>Bilan</Eyebrow>
              <BilanGrid bilan={f.bilan} />
            </div>
          )}
          {/* News */}
          <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'16px' }}>
            <Eyebrow>Actualités</Eyebrow>
            {f.news.map((n,i) => (
              <div key={i} style={{ padding:'7px 0', borderBottom: i < f.news.length-1 ? '1px solid var(--border-subtle)' : 'none' }}>
                <div style={{ fontSize:10, color:'var(--text-tertiary)', marginBottom:2 }}>{n.date}</div>
                <div style={{ fontSize:12, color:'var(--text-primary)', lineHeight:1.5 }}>{n.title}</div>
              </div>
            ))}
          </div>
          {/* Votes */}
          {f.votes && f.votes.length > 0 && (
            <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'16px' }}>
              <Eyebrow>Votes</Eyebrow>
              <PPTimeline items={f.votes} />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function PPDetail({ f, onBack }) {
  const [variant, setVariant] = React.useState('A');
  return (
    <div style={{ padding:'20px 28px', maxWidth:1100, margin:'0 auto' }}>
      {/* Sticky sub-bar */}
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:20, flexWrap:'wrap' }}>
        <button onClick={onBack} style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'white', cursor:'pointer', fontSize:12, color:'var(--text-secondary)', fontFamily:'var(--font-sans)' }}>
          <Icon n="arrow-left" s={12} /> Retour
        </button>
        <div style={{ display:'flex', gap:4, background:'var(--gray-100)', borderRadius:'var(--radius-sm)', padding:3 }}>
          {['A','B','C'].map(v => (
            <button key={v} onClick={() => setVariant(v)}
              style={{ padding:'4px 14px', borderRadius:6, border:'none', cursor:'pointer', fontSize:12, fontWeight: variant===v ? 700 : 400, background: variant===v ? 'white' : 'transparent', color: variant===v ? 'var(--text-primary)' : 'var(--text-tertiary)', fontFamily:'var(--font-sans)', boxShadow: variant===v ? '0 1px 3px rgba(0,0,0,0.12)' : 'none', transition:'all 0.15s' }}>
              {v === 'A' ? 'Institutionnel' : v === 'B' ? 'Terminal' : 'Cartes'}
            </button>
          ))}
        </div>
        <div style={{ marginLeft:'auto' }}>
          <SourceTag source="Personnalités politiques · france-monitor" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />
        </div>
      </div>

      {variant === 'A' && <PPDetailA f={f} />}
      {variant === 'B' && <PPDetailB f={f} />}
      {variant === 'C' && <PPDetailC f={f} />}
    </div>
  );
}

function PPCard({ f, onClick }) {
  const [hov, setHov] = React.useState(false);
  return (
    <div onClick={() => onClick(f.id)} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ background:'white', borderRadius:'var(--radius-lg)', border:`1px solid ${hov ? f.color : 'var(--border-subtle)'}`, padding:'16px', cursor:'pointer', transition:'all 0.15s', transform: hov ? 'translateY(-2px)' : 'none', boxShadow: hov ? '0 4px 14px rgba(0,0,0,0.07)' : 'none', position:'relative' }}>
      {/* Rank badge */}
      <div style={{ position:'absolute', top:10, right:10, width:22, height:22, borderRadius:99, background: f.rank <= 3 ? f.color : 'var(--gray-100)', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <span style={{ fontSize:10, fontWeight:800, color: f.rank <= 3 ? 'white' : 'var(--text-tertiary)' }}>{f.rank}</span>
      </div>
      {/* Monogram */}
      <PPAvatar f={f} size={44} />
      <div style={{ marginTop:10, marginBottom:6 }}>
        <div style={{ fontSize:13, fontWeight:700, color:'var(--text-primary)', paddingRight:26 }}>{f.name}</div>
        <div style={{ fontSize:11, color:'var(--text-tertiary)', marginTop:2 }}>{f.role}</div>
      </div>
      <span style={{ fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:99, background:hexRgba(f.color,0.1), color:f.color, border:`1px solid ${hexRgba(f.color,0.2)}` }}>{f.party}</span>
      {/* Influence bar */}
      <div style={{ marginTop:10 }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
          <span style={{ fontSize:9, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.05em' }}>Influence</span>
          <span style={{ fontSize:9, fontWeight:700, color:f.color }}>{f.score}/100</span>
        </div>
        <div style={{ height:3, borderRadius:99, background:'var(--gray-100)' }}>
          <div style={{ height:3, borderRadius:99, background:f.color, width:`${f.score}%`, transition:'width 0.3s' }} />
        </div>
      </div>
    </div>
  );
}

function PersonnalitesModule() {
  const [view, setView] = React.useState('list');
  const [selectedId, setSelectedId] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [sort, setSort] = React.useState('influence');

  const filtered = PERSONNALITES_DATA
    .filter(f => f.name.toLowerCase().includes(search.toLowerCase()) || f.party.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => sort === 'influence' ? a.rank - b.rank : a.name.localeCompare(b.name));

  if (view === 'detail') {
    const f = PERSONNALITES_DATA.find(p => p.id === selectedId);
    return <PPDetail f={f} onBack={() => setView('list')} />;
  }

  return (
    <div style={{ padding:'24px 28px', maxWidth:1200, margin:'0 auto' }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)' }}>Personnalités politiques</div>
        <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>Classement par score d'influence · {PERSONNALITES_DATA.length} personnalités</div>
      </div>

      <div style={{ display:'flex', gap:10, marginBottom:20 }}>
        <div style={{ position:'relative', flex:1 }}>
          <Icon n="search" s={13} style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)' }} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher une personnalité…"
            style={{ width:'100%', padding:'8px 10px 8px 30px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', outline:'none', boxSizing:'border-box' }} />
        </div>
        <select value={sort} onChange={e => setSort(e.target.value)}
          style={{ padding:'8px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', background:'white', cursor:'pointer', outline:'none' }}>
          <option value="influence">Trier par influence</option>
          <option value="alpha">Trier alphabétiquement</option>
        </select>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:12 }}>
        {filtered.map(f => <PPCard key={f.id} f={f} onClick={id => { setSelectedId(id); setView('detail'); }} />)}
      </div>

      <div style={{ marginTop:20 }}>
        <SourceTag source="Personnalités politiques · france-monitor · IFOP" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />
      </div>
    </div>
  );
}

function Dashboard({ variant, go }) {
  const [module, setModule] = React.useState('dette');
  return (
    <div className="db-app">
      <DashSidebar active={module} onSelect={setModule} />
      <div className="db-main">
        <DashTopBar go={go} />
        {variant === 'modules'
          ? <div className="db-scroll"><ModulesView onOpenModule={(id) => setModule(id || 'dette')} /></div>
          : module === 'inflation'
            ? <div className="db-scroll"><InflationModule /></div>
            : module === 'carburant'
            ? <div className="db-scroll"><CarburantModule /></div>
            : module === 'gouvernement'
            ? <div className="db-scroll"><GouvernementModule /></div>
            : module === 'assemblee'
            ? <div className="db-scroll"><AssembleeModule /></div>
            : module === 'senat'
            ? <div className="db-scroll"><SenatModule /></div>
            : module === 'partis'
            ? <div className="db-scroll"><PartisModule /></div>
            : module === 'personnalites'
            ? <div className="db-scroll"><PersonnalitesModule /></div>
            : module === 'agenda'
            ? <div className="db-scroll"><AgendaPolitiqueModule /></div>
            : module === 'deputes'
            ? <div className="db-scroll"><DeputesModule /></div>
            : <TerminalView module={module} />}
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hero": "Split",
  "dashboard": "Carte",
  "accent": "#2563EB"
}/*EDITMODE-END*/;

const HERO_MAP = { "Split": "split", "Centré": "centered", "Sombre": "dark" };
const PERSIST = "fm_screen_v1";
const ENTRY_SCREENS = ["landing", "login", "signup", "forgot", "dashboard"];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState(() => {
    const s = localStorage.getItem(PERSIST);
    return ENTRY_SCREENS.includes(s) ? s : "landing";
  });
  const go = React.useCallback((s) => setScreen(s), []);

  React.useEffect(() => {
    if (ENTRY_SCREENS.includes(screen)) localStorage.setItem(PERSIST, screen);
  }, [screen]);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--accent", t.accent);
  }, [t.accent]);

  React.useEffect(() => {
    if (screen === "loading") { const id = setTimeout(() => setScreen("success"), 1500); return () => clearTimeout(id); }
    if (screen === "success") { const id = setTimeout(() => setScreen("dashboard"), 1400); return () => clearTimeout(id); }
  }, [screen]);

  const fixed = screen !== "landing";
  React.useEffect(() => {
    document.getElementById("root").className = fixed ? "fixed-screen" : "";
  }, [fixed]);

  let view;
  if (screen === "landing")   view = <Landing heroVariant={HERO_MAP[t.hero] || "split"} go={go} />;
  else if (screen === "login")    view = <LoginScreen go={go} />;
  else if (screen === "signup")   view = <SignupScreen go={go} />;
  else if (screen === "forgot")   view = <ForgotScreen go={go} />;
  else if (screen === "loading")  view = <AuthStatus phase="loading" />;
  else if (screen === "success")  view = <AuthStatus phase="success" />;
  else if (screen === "dashboard") view = <Dashboard variant={t.dashboard === "Modules" ? "modules" : "terminal"} go={go} />;

  return (
    <>
      {view}
      <TweaksPanel>
        <TweakSection label="Landing — hero" />
        <TweakRadio label="Disposition" value={t.hero} options={["Split", "Centré", "Sombre"]} onChange={(v) => setTweak("hero", v)} />
        <TweakSection label="Dashboard" />
        <TweakRadio label="Vue" value={t.dashboard} options={["Carte", "Modules"]} onChange={(v) => setTweak("dashboard", v)} />
        <TweakSection label="Marque" />
        <TweakColor label="Accent" value={t.accent} options={["#2563EB", "#000091", "#1B43C4", "#0E9BA8"]} onChange={(v) => setTweak("accent", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
