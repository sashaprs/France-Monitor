name: Fetch Députés News

on:
  schedule:
    # Une fois par jour (les 577 requêtes prennent ~10 min ; inutile de le faire
    # aussi souvent que les personnalités).
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-news-deputes
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch news
        run: node scripts/fetch-news-deputes.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news_deputes.json
          git diff --staged --quiet || git commit -m "data: update news députés $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
