<style>
/* ── Color tokens ─────────────────────────────────────────── */
:root {
  --white:#FFFFFF; --gray-50:#F7F8FA; --gray-100:#EFF1F4; --gray-150:#E8EBEF;
  --gray-200:#E1E5EA; --gray-300:#D0D5DD; --gray-400:#AEB4BE; --gray-500:#7B828D;
  --gray-600:#565D67; --gray-700:#3B414A; --gray-800:#242931; --gray-900:#12161C;
  --ink:#0B0E14;
  --blue-france:#000091; --blue-900:#0A1F66; --blue-700:#1B43C4; --blue-600:#2563EB;
  --blue-500:#4178F0; --blue-200:#BCD0FB; --blue-100:#DEE8FE; --blue-50:#F1F5FF;
  --red-700:#B00910; --red-600:#E1000F; --red-500:#EF2D3B; --red-100:#FBDDDF; --red-50:#FEF2F2;
  --green-700:#0A6B43; --green-600:#0E8A52; --green-500:#12A862; --green-100:#C8EFD8; --green-50:#EFFAF3;
  --amber-700:#92500B; --amber-600:#C9760D; --amber-100:#FBE6C2; --amber-50:#FEF8EC;
  --bg:var(--white); --surface:var(--white); --surface-sunken:var(--gray-50);
  --surface-raised:var(--white); --surface-hover:var(--gray-50); --surface-active:var(--gray-100);
  --surface-inverse:var(--ink);
  --text:var(--ink); --text-secondary:var(--gray-600); --text-tertiary:var(--gray-500);
  --text-disabled:var(--gray-400); --text-inverse:var(--white); --text-link:var(--blue-600);
  --text-brand:var(--blue-france);
  --border:var(--gray-200); --border-strong:var(--gray-300); --border-subtle:var(--gray-150);
  --border-focus:var(--blue-600); --divider:var(--gray-150);
  --accent:var(--blue-600); --accent-hover:var(--blue-700); --accent-tint:var(--blue-50);
  --accent-tint-strong:var(--blue-100); --on-accent:var(--white);
  --pos:var(--green-600); --pos-tint:var(--green-50); --neg:var(--red-600); --neg-tint:var(--red-50);
  --warn:var(--amber-600); --warn-tint:var(--amber-50); --info:var(--blue-600); --info-tint:var(--blue-50);
  --viz-1:#2563EB; --viz-2:#12A862; --viz-3:#C9760D; --viz-4:#7C5CFC; --viz-5:#E1000F; --viz-6:#0E9BA8;
  --seq-1:#F1F5FF; --seq-2:#DEE8FE; --seq-3:#BCD0FB; --seq-4:#84A8F6;
  --seq-5:#4178F0; --seq-6:#2563EB; --seq-7:#1B43C4; --seq-8:#0A1F66;
}
/* ── Typography tokens ────────────────────────────────────── */
:root {
  --font-sans:'Schibsted Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --fs-display:56px; --fs-h1:36px; --fs-h2:26px; --fs-h3:20px; --fs-h4:17px;
  --fs-body-lg:17px; --fs-body:15px; --fs-sm:13px; --fs-caption:12px; --fs-label:11px;
  --fs-data-xl:44px; --fs-data-lg:30px; --fs-data-md:20px; --fs-data-sm:14px;
  --lh-tight:1.04; --lh-snug:1.2; --lh-normal:1.45; --lh-relaxed:1.65;
  --ls-tighter:-0.03em; --ls-tight:-0.02em; --ls-snug:-0.01em; --ls-normal:0;
  --ls-wide:0.04em; --ls-label:0.08em;
}
/* ── Spacing / radii / shadows / motion ───────────────────── */
:root {
  --space-0:0; --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:20px; --space-6:24px; --space-8:32px; --space-10:40px;
  --space-12:48px; --space-16:64px; --space-20:80px; --space-24:96px;
  --radius-xs:4px; --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
  --radius-xl:20px; --radius-pill:999px;
  --bw-hair:1px; --bw-thick:1.5px;
  --shadow-xs:0 1px 2px rgba(11,14,20,.04);
  --shadow-sm:0 1px 3px rgba(11,14,20,.06),0 1px 2px rgba(11,14,20,.04);
  --shadow-md:0 4px 12px rgba(11,14,20,.06),0 1px 3px rgba(11,14,20,.04);
  --shadow-lg:0 12px 32px rgba(11,14,20,.10),0 2px 6px rgba(11,14,20,.05);
  --shadow-pop:0 16px 48px rgba(11,14,20,.14);
  --ring-focus:0 0 0 3px rgba(37,99,235,.22);
  --sidebar-w:248px; --topbar-h:56px; --panel-w:360px; --container-max:1240px;
  --ease-out:cubic-bezier(.22,1,.36,1); --ease-in-out:cubic-bezier(.65,0,.35,1);
  --dur-fast:120ms; --dur-base:180ms; --dur-slow:280ms;
}
/* ── Base reset ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--font-sans);font-size:var(--fs-body);line-height:var(--lh-relaxed);
  color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
h1,h2,h3,h4,h5,h6,p,figure{margin:0}
a{color:var(--text-link);text-decoration:none}
a:hover{text-decoration:underline}
table,.tabular,[data-numeric]{font-variant-numeric:tabular-nums}
::selection{background:var(--blue-100);color:var(--ink)}
:focus-visible{outline:none;box-shadow:var(--ring-focus);border-radius:var(--radius-sm)}

/* ── App shell ────────────────────────────────────────────── */
html,body{margin:0;background:var(--bg)}
#root{min-height:100vh}
a{text-decoration:none}
.fixed-screen{height:100vh;overflow:hidden}

/* ── Dark Landing ─────────────────────────────────────────── */
.landing{background:#03091A;min-height:100vh;color:#fff}
.ln-wrap{max-width:var(--container-max);margin:0 auto;padding:0 32px;position:relative;z-index:1}

/* Cursor glow */
.ln-cursor-glow{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,.07) 0%,transparent 70%);pointer-events:none;top:0;left:0;z-index:0;will-change:transform}

/* Nav */
.ln-nav{position:sticky;top:0;z-index:20;background:rgba(3,9,26,.88);backdrop-filter:saturate(180%) blur(16px);border-bottom:1px solid rgba(255,255,255,.07)}
.ln-nav-in{max-width:var(--container-max);margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;gap:28px}
.ln-links{display:flex;gap:26px;margin-left:14px}
.ln-links a{font-family:var(--font-sans);font-size:14px;color:rgba(255,255,255,.5);font-weight:500;transition:color .18s}
.ln-links a:hover{color:#fff;text-decoration:none}
.ln-nav-cta{margin-left:auto;display:flex;gap:8px;align-items:center}

/* Hero */
.ln-hero-wrap{position:relative;overflow:visible;padding:0}
.ln-hero-blobs{position:absolute;inset:0;pointer-events:none;z-index:0}
.ln-blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.42}
.ln-blob.b1{width:580px;height:580px;background:radial-gradient(circle,#1B43C4 0%,transparent 70%);top:-200px;left:-140px;animation:lnblob1 18s ease-in-out infinite}
.ln-blob.b2{width:500px;height:500px;background:radial-gradient(circle,#7C5CFC 0%,transparent 70%);top:-80px;right:-100px;animation:lnblob2 22s ease-in-out infinite}
.ln-blob.b3{width:420px;height:420px;background:radial-gradient(circle,#0E6E9A 0%,transparent 70%);bottom:-120px;left:38%;animation:lnblob3 20s ease-in-out infinite}
@keyframes lnblob1{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(55px,-45px) scale(1.08)}75%{transform:translate(-30px,55px) scale(.93)}}
@keyframes lnblob2{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-45px,32px) scale(1.06)}70%{transform:translate(28px,-40px) scale(.95)}}
@keyframes lnblob3{0%,100%{transform:translate(0,0) scale(1)}45%{transform:translate(30px,42px) scale(1.05)}78%{transform:translate(-42px,-22px) scale(.96)}}
@media(prefers-reduced-motion:reduce){.ln-blob{animation:none}}

.ln-hero{padding:96px 0 64px;display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;position:relative;z-index:1}

/* Pill badge */
.ln-pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:12px;font-weight:700;color:var(--blue-200);background:rgba(37,99,235,.18);border:1px solid rgba(79,142,247,.35);padding:6px 13px;border-radius:999px;animation:pill-float 4s ease-in-out infinite;letter-spacing:.01em}
@keyframes pill-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@media(prefers-reduced-motion:reduce){.ln-pill{animation:none}}

.ln-h1{font-family:var(--font-sans);font-size:60px;line-height:1.01;font-weight:800;letter-spacing:-.04em;color:#fff;margin:24px 0 0;text-wrap:balance}
.ln-h1 .accent{background:linear-gradient(130deg,#6aa3ff 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ln-lead{font-family:var(--font-sans);font-size:18px;line-height:1.68;color:rgba(255,255,255,.55);margin:22px 0 0;max-width:520px}
.ln-hero-cta{display:flex;gap:12px;margin-top:34px;flex-wrap:wrap}
.ln-nots{display:flex;gap:20px;margin-top:28px;flex-wrap:wrap}
.ln-not{font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.42);display:flex;align-items:center;gap:7px}
.ln-not svg{color:#6aa3ff}

/* Hero visual card */
.ln-herovis-wrap{position:relative}
.ln-herovis{background:transparent;border:none;border-radius:var(--radius-xl);padding:22px;transition:transform .35s var(--ease-out)}
.ln-herovis:hover{transform:translateY(-6px)}
.ln-hv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ln-hv-lbl{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.35)}

/* Floating hero badges */
.ln-float-badge{position:absolute;background:rgba(10,20,45,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.14);border-radius:var(--radius-md);padding:9px 14px;font-family:var(--font-mono);font-size:12px;color:#fff;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:2}
.ln-float-badge.f1{right:-18px;top:22%;animation:fb-float1 5s ease-in-out infinite}
.ln-float-badge.f2{left:-18px;bottom:28%;animation:fb-float2 6.5s ease-in-out infinite}
.ln-fbdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
.ln-fbdot.pos{background:#12A862}
.ln-fbdot.neg{background:#E1000F}
@keyframes fb-float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fb-float2{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}
@media(prefers-reduced-motion:reduce){.ln-float-badge{animation:none}}

/* Sources marquee */
.ln-sources{padding:44px 0 14px;border-top:1px solid rgba(255,255,255,.06);overflow:hidden}
.ln-src-eyebrow{text-align:center;font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:18px}
.ln-marquee-wrap{overflow:hidden;-webkit-mask:linear-gradient(to right,transparent,#000 10%,#000 90%,transparent);mask:linear-gradient(to right,transparent,rgba(0,0,0,1) 10%,rgba(0,0,0,1) 90%,transparent)}
.ln-marquee{display:flex;gap:10px;width:max-content;animation:ln-marquee 28s linear infinite}
@keyframes ln-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media(prefers-reduced-motion:reduce){.ln-marquee{animation:none}}
.ln-src{font-family:var(--font-mono);font-size:13px;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);border-radius:var(--radius-md);padding:9px 16px;white-space:nowrap;transition:background .22s,border-color .22s,color .22s}
.ln-src:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}

/* Stats bar */
.ln-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-xl);overflow:hidden;margin:48px 0 0}
.ln-stat{background:#03091A;padding:34px 22px;text-align:center;position:relative;transition:background .22s;cursor:default}
.ln-stat::before{content:'';position:absolute;inset:0;opacity:0;background:radial-gradient(circle at 50% 100%,rgba(79,142,247,.14),transparent 75%);transition:opacity .32s;pointer-events:none}
.ln-stat:hover::before{opacity:1}
.ln-stat-n{font-family:var(--font-sans);font-size:46px;font-weight:800;letter-spacing:-.04em;color:#fff;font-variant-numeric:tabular-nums;line-height:1;transition:transform .32s var(--ease-out)}
.ln-stat:hover .ln-stat-n{transform:scale(1.07)}
.ln-stat-l{font-family:var(--font-sans);font-size:13px;font-weight:600;color:rgba(255,255,255,.5);margin-top:7px}
.ln-stat-s{font-family:var(--font-sans);font-size:11px;color:rgba(255,255,255,.28);margin-top:3px}

/* Section base */
.ln-section{padding:76px 0;position:relative;z-index:1}
.ln-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6aa3ff;text-align:center}
.ln-sec-title{font-family:var(--font-sans);font-size:38px;font-weight:800;letter-spacing:-.03em;color:#fff;text-align:center;margin:12px 0 0;text-wrap:balance}
.ln-sec-sub{font-family:var(--font-sans);font-size:16px;color:rgba(255,255,255,.48);text-align:center;max-width:580px;margin:16px auto 0;line-height:1.68}

/* Feature cards */
.ln-feat{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:50px}
.ln-feat-6{grid-template-columns:repeat(3,1fr)}
.ln-fcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg);padding:28px;transition:background .25s,border-color .28s,box-shadow .28s,transform .3s var(--ease-out)}
.ln-fcard:hover{background:rgba(255,255,255,.07);border-color:rgba(106,163,255,.4);box-shadow:0 8px 32px rgba(0,0,0,.35),0 0 0 1px rgba(106,163,255,.08),inset 0 1px 0 rgba(255,255,255,.07);transform:translateY(-4px)}
.ln-ficon{width:44px;height:44px;border-radius:var(--radius-md);background:rgba(106,163,255,.14);color:#6aa3ff;display:flex;align-items:center;justify-content:center;transition:background .25s,transform .3s var(--ease-out)}
.ln-fcard:hover .ln-ficon{background:rgba(106,163,255,.24);transform:scale(1.12) rotate(-4deg)}
.ln-ftitle{font-family:var(--font-sans);font-size:17px;font-weight:700;color:#fff;margin:18px 0 0}
.ln-ftext{font-family:var(--font-sans);font-size:14px;line-height:1.68;color:rgba(255,255,255,.48);margin:8px 0 0}

/* Positioning */
.ln-pos{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:42px}
.ln-poscard{border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg);padding:26px;transition:transform .28s var(--ease-out)}
.ln-poscard.no{background:rgba(255,255,255,.03)}
.ln-poscard.no:hover{transform:translateY(-2px)}
.ln-poscard.yes{background:rgba(37,99,235,.14);border-color:rgba(106,163,255,.35);box-shadow:0 0 40px rgba(37,99,235,.18),inset 0 1px 0 rgba(255,255,255,.08)}
.ln-poscard.yes:hover{transform:translateY(-4px)}
.ln-pos-k{font-family:var(--font-mono);font-size:12px;letter-spacing:.05em}
.ln-poscard.no .ln-pos-k{color:rgba(255,255,255,.28)}
.ln-poscard.yes .ln-pos-k{color:#6aa3ff}
.ln-pos-t{font-family:var(--font-sans);font-size:19px;font-weight:700;margin-top:12px;letter-spacing:-.01em;color:#fff}
.ln-pos-d{font-family:var(--font-sans);font-size:14px;line-height:1.58;margin-top:8px;color:rgba(255,255,255,.48)}

/* Users */
.ln-users{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:42px}
.ln-ucard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg);padding:24px;display:flex;flex-direction:column;gap:12px;transition:background .22s,border-color .25s,transform .3s var(--ease-out),box-shadow .28s}
.ln-ucard:hover{background:rgba(255,255,255,.07);border-color:rgba(106,163,255,.35);transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.ln-uicon{color:#6aa3ff}
.ln-uname{font-family:var(--font-sans);font-size:15px;font-weight:700;color:#fff}
.ln-udesc{font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.42);line-height:1.58}

/* CTA banner */
.ln-cta{background:linear-gradient(140deg,rgba(27,67,196,.75) 0%,rgba(124,92,252,.55) 100%);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-xl);padding:76px 52px;text-align:center;margin:16px 0 64px;position:relative;overflow:hidden}
.ln-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.09),transparent 65%);pointer-events:none}
.ln-cta::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.ln-cta-t{font-family:var(--font-sans);font-size:42px;font-weight:800;letter-spacing:-.04em;color:#fff;text-wrap:balance;position:relative;z-index:1}
.ln-cta-s{font-family:var(--font-sans);font-size:16px;color:rgba(255,255,255,.62);margin:18px auto 0;max-width:480px;line-height:1.68;position:relative;z-index:1}
.ln-cta-b{display:flex;gap:12px;justify-content:center;margin-top:34px;position:relative;z-index:1;flex-wrap:wrap}

/* Footer */
.ln-foot{border-top:1px solid rgba(255,255,255,.07);padding:34px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.ln-foot-links{display:flex;gap:24px}
.ln-foot-links a{font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.32);transition:color .18s}
.ln-foot-links a:hover{color:rgba(255,255,255,.7);text-decoration:none}
.ln-meta{font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,.22)}

/* Steps */
.ln-steps-section{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-xl);padding:64px 56px}
.ln-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:44px;margin-top:48px;position:relative}
.ln-step-connector{position:absolute;top:26px;left:calc(33.33% + 16px);right:calc(33.33% + 16px);height:1px;background:linear-gradient(to right,rgba(106,163,255,.4),rgba(167,139,250,.4));pointer-events:none}
.ln-step-n{font-family:var(--font-mono);font-size:44px;font-weight:700;color:rgba(106,163,255,.3);letter-spacing:-.02em;line-height:1;transition:color .3s}
.ln-step:hover .ln-step-n{color:rgba(106,163,255,.7)}
.ln-step-t{font-family:var(--font-sans);font-size:17px;font-weight:700;color:#fff;margin-top:14px;letter-spacing:-.01em}
.ln-step-d{font-family:var(--font-sans);font-size:14px;color:rgba(255,255,255,.44);margin-top:8px;line-height:1.68}

/* Testimonials */
.ln-testimonials{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}
.ln-tcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-xl);padding:32px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:border-color .28s,box-shadow .3s,transform .32s var(--ease-out)}
.ln-tcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(106,163,255,.4),transparent);opacity:0;transition:opacity .3s}
.ln-tcard:hover{border-color:rgba(106,163,255,.3);box-shadow:0 14px 44px rgba(0,0,0,.45),0 0 32px rgba(106,163,255,.1);transform:translateY(-6px)}
.ln-tcard:hover::before{opacity:1}
.ln-tquote-mark{font-family:Georgia,serif;font-size:62px;line-height:.7;color:rgba(106,163,255,.35);margin-bottom:12px;user-select:none;display:block}
.ln-tquote{font-family:var(--font-sans);font-size:14px;line-height:1.82;color:rgba(255,255,255,.58);margin:0;flex:1}
.ln-tauthor{display:flex;align-items:center;gap:12px;margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,.07)}
.ln-tavatar{width:38px;height:38px;border-radius:50%;background:rgba(106,163,255,.18);color:#6aa3ff;font-family:var(--font-sans);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.04em;border:1px solid rgba(106,163,255,.25)}
.ln-tname{font-family:var(--font-sans);font-size:13px;font-weight:700;color:#fff}
.ln-trole{font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,.38);margin-top:1px}
.ln-torg{color:#6aa3ff;font-weight:600}

/* Pricing */
.ln-pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px;align-items:start}
.ln-pcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-xl);padding:32px;display:flex;flex-direction:column;position:relative;transition:border-color .28s,box-shadow .3s,transform .32s var(--ease-out)}
.ln-pcard:not(.featured):hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);border-color:rgba(255,255,255,.15)}
.ln-pcard.featured{background:linear-gradient(155deg,rgba(37,99,235,.28) 0%,rgba(124,92,252,.18) 100%);border-color:rgba(106,163,255,.45);box-shadow:0 0 0 1px rgba(106,163,255,.22),0 24px 64px rgba(37,99,235,.22),inset 0 1px 0 rgba(255,255,255,.12)}
.ln-pcard.featured:hover{transform:translateY(-6px);box-shadow:0 0 0 1px rgba(106,163,255,.4),0 30px 80px rgba(37,99,235,.3),inset 0 1px 0 rgba(255,255,255,.14)}
.ln-pbadge{display:inline-flex;align-self:flex-start;font-family:var(--font-sans);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(106,163,255,.22);color:#6aa3ff;border:1px solid rgba(106,163,255,.4);border-radius:var(--radius-pill);padding:4px 12px;margin-bottom:18px}
.ln-pname{font-family:var(--font-sans);font-size:17px;font-weight:700;color:#fff;letter-spacing:-.01em}
.ln-psub{font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.4);margin-top:4px}
.ln-pprice{margin:24px 0 0;display:flex;align-items:baseline;gap:4px}
.ln-pprice-n{font-family:var(--font-sans);font-size:44px;font-weight:800;letter-spacing:-.04em;color:#fff;font-variant-numeric:tabular-nums}
.ln-pprice-per{font-family:var(--font-sans);font-size:15px;color:rgba(255,255,255,.38)}
.ln-pfeatures{list-style:none;margin:22px 0 28px;padding:0;border-top:1px solid rgba(255,255,255,.07);padding-top:20px;display:flex;flex-direction:column;gap:11px}
.ln-pfeatures li{font-family:var(--font-sans);font-size:14px;color:rgba(255,255,255,.52);display:flex;align-items:flex-start;gap:10px;line-height:1.4}
.ln-pcheck{color:#6aa3ff;flex-shrink:0;display:inline-flex;margin-top:1px}
.ln-pmt{margin-top:auto}

/* FAQ */
.ln-faq{max-width:700px;margin:48px auto 0;border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-xl);overflow:hidden;background:rgba(255,255,255,.02)}
.ln-faq-item{border-bottom:1px solid rgba(255,255,255,.06)}
.ln-faq-item:last-child{border-bottom:none}
.ln-faq-q{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:20px 24px;font-family:var(--font-sans);font-size:15px;font-weight:600;color:rgba(255,255,255,.78);display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .18s,color .18s}
.ln-faq-q:hover{background:rgba(255,255,255,.04);color:#fff}
.ln-faq-q.open{color:#6aa3ff}
.ln-faq-icon{flex-shrink:0;color:rgba(255,255,255,.3);display:inline-flex;transition:color .2s,transform .3s var(--ease-out)}
.ln-faq-q.open .ln-faq-icon{color:#6aa3ff;transform:rotate(45deg)}
.ln-faq-a{padding:0 24px 20px;font-family:var(--font-sans);font-size:14px;line-height:1.78;color:rgba(255,255,255,.44);animation:faq-in .26s cubic-bezier(.22,1,.36,1)}
@keyframes faq-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.ln-faq-a{animation:none}}

/* Reveal animation */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .68s cubic-bezier(.22,1,.36,1),transform .68s cubic-bezier(.22,1,.36,1);transition-delay:calc(var(--i,0)*72ms)}
.reveal.in-view{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

/* ── Auth ─────────────────────────────────────────────────── */
.auth{display:grid;grid-template-columns:minmax(0,1fr) 1.05fr;height:100vh}
.auth-form-col{display:flex;flex-direction:column;background:var(--bg);overflow-y:auto}

.auth-form-foot{padding:22px 40px;font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary);flex-shrink:0}
.auth-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.auth-title{font-family:var(--font-sans);font-size:30px;font-weight:700;letter-spacing:-.025em;color:var(--text);margin:8px 0 0}

.auth-fields{display:flex;flex-direction:column;gap:16px;margin-top:4px}

.af-box{display:flex;align-items:center;height:44px;padding:0 12px;border-radius:var(--radius-md);background:var(--surface);border:1px solid var(--border);transition:border-color var(--dur-fast),box-shadow var(--dur-fast)}
.af-input{flex:1;border:none;outline:none;background:none;font-family:var(--font-sans);font-size:14px;color:var(--text);height:100%}

.auth-row-between{display:flex;align-items:center;justify-content:space-between}
.auth-check{display:flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);cursor:pointer}
.auth-check.terms{align-items:flex-start;line-height:1.5}
.auth-check input{accent-color:var(--accent);width:15px;height:15px;margin-top:1px}
.auth-link{border:none;background:none;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:var(--accent);font-weight:500;padding:0}
.auth-link:hover{color:var(--accent-hover)}
.auth-link.strong{font-weight:600}
.auth-switch{margin-top:24px;font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);text-align:center}
.auth-back{display:inline-flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);padding:0;margin-bottom:18px}
.auth-back:hover{color:var(--text)}
.auth-confirm-icon{width:52px;height:52px;border-radius:50%;background:var(--blue-50);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.auth-status{height:100vh;background:var(--blue-france);display:flex;align-items:center;justify-content:center}
.auth-status-inner{display:flex;flex-direction:column;align-items:center;text-align:center}
.auth-status-t{font-family:var(--font-sans);font-size:22px;font-weight:700;color:#fff;margin-top:28px;letter-spacing:-.02em}
.auth-status-s{font-family:var(--font-sans);font-size:14px;color:var(--blue-200);margin-top:8px}
.auth-spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;animation:fmspin .8s linear infinite;margin-top:40px}

.auth-check-circle{width:64px;height:64px;border-radius:50%;background:var(--green-500);display:flex;align-items:center;justify-content:center;margin-top:36px;animation:fmpop .4s var(--ease-out)}

/* ── Dashboard ────────────────────────────────────────────── */
.db-app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden;background:var(--surface-sunken)}

.db-map-title{font-family:var(--font-sans);font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.01em}

.db-tile-row{display:grid;grid-template-columns:1fr;gap:12px}
.db-blk-lbl{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary)}

.db-sources{display:flex;flex-wrap:wrap;gap:8px}

.db-modules{max-width:1180px;margin:0 auto;padding:26px 28px 48px}
.db-mod-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:22px}
.db-mod-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.db-mod-title{font-family:var(--font-sans);font-size:30px;font-weight:700;letter-spacing:-.025em;color:var(--text);margin:6px 0 0}
.db-mod-sub{font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);margin:6px 0 0;max-width:560px}

.db-kpi-card{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:12px;transition:box-shadow var(--dur-fast),border-color var(--dur-fast)}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {
  return (

      </div>
      {children}
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
        </select>
      </TweakRow>
    );
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function Icon({ n, s = 18, color, style = {} }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", n);
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs: { width: s, height: s } });
    }
  }, [n, s]);
  return <span ref={ref} style={{ display: "inline-flex", color, ...style }} />;
}

function useReveal() {
  const ref = React.useRef(null);
  const [inView, setInView] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold: 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

function AnimCounter({ target, inView }) {
  const [display, setDisplay] = React.useState('0');
  React.useEffect(() => {
    if (!inView) return;
    const raw = target.replace(/[^0-9]/g, '');
    if (!raw) { setDisplay(target); return; }
    const num = parseInt(raw, 10);
    const suffix = target.replace(/[0-9]/g, '');
    let start = null;
    const dur = 1400;
    const raf = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(Math.floor(eased * num) + suffix);
      if (p < 1) requestAnimationFrame(raf);
      else setDisplay(target);
    };
    requestAnimationFrame(raf);
  }, [inView, target]);
  return display;
}

const frpct1 = (n) => n.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

// Area chart — recreated per handoff spec (not part of the DS bundle).
function AreaChart({ series, labels = [], color = "var(--accent)", h = 230, id = "c" }) {
  const w = 720, padL = 40, padR = 14, padT = 14, padB = 26;
  const min = Math.min(...series, 0), max = Math.max(...series);
  const span = (max - min) || 1;
  const X = (i) => padL + i * ((w - padL - padR) / (series.length - 1 || 1));
  const Y = (v) => padT + (1 - (v - min) / span) * (h - padT - padB);
  const pts = series.map((v, i) => [X(i), Y(v)]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = `${line} L ${X(series.length - 1)} ${h - padB} L ${padL} ${h - padB} Z`;
  const ticks = 4;
  const gridY = Array.from({ length: ticks + 1 }, (_, i) => min + (span * i) / ticks);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height: 'auto', display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={id + '-g'} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {gridY.map((gv, i) => (
        <g key={'g' + i}>
          <line x1={padL} x2={w - padR} y1={Y(gv)} y2={Y(gv)} stroke="var(--border-subtle)" strokeWidth="1" />
          <text x={padL - 8} y={Y(gv) + 3} textAnchor="end" style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--text-tertiary)' }}>{frpct1(gv)}</text>
        </g>
      ))}
      <path d={area} fill={`url(#${id}-g)`} />
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="3.4" fill={color} stroke="var(--surface)" strokeWidth="2" />
      {labels.map((lb, i) => (
        <text key={'t' + i} x={X(i * (series.length - 1) / (labels.length - 1))} y={h - 8}
              textAnchor={i === 0 ? 'start' : i === labels.length - 1 ? 'end' : 'middle'}
              style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--text-tertiary)' }}>{lb}</text>
      ))}
    </svg>
  );
}

const MOIS_SHORT = ['Janv.','Févr.','Mars','Avr.','Mai','Juin','Juil.','Août','Sept.','Oct.','Nov.','Déc.'];

function fmtPeriod(p, short) {
  const [y, m] = p.split('-');
  const idx = parseInt(m) - 1;
  return (short ? MOIS_SHORT[idx] : MOIS_FR[idx]) + ' ' + y;
}

function parseSDMX(json) {
  try {
    const timeDim = json.structure.dimensions.observation.find(d => d.id === 'TIME_PERIOD');
    if (!timeDim) return {};
    const periods = timeDim.values.map(v => v.id);
    const seriesKey = Object.keys(json.dataSets[0].series)[0];
    const obs = json.dataSets[0].series[seriesKey].observations;
    const result = {};
    Object.entries(obs).forEach(([idx, vals]) => {
      const period = periods[parseInt(idx)];
      if (period && vals[0] != null) result[period] = Math.round(vals[0] * 10) / 10;
    });
    return result;
  } catch(e) { return {}; }
}

function useInflData() {
  const [state, setState] = React.useState({ loading: true, error: false, data: {}, fetchedAt: null });
  React.useEffect(() => {
    let alive = true;
    fetch('https://data-api.ecb.europa.eu/service/data/ICP/M.FR.N.000000.4.ANR?lastNObservations=84&format=jsondata')
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(json => {
        if (!alive) return;
        const data = parseSDMX(json);
        const periods = Object.keys(data);
        console.log('[BCE France] HICP received. Periods:', periods.length, 'Latest:', periods.sort().at(-1), 'Value:', data[periods.sort().at(-1)]);
        setState({ loading: false, error: false, data, fetchedAt: new Date().toISOString() });
      })
      .catch(err => {
        console.warn('[BCE France] API failed:', err);
        if (alive) setState({ loading: false, error: true, data: {}, fetchedAt: null });
      });
    return () => { alive = false; };
  }, []);
  return state;
}

function getMonthly(apiData, apiError) {
  return (apiError || Object.keys(apiData).length === 0) ? STATIC_MONTHLY : apiData;
}

function getAnnualAvg(monthly, year) {
  const vals = Object.entries(monthly)
    .filter(([k]) => k.startsWith(year + '-'))
    .map(([, v]) => v);
  if (!vals.length) return null;
  return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length * 10) / 10;
}

function getLatestPeriod(monthly) {
  return Object.keys(monthly).sort().slice(-1)[0] || null;
}

function parseInflQuery(q) {
  const yearMatch = String(q).match(/\b(19|20)\d{2}\b/);
  const year = yearMatch ? yearMatch[0] : null;
  const low = String(q).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  let indicator = 'IPC ensemble';
  if (/energ/.test(low)) indicator = 'Énergie';
  else if (/aliment|nourrit/.test(low)) indicator = 'Alimentation';
  else if (/sous.jacent|coeur|hors energ/.test(low)) indicator = 'Inflation sous-jacente';
  else if (/service/.test(low)) indicator = 'Services';
  else if (/logement|loyer/.test(low)) indicator = 'Logement';
  else if (/transport/.test(low)) indicator = 'Transports';
  else if (/sante|medical|soin/.test(low)) indicator = 'Santé';
  const wantsLatest = /dernier|recent|actuel|maintenant|aujourd/.test(low) && !year;
  return { year, indicator, wantsLatest };
}

// Web Mercator projection (pseudo-Mercator fitted to viewport)
const EU_W = 660, EU_H = 540;
const EU_LON_MIN = -12, EU_LON_MAX = 40;
const EU_YM_MIN = Math.log(Math.tan(Math.PI/4 + 34 * Math.PI/360)); // lat 34°N
const EU_YM_MAX = Math.log(Math.tan(Math.PI/4 + 71 * Math.PI/360)); // lat 71°N
const EU27_SET = new Set(['AT','BE','BG','CY','CZ','DE','DK','EE','ES','FI','FR','GR','HR','HU','IE','IT','LT','LU','LV','MT','NL','PL','PT','RO','SE','SI','SK']);
const EU_CONTEXT_CODES = new Set(['NO','CH','GB','RS','AL','MK','ME','BA','UA','BY','TR','IS','XK','MD','AM','AZ','GE']);

function euXY(lon, lat) {
  const yM = Math.log(Math.tan(Math.PI/4 + lat * Math.PI/360));
  const x = (lon - EU_LON_MIN) / (EU_LON_MAX - EU_LON_MIN) * EU_W;
  const y = (EU_YM_MAX - yM) / (EU_YM_MAX - EU_YM_MIN) * EU_H;
  return [x, y];
}

function ringToSVGD(coords) {
  const pts = coords.filter((_, i) => i % 2 === 0); // thin by skipping every other for perf
  return pts.map((c, i) => {
    const [x, y] = euXY(c[0], c[1]);
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ') + 'Z';
}

function geomToSVGD(geometry) {
  if (!geometry) return '';
  if (geometry.type === 'Polygon') return ringToSVGD(geometry.coordinates[0]);
  if (geometry.type === 'MultiPolygon') return geometry.coordinates.map(p => ringToSVGD(p[0])).join(' ');
  return '';
}

function parseEUSDMX(json) {
  try {
    const seriesDims = json.structure.dimensions.series;
    const obsDims = json.structure.dimensions.observation;
    const timeDim = obsDims.find(d => d.id === 'TIME_PERIOD');
    const periods = timeDim.values.map(v => v.id);
    const refAreaDim = seriesDims.find(d => d.id === 'REF_AREA');
    const countries = refAreaDim.values.map(v => v.id);
    const refAreaIdx = seriesDims.indexOf(refAreaDim);
    const result = {};
    Object.entries(json.dataSets[0].series).forEach(([key, series]) => {
      const parts = key.split(':').map(Number);
      const code = countries[parts[refAreaIdx]];
      if (!code) return;
      result[code] = {};
      Object.entries(series.observations).forEach(([oi, vals]) => {
        const p = periods[parseInt(oi)];
        if (p && vals[0] != null) result[code][p] = Math.round(vals[0] * 10) / 10;
      });
    });
    return result;
  } catch(e) { return {}; }
}

function getEUValue(euData, code, period, useStatic) {
  if (!useStatic && euData[code] && euData[code][period] != null) return euData[code][period];
  const year = period ? parseInt(period.slice(0, 4)) : null;
  return (year && EU_STATIC_ANNUAL[code]?.[year]) ?? null;
}

function genPeriods(fromYear) {
  const result = [];
  const now = new Date();
  for (let y = fromYear; y <= now.getFullYear(); y++) {
    const maxM = y === now.getFullYear() ? now.getMonth() + 1 : 12;
    for (let m = 1; m <= maxM; m++) result.push(y + '-' + String(m).padStart(2, '0'));
  }
  return result.reverse();
}

function SortableEUTable({ rows, euAvg }) {
  const [sortKey, setSortKey] = React.useState('val');
  const [sortDir, setSortDir] = React.useState('desc');

  function handleSort(key) {
    if (key === sortKey) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(key); setSortDir(key === 'pays' ? 'asc' : 'desc'); }
  }

  const sorted = [...rows].sort((a, b) => {
    if (sortKey === 'pays') return sortDir === 'asc' ? a._raw.name.localeCompare(b._raw.name) : b._raw.name.localeCompare(a._raw.name);
    const va = sortKey === 'diff' ? (a._raw.v - euAvg) : a._raw.v;
    const vb = sortKey === 'diff' ? (b._raw.v - euAvg) : b._raw.v;
    return sortDir === 'asc' ? va - vb : vb - va;
  }).map((r, i) => ({ ...r, rang: i + 1 }));

  const cols = [
    { key:'rang', label:'#', numeric:true },
    { key:'pays', label:'Pays', numeric:false },
    { key:'val', label:'Inflation IPCH', numeric:true },
    { key:'diff', label:'vs moy. UE', numeric:true },
  ];

  const SortIcon = ({ col }) => {
    if (col !== sortKey) return <span style={{ opacity:0.3, fontSize:9 }}>⇅</span>;
    return <span style={{ fontSize:9 }}>{sortDir === 'desc' ? '▼' : '▲'}</span>;
  };

  return (
    <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', overflow:'hidden' }}>
      <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
        <thead>
          <tr style={{ background:'var(--gray-50)', borderBottom:'1px solid var(--border)' }}>
            {cols.map(col => (
              <th key={col.key} onClick={() => handleSort(col.key)}
                  style={{ padding:'8px 12px', textAlign: col.numeric ? 'right' : 'left',
                           fontWeight:600, fontSize:11, color:'var(--text-secondary)',
                           textTransform:'uppercase', letterSpacing:'0.06em', cursor:'pointer',
                           userSelect:'none', whiteSpace:'nowrap' }}>
                {col.label} <SortIcon col={col.key} />
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.map((row, i) => (
            <tr key={row._raw.code} style={{ borderBottom: i < sorted.length-1 ? '1px solid var(--border-subtle)' : 'none',
                                              background: i % 2 === 0 ? 'white' : 'var(--gray-50)' }}>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text-tertiary)' }}>{row.rang}</td>
              <td style={{ padding:'7px 12px', fontWeight:600 }}>{row._raw.flag} {row._raw.name}</td>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontWeight:700, color: inflColor(row._raw.v) }}>{row.val}</td>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontSize:12,
                           color: row._raw.v > euAvg ? '#E1000F' : row._raw.v < euAvg ? '#0A6B43' : 'var(--text-secondary)' }}>{row.diff}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function parseMultiCatSDMX(json) {
  try {
    const serDims = json.structure.dimensions.series;
    const obsDims = json.structure.dimensions.observation;
    const timeDim = obsDims.find(d => d.id === 'TIME_PERIOD');
    const periods = timeDim.values.map(v => v.id);
    const catDim = serDims.find(d => d.id === 'ICP_ITEM');
    const result = {};
    Object.entries(json.dataSets[0].series).forEach(([key, s]) => {
      const parts = key.split(':').map(Number);
      const catIdx = serDims.indexOf(catDim);
      const cat = catDim.values[parts[catIdx]]?.id;
      if (!cat) return;
      result[cat] = {};
      Object.entries(s.observations).forEach(([oi, vals]) => {
        const p = periods[parseInt(oi)];
        if (p && vals[0] != null) result[cat][p] = Math.round(vals[0] * 10) / 10;
      });
    });
    return result;
  } catch(e) { return {}; }
}

function useInflCats() {
  const [state, setState] = React.useState({ loading: true, data: {} });
  React.useEffect(() => {
    let alive = true;
    fetch('https://data-api.ecb.europa.eu/service/data/ICP/M.FR.N.010000+045000+070000+060000+110000.4.ANR?lastNObservations=3&format=jsondata')
      .then(r => r.json())
      .then(json => { if (alive) setState({ loading: false, data: parseMultiCatSDMX(json) }); })
      .catch(() => { if (alive) setState({ loading: false, data: {} }); });
    return () => { alive = false; };
  }, []);
  return state;
}

function ExportMenu({ filename, title, columns, getRows }) {

    function onDown(e) { if (!ref.current?.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, [open]);

  function exportCSV() {
    setOpen(false);

function parseStationRecord(rec) {
  const lat = parseFloat(rec.latitude || rec.lat || (rec.geom && rec.geom.lat) || 0);
  const lon = parseFloat(rec.longitude || rec.lon || (rec.geom && rec.geom.lon) || 0);
  const prix = {};
  const keys = { Gazole:'prix_gazole_valeur', SP95:'prix_sp95_valeur', SP98:'prix_sp98_valeur', E10:'prix_e10_valeur', E85:'prix_e85_valeur', GPLc:'prix_gplc_valeur' };
  Object.entries(keys).forEach(([ft, k]) => { if (rec[k] != null) prix[ft] = parseFloat(rec[k]); });
  if (rec.prix && Array.isArray(rec.prix)) rec.prix.forEach(p => { if (p.nom && p.valeur) prix[p.nom] = parseFloat(p.valeur); });
  return {
    id: String(rec.id),
    nom: rec.nom || rec.ensigne || ('Station ' + rec.id),
    adresse: rec.adresse || '',
    ville: rec.ville || '',
    cp: rec.cp || '',
    dept: rec.dep_code || rec.code_dep || (rec.cp || '').slice(0, 2),
    lat, lon, prix,
    h24: rec.automate_24_24 === 'Oui' || rec.automate_24_24 === '1',
  };
}

function useCarburantData() {
  const [state, setState] = React.useState({ loading: true, stations: [], progress: 0, total: 0, error: false, fromApi: false });
  React.useEffect(() => {
    let alive = true;
    const LIMIT = 100;
    const FIELDS = 'id,adresse,ville,cp,dep_code,latitude,longitude,prix_gazole_valeur,prix_sp95_valeur,prix_sp98_valeur,prix_e10_valeur,prix_e85_valeur,prix_gplc_valeur,automate_24_24';

    async function loadAll() {
      try {
        const r0 = await fetch(`${CARB_API_URL}?limit=${LIMIT}&offset=0&select=${FIELDS}`);
        if (!r0.ok) throw new Error(r0.status);
        const d0 = await r0.json();
        const total = d0.total_count || 0;
        let all = (d0.results || []).map(parseStationRecord).filter(s => s.lat && s.lon);
        if (!alive) return;
        setState({ loading: total > LIMIT, stations: [...all], total, progress: all.length, error: false, fromApi: true });

        if (total > LIMIT) {
          const offsets = [];
          for (let o = LIMIT; o < total; o += LIMIT) offsets.push(o);
          for (let i = 0; i < offsets.length; i += 10) {
            if (!alive) return;
            const chunk = offsets.slice(i, i + 10);
            const batches = await Promise.all(chunk.map(o =>
              fetch(`${CARB_API_URL}?limit=${LIMIT}&offset=${o}&select=${FIELDS}`)
                .then(r => r.json())
                .then(d => (d.results || []).map(parseStationRecord).filter(s => s.lat && s.lon))
                .catch(() => [])
            ));
            all = [...all, ...batches.flat()];
            if (!alive) return;
            setState(s => ({ ...s, stations: [...all], progress: all.length }));
          }
        }
        if (!alive) return;
        setState(s => ({ ...s, loading: false }));
      } catch(e) {
        if (alive) setState({ loading: false, stations: STATIC_CARB, error: true, fromApi: false, progress: 0, total: 0 });
      }
    }

    loadAll();
    return () => { alive = false; };
  }, []);
  return state;
}

function carbPriceColor(price, allPrices) {
  if (price == null || allPrices.length === 0) return 'var(--gray-300)';
  const mn = Math.min(...allPrices), mx = Math.max(...allPrices);
  const r = (price - mn) / ((mx - mn) || 1);
  if (r < 0.15) return '#0A6B43';
  if (r < 0.35) return '#12A862';
  if (r < 0.65) return '#C9760D';
  if (r < 0.85) return '#E1000F';
  return '#7B0008';
}

function CarbMap({ stations, fuelId, selected, onSelect }) {
  const { FranceMap } = window.FranceMonitorDesignSystem_5343d8;
  const allPrices = stations.map(s => s.prix[fuelId]).filter(v => v != null);

  const dots = React.useMemo(() => stations.map(s => {
    const { x, y } = stationToSvg(s.lon, s.lat);
    if (isNaN(x) || isNaN(y) || x < -200 || x > 1200 || y < -200 || y > 1163) return null;
    return { s, x, y, v: s.prix[fuelId] };
  }).filter(Boolean), [stations, fuelId]);

  return (
    <div style={{ position:'relative', flex:1, minWidth:0, overflow:'hidden' }}>
      <FranceMap height="100%" />
      <svg viewBox="0 0 1000 963" preserveAspectRatio="xMidYMid meet"
           style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none' }}>
        {dots.map(({ s, x, y, v }) => {
          const isSel = selected === s.id;
          return (
            <circle key={s.id} cx={x} cy={y} r={isSel ? 8 : 3.5}
              fill={carbPriceColor(v, allPrices)}

        })}
      </svg>
    </div>
  );
}

function CarburantClassement({ stations, fuelId, onSelectStation, avgPrice }) {
  const [sortKey, setSortKey] = React.useState('prix');
  const [sortDir, setSortDir] = React.useState('asc');
  const [deptFilter, setDeptFilter] = React.useState('');
  const [search, setSearch] = React.useState('');

  const depts = [...new Set(stations.map(s => s.dept))].filter(Boolean).sort();
  const allPrices = stations.map(s => s.prix[fuelId]).filter(v => v != null);

  function hs(key) {
    if (key === sortKey) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  }

  const rows = stations
    .filter(s => s.prix[fuelId] != null)
    .filter(s => !deptFilter || s.dept === deptFilter)
    .filter(s => !search || s.nom.toLowerCase().includes(search.toLowerCase()) || s.ville.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      if (sortKey === 'nom')  return sortDir === 'asc' ? a.nom.localeCompare(b.nom)   : b.nom.localeCompare(a.nom);
      if (sortKey === 'ville')return sortDir === 'asc' ? a.ville.localeCompare(b.ville): b.ville.localeCompare(a.ville);
      if (sortKey === 'dept') return sortDir === 'asc' ? a.dept.localeCompare(b.dept)  : b.dept.localeCompare(a.dept);
      const va = a.prix[fuelId], vb2 = b.prix[fuelId];
      return sortDir === 'asc' ? va - vb2 : vb2 - va;
    });

  const expCols = [
    { key:'nom', label:'Station' }, { key:'adresse', label:'Adresse' }, { key:'ville', label:'Ville' },
    { key:'dept', label:'Dép.' }, { key:'prix', label:'Prix (€/L)' }, { key:'vs', label:'vs. moy.' }, { key:'h24', label:'24h/24' },
  ];
  const SI = ({ col }) => col !== sortKey ? <span style={{ opacity:0.3, fontSize:9 }}>⇅</span> : <span style={{ fontSize:9 }}>{sortDir === 'asc' ? '▲' : '▼'}</span>;

  return (
    <div className="infl-body">
      <div style={{ display:'flex', gap:10, marginBottom:14, flexWrap:'wrap', alignItems:'flex-end', justifyContent:'space-between' }}>
        <div style={{ display:'flex', gap:10, flexWrap:'wrap', alignItems:'flex-end' }}>
          <div>
            <div className="infl-eyebrow" style={{ marginBottom:4 }}>Recherche</div>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Station ou ville…"
              style={{ height:32, padding:'0 10px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', fontSize:12, fontFamily:'var(--font-sans)', outline:'none', width:180 }} />
          </div>
          <div>
            <div className="infl-eyebrow" style={{ marginBottom:4 }}>Département</div>
            <select className="infl-sel" value={deptFilter} onChange={e => setDeptFilter(e.target.value)}>
              <option value="">Tous les dép.</option>
              {depts.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>
        </div>
        <ExportMenu filename={'carburant-classement-' + fuelId} title={'Classement stations ' + fuelId}
          columns={expCols}
          getRows={() => rows.map(s => ({
            nom: s.nom, adresse: s.adresse, ville: s.ville, dept: s.dept,
            prix: s.prix[fuelId].toFixed(3) + ' €/L',
            vs: avgPrice != null ? ((s.prix[fuelId] - avgPrice) >= 0 ? '+' : '') + (s.prix[fuelId] - avgPrice).toFixed(3) + ' €/L' : '—',
            h24: s.h24 ? 'Oui' : 'Non',
          }))} />
      </div>
      <div style={{ fontSize:12, color:'var(--text-tertiary)', marginBottom:8 }}>{rows.length} station{rows.length !== 1 ? 's' : ''} — cliquez un en-tête pour trier</div>
      <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
          <thead>
            <tr style={{ background:'var(--gray-50)', borderBottom:'1px solid var(--border)' }}>
              {[{k:'nom',l:'Station'},{k:'ville',l:'Ville'},{k:'dept',l:'Dép.',n:true},{k:'prix',l:'Prix ' + fuelId,n:true},{k:'diff',l:'vs. moy.',n:true}].map(c => (
                <th key={c.k} onClick={() => hs(c.k)}
                    style={{ padding:'8px 10px', textAlign:c.n?'right':'left', fontWeight:600, fontSize:10, color:'var(--text-secondary)', textTransform:'uppercase', letterSpacing:'0.06em', cursor:'pointer', userSelect:'none', whiteSpace:'nowrap' }}>
                  {c.l} <SI col={c.k} />
                </th>
              ))}
              <th style={{ padding:'8px 10px', fontSize:10, color:'var(--text-secondary)', textTransform:'uppercase' }}>24h</th>
            </tr>
          </thead>
          <tbody>
            {rows.slice(0, 100).map((s, i) => {
              const v = s.prix[fuelId];
              const diff = avgPrice != null ? v - avgPrice : null;
              return (
                <tr key={s.id} onClick={() => onSelectStation(s.id)}
                    style={{ borderBottom: i < rows.length-1 ? '1px solid var(--border-subtle)' : 'none',
                             background: i % 2 === 0 ? 'white' : 'var(--gray-50)', cursor:'pointer' }}>
                  <td style={{ padding:'7px 10px', fontWeight:600, maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.nom}</td>
                  <td style={{ padding:'7px 10px', color:'var(--text-secondary)' }}>{s.ville}</td>
                  <td style={{ padding:'7px 10px', textAlign:'right', color:'var(--text-tertiary)', fontFamily:'var(--font-mono)' }}>{s.dept}</td>
                  <td style={{ padding:'7px 10px', textAlign:'right', fontFamily:'var(--font-mono)', fontWeight:700, color:carbPriceColor(v, allPrices) }}>{v.toFixed(3)} €/L</td>
                  <td style={{ padding:'7px 10px', textAlign:'right', fontFamily:'var(--font-mono)', fontSize:11,
                               color: diff != null ? (diff > 0.005 ? '#E1000F' : diff < -0.005 ? '#0A6B43' : 'var(--text-secondary)') : 'var(--text-tertiary)' }}>
                    {diff != null ? (diff >= 0 ? '+' : '') + diff.toFixed(3) + ' €' : '—'}
                  </td>
                  <td style={{ padding:'7px 10px', textAlign:'center', fontSize:12, color:'var(--green-600)' }}>{s.h24 ? '✓' : ''}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {rows.length > 100 && <div style={{ marginTop:6, fontSize:11, color:'var(--text-tertiary)', textAlign:'center' }}>Affichage limité à 100 résultats — affinez avec les filtres</div>}
    </div>
  );
}

function CarburantHistorique({ stations, fuelId, fuelTypes, initStation }) {
  const { Alert } = window.FranceMonitorDesignSystem_5343d8;
  const [histStn, setHistStn] = React.useState(initStation || null);
  const [search, setSearch] = React.useState('');
  const [results, setResults] = React.useState([]);

  React.useEffect(() => { if (initStation) setHistStn(initStation); }, [initStation && initStation.id]);

  function doSearch(q) {
    setSearch(q);
    if (q.length < 2) { setResults([]); return; }
    setResults(stations.filter(s =>
      s.nom.toLowerCase().includes(q.toLowerCase()) || s.ville.toLowerCase().includes(q.toLowerCase())
    ).slice(0, 8));
  }

  const mockHistory = React.useMemo(() => {
    if (!histStn) return [];
    const base = histStn.prix[fuelId] || 1.75;
    return Array.from({ length: 30 }, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (29 - i));
      const noise = Math.sin(i * 0.8) * 0.012 + (Math.random() - 0.5) * 0.006;
      const trend = i < 15 ? -0.001 * i : 0.001 * (i - 15);
      return { date: d.toISOString().slice(0, 10), price: Math.max(1.3, Math.round((base + noise + trend) * 1000) / 1000) };
    });
  }, [histStn && histStn.id, fuelId]);

  const chartSeries = mockHistory.map(d => d.price);
  const chartLabels = mockHistory.filter((_, i) => i % 7 === 0 || i === 29).map(d => d.date.slice(5));
  const minH = chartSeries.length ? Math.min(...chartSeries) : 0;
  const maxH = chartSeries.length ? Math.max(...chartSeries) : 0;

  const ftColor = (FUEL_TYPES.find(f => f.id === fuelId) || {}).color || 'var(--accent)';

  return (
    <div className="infl-body">
      <div style={{ marginBottom:16 }}>
        <div className="infl-eyebrow" style={{ marginBottom:6 }}>Rechercher une station</div>
        <div style={{ position:'relative', maxWidth:380 }}>
          <input value={search} onChange={e => doSearch(e.target.value)} placeholder="Nom de la station ou ville…"
            style={{ width:'100%', height:36, padding:'0 12px', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', fontSize:13, fontFamily:'var(--font-sans)', outline:'none', boxSizing:'border-box' }} />
          {results.length > 0 && (
            <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, background:'white', border:'1px solid var(--border)', borderRadius:'var(--radius-md)', boxShadow:'var(--shadow-md)', zIndex:50, overflow:'hidden' }}>
              {results.map(s => (
                <button key={s.id} onClick={() => { setHistStn(s); setSearch(''); setResults([]); }}
                  style={{ display:'block', width:'100%', textAlign:'left', padding:'8px 12px', border:'none', borderBottom:'1px solid var(--border-subtle)', background:'none', cursor:'pointer', fontSize:12, fontFamily:'var(--font-sans)' }}>
                  <div style={{ fontWeight:600 }}>{s.nom}</div>
                  <div style={{ color:'var(--text-tertiary)', fontSize:11 }}>{s.adresse} · {s.cp} {s.ville}</div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {!histStn ? (
        <div style={{ textAlign:'center', padding:'56px 24px', color:'var(--text-tertiary)' }}>
          <Icon n="chart-line" s={32} color="var(--gray-300)" />
          <div style={{ marginTop:12, fontSize:13, lineHeight:1.5 }}>Tapez le nom d'une station ou d'une ville<br />pour afficher l'évolution de ses prix</div>
        </div>
      ) : (
        <div>
          <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:8 }}>
            <div>
              <div style={{ fontWeight:700, fontSize:14 }}>{histStn.nom}</div>
              <div style={{ fontSize:12, color:'var(--text-tertiary)' }}>{histStn.adresse} · {histStn.cp} {histStn.ville}</div>
            </div>
            <button onClick={() => setHistStn(null)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text-tertiary)', fontSize:16, padding:0 }}>✕</button>
          </div>

          <div style={{ background:'var(--gray-50)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', padding:'12px 16px', marginBottom:16 }}>
            <div style={{ fontSize:11, fontWeight:700, color:'var(--text-secondary)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:10 }}>Prix actuels</div>
            <div style={{ display:'flex', gap:14, flexWrap:'wrap' }}>
              {fuelTypes.map(ft => {
                const v = histStn.prix[ft.id];
                if (v == null) return null;
                return (
                  <div key={ft.id} style={{ display:'flex', alignItems:'center', gap:6 }}>
                    <span style={{ width:9, height:9, borderRadius:99, background:ft.color, display:'inline-block', flexShrink:0 }} />
                    <span style={{ fontSize:11, color:'var(--text-secondary)' }}>{ft.short}</span>
                    <span className="infl-mono" style={{ fontSize:13, fontWeight:700, color: ft.id === fuelId ? ftColor : 'var(--text)' }}>{v.toFixed(3)} €/L</span>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8, flexWrap:'wrap', gap:8 }}>
            <div className="infl-eyebrow">{(FUEL_TYPES.find(f=>f.id===fuelId)||{}).label} — évolution sur 30 jours</div>
            <div style={{ display:'flex', gap:14, fontSize:11, color:'var(--text-tertiary)' }}>
              <span>Min : <b className="infl-mono" style={{ color:'#0A6B43' }}>{minH.toFixed(3)} €/L</b></span>
              <span>Max : <b className="infl-mono" style={{ color:'#E1000F' }}>{maxH.toFixed(3)} €/L</b></span>
              <span>Var : <b className="infl-mono">{((maxH - minH)).toFixed(3)} €/L</b></span>
            </div>
          </div>
          <AreaChart id={'carb-hist-' + histStn.id + '-' + fuelId} series={chartSeries} labels={chartLabels} color={ftColor} />

          <div style={{ marginTop:14 }}>
            <Alert kind="info" title="Données simulées">L'historique réel sera automatiquement affiché dès connexion de l'API gouvernementale officielle. Les valeurs affichées ici sont simulées pour illustration.</Alert>
          </div>
        </div>
      )}
    </div>
  );
}

function buildSeats() {
  const total = AN_GROUPS.reduce((a, g) => a + g.n, 0);
  const rows = 13, CX = 420, CY = 432, rInner = 150, rOuter = 402;
  const radii = [];
  for (let r = 0; r < rows; r++) radii.push(rInner + (rOuter - rInner) * r / (rows - 1));
  const sumR = radii.reduce((a, b) => a + b, 0);
  let perRow = radii.map(rad => Math.max(1, Math.round(total * rad / sumR)));
  let diff = total - perRow.reduce((a, b) => a + b, 0);
  let ri = rows - 1;
  while (diff !== 0) { perRow[ri] += diff > 0 ? 1 : -1; diff += diff > 0 ? -1 : 1; ri = (ri - 1 + rows) % rows; }
  const slots = [];
  for (let r = 0; r < rows; r++) {
    const count = perRow[r], rad = radii[r];
    for (let i = 0; i < count; i++) {
      const frac = count === 1 ? 0.5 : i / (count - 1);
      slots.push({ a: Math.PI * (1 - frac), rad });
    }
  }
  slots.sort((s1, s2) => s2.a - s1.a);
  let gi = 0, gcount = 0;
  return slots.map((s, idx) => {
    while (gi < AN_GROUPS.length - 1 && gcount >= AN_GROUPS[gi].n) { gi++; gcount = 0; }
    const g = AN_GROUPS[gi]; gcount++;
    return {
      x: CX + s.rad * Math.cos(s.a),
      y: CY - s.rad * Math.sin(s.a),
      group: g.id, color: g.c,
      name: FN_NAMES[(idx * 13) % FN_NAMES.length] + ' ' + SN_NAMES[(idx * 7) % SN_NAMES.length],
      party: g.name,
      circ: DEPT_NAMES[(idx * 5) % DEPT_NAMES.length] + ' · ' + ((idx % 18) + 1) + 'e circ.',
    };
  });
}

const AGENDA_TYPES = {

  autre:      { label:'Autre réunion', color:'#9AA3AF' },
};

function getAgendaType(r) {
  // Priorité au champ type (xsiType réel de l'API AN)
  const type = (r.type || '').toLowerCase();
  if (type.includes('seance')) return 'seance';
  if (type.includes('commission')) return 'commission';
  if (type.includes('init') || type.includes('delegation')) return 'delegation';
  // Fallback sur titre / lieu
  const t = (r.titre || '').toLowerCase();
  const l = (r.lieu || '').toLowerCase();
  if (t.includes('séance') || l.includes('hémicycle') || l.includes('hemicycle')) return 'seance';
  if (t.includes('commission')) return 'commission';
  if (t.includes('délégation') || t.includes('delegation')) return 'delegation';
  if (t.includes('conférence des présidents')) return 'conference';
  if (t.includes('audition')) return 'audition';
  return 'autre';
}

function isoDateStr(d) { return d.toISOString().slice(0,10); }

function AgendaPolitiqueModule() {
  const { loading, reunions, updatedAt } = useANAgenda();
  const today = new Date();
  const [view, setView] = React.useState('month');
  const [cursor, setCursor] = React.useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [selectedDay, setSelectedDay] = React.useState(null);

  const makeWeekStart = (from) => {
    const d = new Date(from);
    const day = d.getDay();
    d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    d.setHours(0,0,0,0);
    return d;
  };
  const [weekStart, setWeekStart] = React.useState(() => makeWeekStart(today));

  const byDate = React.useMemo(() => {
    const map = {};
    reunions.forEach(r => {
      if (!r.dateDebut) return;
      const k = isoDateStr(new Date(r.dateDebut));
      if (!map[k]) map[k] = [];
      map[k].push({ ...r, _type: getAgendaType(r) });
    });
    return map;
  }, [reunions]);

  const MOIS_LONG = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

/* Cache partagé pour éviter de recharger votes_deputes.json à chaque clic */
let _votesCache = null;
let _votesCachePromise = null;

const POS_MAP = { p:'pour', c:'contre', a:'abstention', x:'absent' };

function useDeputeVotes(depId) {
  const [stats, setStats] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    if (!depId) return;
    setLoading(true);
    const load = _votesCachePromise
      ? _votesCachePromise
      : (_votesCachePromise = fetch('public/data/votes_deputes.json')
          .then(r => r.json())
          .then(d => { _votesCache = d.deputes || {}; return _votesCache; })
          .catch(() => { _votesCache = {}; return {}; }));
    load.then(cache => {
      const raw = cache[depId];
      if (!raw) { setStats(null); setLoading(false); return; }
      // Decompress compact format
      const votes = (raw.v || []).map(v => ({
        date: v.d, titre: v.t,
        position: POS_MAP[v.p] || v.p,
        parDelegation: v.del || false,
      }));
      setStats({ pour: raw.p||0, contre: raw.c||0, abstention: raw.a||0, absent: raw.x||0, votes });
      setLoading(false);
    });
  }, [depId]);

  return { stats, loading };
}

                    </div>
                  </div>

              })}
            </div>
          )}

          {/* Info */}
          {tab === 'info' && (
            <div style={{ padding:'28px 24px', display:'flex', flexDirection:'column', gap:0 }}>
              <div style={{ fontFamily:'var(--font-sans)', fontSize:17, fontWeight:700, color:'var(--ink)', marginBottom:20 }}>Informations</div>

                ['Département',      dep.dept],

          )}
        </div>
      </div>
    </div>

}

function DepAvatar({ dep, size = 46 }) {
  const [triedLocal, setTriedLocal] = React.useState(false);
  const [triedRemote, setTriedRemote] = React.useState(false);
  const color = dep.groupe ? dep.groupe.color : '#9AA3AF';
  const localUrl = 'public/photos/' + dep.id + '.jpg';
  const remoteUrl = AN_PHOTO_BASE + dep.id + '.jpg';

  if (!triedRemote) {
    const src = !triedLocal ? localUrl : remoteUrl;
    return (
      <img
        src={src}
        alt={dep.nomComplet}
        onError={() => { if (!triedLocal) { setTriedLocal(true); } else { setTriedRemote(true); } }}
        style={{ width:size, height:size, borderRadius:'50%', objectFit:'cover', objectPosition:'top', border:'2px solid ' + color + '33', flex:'none', display:'block' }}
      />
    );
  }
  return (
    <div style={{ width:size, height:size, borderRadius:'50%', background:color + '1A', border:'2px solid ' + color + '33', display:'flex', alignItems:'center', justifyContent:'center', flex:'none' }}>
      <span style={{ fontFamily:'var(--font-sans)', fontSize:Math.round(size * 0.3), fontWeight:700, color }}>{dep.initiales}</span>
    </div>
  );
}

function SourceTag(props) {
  const C = window.FranceMonitorDesignSystem_5343d8 && window.FranceMonitorDesignSystem_5343d8.SourceTag;
  return C ? React.createElement(C, props) : null;
}
function hexRgba(hex, a) {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function Eyebrow({ children, style }) {
  return <div style={{ fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em', color:'var(--text-tertiary)', marginBottom:6, ...style }}>{children}</div>;
}
function Spark({ series, tone, width=60, height=24 }) {
  if (!series || series.length < 2) return null;
  const mn = Math.min(...series), mx = Math.max(...series);
  const rng = mx - mn || 1;
  const pts = series.map((v,i) => {
    const x = (i / (series.length-1)) * width;
    const y = height - ((v - mn) / rng) * height;
    return `${x},${y}`;
  }).join(' ');
  const color = tone === 'pos' ? '#0E8A52' : tone === 'neg' ? '#E1000F' : '#9AA3AF';
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display:'block' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

function buildSenatSeats() {
  const CX=420, CY=432, rI=158, rO=402, ROWS=11;
  const seats = [];
  let idx = 0;
  const groupOrder = ['crce','gest','ser','rdse','rdpi','indep','uc','lr','ni'];
  const allSeats = [];
  for (let row = 0; row < ROWS; row++) {
    const t = row / (ROWS - 1);
    const r = rI + (rO - rI) * t;
    const seatsInRow = Math.round(22 + 20 * t);
    const spanAng = Math.PI * 0.92;
    const startAng = Math.PI + (Math.PI - spanAng) / 2;
    for (let s = 0; s < seatsInRow; s++) {
      const ang = startAng + (s / (seatsInRow - 1)) * spanAng;
      allSeats.push({ x: CX + r * Math.cos(ang), y: CY + r * Math.sin(ang) });
    }
  }
  let seatIdx = 0;
  return groupOrder.flatMap(gid => {
    const g = SENAT_GROUPS.find(x => x.id === gid);
    return Array.from({length: g.seats}, () => ({ ...allSeats[seatIdx++], group: gid, color: g.color }));
  });
}

function SenatHemicycle({ seats, hoveredGroup, onHoverGroup }) {
  const W=840, H=440;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:'100%', maxWidth:560, display:'block', margin:'0 auto' }}>
      {seats.map((s,i) => {
        const dim = hoveredGroup && s.group !== hoveredGroup;
        return (
          <circle key={i} cx={s.x} cy={s.y} r={7.2}
            fill={dim ? hexRgba(s.color, 0.22) : s.color}
            stroke="white" strokeWidth="1"
            style={{ cursor:'pointer', transition:'fill 0.15s' }}
            onMouseEnter={() => onHoverGroup(s.group)}
            onMouseLeave={() => onHoverGroup(null)}
          />
        );
      })}
      <text x={420} y={428} textAnchor="middle" fontSize={11} fill="#9AA3AF" fontFamily="var(--font-sans)">Plateau</text>
    </svg>
  );
}

// Couleur du cercle selon statut
const GOUV_RING = {
  pm:          '#D4AF37',
  plein:       '#DC2626',
  delegue_pm:  '#2563EB',
  delegue:     '#2563EB',
  nouveau:     '#16A34A',
};

function GouvAvatar({ membre, size = 52 }) {
  const [err, setErr] = React.useState(false);
  const partiColor = GOUV_PARTI_COLORS[membre.parti] || '#9AA3AF';
  const ring = GOUV_RING[membre.statut] || partiColor;
  const initiales = (membre.prenom[0] + membre.nom[0]).toUpperCase();
  const thickness = size >= 90 ? 4 : 3;
  const gap = 3;
  const outer = size + (thickness + gap) * 2;
  const inner = (
    membre.photo && !err
      ? <img src={membre.photo} alt={membre.prenom + ' ' + membre.nom} onError={() => setErr(true)}
          style={{ width:size, height:size, borderRadius:'50%', objectFit:'cover', objectPosition:'top center', display:'block', flex:'none' }} />
      : <div style={{ width:size, height:size, borderRadius:'50%', background:partiColor+'20', display:'flex', alignItems:'center', justifyContent:'center', flex:'none' }}>
          <span style={{ fontFamily:'var(--font-sans)', fontSize:Math.round(size*0.3), fontWeight:700, color:partiColor }}>{initiales}</span>
        </div>
  );
  return (
    <div style={{ position:'relative', width:outer, height:outer, flex:'none' }}>
      <div style={{ position:'absolute', inset:0, borderRadius:'50%', border:`${thickness}px solid ${ring}`, opacity:0.85 }} />
      <div style={{ position:'absolute', inset:thickness+gap, borderRadius:'50%', overflow:'hidden' }}>
        {inner}
      </div>
    </div>
  );
}

function GouvCard({ membre, onClick, big, compact }) {
  const partiColor = GOUV_PARTI_COLORS[membre.parti] || '#9AA3AF';
  const ring = GOUV_RING[membre.statut] || partiColor;
  const [hov, setHov] = React.useState(false);
  const avatarSize = compact ? 42 : (big ? 84 : 54);
  const isNew = membre.statut === 'nouveau';
  return (
    <div onClick={() => onClick(membre)} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ background: isNew ? '#F0FDF4' : 'var(--surface)',
        border:'1px solid ' + (hov ? ring+'90' : (isNew ? '#BBF7D0' : 'var(--border)')),
        borderRadius:'var(--radius-lg)',
        padding: compact ? '10px 10px' : (big ? '28px 20px 20px' : '14px 12px'),
        cursor:'pointer', transition:'all 140ms', boxShadow: hov ? '0 4px 20px '+ring+'25' : 'none',
        transform: hov ? 'translateY(-2px)' : 'none',
        display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center',
        gap: compact ? 7 : (big ? 14 : 9) }}>
      <GouvAvatar membre={membre} size={avatarSize} />
      <div>
        <div style={{ fontFamily:'var(--font-sans)', fontSize: compact ? 11.5 : (big ? 16 : 13), fontWeight:700, color: isNew ? '#15803D' : 'var(--ink)', marginBottom:3, lineHeight:1.2 }}>
          {membre.prenom} {membre.nom}
          {isNew && <span style={{ marginLeft:5, fontSize:9, fontWeight:800, color:'#16A34A', background:'#DCFCE7', borderRadius:999, padding:'1px 6px', verticalAlign:'middle' }}>NOUVEAU</span>}
        </div>
        <div style={{ fontSize: compact ? 10 : (big ? 12.5 : 11), color:'var(--text-secondary)', lineHeight:1.35, marginBottom: compact ? 0 : 6,
          display:'-webkit-box', WebkitLineClamp: compact ? 2 : 3, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
          {membre.titre}
        </div>
        {!compact && <span style={{ fontSize:10, fontWeight:700, color:partiColor, background:partiColor+'18', border:'1px solid '+partiColor+'35', borderRadius:999, padding:'2px 8px' }}>{membre.parti}</span>}
      </div>
    </div>
  );
}
