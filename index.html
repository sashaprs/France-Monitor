/* Recherche dans le référentiel députés (mêmes critères que la page Députés)
   pour ajouter un parlementaire au dossier en un clic. */
function DossierAjoutParlementaire({ deputes, dejaSuivis, onAdd }) {
  const [q, setQ] = React.useState('');
  const resultats = React.useMemo(() => {
    const query = q.trim().toLowerCase();
    if (!query) return [];
    return deputes.filter(d => !dejaSuivis.has(d.id) && (
      d.nomComplet.toLowerCase().includes(query) ||
      (d.groupe && (d.groupe.name.toLowerCase().includes(query) || d.groupe.short.toLowerCase().includes(query))) ||
      (d.dept || '').toLowerCase().includes(query) ||
      (d.circonscription || '').toLowerCase().includes(query) ||
      (d.commission || '').toLowerCase().includes(query)
    )).slice(0, 8);
  }, [q, deputes, dejaSuivis]);

  return (
    <div style={{ position: 'relative', marginBottom: 14 }}>
      <input type="text" value={q} onChange={(e) => setQ(e.target.value)}
        placeholder="Rechercher un député (nom, groupe, département, commission…) et l'ajouter"
        style={{ ...DOSSIER_INPUT, width: '100%', boxSizing: 'border-box' }} />
      {resultats.length > 0 && (
        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 30, marginTop: 4,
          background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
          boxShadow: 'var(--shadow-md, 0 8px 24px rgba(0,0,0,.12))', overflow: 'hidden' }}>
          {resultats.map(d => (
            <button key={d.id} onClick={() => { onAdd(d); setQ(''); }}
              style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%', textAlign: 'left', padding: '9px 12px',
                border: 'none', borderBottom: '1px solid var(--border-subtle)', background: 'var(--surface)', cursor: 'pointer', fontFamily: 'var(--font-sans)' }}
              onMouseEnter={e => e.currentTarget.style.background = 'var(--surface-hover)'}
              onMouseLeave={e => e.currentTarget.style.background = 'var(--surface)'}>
              <span style={{ width: 8, height: 8, borderRadius: 99, background: (d.groupe && d.groupe.color) || 'var(--gray-300)', flex: 'none' }} />
              <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>{d.nomComplet}</span>
              <span style={{ fontSize: 11.5, color: 'var(--text-tertiary)' }}>
                {(d.groupe ? d.groupe.short : 'NI') + ' · ' + (d.dept || '')}
              </span>
              <span style={{ marginLeft: 'auto', fontSize: 11.5, fontWeight: 700, color: 'var(--accent)' }}>+ Ajouter</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* Recherche dans l'index public des dossiers législatifs (module Suivi
   législatif) pour suivre un texte dans le dossier client. */
function DossierAjoutLegislatif({ index, dejaSuivis, onAdd }) {
  const [q, setQ] = React.useState('');
  const resultats = React.useMemo(() => {
    const query = legisNorm(q.trim());
    if (!query) return [];
    return index.filter(d => !dejaSuivis.has(d.id) &&
      legisNorm(`${d.titre} ${d.titre_court || ''} ${d.commission || ''} ${d.rapporteur || ''}`).includes(query)
    ).slice(0, 8);
  }, [q, index, dejaSuivis]);

  return (
    <div style={{ position: 'relative', marginBottom: 14 }}>
      <input type="text" value={q} onChange={(e) => setQ(e.target.value)}
        placeholder="Rechercher un dossier législatif (titre, commission, rapporteur…) et le suivre"
        style={{ ...DOSSIER_INPUT, width: '100%', boxSizing: 'border-box' }} />
      {resultats.length > 0 && (
        <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 30, marginTop: 4,
          background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)',
          boxShadow: 'var(--shadow-md, 0 8px 24px rgba(0,0,0,.12))', overflow: 'hidden' }}>
          {resultats.map(d => {
            const st = LEGIS_STATUTS[d.statut] || {};
            return (
              <button key={d.id} onClick={() => { onAdd(d); setQ(''); }}
                style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%', textAlign: 'left', padding: '9px 12px',
                  border: 'none', borderBottom: '1px solid var(--border-subtle)', background: 'var(--surface)', cursor: 'pointer', fontFamily: 'var(--font-sans)' }}
                onMouseEnter={e => e.currentTarget.style.background = 'var(--surface-hover)'}
                onMouseLeave={e => e.currentTarget.style.background = 'var(--surface)'}>
                <span style={{ flex: 1, fontSize: 12.5, fontWeight: 600, color: 'var(--ink)', lineHeight: 1.35, minWidth: 0 }}>
                  {d.titre_court || d.titre}
                </span>
                {st.label && <span style={{ flex: 'none', fontSize: 10.5, fontWeight: 700, color: st.color, background: st.bg, borderRadius: 999, padding: '2px 9px' }}>{st.label}</span>}
                <span style={{ flex: 'none', fontSize: 11.5, fontWeight: 700, color: 'var(--accent)' }}>+ Suivre</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* Journal des actions d'influence d'un dossier (partie E).
   Alimente l'export d'aide à la préparation de la déclaration HATVP —
   présenté comme une aide, jamais comme une télédéclaration officielle. */
const ACTION_TYPES = [
  { id: 'reunion',    label: 'Réunion' },
  { id: 'envoi_note', label: 'Envoi de note' },
  { id: 'appel',      label: 'Appel' },
  { id: 'evenement',  label: 'Événement' },
  { id: 'autre',      label: 'Autre' },
];
const ACTION_TYPE_LABEL = Object.fromEntries(ACTION_TYPES.map(t => [t.id, t.label]));

function DossierJournalActions({ user, org, dossier, suivisParl, depParId }) {
  const { Button: Btn } = window.FranceMonitorDesignSystem_5343d8;
  const [actions, setActions] = React.useState(null);
  const [msg, setMsg] = React.useState(null);
  const [creation, setCreation] = React.useState(false);
  const [busy, setBusy] = React.useState(false);
  // Filtres
  const [fType, setFType] = React.useState('tous');
  const [fDebut, setFDebut] = React.useState('');
  const [fFin, setFFin] = React.useState('');
  // Formulaire
  const [form, setForm] = React.useState({
    type_action: 'reunion', depute_id: '', institution: '',
    date_action: new Date().toISOString().slice(0, 10), sujet: '', description: '', budget_estime: '',
  });
  const maj = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const charger = React.useCallback(async () => {
    const { data, error } = await supabaseClient.from('actions_influence')
      .select('*').eq('dossier_id', dossier.id).order('date_action', { ascending: false });
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setActions(data || []);
  }, [dossier.id]);

  React.useEffect(() => { charger(); }, [charger]);

  const cibleLabel = React.useCallback((a) => {
    if (a.depute_id) { const d = depParId.get(a.depute_id); return d ? d.nomComplet : 'Député ' + a.depute_id; }
    return a.institution || '—';
  }, [depParId]);

  async function ajouter(e) {
    e.preventDefault();
    if (!form.sujet.trim()) return;
    if (!form.depute_id && !form.institution.trim()) { setMsg({ tone: 'err', text: 'Indiquez au moins une cible : un parlementaire ou une institution.' }); return; }
    setBusy(true); setMsg(null);
    const { error } = await supabaseClient.from('actions_influence').insert({
      dossier_id: dossier.id, auteur_id: user.id,
      type_action: form.type_action,
      depute_id: form.depute_id || null,
      institution: form.institution.trim() || null,
      date_action: form.date_action,
      sujet: form.sujet.trim(),
      description: form.description.trim() || null,
      budget_estime: form.budget_estime === '' ? null : Number(form.budget_estime),
    });
    setBusy(false);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setForm(f => ({ ...f, sujet: '', description: '', institution: '', budget_estime: '' }));
    setCreation(false); charger();
  }

  async function supprimer(id) {
    if (!window.confirm('Supprimer cette action du journal ?')) return;
    const { error } = await supabaseClient.from('actions_influence').delete().eq('id', id);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    charger();
  }

  const filtrees = React.useMemo(() => {
    return (actions || []).filter(a =>
      (fType === 'tous' || a.type_action === fType) &&
      (!fDebut || a.date_action >= fDebut) &&
      (!fFin || a.date_action <= fFin)
    );
  }, [actions, fType, fDebut, fFin]);

  const budgetTotal = React.useMemo(
    () => filtrees.reduce((s, a) => s + (Number(a.budget_estime) || 0), 0),
    [filtrees]
  );

  /* Export d'aide à la déclaration HATVP : CSV structuré sur la période et le
     filtre courants. AIDE À LA PRÉPARATION — pas une télédéclaration. */
  function exportHatvp() {
    if (!filtrees.length) { setMsg({ tone: 'err', text: 'Aucune action à exporter pour ce filtre.' }); return; }
    const dates = filtrees.map(a => a.date_action).sort();
    const periode = dates[0] + ' au ' + dates[dates.length - 1];
    const esc = (v) => '"' + String(v ?? '').replace(/"/g, '""') + '"';
    const cols = ['Période', 'Date', 'Nature de l\'action', 'Autorité publique concernée', 'Sujet abordé', 'Description', 'Budget estimé (€)'];
    const lignes = filtrees.map(a => [
      periode, a.date_action, ACTION_TYPE_LABEL[a.type_action] || a.type_action,
      cibleLabel(a), a.sujet, a.description || '', a.budget_estime != null ? a.budget_estime : '',
    ].map(esc).join(','));
    // Ligne d'agrégat en pied de tableau.
    lignes.push(['', '', '', '', 'BUDGET AGRÉGÉ', filtrees.length + ' action(s)', budgetTotal].map(esc).join(','));
    const entete =
      '"Aide à la préparation de la déclaration HATVP — ' + dossier.nom_client_final + '"\n' +
      '"Document généré via NomosLab le ' + new Date().toLocaleDateString('fr-FR') + ' — AIDE À LA PRÉPARATION, à vérifier par le déclarant. Ne constitue pas une télédéclaration officielle."\n\n';
    const csv = entete + cols.map(esc).join(',') + '\n' + lignes.join('\n');
    triggerDownload(new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' }),
      slugify('hatvp-' + dossier.nom_client_final, dossier.id.slice(0, 8)) + '.csv');
  }

  /* Export PDF marque blanche du journal (en-tête cabinet). */
  function exportPdfJournal() {
    if (!filtrees.length) { setMsg({ tone: 'err', text: 'Aucune action à exporter pour ce filtre.' }); return; }
    const lignes = filtrees.map(a => `<tr>
      <td>${new Date(a.date_action).toLocaleDateString('fr-FR')}</td>
      <td>${escapeHtml(ACTION_TYPE_LABEL[a.type_action] || a.type_action)}</td>
      <td>${escapeHtml(cibleLabel(a))}</td>
      <td>${escapeHtml(a.sujet)}${a.description ? '<br><span style="color:#7B828D;font-size:11px">' + escapeHtml(a.description) + '</span>' : ''}</td>
      <td style="text-align:right">${a.budget_estime != null ? Number(a.budget_estime).toLocaleString('fr-FR') + ' €' : '—'}</td>
    </tr>`).join('');
    const corps = `
      <div class="wl-sec">Journal des actions d'influence</div>
      <table><thead><tr><th>Date</th><th>Nature</th><th>Autorité concernée</th><th>Sujet</th><th>Budget</th></tr></thead>
      <tbody>${lignes}</tbody></table>
      <p style="font-size:12px">Total : <strong>${filtrees.length}</strong> action(s) · budget agrégé <strong>${budgetTotal.toLocaleString('fr-FR')} €</strong>.</p>
      <p style="font-size:11px;color:#7B828D">Document d'aide à la préparation de la déclaration HATVP — à vérifier par le déclarant, ne constitue pas une télédéclaration officielle.</p>`;
    imprimerMarqueBlanche(org, { titre: 'Dossier ' + dossier.nom_client_final, sousTitre: 'Journal d\'actions d\'influence', corpsHtml: corps });
  }

  const input = { ...DOSSIER_INPUT, width: '100%', boxSizing: 'border-box' };
  const champ = (label, node) => (
    <label style={{ display: 'flex', flexDirection: 'column', gap: 4, fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>
      {label}{node}
    </label>
  );

  return (
    <div>
      {dossierMsgBox(msg)}

      {/* Barre : filtres + actions */}
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center', marginBottom: 14 }}>
        <select value={fType} onChange={(e) => setFType(e.target.value)} style={{ ...DOSSIER_INPUT, cursor: 'pointer' }} title="Filtrer par type">
          <option value="tous">Tous les types</option>
          {ACTION_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
        </select>
        <label style={{ fontSize: 12, color: 'var(--text-tertiary)', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
          du <input type="date" value={fDebut} onChange={(e) => setFDebut(e.target.value)} style={DOSSIER_INPUT} />
        </label>
        <label style={{ fontSize: 12, color: 'var(--text-tertiary)', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
          au <input type="date" value={fFin} onChange={(e) => setFFin(e.target.value)} style={DOSSIER_INPUT} />
        </label>
        {(fDebut || fFin || fType !== 'tous') && (
          <button onClick={() => { setFType('tous'); setFDebut(''); setFFin(''); }}
            style={{ border: 'none', background: 'none', color: 'var(--text-link)', fontSize: 12, cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>Réinitialiser</button>
        )}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
          <Btn variant="secondary" size="sm" icon={<Icon n="file-text" s={13} />} onClick={exportPdfJournal}>PDF cabinet</Btn>
          <Btn variant="secondary" size="sm" icon={<Icon n="download" s={13} />} onClick={exportHatvp}>Export annuel HATVP</Btn>
          <Btn variant="primary" size="sm" icon={<Icon n="plus" s={13} />} onClick={() => setCreation(c => !c)}>Ajouter une action</Btn>
        </div>
      </div>

      <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginBottom: 14, lineHeight: 1.5, background: 'var(--amber-50)', border: '1px solid var(--amber-100)', borderRadius: 'var(--radius-sm)', padding: '8px 11px' }}>
        <Icon n="info" s={12} /> L'export HATVP est une <strong>aide à la préparation</strong> de votre déclaration annuelle : il reprend les actions consignées ici pour la période filtrée. Il ne remplace pas la vérification par le déclarant et ne constitue pas une télédéclaration officielle auprès de la HATVP.
      </div>

      {creation && (
        <form onSubmit={ajouter} style={{ ...DOSSIER_CARD, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {champ('Type d\'action', (
            <select value={form.type_action} onChange={(e) => maj('type_action', e.target.value)} style={{ ...input, cursor: 'pointer' }}>
              {ACTION_TYPES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
            </select>
          ))}
          {champ('Date', <input type="date" required value={form.date_action} onChange={(e) => maj('date_action', e.target.value)} style={input} />)}
          {champ('Parlementaire concerné (suivi dans le dossier)', (
            <select value={form.depute_id} onChange={(e) => maj('depute_id', e.target.value)} style={{ ...input, cursor: 'pointer' }}>
              <option value="">— aucun / institution —</option>
              {(suivisParl || []).map(s => {
                const d = depParId.get(s.depute_id);
                return <option key={s.depute_id} value={s.depute_id}>{d ? d.nomComplet : s.depute_id}</option>;
              })}
            </select>
          ))}
          {champ('… ou institution concernée', <input type="text" maxLength={200} placeholder="ex. Cabinet du ministre de la Santé" value={form.institution} onChange={(e) => maj('institution', e.target.value)} style={input} />)}
          <div style={{ gridColumn: '1 / -1' }}>
            {champ('Sujet abordé', <input type="text" required maxLength={300} placeholder="ex. Encadrement des néonicotinoïdes" value={form.sujet} onChange={(e) => maj('sujet', e.target.value)} style={input} />)}
          </div>
          <div style={{ gridColumn: '1 / -1' }}>
            {champ('Description (optionnel)', <textarea rows={2} value={form.description} onChange={(e) => maj('description', e.target.value)} style={{ ...input, resize: 'vertical', fontFamily: 'var(--font-sans)' }} />)}
          </div>
          {champ('Budget estimé en € (optionnel)', <input type="number" min="0" step="1" placeholder="0" value={form.budget_estime} onChange={(e) => maj('budget_estime', e.target.value)} style={input} />)}
          <div style={{ gridColumn: '1 / -1', display: 'flex', gap: 8 }}>
            <Btn type="submit" variant="primary" size="sm" disabled={busy || !form.sujet.trim()}>{busy ? 'Enregistrement…' : 'Enregistrer l\'action'}</Btn>
            <Btn variant="secondary" size="sm" onClick={() => setCreation(false)}>Annuler</Btn>
          </div>
        </form>
      )}

      {/* Récap période courante */}
      {actions && actions.length > 0 && (
        <div style={{ display: 'flex', gap: 16, fontSize: 12, color: 'var(--text-secondary)', marginBottom: 10 }}>
          <span><strong style={{ fontFamily: 'var(--font-mono)', color: 'var(--ink)' }}>{filtrees.length}</strong> action{filtrees.length > 1 ? 's' : ''}{filtrees.length !== actions.length ? ' (sur ' + actions.length + ')' : ''}</span>
          <span>Budget agrégé : <strong style={{ fontFamily: 'var(--font-mono)', color: 'var(--ink)' }}>{budgetTotal.toLocaleString('fr-FR')} €</strong></span>
        </div>
      )}

      {actions === null ? (
        <div style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>Chargement…</div>
      ) : filtrees.length === 0 ? (
        <div style={{ fontSize: 13, color: 'var(--text-tertiary)', padding: '18px 0' }}>
          {actions.length === 0 ? 'Aucune action consignée dans ce dossier — ajoutez la première.' : 'Aucune action ne correspond au filtre.'}
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {filtrees.map(a => (
            <div key={a.id} style={{ ...DOSSIER_CARD, marginBottom: 0, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
              <div style={{ flex: 'none', textAlign: 'center', minWidth: 62 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--blue-france)', background: '#00009114', borderRadius: 999, padding: '3px 9px' }}>{ACTION_TYPE_LABEL[a.type_action] || a.type_action}</div>
                <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 5, fontFamily: 'var(--font-mono)' }}>{new Date(a.date_action).toLocaleDateString('fr-FR')}</div>
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--ink)' }}>{a.sujet}</div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginTop: 2 }}>
                  <Icon n="target" s={11} /> {cibleLabel(a)}
                  {a.budget_estime != null && <span style={{ marginLeft: 10 }}><Icon n="banknote" s={11} /> {Number(a.budget_estime).toLocaleString('fr-FR')} €</span>}
                </div>
                {a.description && <div style={{ fontSize: 12.5, color: 'var(--text-secondary)', marginTop: 6, lineHeight: 1.5, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>{a.description}</div>}
              </div>
              {a.auteur_id === user.id && (
                <button onClick={() => supprimer(a.id)} title="Supprimer" style={{ flex: 'none', border: 'none', background: 'none', color: 'var(--red-600)', cursor: 'pointer', padding: 4 }}>
                  <Icon n="trash-2" s={14} />
                </button>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* Vue détaillée d'un dossier client : onglets Parlementaires / Législatif / Journal. */
function DossierClientView({ user, orgState, dossier, onBack, onChanged }) {
  const { Button: Btn, Badge: Bdg } = window.FranceMonitorDesignSystem_5343d8;
  const estAdmin = orgState.role === 'admin';
  const { deputes } = useANDeputes();
  const { dossiers: legisIndex } = useLegisIndex();
  const [tab, setTab] = React.useState('parl');       // 'parl' | 'legis'
  const [suivisParl, setSuivisParl] = React.useState(null);
  const [suivisLegis, setSuivisLegis] = React.useState(null);
  const [msg, setMsg] = React.useState(null);
  const [veilleCopie, setVeilleCopie] = React.useState(false);

  const depParId = React.useMemo(() => {
    const m = new Map(); deputes.forEach(d => m.set(d.id, d)); return m;
  }, [deputes]);
  const legisParId = React.useMemo(() => {
    const m = new Map(); legisIndex.forEach(d => m.set(d.id, d)); return m;
  }, [legisIndex]);

  const charger = React.useCallback(async () => {
    const [p, l] = await Promise.all([
      supabaseClient.from('dossier_parlementaires').select('*').eq('dossier_id', dossier.id).order('ajoute_le', { ascending: false }),
      supabaseClient.from('dossiers_legislatifs_suivis').select('*').eq('dossier_id', dossier.id).order('ajoute_le', { ascending: false }),
    ]);
    if (p.error || l.error) { setMsg({ tone: 'err', text: (p.error || l.error).message }); return; }
    setSuivisParl(p.data || []);
    setSuivisLegis(l.data || []);
  }, [dossier.id]);

  React.useEffect(() => { charger(); }, [charger]);

  async function ajouterParl(d) {
    const { error } = await supabaseClient.from('dossier_parlementaires')
      .insert({ dossier_id: dossier.id, depute_id: d.id, ajoute_par: user.id });
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setMsg(null); charger();
  }
  async function retirerParl(depute_id) {
    const { error } = await supabaseClient.from('dossier_parlementaires')
      .delete().eq('dossier_id', dossier.id).eq('depute_id', depute_id);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    charger();
  }
  async function ajouterLegis(d) {
    const { error } = await supabaseClient.from('dossiers_legislatifs_suivis')
      .insert({ dossier_id: dossier.id, dossier_legislatif_id: d.id, ajoute_par: user.id });
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setMsg(null); charger();
  }
  async function retirerLegis(id) {
    const { error } = await supabaseClient.from('dossiers_legislatifs_suivis')
      .delete().eq('dossier_id', dossier.id).eq('dossier_legislatif_id', id);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    charger();
  }

  async function basculerArchive() {
    const { error } = await supabaseClient.from('dossiers_clients')
      .update({ archive: !dossier.archive }).eq('id', dossier.id);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    onChanged(); onBack();
  }

  /* Génère un profil au format config/veille-profils.json, à coller
     manuellement (l'intégration automatique est un chantier ultérieur). */
  async function copierConfigVeille() {
    const slug = dossier.nom_client_final.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    const profil = {
      id: 'dossier-' + slug,
      nom: 'Dossier ' + dossier.nom_client_final,
      mots_cles: [],
      email_destinataires: [user.email],
      dossiers_suivis: (suivisLegis || []).map(s => s.dossier_legislatif_id),
      alertes: {
        email: true,
        slack_webhook_url: null,
        types: ['nouveau_dossier', 'changement_etape', 'nouvel_amendement', 'sort_amendement', 'inscription_ordre_du_jour', 'resultat_scrutin'],
      },
    };
    const json = JSON.stringify(profil, null, 2);
    try { await navigator.clipboard.writeText(json); setVeilleCopie(true); setTimeout(() => setVeilleCopie(false), 3000); }

        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          <Btn variant="secondary" size="sm" icon={<Icon n={veilleCopie ? 'check' : 'copy'} s={13} />} onClick={copierConfigVeille}>
            {veilleCopie ? 'Profil copié !' : 'Copier la config pour la veille email'}

          {estAdmin && (

              {dossier.archive ? 'Désarchiver' : 'Archiver'}

      <div style={{ fontSize: 11.5, color: 'var(--text-tertiary)', marginBottom: 18 }}>

function MesDossiersModule({ user, orgState }) {
  const { Button: Btn, Badge: Bdg } = window.FranceMonitorDesignSystem_5343d8;
  const org = orgState && orgState.org;
  const [dossiers, setDossiers] = React.useState(null);
  const [ouvert, setOuvert] = React.useState(null);      // dossier sélectionné
  const [voirArchives, setVoirArchives] = React.useState(false);
  const [creation, setCreation] = React.useState(false);
  const [nom, setNom] = React.useState('');
  const [description, setDescription] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);

  const charger = React.useCallback(async () => {
    if (!org) return;
    const { data, error } = await supabaseClient
      .from('dossiers_clients')
      .select('*, dossier_parlementaires(count), dossiers_legislatifs_suivis(count)')
      .eq('organisation_id', org.id)
      .order('cree_le', { ascending: false });
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setDossiers(data || []);
  }, [org && org.id]);

  React.useEffect(() => { setDossiers(null); setOuvert(null); charger(); }, [charger]);

  async function creer(e) {
    e.preventDefault();
    setMsg(null); setBusy(true);
    const { error } = await supabaseClient.from('dossiers_clients')
      .insert({ organisation_id: org.id, nom_client_final: nom.trim(), description: description.trim() || null, cree_par: user.id });
    setBusy(false);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setNom(''); setDescription(''); setCreation(false);
    charger();
  }

  if (!user) {
    return (
      <div style={{ padding: '24px 28px', maxWidth: 980, margin: '0 auto' }}>
        <div style={{ fontSize: 20, fontWeight: 700 }}>Mes dossiers</div>
        <p style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Les dossiers clients sont un espace privé : connectez-vous pour y accéder.</p>
      </div>
    );
  }
  if (!org) {
    return (
      <div style={{ padding: '24px 28px', maxWidth: 980, margin: '0 auto' }}>
        <div style={{ fontSize: 20, fontWeight: 700 }}>Mes dossiers</div>
        <p style={{ fontSize: 13, color: 'var(--text-secondary)' }}>
          Les dossiers clients appartiennent à une organisation. Créez la vôtre ou faites-vous inviter,
          puis revenez ici (déconnectez-vous et reconnectez-vous pour relancer l'écran d'organisation).
        </p>
      </div>
    );
  }

  if (ouvert) {
    return <DossierClientView user={user} orgState={orgState} dossier={ouvert}
      onBack={() => setOuvert(null)} onChanged={charger} />;
  }

  const visibles = (dossiers || []).filter(d => voirArchives || !d.archive);
  const nbArchives = (dossiers || []).filter(d => d.archive).length;
  const compte = (d, cle) => (d[cle] && d[cle][0] && d[cle][0].count) || 0;

  return (
    <div style={{ padding: '24px 28px', maxWidth: 980, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 4, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 240 }}>
          <div style={{ fontSize: 20, fontWeight: 700 }}>Mes dossiers</div>
          <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginTop: 2 }}>
            Les dossiers clients de {org.nom} — parlementaires ciblés, textes suivis, notes et actions.
          </div>
        </div>
        <Btn variant="primary" size="sm" icon={<Icon n="plus" s={14} />} onClick={() => setCreation(c => !c)}>Nouveau dossier</Btn>
      </div>

      {nbArchives > 0 && (
        <label style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, color: 'var(--text-secondary)', margin: '8px 0 4px', cursor: 'pointer' }}>
          <input type="checkbox" checked={voirArchives} onChange={(e) => setVoirArchives(e.target.checked)} />
          Afficher les dossiers archivés ({nbArchives})
        </label>
      )}

      <div style={{ marginTop: 14 }}>
        {dossierMsgBox(msg)}

        {creation && (
          <form onSubmit={creer} style={{ ...DOSSIER_CARD, display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={DOSSIER_LBL}>Nouveau dossier client</div>
            <input type="text" required maxLength={160} placeholder="Nom du client final (ex. Fédération X, Bayer…)"
              value={nom} onChange={(e) => setNom(e.target.value)} style={DOSSIER_INPUT} autoFocus />
            <textarea placeholder="Description courte (enjeu, périmètre de la mission…) — optionnel"
              value={description} onChange={(e) => setDescription(e.target.value)} rows={2}
              style={{ ...DOSSIER_INPUT, resize: 'vertical', fontFamily: 'var(--font-sans)' }} />
            <div style={{ display: 'flex', gap: 8 }}>
              <Btn type="submit" variant="primary" size="sm" disabled={!nom.trim() || busy}>{busy ? 'Création…' : 'Créer le dossier'}</Btn>
              <Btn variant="secondary" size="sm" onClick={() => setCreation(false)}>Annuler</Btn>
            </div>
          </form>
        )}

        {dossiers === null ? (
          <div style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>Chargement…</div>
        ) : visibles.length === 0 ? (
          <div style={{ fontSize: 13, color: 'var(--text-tertiary)', padding: '18px 0' }}>
            {dossiers.length === 0
              ? 'Aucun dossier client pour l\'instant — créez le premier avec « Nouveau dossier ».'
              : 'Tous vos dossiers sont archivés — cochez « Afficher les dossiers archivés ».'}
          </div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>
            {visibles.map(d => (
              <button key={d.id} onClick={() => setOuvert(d)}
                style={{ ...DOSSIER_CARD, marginBottom: 0, textAlign: 'left', cursor: 'pointer', fontFamily: 'var(--font-sans)', transition: 'box-shadow .14s,border-color .14s' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--border-strong)'; e.currentTarget.style.boxShadow = 'var(--shadow-md, 0 6px 18px rgba(0,0,0,.08))'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.boxShadow = 'none'; }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                  <Icon n="folder-kanban" s={16} color="var(--blue-france)" />
                  <span style={{ fontSize: 14.5, fontWeight: 700, color: 'var(--ink)' }}>{d.nom_client_final}</span>
                  {d.archive && <Bdg tone="amber">Archivé</Bdg>}
                </div>
                {d.description && (
                  <div style={{ fontSize: 12.5, color: 'var(--text-secondary)', lineHeight: 1.5, marginBottom: 8,
                    display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                    {d.description}
                  </div>
                )}
                <div style={{ display: 'flex', gap: 12, fontSize: 11.5, color: 'var(--text-tertiary)' }}>
                  <span><strong style={{ color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)' }}>{compte(d, 'dossier_parlementaires')}</strong> parlementaire{compte(d, 'dossier_parlementaires') > 1 ? 's' : ''}</span>
                  <span><strong style={{ color: 'var(--text-secondary)', fontFamily: 'var(--font-mono)' }}>{compte(d, 'dossiers_legislatifs_suivis')}</strong> texte{compte(d, 'dossiers_legislatifs_suivis') > 1 ? 's' : ''}</span>
                  <span style={{ marginLeft: 'auto' }}>créé le {new Date(d.cree_le).toLocaleDateString('fr-FR')}</span>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const frpct1 = (n) => n.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

// Area chart — recreated per handoff spec (not part of the DS bundle).
function AreaChart({ series, labels = [], color = "var(--accent)", h = 230, id = "c" }) {
  const w = 720, padL = 40, padR = 14, padT = 14, padB = 26;
  const min = Math.min(...series, 0), max = Math.max(...series);
  const span = (max - min) || 1;
  const X = (i) => padL + i * ((w - padL - padR) / (series.length - 1 || 1));
  const Y = (v) => padT + (1 - (v - min) / span) * (h - padT - padB);
  const pts = series.map((v, i) => [X(i), Y(v)]);
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = `${line} L ${X(series.length - 1)} ${h - padB} L ${padL} ${h - padB} Z`;
  const ticks = 4;
  const gridY = Array.from({ length: ticks + 1 }, (_, i) => min + (span * i) / ticks);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height: 'auto', display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={id + '-g'} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.18" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {gridY.map((gv, i) => (
        <g key={'g' + i}>
          <line x1={padL} x2={w - padR} y1={Y(gv)} y2={Y(gv)} stroke="var(--border-subtle)" strokeWidth="1" />
          <text x={padL - 8} y={Y(gv) + 3} textAnchor="end" style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--text-tertiary)' }}>{frpct1(gv)}</text>
        </g>
      ))}
      <path d={area} fill={`url(#${id}-g)`} />
      <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts[pts.length - 1][0]} cy={pts[pts.length - 1][1]} r="3.4" fill={color} stroke="var(--surface)" strokeWidth="2" />
      {labels.map((lb, i) => (
        <text key={'t' + i} x={X(i * (series.length - 1) / (labels.length - 1))} y={h - 8}
              textAnchor={i === 0 ? 'start' : i === labels.length - 1 ? 'end' : 'middle'}
              style={{ fontFamily: 'var(--font-mono)', fontSize: 10, fill: 'var(--text-tertiary)' }}>{lb}</text>
      ))}
    </svg>
  );
}

function fmtPeriod(p, short) {
  const [y, m] = p.split('-');
  const idx = parseInt(m) - 1;
  return (short ? MOIS_SHORT[idx] : MOIS_FR[idx]) + ' ' + y;
}

function parseSDMX(json) {
  try {
    const timeDim = json.structure.dimensions.observation.find(d => d.id === 'TIME_PERIOD');
    if (!timeDim) return {};
    const periods = timeDim.values.map(v => v.id);
    const seriesKey = Object.keys(json.dataSets[0].series)[0];
    const obs = json.dataSets[0].series[seriesKey].observations;
    const result = {};
    Object.entries(obs).forEach(([idx, vals]) => {
      const period = periods[parseInt(idx)];
      if (period && vals[0] != null) result[period] = Math.round(vals[0] * 10) / 10;
    });
    return result;
  } catch(e) { return {}; }
}

function useInflData() {
  const [state, setState] = React.useState({ loading: true, error: false, data: {}, fetchedAt: null });
  React.useEffect(() => {
    let alive = true;
    fetch('https://data-api.ecb.europa.eu/service/data/ICP/M.FR.N.000000.4.ANR?lastNObservations=84&format=jsondata')
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(json => {
        if (!alive) return;
        const data = parseSDMX(json);
        const periods = Object.keys(data);
        console.log('[BCE France] HICP received. Periods:', periods.length, 'Latest:', periods.sort().at(-1), 'Value:', data[periods.sort().at(-1)]);
        setState({ loading: false, error: false, data, fetchedAt: new Date().toISOString() });
      })
      .catch(err => {
        console.warn('[BCE France] API failed:', err);
        if (alive) setState({ loading: false, error: true, data: {}, fetchedAt: null });
      });
    return () => { alive = false; };
  }, []);
  return state;
}

function getMonthly(apiData, apiError) {
  return (apiError || Object.keys(apiData).length === 0) ? STATIC_MONTHLY : apiData;
}

function getAnnualAvg(monthly, year) {
  const vals = Object.entries(monthly)
    .filter(([k]) => k.startsWith(year + '-'))
    .map(([, v]) => v);
  if (!vals.length) return null;
  return Math.round(vals.reduce((a, b) => a + b, 0) / vals.length * 10) / 10;
}

function getLatestPeriod(monthly) {
  return Object.keys(monthly).sort().slice(-1)[0] || null;
}

function parseInflQuery(q) {
  const yearMatch = String(q).match(/\b(19|20)\d{2}\b/);
  const year = yearMatch ? yearMatch[0] : null;
  const low = String(q).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  let indicator = 'IPC ensemble';
  if (/energ/.test(low)) indicator = 'Énergie';
  else if (/aliment|nourrit/.test(low)) indicator = 'Alimentation';
  else if (/sous.jacent|coeur|hors energ/.test(low)) indicator = 'Inflation sous-jacente';
  else if (/service/.test(low)) indicator = 'Services';
  else if (/logement|loyer/.test(low)) indicator = 'Logement';
  else if (/transport/.test(low)) indicator = 'Transports';
  else if (/sante|medical|soin/.test(low)) indicator = 'Santé';
  const wantsLatest = /dernier|recent|actuel|maintenant|aujourd/.test(low) && !year;
  return { year, indicator, wantsLatest };
}

function InflInterroger({ monthly, apiSource }) {
  const { Button: Btn, SourceTag, DataTable } = window.FranceMonitorDesignSystem_5343d8;
  const [query, setQuery] = React.useState('');
  const [parsed, setParsed] = React.useState(null);

  const run = () => { const q = query.trim(); if (q) setParsed(parseInflQuery(q)); };
  const onKey = (e) => { if (e.key === 'Enter') run(); };

  const latestPeriod = getLatestPeriod(monthly || STATIC_MONTHLY);
  const safeMonthly = monthly || STATIC_MONTHLY;

  let result = null;
  if (parsed) {
    const { year, indicator, wantsLatest } = parsed;
    if (wantsLatest && latestPeriod) {
      const val = safeMonthly[latestPeriod];
      result = { type: 'latest', period: latestPeriod, val, indicator };
    } else if (year) {
      const annualVal = getAnnualAvg(safeMonthly, year);
      const monthRows = Object.entries(safeMonthly)
        .filter(([k]) => k.startsWith(year + '-'))
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([period, v]) => ({ m: fmtPeriod(period, false), v: (v >= 0 ? '+' : '') + v.toFixed(1).replace('.', ',') + ' %' }));
      result = { type: 'year', year, annualVal, monthRows, indicator };
    } else {
      result = { type: 'unknown', indicator };
    }
  }

  const EXAMPLES = ['inflation 2022', 'inflation 2024', 'dernier chiffre', 'alimentation 2023', 'énergie 2022'];

  return (
    <div className="infl-body">
      <div className="infl-eyebrow" style={{ marginBottom: 10 }}>Chercher une donnée</div>
      <div className="infl-q-row">
        <div className="infl-q-field">
          <span className="ico"><InflSearchIcon /></span>
          <input className="infl-q-input" value={query} placeholder="Ex. inflation 2022, énergie 2023, dernier chiffre…"
                 onChange={(e) => setQuery(e.target.value)} onKeyDown={onKey} />
        </div>
        <Btn variant="primary" onClick={run}>Rechercher</Btn>
      </div>
      <div className="infl-q-help">
        Exemples : {EXAMPLES.map((ex, i) => (
          <span key={ex}>
            <button style={{ background:'none',border:'none',padding:0,color:'var(--accent)',cursor:'pointer',font:'inherit',fontSize:13 }}
              onClick={() => { setQuery(ex); setParsed(parseInflQuery(ex)); }}>{ex}</button>
            {i < EXAMPLES.length - 1 ? ' · ' : ''}
          </span>
        ))}
      </div>

      {result && (
        <>
          <div className="infl-eyebrow" style={{ margin: '28px 0 10px' }}>Résultat</div>
          <div className="infl-resp">
            <div className="infl-resp-h">
              <div className="infl-chips">
                <span className="infl-chip"><i>Indicateur · </i><b>{result.indicator}</b></span>
                <span className="infl-chip"><i>Territoire · </i><b>France</b></span>
                {result.type === 'year' && <span className="infl-chip"><i>Année · </i><b>{result.year}</b></span>}
                {result.type === 'latest' && <span className="infl-chip"><i>Période · </i><b>{fmtPeriod(result.period, false)}</b></span>}
              </div>
              <SourceTag source={apiSource || 'INSEE'} date={result.type === 'latest' ? fmtPeriod(result.period, false) : result.year} />
            </div>

            {result.type === 'latest' && (
              <div className="infl-resp-num">
                <div className="n">{(result.val >= 0 ? '+' : '') + result.val.toFixed(1).replace('.', ',')}<span>%</span></div>
                <p>Dernier taux d'inflation disponible (<b>{fmtPeriod(result.period, false)}</b>) — glissement annuel, indice des prix à la consommation, France.</p>
              </div>
            )}

            {result.type === 'year' && result.annualVal !== null && (
              <>
                <div className="infl-resp-num">
                  <div className="n">{(result.annualVal >= 0 ? '+' : '') + result.annualVal.toFixed(1).replace('.', ',')}<span>%</span></div>
                  <p>Moyenne de l'inflation sur l'année <b>{result.year}</b> — calculée sur {result.monthRows.length} mois disponibles.</p>
                </div>
                {result.monthRows.length > 0 && (

                    columns={[

                    ]}

            {result.type === 'year' && result.annualVal === null && (
              <div className="infl-note">Aucune donnée pour {result.year}. Les données disponibles vont de 2019 à aujourd'hui. Essayez « inflation 2022 » ou « dernier chiffre ».</div>
            )}

              <div className="infl-note">Précisez une année (ex. « inflation 2022 ») ou tapez « dernier chiffre » pour la valeur la plus récente.</div>
            )}

            <Btn variant="secondary">Exporter CSV</Btn>

          Tapez votre question ci-dessus et appuyez sur Entrée, ou cliquez sur un exemple.

      )}

function euXY(lon, lat) {
  const yM = Math.log(Math.tan(Math.PI/4 + lat * Math.PI/360));
  const x = (lon - EU_LON_MIN) / (EU_LON_MAX - EU_LON_MIN) * EU_W;
  const y = (EU_YM_MAX - yM) / (EU_YM_MAX - EU_YM_MIN) * EU_H;
  return [x, y];
}

function ringToSVGD(coords) {
  const pts = coords.filter((_, i) => i % 2 === 0); // thin by skipping every other for perf
  return pts.map((c, i) => {
    const [x, y] = euXY(c[0], c[1]);
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ') + 'Z';
}

function geomToSVGD(geometry) {
  if (!geometry) return '';
  if (geometry.type === 'Polygon') return ringToSVGD(geometry.coordinates[0]);
  if (geometry.type === 'MultiPolygon') return geometry.coordinates.map(p => ringToSVGD(p[0])).join(' ');
  return '';
}

function useEUGeoJSON() {
  const [state, setState] = React.useState({ paths: null, loading: true });
  React.useEffect(() => {
    let alive = true;
    fetch('https://gisco-services.ec.europa.eu/distribution/v2/countries/geojson/CNTR_RG_60M_2020_4326.geojson')
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(data => {
        if (!alive) return;
        const paths = {};
        data.features.forEach(f => {
          const code = f.properties.CNTR_ID || f.properties.FID || f.properties.ISO2;
          if (code) paths[code] = geomToSVGD(f.geometry);
        });
        setState({ paths, loading: false });
      })
      .catch(() => { if (alive) setState({ paths: {}, loading: false }); });
    return () => { alive = false; };
  }, []);
  return state;
}

function parseEUSDMX(json) {
  try {
    const seriesDims = json.structure.dimensions.series;
    const obsDims = json.structure.dimensions.observation;
    const timeDim = obsDims.find(d => d.id === 'TIME_PERIOD');
    const periods = timeDim.values.map(v => v.id);
    const refAreaDim = seriesDims.find(d => d.id === 'REF_AREA');
    const countries = refAreaDim.values.map(v => v.id);
    const refAreaIdx = seriesDims.indexOf(refAreaDim);
    const result = {};
    Object.entries(json.dataSets[0].series).forEach(([key, series]) => {
      const parts = key.split(':').map(Number);
      const code = countries[parts[refAreaIdx]];
      if (!code) return;
      result[code] = {};
      Object.entries(series.observations).forEach(([oi, vals]) => {
        const p = periods[parseInt(oi)];
        if (p && vals[0] != null) result[code][p] = Math.round(vals[0] * 10) / 10;
      });
    });
    return result;
  } catch(e) { return {}; }
}

function useEUInflData() {
  const [state, setState] = React.useState({ loading: true, error: false, data: {}, fetchedAt: null });
  React.useEffect(() => {
    let alive = true;
    // Use wildcard to get all countries in one reliable request
    fetch('https://data-api.ecb.europa.eu/service/data/ICP/M.*.N.000000.4.ANR?lastNObservations=84&format=jsondata')
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(json => {
        if (!alive) return;
        const data = parseEUSDMX(json);
        const hasData = Object.keys(data).length > 0;
        console.log('[BCE] HICP data received, countries:', Object.keys(data).length, 'sample:', JSON.stringify(Object.entries(data).slice(0,2).map(([k,v])=>({k,periods:Object.keys(v).length}))));
        setState({ loading: false, error: !hasData, data, fetchedAt: hasData ? new Date().toISOString() : null });
      })
      .catch(err => {
        console.warn('[BCE] API failed:', err);
        if (alive) setState({ loading: false, error: true, data: {}, fetchedAt: null });
      });
    return () => { alive = false; };
  }, []);
  return state;
}

function inflColor(v) {
  if (v == null) return 'var(--gray-200)';
  if (v < 0)    return '#0A6B43';
  if (v < 2)    return '#12A862';
  if (v < 3.5)  return '#C9760D';
  if (v < 6)    return '#E1000F';
  return '#7B0008';
}

function getEUValue(euData, code, period, useStatic) {
  if (!useStatic && euData[code] && euData[code][period] != null) return euData[code][period];
  const year = period ? parseInt(period.slice(0, 4)) : null;
  return (year && EU_STATIC_ANNUAL[code]?.[year]) ?? null;
}

function genPeriods(fromYear) {
  const result = [];
  const now = new Date();
  for (let y = fromYear; y <= now.getFullYear(); y++) {
    const maxM = y === now.getFullYear() ? now.getMonth() + 1 : 12;
    for (let m = 1; m <= maxM; m++) result.push(y + '-' + String(m).padStart(2, '0'));
  }
  return result.reverse();
}

function EURealMap({ valsByCode, hovered, onHover, onSelect }) {
  const { paths, loading: geoLoading } = useEUGeoJSON();

  if (geoLoading) return (
    <div style={{ height:400, display:'flex', alignItems:'center', justifyContent:'center', gap:10,
                  color:'var(--text-tertiary)', fontSize:14, background:'var(--gray-50)',
                  borderRadius:12, border:'1px solid var(--border)' }}>
      <Icon n="loader" s={18} color="var(--accent)" /> Chargement de la carte…
    </div>
  );

  return (
    <svg viewBox={`0 0 ${EU_W} ${EU_H}`}
         style={{ width:'100%', display:'block', borderRadius:12, background:'var(--gray-100)',
                  border:'1px solid var(--border)', overflow:'hidden' }}>
      {/* Ocean/background fill */}
      <rect x={0} y={0} width={EU_W} height={EU_H} fill="#dde8f2" rx={12} />
      {/* Context neighbours (non-EU, neutral gray) */}
      {paths && Object.entries(paths).map(([code, d]) => {
        if (!EU_CONTEXT_CODES.has(code) || !d) return null;
        return <path key={code} d={d} fill="#c8d0d8" stroke="white" strokeWidth={0.8}
                     strokeLinejoin="round" />;
      })}
      {/* EU-27 member states with inflation colour */}
      {paths && EU_COUNTRIES.map(c => {
        const d = paths[c.code];
        if (!d) return null;
        const v = valsByCode[c.code];
        const isH = hovered === c.code;
        return (
          <path key={c.code} d={d}
                fill={inflColor(v)}
                stroke="white"
                strokeWidth={isH ? 2 : 0.8}
                strokeLinejoin="round"
                onMouseEnter={() => onHover(c.code)}
                onMouseLeave={() => onHover(null)}
                onClick={() => onSelect && onSelect(c.code)}
                style={{ cursor:'pointer',
                         opacity: hovered && !isH ? 0.55 : 1,
                         filter: isH ? 'brightness(1.12)' : 'none',
                         transition:'opacity 120ms, filter 120ms' }} />
        );
      })}
    </svg>
  );
}

function EUCountryDetail({ country, period, euAvg, onClose }) {
  const [cats, setCats] = React.useState(null);
  const [catLoad, setCatLoad] = React.useState(true);
  React.useEffect(() => {
    setCatLoad(true); setCats(null);
    const codes = '010000+045000+040000+070000+110000';
    fetch(`https://data-api.ecb.europa.eu/service/data/ICP/M.${country.code}.N.${codes}.4.ANR?lastNObservations=3&format=jsondata`)
      .then(r => r.ok ? r.json() : null)
      .then(json => {
        if (!json) { setCatLoad(false); return; }
        try {
          const serDims = json.structure.dimensions.series;
          const obsDims = json.structure.dimensions.observation;
          const timeDim = obsDims.find(d => d.id === 'TIME_PERIOD');
          const periods = timeDim.values.map(v => v.id);
          const catDim = serDims.find(d => d.id === 'ICP_ITEM');
          const result = {};
          Object.entries(json.dataSets[0].series).forEach(([key, s]) => {
            const parts = key.split(':').map(Number);
            const catIdx = serDims.indexOf(catDim);
            const cat = catDim.values[parts[catIdx]]?.id;
            if (!cat) return;
            const obsEntries = Object.entries(s.observations);
            const latest = obsEntries[obsEntries.length - 1];
            if (latest && latest[1][0] != null) result[cat] = Math.round(latest[1][0] * 10) / 10;
          });
          setCats(result); setCatLoad(false);
        } catch(e) { setCatLoad(false); }
      })
      .catch(() => setCatLoad(false));
  }, [country.code]);

  const v = country.val;
  return (
    <div style={{ width:230, flexShrink:0, background:'white', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', padding:'14px 16px', boxShadow:'var(--shadow-sm)' }}>

      </div>
      {v != null ? (
        <div className="infl-mono" style={{ fontSize:26, fontWeight:700, color:inflColor(v), marginBottom:4 }}>
          {(v >= 0 ? '+' : '') + v.toFixed(1).replace('.', ',')}<span style={{ fontSize:14 }}> %</span>
        </div>
      ) : <div style={{ fontSize:13, color:'var(--text-tertiary)', marginBottom:8 }}>Donnée non disponible</div>}
      <div style={{ fontSize:12, color:'var(--text-secondary)', marginBottom:10 }}>IPCH glissement annuel</div>
      {euAvg != null && v != null && (
        <div style={{ background:'var(--gray-50)', borderRadius:'var(--radius-sm)', padding:'7px 10px', marginBottom:12 }}>
          <div style={{ fontSize:11, color:'var(--text-tertiary)', marginBottom:2 }}>vs. moyenne UE-27</div>
          <div className="infl-mono" style={{ fontSize:15, fontWeight:700, color: v > euAvg ? '#E1000F' : '#12A862' }}>
            {(v - euAvg >= 0 ? '+' : '') + (v - euAvg).toFixed(1).replace('.', ',') + ' pp'}
          </div>
        </div>
      )}
      <div style={{ fontSize:11, color:'var(--text-tertiary)', fontWeight:600, marginBottom:6 }}>Détail par catégorie</div>
      {catLoad ? (
        <div style={{ fontSize:12, color:'var(--text-tertiary)', display:'flex', alignItems:'center', gap:6 }}><Icon n="loader" s={13} color="var(--accent)" /> Chargement…</div>
      ) : cats && Object.keys(cats).length > 0 ? (

          <div key={code} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
            <div style={{ fontSize:11, color:'var(--text-secondary)' }}>{label}</div>

              {(cats[code] >= 0 ? '+' : '') + cats[code].toFixed(1)} %

          </div>
        ) : null)
      ) : (
        <div style={{ fontSize:11, color:'var(--text-tertiary)', fontStyle:'italic' }}>Données catégorielles non disponibles</div>
      )}
    </div>
  );
}

function SortableEUTable({ rows, euAvg }) {
  const [sortKey, setSortKey] = React.useState('val');
  const [sortDir, setSortDir] = React.useState('desc');

  function handleSort(key) {
    if (key === sortKey) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(key); setSortDir(key === 'pays' ? 'asc' : 'desc'); }
  }

  const sorted = [...rows].sort((a, b) => {
    if (sortKey === 'pays') return sortDir === 'asc' ? a._raw.name.localeCompare(b._raw.name) : b._raw.name.localeCompare(a._raw.name);
    const va = sortKey === 'diff' ? (a._raw.v - euAvg) : a._raw.v;
    const vb = sortKey === 'diff' ? (b._raw.v - euAvg) : b._raw.v;
    return sortDir === 'asc' ? va - vb : vb - va;
  }).map((r, i) => ({ ...r, rang: i + 1 }));

  const cols = [
    { key:'rang', label:'#', numeric:true },
    { key:'pays', label:'Pays', numeric:false },
    { key:'val', label:'Inflation IPCH', numeric:true },
    { key:'diff', label:'vs moy. UE', numeric:true },
  ];

  const SortIcon = ({ col }) => {
    if (col !== sortKey) return <span style={{ opacity:0.3, fontSize:9 }}>⇅</span>;
    return <span style={{ fontSize:9 }}>{sortDir === 'desc' ? '▼' : '▲'}</span>;
  };

  return (
    <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', overflow:'hidden' }}>
      <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
        <thead>
          <tr style={{ background:'var(--gray-50)', borderBottom:'1px solid var(--border)' }}>
            {cols.map(col => (
              <th key={col.key} onClick={() => handleSort(col.key)}
                  style={{ padding:'8px 12px', textAlign: col.numeric ? 'right' : 'left',
                           fontWeight:600, fontSize:11, color:'var(--text-secondary)',
                           textTransform:'uppercase', letterSpacing:'0.06em', cursor:'pointer',
                           userSelect:'none', whiteSpace:'nowrap' }}>
                {col.label} <SortIcon col={col.key} />
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.map((row, i) => (
            <tr key={row._raw.code} style={{ borderBottom: i < sorted.length-1 ? '1px solid var(--border-subtle)' : 'none',
                                              background: i % 2 === 0 ? 'white' : 'var(--gray-50)' }}>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontSize:12, color:'var(--text-tertiary)' }}>{row.rang}</td>
              <td style={{ padding:'7px 12px', fontWeight:600 }}>{row._raw.flag} {row._raw.name}</td>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontWeight:700, color: inflColor(row._raw.v) }}>{row.val}</td>
              <td style={{ padding:'7px 12px', textAlign:'right', fontFamily:'var(--font-mono)', fontSize:12,
                           color: row._raw.v > euAvg ? '#E1000F' : row._raw.v < euAvg ? '#0A6B43' : 'var(--text-secondary)' }}>{row.diff}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function parseMultiCatSDMX(json) {
  try {
    const serDims = json.structure.dimensions.series;
    const obsDims = json.structure.dimensions.observation;
    const timeDim = obsDims.find(d => d.id === 'TIME_PERIOD');
    const periods = timeDim.values.map(v => v.id);
    const catDim = serDims.find(d => d.id === 'ICP_ITEM');
    const result = {};
    Object.entries(json.dataSets[0].series).forEach(([key, s]) => {
      const parts = key.split(':').map(Number);
      const catIdx = serDims.indexOf(catDim);
      const cat = catDim.values[parts[catIdx]]?.id;
      if (!cat) return;
      result[cat] = {};
      Object.entries(s.observations).forEach(([oi, vals]) => {
        const p = periods[parseInt(oi)];
        if (p && vals[0] != null) result[cat][p] = Math.round(vals[0] * 10) / 10;
      });
    });
    return result;
  } catch(e) { return {}; }
}

function useInflCats() {
  const [state, setState] = React.useState({ loading: true, data: {} });
  React.useEffect(() => {
    let alive = true;
    fetch('https://data-api.ecb.europa.eu/service/data/ICP/M.FR.N.010000+045000+070000+060000+110000.4.ANR?lastNObservations=3&format=jsondata')
      .then(r => r.json())
      .then(json => { if (alive) setState({ loading: false, data: parseMultiCatSDMX(json) }); })
      .catch(() => { if (alive) setState({ loading: false, data: {} }); });
    return () => { alive = false; };
  }, []);
  return state;
}

function ExportMenu({ filename, title, columns, getRows }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    function onDown(e) { if (!ref.current?.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, [open]);

  function exportCSV() {
    setOpen(false);
    const rows = getRows();
    const hdr = columns.map(c => '"' + c.label + '"').join(',');
    const body = rows.map(r => columns.map(c => '"' + String(r[c.key] ?? '') + '"').join(',')).join('\n');
    const blob = new Blob(['﻿' + hdr + '\n' + body], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename + '.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function exportPDF() {
    setOpen(false);
    const rows = getRows();

    <style>
      body{font-family:Arial,sans-serif;font-size:12px;margin:28px;color:#111}
      h2{font-size:17px;color:#000091;margin:0 0 4px}
      .sub{font-size:11px;color:#666;margin:0 0 18px}
      table{width:100%;border-collapse:collapse}
      th{background:#f0f4ff;padding:7px 10px;text-align:left;border:1px solid #c8d0e8;font-size:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}

      tr:nth-child(even){background:#f8f9ff}
      .footer{margin-top:18px;font-size:10px;color:#999;border-top:1px solid #eee;padding-top:8px}
    </style></head><body>
    <h2>${title || filename}</h2>
    <div class="sub">NomosLab · Source : BCE / INSEE · ${new Date().toLocaleDateString('fr-FR',{year:'numeric',month:'long',day:'numeric'})}</div>
    <table><thead><tr>${thRow}</tr></thead><tbody>${trRows}</tbody></table>
    <div class="footer">Données officielles — Banque Centrale Européenne (BCE) / INSEE</div>
    <script>window.onload=function(){setTimeout(function(){window.print();},500);}<\/script>
    </body></html>`);
    w.document.close();
  }

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={() => setOpen(!open)}
        style={{ display:'flex', alignItems:'center', gap:5, padding:'5px 10px', borderRadius:'var(--radius-sm)',
                 border:'1px solid var(--border)', background:'white', cursor:'pointer', fontSize:12,
                 fontFamily:'var(--font-sans)', color:'var(--text-secondary)', whiteSpace:'nowrap' }}>
        <Icon n="download" s={13} /> Exporter ▾
      </button>
      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 4px)', right:0, background:'white',
                      border:'1px solid var(--border)', borderRadius:'var(--radius-md)',
                      boxShadow:'var(--shadow-md)', zIndex:100, minWidth:170, overflow:'hidden' }}>

function InflPostes({ monthly }) {
  const { SourceTag, Alert } = window.FranceMonitorDesignSystem_5343d8;
  const [catData, setCatData] = React.useState(null);
  const [catLoading, setCatLoading] = React.useState(true);
  const [catError, setCatError] = React.useState(false);
  const [period, setPeriod] = React.useState(null);

  React.useEffect(() => {
    const codes = POSTE_CATS.map(c => c.code).join('+');
    fetch(`https://data-api.ecb.europa.eu/service/data/ICP/M.FR.N.${codes}.4.ANR?lastNObservations=84&format=jsondata`)
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(json => {
        const data = parseMultiCatSDMX(json);
        setCatData(data);
        const allP = Object.keys(Object.values(data)[0] || {}).sort().reverse();
        setPeriod(allP[0] || null);
        setCatLoading(false);
      })
      .catch(() => { setCatError(true); setCatLoading(false); });
  }, []);

  const allPeriods = catData ? Object.keys(Object.values(catData)[0] || {}).sort().reverse() : [];
  const prevPeriod = period && allPeriods.length > 1 ? allPeriods[allPeriods.indexOf(period) + 1] : null;
  const overallVal = period ? monthly[period] ?? null : null;

  if (catLoading) return (
    <div className="infl-body" style={{ padding:'48px', textAlign:'center', color:'var(--text-tertiary)', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', gap:10 }}>
      <Icon n="loader" s={18} color="var(--accent)" /> Chargement des données BCE par poste…
    </div>
  );

  return (
    <div className="infl-body">
      {catError || !catData ? (
        <Alert kind="warn" title="Données indisponibles">L'API BCE ne répond pas. Réessayez dans quelques instants.</Alert>
      ) : (
        <>
          <div style={{ display:'flex', alignItems:'flex-end', gap:12, marginBottom:16, flexWrap:'wrap', justifyContent:'space-between' }}>
            <div style={{ display:'flex', alignItems:'flex-end', gap:12, flexWrap:'wrap' }}>
              <div>
                <div className="infl-eyebrow" style={{ marginBottom:4 }}>Période</div>
                <select className="infl-sel" value={period || ''} onChange={e => setPeriod(e.target.value)}>
                  {allPeriods.map(p => <option key={p} value={p}>{fmtPeriod(p, false)}</option>)}
                </select>
              </div>
              {overallVal != null && (
                <div style={{ background:'var(--blue-50)', border:'1px solid var(--blue-100)', borderRadius:'var(--radius-sm)', padding:'5px 14px' }}>
                  <div className="infl-eyebrow" style={{ marginBottom:2 }}>Indice général France</div>
                  <div className="infl-mono" style={{ fontSize:17, fontWeight:700, color:'var(--blue-france)' }}>
                    {(overallVal >= 0 ? '+' : '') + overallVal.toFixed(1).replace('.', ',')}<span style={{ fontSize:12 }}> %</span>
                  </div>
                </div>
              )}
            </div>
            <ExportMenu filename={'postes-inflation-' + (period || '')} title={'Inflation par poste COICOP — ' + (period ? fmtPeriod(period, false) : '')}
              columns={[{key:'label',label:'Poste'},{key:'val',label:'Inflation (%)'},{key:'delta',label:'Variation (pp)'},{key:'vs',label:'vs. indice général'}]}
              getRows={() => POSTE_CATS.map(({ code, label }) => {
                const v = catData[code]?.[period];
                const vPrev = catData[code]?.[prevPeriod];
                const d = (v != null && vPrev != null) ? Math.round((v - vPrev) * 10) / 10 : null;
                return {
                  label,
                  val: v != null ? (v >= 0 ? '+' : '') + v.toFixed(1).replace('.', ',') + ' %' : '—',
                  delta: d != null ? (d >= 0 ? '+' : '') + d.toFixed(1) + ' pp' : '—',
                  vs: (overallVal != null && v != null) ? (v - overallVal >= 0 ? '+' : '') + (v - overallVal).toFixed(1) + ' pp' : '—',
                };
              })} />
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(240px, 1fr))', gap:12, marginBottom:20 }}>
            {POSTE_CATS.map(({ code, label, icon }) => {
              const v = catData[code]?.[period];
              const vPrev = catData[code]?.[prevPeriod];
              const delta = (v != null && vPrev != null) ? Math.round((v - vPrev) * 10) / 10 : null;
              const barW = v != null ? Math.min(Math.abs(v) / 15 * 100, 100) : 0;
              return (
                <div key={code} style={{ background:'white', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', padding:'12px 14px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                    <Icon n={icon} s={15} color="var(--blue-france)" />
                    <div style={{ fontSize:12, fontWeight:600, color:'var(--text-secondary)' }}>{label}</div>
                  </div>
                  <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:6 }}>
                    <div className="infl-mono" style={{ fontSize:22, fontWeight:700, color:inflColor(v) }}>
                      {v != null ? (v >= 0 ? '+' : '') + v.toFixed(1).replace('.', ',') : '—'}
                    </div>
                    <div style={{ fontSize:13, color:'var(--text-tertiary)' }}>%</div>
                    {delta != null && (
                      <div style={{ fontSize:11, color: delta > 0 ? '#E1000F' : '#12A862', fontWeight:600, marginLeft:4 }}>
                        {delta > 0 ? '▲' : '▼'} {Math.abs(delta).toFixed(1)} pp
                      </div>
                    )}
                  </div>
                  <div style={{ height:5, background:'var(--gray-100)', borderRadius:99, overflow:'hidden' }}>
                    <div style={{ height:'100%', width: barW + '%', background: inflColor(v), borderRadius:99, transition:'width 600ms' }} />
                  </div>
                  {overallVal != null && v != null && (
                    <div style={{ fontSize:10, color:'var(--text-tertiary)', marginTop:5 }}>
                      {(v - overallVal >= 0 ? '+' : '') + (v - overallVal).toFixed(1)} pp vs. indice général ({(overallVal >= 0 ? '+' : '') + overallVal.toFixed(1)} %)
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{ marginTop:4 }}>
            <SourceTag source="BCE · SDMX IPCH France par poste COICOP" date={period ? fmtPeriod(period, false) : ''} />
          </div>
        </>
      )}
    </div>
  );
}

function InflationModule() {

  const { loading, error, data: apiData, fetchedAt: inflFetchedAt } = useInflData();
  const { data: catData } = useInflCats();

  const monthly = getMonthly(apiData, error);
  const latestPeriod = getLatestPeriod(monthly);
  const sortedPeriods = Object.keys(monthly).sort();
  const prevPeriod = sortedPeriods.slice(-2)[0];
  const latestVal = latestPeriod ? monthly[latestPeriod] : 1.2;
  const prevVal = prevPeriod ? monthly[prevPeriod] : 1.3;
  const delta = Math.round((latestVal - prevVal) * 10) / 10;
  const apiSource = error ? 'INSEE · données intégrées' : 'BCE · IPCH France temps réel';
  const apiLive = !error && inflFetchedAt;

  const chartPeriods = sortedPeriods.slice(-36);
  const chartSeries = chartPeriods.map(p => monthly[p]);
  const chartLabels = chartPeriods
    .filter((_, i) => i % 9 === 0 || i === chartPeriods.length - 1)
    .map(p => p.slice(0, 4));

  const histRows = sortedPeriods.slice(-12).reverse().map((p, i, arr) => {
    const val = monthly[p];
    const prev = arr[i + 1] ? monthly[arr[i + 1]] : null;
    const g = prev !== null ? Math.round((val - prev) * 10) / 10 : null;
    return {
      p: fmtPeriod(p, true),
      e: (val >= 0 ? '+' : '') + val.toFixed(1).replace('.', ','),

                  { key:'e', header:'Inflation a/a (%)', align:'right', mono:true },
                  { key:'g', header:'Variation vs mois préc.', align:'right', mono:true },
                ]}
                rows={histRows} />
            </div>
            <div style={{ marginTop:12 }}><SourceTag source={apiSource} date={latestPeriod ? fmtPeriod(latestPeriod, false) : ''} /></div>
          </div>
        )}

        {!loading && tab === 'Interroger' && <InflInterroger monthly={monthly} apiSource={apiSource} />}

        {!loading && tab === 'Départements' && <InflDepartements monthly={monthly} />}
        {!loading && tab === 'Postes' && <InflPostes monthly={monthly} />}
        {!loading && tab === 'Comparaison UE' && <InflComparaisonUE />}
      </div>
    </div>
  );
}

function parseStationRecord(rec) {
  const lat = parseFloat(rec.latitude || rec.lat || (rec.geom && rec.geom.lat) || 0);
  const lon = parseFloat(rec.longitude || rec.lon || (rec.geom && rec.geom.lon) || 0);
  const prix = {};
  const keys = { Gazole:'prix_gazole_valeur', SP95:'prix_sp95_valeur', SP98:'prix_sp98_valeur', E10:'prix_e10_valeur', E85:'prix_e85_valeur', GPLc:'prix_gplc_valeur' };
  Object.entries(keys).forEach(([ft, k]) => { if (rec[k] != null) prix[ft] = parseFloat(rec[k]); });
  if (rec.prix && Array.isArray(rec.prix)) rec.prix.forEach(p => { if (p.nom && p.valeur) prix[p.nom] = parseFloat(p.valeur); });
  return {
    id: String(rec.id),
    nom: rec.nom || rec.ensigne || ('Station ' + rec.id),
    adresse: rec.adresse || '',
    ville: rec.ville || '',
    cp: rec.cp || '',
    dept: rec.dep_code || rec.code_dep || (rec.cp || '').slice(0, 2),
    lat, lon, prix,
    h24: rec.automate_24_24 === 'Oui' || rec.automate_24_24 === '1',
  };
}

function useCarburantData() {
  const [state, setState] = React.useState({ loading: true, stations: [], progress: 0, total: 0, error: false, fromApi: false });
  React.useEffect(() => {
    let alive = true;
    const LIMIT = 100;
    const FIELDS = 'id,adresse,ville,cp,dep_code,latitude,longitude,prix_gazole_valeur,prix_sp95_valeur,prix_sp98_valeur,prix_e10_valeur,prix_e85_valeur,prix_gplc_valeur,automate_24_24';

    async function loadAll() {
      try {
        const r0 = await fetch(`${CARB_API_URL}?limit=${LIMIT}&offset=0&select=${FIELDS}`);
        if (!r0.ok) throw new Error(r0.status);
        const d0 = await r0.json();
        const total = d0.total_count || 0;
        let all = (d0.results || []).map(parseStationRecord).filter(s => s.lat && s.lon);
        if (!alive) return;
        setState({ loading: total > LIMIT, stations: [...all], total, progress: all.length, error: false, fromApi: true });

        if (total > LIMIT) {
          const offsets = [];
          for (let o = LIMIT; o < total; o += LIMIT) offsets.push(o);
          for (let i = 0; i < offsets.length; i += 10) {
            if (!alive) return;
            const chunk = offsets.slice(i, i + 10);
            const batches = await Promise.all(chunk.map(o =>
              fetch(`${CARB_API_URL}?limit=${LIMIT}&offset=${o}&select=${FIELDS}`)
                .then(r => r.json())
                .then(d => (d.results || []).map(parseStationRecord).filter(s => s.lat && s.lon))
                .catch(() => [])
            ));
            all = [...all, ...batches.flat()];
            if (!alive) return;
            setState(s => ({ ...s, stations: [...all], progress: all.length }));
          }
        }
        if (!alive) return;
        setState(s => ({ ...s, loading: false }));
      } catch(e) {
        if (alive) setState({ loading: false, stations: STATIC_CARB, error: true, fromApi: false, progress: 0, total: 0 });
      }
    }

    loadAll();
    return () => { alive = false; };
  }, []);
  return state;
}

function carbPriceColor(price, allPrices) {
  if (price == null || allPrices.length === 0) return 'var(--gray-300)';
  const mn = Math.min(...allPrices), mx = Math.max(...allPrices);
  const r = (price - mn) / ((mx - mn) || 1);
  if (r < 0.15) return '#0A6B43';
  if (r < 0.35) return '#12A862';
  if (r < 0.65) return '#C9760D';
  if (r < 0.85) return '#E1000F';
  return '#7B0008';
}

function CarbMap({ stations, fuelId, selected, onSelect }) {
  const { FranceMap } = window.FranceMonitorDesignSystem_5343d8;
  const allPrices = stations.map(s => s.prix[fuelId]).filter(v => v != null);

  const dots = React.useMemo(() => stations.map(s => {
    const { x, y } = stationToSvg(s.lon, s.lat);
    if (isNaN(x) || isNaN(y) || x < -200 || x > 1200 || y < -200 || y > 1163) return null;
    return { s, x, y, v: s.prix[fuelId] };
  }).filter(Boolean), [stations, fuelId]);

  return (
    <div style={{ position:'relative', flex:1, minWidth:0, overflow:'hidden' }}>
      <FranceMap height="100%" />
      <svg viewBox="0 0 1000 963" preserveAspectRatio="xMidYMid meet"
           style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none' }}>
        {dots.map(({ s, x, y, v }) => {
          const isSel = selected === s.id;
          return (
            <circle key={s.id} cx={x} cy={y} r={isSel ? 8 : 3.5}

  const allPrices = stations.map(s => s.prix[fuelId]).filter(v => v != null);

  function hs(key) {
    if (key === sortKey) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  }

  const rows = stations
    .filter(s => s.prix[fuelId] != null)
    .filter(s => !deptFilter || s.dept === deptFilter)

    .sort((a, b) => {

      if (sortKey === 'ville')return sortDir === 'asc' ? a.ville.localeCompare(b.ville): b.ville.localeCompare(a.ville);
      if (sortKey === 'dept') return sortDir === 'asc' ? a.dept.localeCompare(b.dept)  : b.dept.localeCompare(a.dept);

            </select>
          </div>
        </div>
        <ExportMenu filename={'carburant-classement-' + fuelId} title={'Classement stations ' + fuelId}
          columns={expCols}
          getRows={() => rows.map(s => ({
            nom: s.nom, adresse: s.adresse, ville: s.ville, dept: s.dept,
            prix: s.prix[fuelId].toFixed(3) + ' €/L',

      </div>

function CarburantHistorique({ stations, fuelId, fuelTypes, initStation }) {
  const { Alert } = window.FranceMonitorDesignSystem_5343d8;
  const [histStn, setHistStn] = React.useState(initStation || null);
  const [search, setSearch] = React.useState('');
  const [results, setResults] = React.useState([]);

  React.useEffect(() => { if (initStation) setHistStn(initStation); }, [initStation && initStation.id]);

  function doSearch(q) {
    setSearch(q);
    if (q.length < 2) { setResults([]); return; }
    setResults(stations.filter(s =>
      s.nom.toLowerCase().includes(q.toLowerCase()) || s.ville.toLowerCase().includes(q.toLowerCase())
    ).slice(0, 8));
  }

  const mockHistory = React.useMemo(() => {
    if (!histStn) return [];
    const base = histStn.prix[fuelId] || 1.75;
    return Array.from({ length: 30 }, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (29 - i));
      const noise = Math.sin(i * 0.8) * 0.012 + (Math.random() - 0.5) * 0.006;
      const trend = i < 15 ? -0.001 * i : 0.001 * (i - 15);
      return { date: d.toISOString().slice(0, 10), price: Math.max(1.3, Math.round((base + noise + trend) * 1000) / 1000) };
    });

function buildSeats() {
  const total = AN_GROUPS.reduce((a, g) => a + g.n, 0);
  const rows = 13, CX = 420, CY = 432, rInner = 150, rOuter = 402;
  const radii = [];
  for (let r = 0; r < rows; r++) radii.push(rInner + (rOuter - rInner) * r / (rows - 1));
  const sumR = radii.reduce((a, b) => a + b, 0);
  let perRow = radii.map(rad => Math.max(1, Math.round(total * rad / sumR)));
  let diff = total - perRow.reduce((a, b) => a + b, 0);
  let ri = rows - 1;
  while (diff !== 0) { perRow[ri] += diff > 0 ? 1 : -1; diff += diff > 0 ? -1 : 1; ri = (ri - 1 + rows) % rows; }
  const slots = [];
  for (let r = 0; r < rows; r++) {
    const count = perRow[r], rad = radii[r];
    for (let i = 0; i < count; i++) {
      const frac = count === 1 ? 0.5 : i / (count - 1);
      slots.push({ a: Math.PI * (1 - frac), rad });
    }
  }
  slots.sort((s1, s2) => s2.a - s1.a);
  let gi = 0, gcount = 0;
  return slots.map((s, idx) => {
    while (gi < AN_GROUPS.length - 1 && gcount >= AN_GROUPS[gi].n) { gi++; gcount = 0; }
    const g = AN_GROUPS[gi]; gcount++;
    return {
      x: CX + s.rad * Math.cos(s.a),
      y: CY - s.rad * Math.sin(s.a),
      group: g.id, color: g.c,
      name: FN_NAMES[(idx * 13) % FN_NAMES.length] + ' ' + SN_NAMES[(idx * 7) % SN_NAMES.length],
      party: g.name,
      circ: DEPT_NAMES[(idx * 5) % DEPT_NAMES.length] + ' · ' + ((idx % 18) + 1) + 'e circ.',
    };
  });
}

const AGENDA_TYPES = {
  seance:     { label:'Séance publique', color:'#E1000F' },
  commission: { label:'Commission', color:'#2563EB' },
  delegation: { label:'Délégation', color:'#7C5CFC' },
  conference: { label:'Conférence des présidents', color:'#C9760D' },
  audition:   { label:'Audition', color:'#0E8A52' },
  autre:      { label:'Autre réunion', color:'#9AA3AF' },
};

function getAgendaType(r) {
  // Priorité au champ type (xsiType réel de l'API AN)
  const type = (r.type || '').toLowerCase();
  if (type.includes('seance')) return 'seance';
  if (type.includes('commission')) return 'commission';
  if (type.includes('init') || type.includes('delegation')) return 'delegation';
  // Fallback sur titre / lieu
  const t = (r.titre || '').toLowerCase();
  const l = (r.lieu || '').toLowerCase();
  if (t.includes('séance') || l.includes('hémicycle') || l.includes('hemicycle')) return 'seance';
  if (t.includes('commission')) return 'commission';
  if (t.includes('délégation') || t.includes('delegation')) return 'delegation';
  if (t.includes('conférence des présidents')) return 'conference';
  if (t.includes('audition')) return 'audition';
  return 'autre';
}

function isoDateStr(d) { return d.toISOString().slice(0,10); }

      .then(r => r.json())

      .catch(() => setState({ loading: false, scrutins: [], updatedAt: null }));

  return state;
}

}

/* ============================================================
   MARQUE BLANCHE (partie F)
   Exports imprimables avec en-tête = logo + nom du cabinet (au lieu
   du branding NomosLab), pied de page « Généré via NomosLab » discret.
   Approche HTML → impression navigateur (aucune dépendance PDF lourde).
   ============================================================ */
function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* Charge le logo de l'organisation depuis le bucket privé Storage sous forme
   de data URL (inlinable dans la fenêtre d'impression). null si absent. */
async function chargerLogoDataUrl(org) {
  if (!org || !org.logo_url || !isSupabaseConfigured()) return null;
  try {
    const { data, error } = await supabaseClient.storage.from('logos').createSignedUrl(org.logo_url, 300);
    if (error || !data) return null;
    const res = await fetch(data.signedUrl);
    if (!res.ok) return null;
    const blob = await res.blob();
    return await new Promise((resolve) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = () => resolve(null);
      fr.readAsDataURL(blob);
    });
  } catch (e) { return null; }
}

/* Ouvre une fenêtre d'impression en marque blanche. corpsHtml est du HTML
   déjà échappé/maîtrisé par l'appelant. */
