/* ── Export des fiches (députés & personnalités) en PDF / Excel / Word ──
   Système générique : un modèle de « fiche » normalisé est rendu dans les trois
   formats. Les librairies sont chargées à la demande (CDN) au premier clic. */
const EXPORT_LIBS = {
  jspdf:     'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',
  autotable: 'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js',
  xlsx:      'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
  docx:      'https://unpkg.com/docx@9.7.1/dist/index.iife.js',
};
const _exportScriptCache = {};
function loadExportScript(src) {
  if (_exportScriptCache[src]) return _exportScriptCache[src];
  _exportScriptCache[src] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.async = true;
    s.onload = () => resolve();
    s.onerror = () => { delete _exportScriptCache[src]; reject(new Error('Échec du chargement : ' + src)); };
    document.head.appendChild(s);
  });
  return _exportScriptCache[src];
}
function slugify(prefix, s) {
  return prefix + '-' + (s || 'x').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}
async function fetchImageBuffer(url) {
  try { const res = await fetch(url); if (!res.ok) return null; return await res.arrayBuffer(); }
  catch (e) { return null; }
}
function bufToDataURL(buf) {
  let bin = ''; const bytes = new Uint8Array(buf);
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return 'data:image/jpeg;base64,' + btoa(bin);
}

const DEP_VOTE_LABELS = { pour:'Pour', contre:'Contre', abstention:'Abstention', absent:'Non-vote' };

/* Modèle de fiche normalisé à partir d'un député. */
function buildDeputeFiche(dep, stats, news) {
  const s = stats || { pour:0, contre:0, abstention:0, absent:0, votes:[] };
  const total = s.pour + s.contre + s.abstention + s.absent;
  const exprimes = s.pour + s.contre + s.abstention;
  const txParticip = total > 0 ? Math.round(exprimes / total * 100) : 0;
  const parDeleg = (s.votes || []).filter(v => v.parDelegation).length;
  return {
    docTitle: 'Fiche député',
    eyebrow: 'NomosLab · Assemblée nationale · XVIIe législature',
    name: dep.nomComplet || '',
    subtitle: [
      (dep.female ? 'Députée' : 'Député') + (dep.groupe ? ' · ' + dep.groupe.short : ''),
      dep.groupe?.name || '',
      (dep.circonscription || '') + (dep.dept ? ' - ' + dep.dept : '') + (dep.region ? ', ' + dep.region : ''),
      dep.profession ? 'Profession : ' + dep.profession : '',
    ].filter(Boolean),
    photoUrl: 'public/photos/' + dep.id + '.jpg',
    sections: [
      { title:'Identité', rows: [
        ['Nom complet', dep.nomComplet || '—'],
        ['Qualité', dep.female ? 'Députée' : 'Député'],
        ['Groupe politique', dep.groupe?.name || '—'],
        ['Sigle du groupe', dep.groupe?.short || '—'],
        ['Département', dep.dept || '—'],
        ['Région', dep.region || '—'],
        ['Circonscription', dep.circonscription || '—'],
        ['Profession', dep.profession || '—'],
        ['Législature', 'XVIIe (depuis juillet 2024)'],
      ] },
      { title:'Participation aux votes', rows: [
        ['Taux de participation', txParticip + ' %'],
        ['Scrutins au total', String(total)],
        ['Votes exprimés', String(exprimes)],
        ['Pour', String(s.pour)],
        ['Contre', String(s.contre)],
        ['Abstention', String(s.abstention)],
        ['Non-votes / absences', String(s.absent)],
        ['Votes par délégation', String(parDeleg)],
      ] },
    ],
    votes: {
      title: 'Détail des votes',
      columns: ['Date','Scrutin','Position','Délégation'],
      colorCol: 2,
      rows: (s.votes || []).map(v => [ v.date || '', v.titre || '', DEP_VOTE_LABELS[v.position] || v.position || '', v.parDelegation ? 'Oui' : '' ]),
      widths: { pdf: { 0:62, 2:70, 3:58 }, word: [14,58,16,12] },
    },
    news: (news || []).map(n => ({ date:n.date||'', source:n.source||'', title:n.title||'', link:n.link||'' })),
    source: 'Assemblée nationale — XVIIe législature',
    slug: slugify('fiche-depute', dep.nomComplet),
  };
}

/* Modèle de fiche normalisé à partir d'une personnalité politique. */
function buildPersoFiche(f, news) {
  const bilanRows = (f.bilan || []).map(b => [ b.label,
    (b.value != null ? b.value : '') + (b.unit ? ' ' + b.unit : '') + (b.delta ? ' (' + b.delta + ')' : '') ]);
  const sections = [
    { title:'Identité', rows: [
      ['Nom', f.name || '—'],
      ['Fonction', f.role || '—'],
      ['Parti', f.party || '—'],
      ['Année de naissance', f.born || '—'],
      ["Score d'influence", f.score != null ? f.score + '/100' : '—'],
      ['Rang', f.rank != null ? '#' + f.rank : '—'],
    ] },
  ];
  if (bilanRows.length) sections.push({ title:'Bilan', rows: bilanRows });
  return {
    docTitle: 'Fiche personnalité',
    eyebrow: 'NomosLab · Personnalités politiques',
    name: f.name || '',
    subtitle: [ f.role || '', f.party || '', f.born ? 'Né·e en ' + f.born : '' ].filter(Boolean),
    photoUrl: f.photo || '',
    bio: f.bio || '',
    sections,
    votes: (f.votes && f.votes.length) ? {
      title: 'Votes récents',
      columns: ['Date','Intitulé','Position','Résultat'],
      colorCol: 2,
      rows: f.votes.map(v => [ (v.date && v.date !== '—') ? v.date : '', v.title || '', v.position || '', v.result || '' ]),
      widths: { pdf: { 0:62, 2:74, 3:74 }, word: [14,50,18,18] },
    } : null,
    news: (news || []).map(n => ({ date:n.date||'', source:n.source||'', title:n.title||'', link:n.link||'' })),
    source: 'NomosLab · Personnalités politiques',
    slug: slugify('fiche-personnalite', f.name),
  };
}

/* ── Rendu PDF (jsPDF + autoTable) ── */
async function exportFichePDF(fiche) {
  await loadExportScript(EXPORT_LIBS.jspdf);
  await loadExportScript(EXPORT_LIBS.autotable);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const M = 40;
  const INK = [11,14,20];
  const dateStr = new Date().toLocaleDateString('fr-FR', { year:'numeric', month:'long', day:'numeric' });

  doc.setFillColor(INK[0],INK[1],INK[2]); doc.rect(0,0,pageW,66,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(18);
  doc.text(fiche.docTitle, M, 32);
  doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(190,196,208);
  doc.text(fiche.eyebrow, M, 50);

  const photoW = 70, photoH = 88, headTop = 88;
  if (fiche.photoUrl) {
    const buf = await fetchImageBuffer(fiche.photoUrl);
    if (buf) { try { doc.addImage(bufToDataURL(buf), 'JPEG', pageW - M - photoW, headTop, photoW, photoH); } catch (e) {} }
  }
  doc.setTextColor(INK[0],INK[1],INK[2]); doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text(fiche.name, M, headTop + 16, { maxWidth: pageW - 2*M - photoW - 16 });
  doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor(90,97,107);
  doc.text(fiche.subtitle, M, headTop + 34, { lineHeightFactor: 1.5, maxWidth: pageW - 2*M - photoW - 16 });

  let y = headTop + photoH + 20;
  if (fiche.bio) {
    doc.setFontSize(9.5); doc.setTextColor(60,66,74);
    const lines = doc.splitTextToSize(fiche.bio, pageW - 2*M);
    doc.text(lines, M, y, { lineHeightFactor: 1.45 });
    y += lines.length * 12 + 14;
  }

  const baseStyles = { font:'helvetica', fontSize:9.5, cellPadding:5, textColor:[35,41,49], lineColor:[225,229,234], lineWidth:0.5, overflow:'linebreak' };
  const sectionHead = (label, span) => [[{ content:label, colSpan:span, styles:{ halign:'left', fillColor:INK, textColor:[255,255,255], fontStyle:'bold', fontSize:11 } }]];

  fiche.sections.forEach(sec => {
    doc.autoTable({
      startY: y,
      head: sectionHead(sec.title, 2),
      body: sec.rows,
      theme:'grid', styles: baseStyles,
      columnStyles: { 0:{ cellWidth:160, fontStyle:'bold', textColor:[90,97,107] } },
      margin:{ left:M, right:M },
    });
    y = doc.lastAutoTable.finalY + 16;
  });

  if (fiche.votes) {
    const v = fiche.votes;
    const cols = {};
    if (v.widths?.pdf) Object.entries(v.widths.pdf).forEach(([k,w]) => { cols[k] = { cellWidth:w }; });
    cols[v.colorCol] = Object.assign(cols[v.colorCol] || {}, { fontStyle:'bold' });
    doc.autoTable({
      startY: y,
      head: [
        [{ content: v.title + ' (' + v.rows.length + ')', colSpan: v.columns.length, styles:{ halign:'left', fillColor:INK, textColor:[255,255,255], fontStyle:'bold', fontSize:11 } }],
        v.columns.map(c => ({ content:c, styles:{ fillColor:[240,242,246], textColor:[60,66,74], fontStyle:'bold' } })),
      ],
      body: v.rows.length ? v.rows : [[{ content:'Aucune donnée disponible.', colSpan:v.columns.length, styles:{ halign:'center', textColor:[120,120,120] } }]],
      theme:'grid', styles: baseStyles, columnStyles: cols, margin:{ left:M, right:M },
      didParseCell: (d) => { if (d.section === 'body' && d.column.index === v.colorCol) d.cell.styles.textColor = votePosRgb(d.cell.raw); },
    });
    y = doc.lastAutoTable.finalY + 16;
  }

  {
    const links = fiche.news.map(n => n.link);
    const newsRows = fiche.news.length
      ? fiche.news.map(n => [ n.date, n.source, n.title ])
      : [[{ content:'Aucune actualité récente.', colSpan:3, styles:{ halign:'center', textColor:[120,120,120] } }]];
    doc.autoTable({
      startY: y,
      head: [
        [{ content:'Actualités récentes (' + fiche.news.length + ')', colSpan:3, styles:{ halign:'left', fillColor:INK, textColor:[255,255,255], fontStyle:'bold', fontSize:11 } }],
        ['Date','Source','Titre'].map(c => ({ content:c, styles:{ fillColor:[240,242,246], textColor:[60,66,74], fontStyle:'bold' } })),
      ],
      body: newsRows,
      theme:'grid', styles: baseStyles,
      columnStyles: { 0:{ cellWidth:60 }, 1:{ cellWidth:95, textColor:[110,116,126] }, 2:{ textColor:[37,99,235] } },
      margin:{ left:M, right:M },
      didDrawCell: (d) => {
        if (d.section === 'body' && d.column.index === 2 && links[d.row.index]) {
          doc.link(d.cell.x, d.cell.y, d.cell.width, d.cell.height, { url: links[d.row.index] });
        }
      },
    });
  }

  const pages = doc.internal.getNumberOfPages();
  for (let p = 1; p <= pages; p++) {
    doc.setPage(p);
    const h = doc.internal.pageSize.getHeight();
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150,150,150);
    doc.text('NomosLab - Source : ' + fiche.source + ' · Exporté le ' + dateStr, M, h - 20);
    doc.text('Page ' + p + '/' + pages, pageW - M, h - 20, { align:'right' });
  }

  doc.save(fiche.slug + '.pdf');
}

/* ── Rendu Excel (SheetJS) ── */
async function exportFicheExcel(fiche) {
  await loadExportScript(EXPORT_LIBS.xlsx);
  const XLSX = window.XLSX;
  const dateStr = new Date().toLocaleDateString('fr-FR', { year:'numeric', month:'long', day:'numeric' });
  const wb = XLSX.utils.book_new();

  const aoa = [ [fiche.docTitle.toUpperCase() + ' — FRANCE MONITOR'], [fiche.name], [] ];
  if (fiche.bio) aoa.push(['Biographie', fiche.bio], []);
  fiche.sections.forEach(sec => {
    aoa.push([sec.title.toUpperCase(), '']);
    sec.rows.forEach(r => aoa.push(r));
    aoa.push([]);
  });
  aoa.push(['Source', fiche.source], ['Exporté le', dateStr]);
  const ws1 = XLSX.utils.aoa_to_sheet(aoa);
  ws1['!cols'] = [{ wch:28 }, { wch:72 }];
  XLSX.utils.book_append_sheet(wb, ws1, 'Fiche');

  if (fiche.votes) {
    const ws = XLSX.utils.aoa_to_sheet([ fiche.votes.columns, ...fiche.votes.rows ]);
    ws['!cols'] = fiche.votes.columns.map((c, i) => ({ wch: i === 1 ? 70 : 16 }));
    if (fiche.votes.rows.length) ws['!autofilter'] = { ref: XLSX.utils.encode_range({ s:{ r:0, c:0 }, e:{ r:0, c:fiche.votes.columns.length - 1 } }) };
    XLSX.utils.book_append_sheet(wb, ws, 'Votes');
  }

  const ws3 = XLSX.utils.aoa_to_sheet([ ['Date','Source','Titre','Lien'], ...fiche.news.map(n => [n.date, n.source, n.title, n.link]) ]);
  ws3['!cols'] = [{ wch:13 }, { wch:24 }, { wch:70 }, { wch:42 }];
  if (fiche.news.length) ws3['!autofilter'] = { ref:'A1:D1' };
  XLSX.utils.book_append_sheet(wb, ws3, 'Actualités');

  XLSX.writeFile(wb, fiche.slug + '.xlsx');
}

/* ── Rendu Word (docx) ── */
async function exportFicheWord(fiche) {
  await loadExportScript(EXPORT_LIBS.docx);
  const D = window.docx;
  const dateStr = new Date().toLocaleDateString('fr-FR', { year:'numeric', month:'long', day:'numeric' });

  const cell = (text, o = {}) => new D.TableCell({
    width: o.width ? { size:o.width, type:D.WidthType.PERCENTAGE } : undefined,
    shading: o.fill ? { type:D.ShadingType.CLEAR, color:'auto', fill:o.fill } : undefined,
    margins: { top:60, bottom:60, left:110, right:110 },
    children: [ new D.Paragraph({ children:[ new D.TextRun({ text:String(text ?? ''), bold:o.bold, color:o.color, size:20 }) ] }) ],
  });
  const kvTable = (rows) => new D.Table({
    width: { size:100, type:D.WidthType.PERCENTAGE },
    rows: rows.map(([k, v]) => new D.TableRow({ children:[ cell(k, { bold:true, width:34, fill:'F3F4F6', color:'3B414A' }), cell(v, { width:66 }) ] })),
  });
  const heading = (text) => new D.Paragraph({ spacing:{ before:320, after:140 }, children:[ new D.TextRun({ text, bold:true, size:26, color:'0B0E14' }) ] });

  const children = [
    new D.Paragraph({ children:[ new D.TextRun({ text:fiche.docTitle, bold:true, size:22, color:'565D67' }) ] }),
    new D.Paragraph({ spacing:{ after:40 }, children:[ new D.TextRun({ text:fiche.name, bold:true, size:40, color:'0B0E14' }) ] }),
  ];
  fiche.subtitle.forEach((line, i) => children.push(new D.Paragraph({
    spacing: i === fiche.subtitle.length - 1 ? { after:80 } : undefined,
    children:[ new D.TextRun({ text:line, color:'565D67', size: i === 0 ? 22 : 20 }) ],
  })));

  if (fiche.photoUrl) {
    const buf = await fetchImageBuffer(fiche.photoUrl);
    if (buf) { try { children.splice(2, 0, new D.Paragraph({ spacing:{ before:40, after:80 }, children:[ new D.ImageRun({ type:'jpg', data:buf, transformation:{ width:96, height:120 } }) ] })); } catch (e) {} }
  }
  if (fiche.bio) children.push(new D.Paragraph({ spacing:{ after:60 }, children:[ new D.TextRun({ text:fiche.bio, size:20, color:'3B414A' }) ] }));

  fiche.sections.forEach(sec => { children.push(heading(sec.title), kvTable(sec.rows)); });

  if (fiche.votes) {
    const v = fiche.votes;
    children.push(heading(v.title + ' (' + v.rows.length + ')'));
    if (v.rows.length) {
      const w = v.widths?.word || v.columns.map(() => Math.floor(100 / v.columns.length));
      const headRow = new D.TableRow({ tableHeader:true, children: v.columns.map((c, i) => cell(c, { bold:true, fill:'0B0E14', color:'FFFFFF', width:w[i] })) });
      const rows = v.rows.map(r => new D.TableRow({ children: r.map((val, i) => cell(val, { width:w[i], bold: i === v.colorCol, color: i === v.colorCol ? votePosHex(val) : undefined })) }));
      children.push(new D.Table({ width:{ size:100, type:D.WidthType.PERCENTAGE }, rows:[headRow, ...rows] }));
    } else {
      children.push(new D.Paragraph({ children:[ new D.TextRun({ text:'Aucune donnée disponible.', italics:true, color:'8A9099', size:20 }) ] }));
    }
  }

  children.push(heading('Actualités récentes (' + fiche.news.length + ')'));
  if (fiche.news.length) {
    fiche.news.forEach((n, i) => {
      children.push(new D.Paragraph({ spacing:{ before: i ? 120 : 0 }, children:[ new D.TextRun({ text:(n.date || '') + (n.source ? '  ·  ' + n.source : ''), color:'8A9099', size:16 }) ] }));
      const titleRun = n.link
        ? new D.ExternalHyperlink({ link:n.link, children:[ new D.TextRun({ text:n.title, color:'2563EB', underline:{}, size:20 }) ] })
        : new D.TextRun({ text:n.title, size:20, color:'0B0E14' });
      children.push(new D.Paragraph({ children:[ titleRun ] }));
    });
  } else {
    children.push(new D.Paragraph({ children:[ new D.TextRun({ text:'Aucune actualité récente.', italics:true, color:'8A9099', size:20 }) ] }));
  }

  children.push(new D.Paragraph({ spacing:{ before:320 }, children:[ new D.TextRun({ text:'Source : ' + fiche.source + ' · Exporté le ' + dateStr + ' via NomosLab', italics:true, color:'8A9099', size:18 }) ] }));

  const docFile = new D.Document({ creator:'NomosLab', title: fiche.docTitle + ' — ' + fiche.name, sections:[{ properties:{}, children }] });
  const blob = await D.Packer.toBlob(docFile);
  triggerDownload(blob, fiche.slug + '.docx');
}

/* Bouton + menu déroulant d'export (présentation générique). `run(fmt)` fait le travail. */
function ExportDropdown({ run, disabled, title, label }) {
  const [open, setOpen] = React.useState(false);
  const [busy, setBusy] = React.useState(null);
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const onDown = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, [open]);

  async function doRun(fmt) {
    if (busy) return;
    setBusy(fmt);
    try {
      await run(fmt);
      setOpen(false);
    } catch (e) {
      console.error('[export]', e);
      alert("L'export a échoué. Vérifiez votre connexion internet puis réessayez.");
    } finally {
      setBusy(null);
    }
  }

  const items = [
    { fmt:'pdf',   label:'PDF',   sub:'Document imprimable', icon:'file-text', color:'#E1000F' },
    { fmt:'excel', label:'Excel', sub:'Classeur .xlsx',      icon:'table-2',   color:'#0E8A52' },
    { fmt:'word',  label:'Word',  sub:'Document .docx',      icon:'file-type', color:'#2563EB' },
  ];
  const off = disabled || !!busy;

  return (
    <div ref={ref} style={{ position:'relative' }}>
      <button onClick={() => { if (!disabled) setOpen(o => !o); }} disabled={off}
        style={{ display:'flex', alignItems:'center', gap:7, padding:'8px 16px', borderRadius:'var(--radius-md)',
                 border:'1px solid var(--border)', background:'var(--surface)', cursor: off ? 'default' : 'pointer',
                 fontFamily:'var(--font-sans)', fontSize:13.5, fontWeight:500, color:'var(--text-secondary)', whiteSpace:'nowrap',
                 opacity: disabled ? 0.5 : 1, transition:'border-color 120ms,color 120ms' }}
        onMouseEnter={e => { if (!off) { e.currentTarget.style.borderColor='var(--border-strong)'; e.currentTarget.style.color='var(--ink)'; } }}
        onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-secondary)'; }}>
        <Icon n="download" s={14} />
        {busy ? 'Génération…' : (label || 'Exporter')}
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 6px)', right:0, background:'var(--surface)',
                      border:'1px solid var(--border)', borderRadius:'var(--radius-md)', boxShadow:'var(--shadow-lg)',
                      zIndex:200, minWidth:238, overflow:'hidden', padding:5 }}>
          <div style={{ fontSize:10.5, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--text-tertiary)', padding:'8px 12px 6px' }}>{title || 'Exporter'}</div>
          {items.map(it => (
            <button key={it.fmt} onClick={() => doRun(it.fmt)} disabled={!!busy}
              style={{ display:'flex', alignItems:'center', gap:11, width:'100%', padding:'9px 12px', borderRadius:'var(--radius-sm)',
                       background:'none', border:'none', cursor: busy ? 'default' : 'pointer', textAlign:'left', fontFamily:'var(--font-sans)',
                       opacity: busy && busy !== it.fmt ? 0.45 : 1, transition:'background 100ms' }}
              onMouseEnter={e => { if (!busy) e.currentTarget.style.background='var(--surface-hover)'; }}
              onMouseLeave={e => { e.currentTarget.style.background='none'; }}>
              <span style={{ display:'inline-flex', width:30, height:30, borderRadius:'var(--radius-sm)', alignItems:'center', justifyContent:'center', background:it.color+'14', flex:'none' }}>
                <Icon n={it.icon} s={16} color={it.color} />
              </span>
              <span style={{ flex:1 }}>
                <span style={{ display:'block', fontSize:13.5, fontWeight:600, color:'var(--ink)' }}>{it.label}</span>
                <span style={{ display:'block', fontSize:11.5, color:'var(--text-tertiary)', marginTop:1 }}>{it.sub}</span>
              </span>
              {busy === it.fmt && <span style={{ fontSize:11, color:'var(--text-tertiary)' }}>…</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function depPct(v, digits = 0) {
  return v === null || v === undefined ? '—' : (v * 100).toLocaleString('fr-FR', { maximumFractionDigits: digits }) + ' %';
}
function depDateFR(iso) {
  return iso ? String(iso).slice(0, 10).split('-').reverse().join('/') : '—';
}

/* Cache des fiches déjà chargées (une par député, ~40-70 Ko). */
const _ficheCache = {};
function useDeputeFiche(depId) {
  const [state, setState] = React.useState({ loading: true, fiche: null, error: false });
  React.useEffect(() => {
    if (!depId) return;
    let alive = true;
    setState({ loading: true, fiche: null, error: false });
    const load = _ficheCache[depId]
      || (_ficheCache[depId] = fetch('public/data/deputes/PA' + depId + '.json')
          .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
          .catch(e => { delete _ficheCache[depId]; throw e; }));
    load
      .then(f => { if (alive) setState({ loading: false, fiche: f, error: false }); })
      .catch(() => { if (alive) setState({ loading: false, fiche: null, error: true }); });
    return () => { alive = false; };
  }, [depId]);
  return state;
}

/* ============================================================
   PROFIL DE CIRCONSCRIPTION
   Données : public/data/circos/index.json + un fichier par circo
   (généré par scripts/build-circos.js — INSEE RP 2022, Filosofi
   2021, législatives 2024). Matching député → circo par nom de
   département normalisé + numéro de circonscription.
   ============================================================ */

let _circoIndexPromise = null;
const _circoCache = {};

function circoNorm(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
}
/* deputes.json et les fichiers électoraux ne nomment pas toujours les
   départements à l'identique. */
const CIRCO_DEPT_ALIAS = {
  reunion: 'lareunion',
  saintbarthelemyetsaintmartin: 'saintmartinsaintbarthelemy',
  francaisetablishorsdefrance: 'francaisetablishorsdefrance',
};

function useCircoProfil(dep) {
  const [state, setState] = React.useState({ loading: true, circo: null, national: null, error: false });
  React.useEffect(() => {
    if (!dep) return;
    let alive = true;
    setState({ loading: true, circo: null, national: null, error: false });
    _circoIndexPromise = _circoIndexPromise
      || fetch('public/data/circos/index.json')
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .catch(e => { _circoIndexPromise = null; throw e; });
    _circoIndexPromise
      .then(idx => {
        const m = /^(\d+)/.exec(dep.circonscription || '');
        const numero = m ? parseInt(m[1], 10) : null;
        let key = circoNorm(dep.dept);
        key = CIRCO_DEPT_ALIAS[key] || key;
        const entry = idx.circos.find(c => c.numero === numero && (circoNorm(c.deptNom) === key || (CIRCO_DEPT_ALIAS[circoNorm(c.deptNom)] || circoNorm(c.deptNom)) === key));
        if (!entry) throw new Error('circo introuvable');
        const load = _circoCache[entry.id]
          || (_circoCache[entry.id] = fetch('public/data/circos/' + entry.id + '.json')
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
            .catch(e => { delete _circoCache[entry.id]; throw e; }));
        return load.then(circo => { if (alive) setState({ loading: false, circo, national: idx.national, error: false }); });
      })
      .catch(() => { if (alive) setState({ loading: false, circo: null, national: null, error: true }); });
    return () => { alive = false; };
  }, [dep && dep.id]);
  return state;
}

/* Jauge horizontale avec repère de la moyenne du groupe. */
function DepGauge({ label, value, moyenne, color }) {
  const pct = value === null || value === undefined ? 0 : Math.max(0, Math.min(1, value)) * 100;
  const moy = moyenne === null || moyenne === undefined ? null : Math.max(0, Math.min(1, moyenne)) * 100;
  const delta = value !== null && value !== undefined && moy !== null ? (value - moyenne) * 100 : null;
  return (
    <div style={{ flex:1, minWidth:200 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:7 }}>
        <span style={{ fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--text-tertiary)' }}>{label}</span>
        <span style={{ fontFamily:'var(--font-mono)', fontSize:22, fontWeight:800, color: value === null ? 'var(--text-tertiary)' : 'var(--ink)' }}>{depPct(value)}</span>
      </div>
      <div style={{ position:'relative', height:10, borderRadius:5, background:'var(--gray-100)', overflow:'visible' }}>
        <div style={{ position:'absolute', inset:0, borderRadius:5, overflow:'hidden' }}>
          <div style={{ width:pct + '%', height:'100%', background:color, borderRadius:5, transition:'width 400ms ease' }} />
        </div>
        {moy !== null && (
          <div title={'Moyenne du groupe : ' + depPct(moyenne)} style={{ position:'absolute', left:'calc(' + moy + '% - 1.5px)', top:-3, width:3, height:16, borderRadius:2, background:'var(--ink)' }} />
        )}
      </div>
      <div style={{ marginTop:6, fontSize:11.5, color:'var(--text-tertiary)' }}>
        {moy === null ? (value === null ? 'Donnée indisponible' : 'Pas de moyenne de groupe')
          : <>Moyenne du groupe : <strong style={{ color:'var(--text-secondary)' }}>{depPct(moyenne)}</strong>
            {delta !== null && Math.abs(delta) >= 0.5 && (
              <span style={{ marginLeft:6, fontWeight:700, color: delta >= 0 ? 'var(--pos)' : 'var(--neg)' }}>
                {delta >= 0 ? '+' : '−'}{Math.abs(delta).toLocaleString('fr-FR', { maximumFractionDigits:0 })} pts
              </span>
            )}</>}
      </div>
    </div>
  );
}

/* Résumé texte de la fiche pour le bouton « Copier la fiche » (collé tel
   quel dans les notes des consultants). */
function buildDeputeClipboard(dep, fiche) {
  const s = fiche.stats || {};
  const m = fiche.mandat || {};
  const circo = m.circonscription || {};
  const L = [];
  L.push('FICHE DÉPUTÉ — ' + fiche.identite.nomComplet + (m.groupe ? ' (' + m.groupe.short + ')' : ''));
  L.push((fiche.identite.female ? 'Députée' : 'Député') + ' de la ' + (circo.libelle || '—') + ' de ' + (circo.departement || '—') + (circo.region ? ' (' + circo.region + ')' : ''));
  L.push('Groupe : ' + (m.groupe ? m.groupe.name : '—'));
  (m.commissions || []).forEach(c => L.push('Commission : ' + c.nom + (c.qualite && c.qualite !== 'Membre' ? ' (' + c.qualite + ')' : '')));
  if (fiche.identite.profession) L.push('Profession : ' + fiche.identite.profession);
  L.push('Mandat depuis le ' + depDateFR(m.dateDebut) + (m.causeMandat ? ' (' + m.causeMandat + ')' : ''));
  L.push('');
  L.push('SIGNAUX STRATÉGIQUES');
  L.push('Participation aux scrutins : ' + depPct(s.taux_participation) + (s.moyenne_groupe_participation != null ? ' (moyenne du groupe : ' + depPct(s.moyenne_groupe_participation) + ')' : ''));
  if (fiche.loyaute_applicable) {
    L.push('Loyauté au groupe : ' + depPct(s.taux_loyaute, 1) + (s.moyenne_groupe_loyaute != null ? ' (moyenne du groupe : ' + depPct(s.moyenne_groupe_loyaute, 1) + ')' : ''));
    L.push('Votes dissidents : ' + (fiche.votes_rebelles || []).length);
    (fiche.votes_rebelles || []).slice(0, 5).forEach(v =>
      L.push('  · ' + depDateFR(v.d) + ' — ' + v.t + ' (a voté ' + (DEP_POS_LABELS[v.p] || v.p).toLowerCase() + ', groupe : ' + (DEP_POS_LABELS[v.g] || v.g).toLowerCase() + ')'));
  } else {
    L.push('Loyauté au groupe : non applicable (député non inscrit)');
  }
  L.push('');
  L.push('ACTIVITÉ PARLEMENTAIRE');
  L.push('Amendements : ' + (s.nb_amendements || 0) + ' déposés, ' + (s.nb_amendements_adoptes || 0) + ' adoptés' + (s.taux_adoption_amendements != null ? ' (taux d’adoption : ' + depPct(s.taux_adoption_amendements) + ')' : '') + ', ' + (s.nb_amendements_cosignes || 0) + ' cosignés');
  L.push('Questions : ' + (s.nb_questions_ecrites || 0) + ' écrites, ' + (s.nb_questions_orales || 0) + ' orales, ' + (s.nb_questions_gouvernement || 0) + ' au Gouvernement');
  L.push('Rapports / missions : ' + (s.nb_rapports || 0));
  if ((fiche.collaborateurs || []).length) {
    L.push('');
    L.push('ÉQUIPE : ' + fiche.collaborateurs.map(c => (c.prenom + ' ' + c.nom).trim()).join(', '));
  }
  L.push('');
  if (fiche.liens && fiche.liens.page_an) L.push('Page AN : ' + fiche.liens.page_an);
  if (fiche.liens && fiche.liens.hatvp) L.push('Déclaration d’intérêts (HATVP) : ' + fiche.liens.hatvp);
  L.push('Source : NomosLab · données Assemblée nationale (Licence Ouverte 2.0)');
  return L.join('\n');
}

/* ============================================================
   CRM LÉGER SUR UNE FICHE DÉPUTÉ (partie D)
   Visible uniquement si l'utilisateur est connecté ET que ce
   député est suivi dans au moins un dossier de son organisation.
   Notes datées + tags colorés, filtrés par RLS côté Supabase :
   aucune logique d'étanchéité inter-organisations côté frontend.
   Le texte libre est rendu comme texte (jamais dangerouslySetInnerHTML).
   ============================================================ */
const CRM_TAG_COULEURS = ['#2563EB', '#0E8A52', '#C9760D', '#7C5CFC', '#E1000F', '#0E9BA8', '#B45309', '#565D67'];

function DeputeCRM({ dep }) {
  const { Button: Btn } = window.FranceMonitorDesignSystem_5343d8;
  const { user, orgState } = React.useContext(AuthOrgContext);
  const org = orgState && orgState.org;
  const actif = !!(user && org && isSupabaseConfigured() && dep && dep.id);

  const [suivis, setSuivis] = React.useState(null);    // dossiers de l'org suivant ce député
  const [dossierId, setDossierId] = React.useState(null);
  const [notes, setNotes] = React.useState(null);
  const [tagsOrg, setTagsOrg] = React.useState([]);    // référentiel de tags de l'org
  const [tagsSuivi, setTagsSuivi] = React.useState([]); // tag_id assignés au (dossier, député)
  const [contenu, setContenu] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const [nouveauTag, setNouveauTag] = React.useState(false);
  const [tagLibelle, setTagLibelle] = React.useState('');
  const [tagCouleur, setTagCouleur] = React.useState(CRM_TAG_COULEURS[0]);

  // 1. Dossiers de l'organisation dans lesquels ce député est suivi.
  React.useEffect(() => {
    if (!actif) { setSuivis(null); return; }
    let alive = true;
    supabaseClient.from('dossier_parlementaires')
      .select('dossier_id, dossiers_clients!inner(id, nom_client_final, archive)')
      .eq('depute_id', dep.id)
      .then(({ data, error }) => {
        if (!alive) return;
        if (error) { setSuivis([]); return; }
        const list = (data || []).map(r => ({ dossier_id: r.dossier_id, nom: r.dossiers_clients.nom_client_final, archive: r.dossiers_clients.archive }));
        setSuivis(list);
        setDossierId(prev => prev && list.some(l => l.dossier_id === prev) ? prev : (list[0] ? list[0].dossier_id : null));
      });
    return () => { alive = false; };
  }, [actif, dep && dep.id]);

  // 2. Référentiel de tags de l'organisation.
  React.useEffect(() => {
    if (!actif) return;
    let alive = true;
    supabaseClient.from('tags').select('*').eq('organisation_id', org.id).order('libelle')
      .then(({ data }) => { if (alive) setTagsOrg(data || []); });
    return () => { alive = false; };
  }, [actif, org && org.id]);

  // 3. Notes + tags du (dossier sélectionné, député).
  const chargerDossier = React.useCallback(async () => {
    if (!actif || !dossierId) { setNotes(null); setTagsSuivi([]); return; }
    const [n, st] = await Promise.all([
      supabaseClient.from('notes_parlementaires').select('*').eq('dossier_id', dossierId).eq('depute_id', dep.id).order('cree_le', { ascending: false }),
      supabaseClient.from('suivi_tags').select('tag_id').eq('dossier_id', dossierId).eq('depute_id', dep.id),
    ]);
    setNotes(n.error ? [] : (n.data || []));
    setTagsSuivi(st.error ? [] : (st.data || []).map(r => r.tag_id));
  }, [actif, dossierId, dep && dep.id]);

  React.useEffect(() => { chargerDossier(); }, [chargerDossier]);

  async function ajouterNote(e) {
    e.preventDefault();
    if (!contenu.trim()) return;
    setBusy(true); setMsg(null);
    const { error } = await supabaseClient.from('notes_parlementaires')
      .insert({ dossier_id: dossierId, depute_id: dep.id, auteur_id: user.id, contenu: contenu.trim() });
    setBusy(false);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setContenu(''); chargerDossier();
  }

  async function supprimerNote(id) {
    const { error } = await supabaseClient.from('notes_parlementaires').delete().eq('id', id);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    chargerDossier();
  }

  async function basculerTag(tag) {
    const assigne = tagsSuivi.includes(tag.id);
    if (assigne) {
      setTagsSuivi(prev => prev.filter(id => id !== tag.id));
      const { error } = await supabaseClient.from('suivi_tags').delete()
        .eq('dossier_id', dossierId).eq('depute_id', dep.id).eq('tag_id', tag.id);
      if (error) { setMsg({ tone: 'err', text: error.message }); chargerDossier(); }
    } else {
      setTagsSuivi(prev => [...prev, tag.id]);
      const { error } = await supabaseClient.from('suivi_tags')
        .insert({ dossier_id: dossierId, depute_id: dep.id, tag_id: tag.id, ajoute_par: user.id });
      if (error) { setMsg({ tone: 'err', text: error.message }); chargerDossier(); }
    }
  }

  async function creerTag(e) {
    e.preventDefault();
    if (!tagLibelle.trim()) return;
    setBusy(true); setMsg(null);
    const { data, error } = await supabaseClient.from('tags')
      .insert({ organisation_id: org.id, libelle: tagLibelle.trim(), couleur: tagCouleur })
      .select().single();
    setBusy(false);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setTagsOrg(prev => [...prev, data].sort((a, b) => a.libelle.localeCompare(b.libelle, 'fr')));
    setTagLibelle(''); setNouveauTag(false);
    if (data) basculerTag(data);   // assigne immédiatement le tag créé
  }

  if (!actif || suivis === null) return null;
  if (suivis.length === 0) return null;   // député non suivi : pas de section CRM

  const dossierCourant = suivis.find(s => s.dossier_id === dossierId);
  const auteurLabel = (n) => n.auteur_id === user.id ? 'Vous' : 'Collaborateur·rice';

  /* Export PDF marque blanche des notes du dossier sur ce parlementaire. */
  function exportNotesPdf() {
    if (!notes || !notes.length) return;
    const tagsAssignes = tagsOrg.filter(t => tagsSuivi.includes(t.id));
    const tagsHtml = tagsAssignes.length
      ? '<p style="font-size:12px">Tags : ' + tagsAssignes.map(t => '<span style="display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;color:#fff;background:' + (t.couleur || '#565D67') + ';margin-right:5px">' + escapeHtml(t.libelle) + '</span>').join('') + '</p>'
      : '';
    const notesHtml = notes.map(n => `<div class="wl-note">
      <div>${escapeHtml(n.contenu)}</div>
      <div class="meta">${auteurLabel(n)} · ${new Date(n.cree_le).toLocaleString('fr-FR', { dateStyle: 'medium', timeStyle: 'short' })}</div>
    </div>`).join('');
    imprimerMarqueBlanche(org, {
      titre: dep.nomComplet,
      sousTitre: (dep.groupe ? dep.groupe.name : 'Non inscrit') + (dep.dept ? ' · ' + dep.dept : '') + ' — Dossier ' + (dossierCourant ? dossierCourant.nom : ''),
      corpsHtml: tagsHtml + '<div class="wl-sec">Notes de suivi</div>' + notesHtml,
    });
  }

  return (
    <div style={{ border: '1px solid var(--blue-200)', borderRadius: 'var(--radius-lg)', background: 'var(--blue-50)', padding: '18px 20px 20px' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14, flexWrap: 'wrap' }}>
        <Icon n="notebook-pen" s={15} color="var(--blue-france)" />
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--blue-france)' }}>Suivi CRM · privé {org.nom}</span>
        {suivis.length > 1 && (
          <select value={dossierId || ''} onChange={(e) => setDossierId(e.target.value)}
            style={{ marginLeft: 'auto', padding: '5px 10px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 12, fontFamily: 'var(--font-sans)', background: 'white', cursor: 'pointer' }}>
            {suivis.map(s => <option key={s.dossier_id} value={s.dossier_id}>{s.nom}{s.archive ? ' (archivé)' : ''}</option>)}
          </select>
        )}
        {suivis.length === 1 && (
          <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--text-secondary)' }}>Dossier {dossierCourant ? dossierCourant.nom : ''}</span>
        )}
      </div>

      {msg && (
        <div style={{ borderRadius: 'var(--radius-md)', padding: '8px 11px', fontSize: 12.5, marginBottom: 12,
          background: 'var(--red-50)', color: 'var(--red-700)', border: '1px solid var(--red-100)' }}>{msg.text}</div>
      )}

      {/* Tags colorés assignables */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.05em', textTransform: 'uppercase', color: 'var(--text-tertiary)', marginBottom: 8 }}>Tags</div>
        <div style={{ display: 'flex', gap: 7, flexWrap: 'wrap', alignItems: 'center' }}>
          {tagsOrg.map(tag => {
            const on = tagsSuivi.includes(tag.id);
            const c = tag.couleur || 'var(--gray-500)';
            return (
              <button key={tag.id} onClick={() => basculerTag(tag)}
                style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '4px 11px', borderRadius: 99, cursor: 'pointer',
                  fontSize: 11.5, fontWeight: 600, fontFamily: 'var(--font-sans)', transition: 'all .12s',
                  border: '1px solid ' + (on ? c : 'var(--border)'),
                  background: on ? hexRgba(c, 0.12) : 'var(--surface)', color: on ? c : 'var(--text-secondary)' }}>
                <span style={{ width: 7, height: 7, borderRadius: 99, background: c }} />
                {tag.libelle}
                {on && <Icon n="check" s={12} />}
              </button>
            );
          })}
          {nouveauTag ? (
            <form onSubmit={creerTag} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 99, padding: '3px 6px 3px 10px' }}>
              {CRM_TAG_COULEURS.map(c => (
                <button key={c} type="button" onClick={() => setTagCouleur(c)} title="Couleur"
                  style={{ width: 14, height: 14, borderRadius: 99, background: c, border: tagCouleur === c ? '2px solid var(--ink)' : '2px solid transparent', cursor: 'pointer', padding: 0 }} />
              ))}
              <input autoFocus value={tagLibelle} onChange={(e) => setTagLibelle(e.target.value)} maxLength={40} placeholder="Nom du tag"
                style={{ border: 'none', outline: 'none', fontSize: 12, fontFamily: 'var(--font-sans)', width: 100, background: 'transparent' }} />
              <button type="submit" disabled={busy || !tagLibelle.trim()} style={{ border: 'none', background: 'none', color: 'var(--accent)', cursor: 'pointer', padding: 2 }}><Icon n="check" s={15} /></button>
              <button type="button" onClick={() => { setNouveauTag(false); setTagLibelle(''); }} style={{ border: 'none', background: 'none', color: 'var(--text-tertiary)', cursor: 'pointer', padding: 2 }}><Icon n="x" s={15} /></button>
            </form>
          ) : (
            <button onClick={() => setNouveauTag(true)}
              style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '4px 11px', borderRadius: 99, cursor: 'pointer',
                fontSize: 11.5, fontWeight: 600, fontFamily: 'var(--font-sans)', border: '1px dashed var(--border-strong)', background: 'transparent', color: 'var(--text-secondary)' }}>
              <Icon n="plus" s={12} /> Nouveau tag
            </button>
          )}
        </div>
      </div>

      {/* Notes datées */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '.05em', textTransform: 'uppercase', color: 'var(--text-tertiary)' }}>
          Notes{notes ? ' (' + notes.length + ')' : ''}
        </span>
        {notes && notes.length > 0 && (
          <button onClick={exportNotesPdf} title="Exporter les notes en PDF (marque blanche)"
            style={{ marginLeft: 'auto', display: 'inline-flex', alignItems: 'center', gap: 4, border: '1px solid var(--border)', background: 'white', borderRadius: 'var(--radius-sm)', padding: '3px 9px', fontSize: 11.5, fontWeight: 600, color: 'var(--text-secondary)', cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>
            <Icon n="file-text" s={12} /> PDF cabinet
          </button>
        )}
      </div>
      <form onSubmit={ajouterNote} style={{ marginBottom: 14 }}>
        <textarea value={contenu} onChange={(e) => setContenu(e.target.value)} rows={2} maxLength={20000}
          placeholder="Ajouter une note datée sur ce parlementaire (contact, position, échange…)"
          style={{ width: '100%', boxSizing: 'border-box', padding: '9px 11px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 13, fontFamily: 'var(--font-sans)', resize: 'vertical', outline: 'none', background: 'white' }} />
        <div style={{ display: 'flex', justifyContent: 'flex-end', marginTop: 6 }}>
          <Btn type="submit" variant="primary" size="sm" disabled={!contenu.trim() || busy} icon={<Icon n="plus" s={13} />}>Ajouter la note</Btn>
        </div>
      </form>

      {notes === null ? (
        <div style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>Chargement…</div>
      ) : notes.length === 0 ? (
        <div style={{ fontSize: 12.5, color: 'var(--text-tertiary)' }}>Aucune note pour l'instant sur ce parlementaire dans ce dossier.</div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {notes.map(n => (
            <div key={n.id} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)', padding: '10px 12px' }}>
              <div style={{ fontSize: 13, color: 'var(--ink)', lineHeight: 1.5, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>{n.contenu}</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 7, fontSize: 11, color: 'var(--text-tertiary)' }}>
                <span>{auteurLabel(n)}</span>
                <span>·</span>
                <span>{new Date(n.cree_le).toLocaleString('fr-FR', { dateStyle: 'medium', timeStyle: 'short' })}</span>
                {n.modifie_le && n.modifie_le !== n.cree_le && <span>· modifiée</span>}
                {n.auteur_id === user.id && (
                  <button onClick={() => supprimerNote(n.id)} title="Supprimer la note"
                    style={{ marginLeft: 'auto', border: 'none', background: 'none', color: 'var(--red-600)', cursor: 'pointer', padding: 2 }}>
                    <Icon n="trash-2" s={13} />
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DeputeView({ dep, onBack }) {
  const { fiche, loading: ficheLoading, error: ficheError } = useDeputeFiche(dep?.id);
  const { news: allDepNews, loading: newsLoading } = useDeputesNews();
  const { orgState } = React.useContext(AuthOrgContext);
  const orgMarque = orgState && orgState.org;
  const depNews = (dep && allDepNews[dep.id]) || [];
  const [tab, setTab] = React.useState('votes');
  const [voteFilter, setVoteFilter] = React.useState('');
  const [amFilter, setAmFilter] = React.useState('');
  const [qFilter, setQFilter] = React.useState('');
  const [copied, setCopied] = React.useState(false);
  const gc = dep?.groupe?.color || '#9AA3AF';

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onBack(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onBack]);

  React.useEffect(() => { setTab('votes'); setVoteFilter(''); setAmFilter(''); setQFilter(''); }, [dep?.id]);

  if (!dep) return null;

  const s = fiche ? fiche.stats : null;
  const rebelles = fiche ? (fiche.votes_rebelles || []) : [];
  const loyApplicable = fiche ? fiche.loyaute_applicable !== false : true;

  /* Compatibilité avec l'export PDF/Excel/Word existant (buildDeputeFiche). */
  const exportStats = fiche && s ? {
    pour: s.pour || 0, contre: s.contre || 0, abstention: s.abstention || 0,
    absent: Math.max(0, (s.nb_scrutins_mandat || 0) - (s.nb_votes_exprimes || 0) - (s.nb_non_votant || 0)),
    votes: (fiche.derniers_votes || []).map(v => ({
      date: v.d, titre: v.t,
      position: (DEP_POS_LABELS[v.p] || v.p || '').toLowerCase(),
      parDelegation: !!v.del,
    })),
  } : null;

  const copyFiche = () => {
    if (!fiche) return;
    const txt = buildDeputeClipboard(dep, fiche);
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 2200); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(done).catch(() => {});
    } else {
      const ta = document.createElement('textarea');
      ta.value = txt; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); done(); } catch (e) {}
      document.body.removeChild(ta);
    }
  };

  /* Export marque blanche d'une fiche de synthèse (en-tête cabinet). */
  const exportFicheCabinet = () => {
    const l = (k, v) => v ? `<tr><td style="width:200px;color:#7B828D">${escapeHtml(k)}</td><td>${escapeHtml(v)}</td></tr>` : '';
    const ident = `<div class="wl-sec">Identité & mandat</div><table><tbody>
      ${l('Groupe', dep.groupe ? dep.groupe.name : 'Non inscrit')}
      ${l('Circonscription', (dep.dept || '') + (dep.circonscription ? ' · ' + dep.circonscription : ''))}
      ${l('Profession', dep.profession)}
      ${l('Commission', fiche && fiche.commission)}
      ${fiche && fiche.mandat ? l('Mandat depuis', depDateFR(fiche.mandat.dateDebut)) : ''}
    </tbody></table>`;
    const stats = s ? `<div class="wl-sec">Signaux stratégiques</div><table><tbody>
      ${l('Participation aux scrutins', (s.taux_participation != null ? s.taux_participation + ' %' : ''))}
      ${l('Loyauté au groupe', (fiche.loyaute_applicable !== false && s.taux_loyaute != null ? s.taux_loyaute + ' %' : 'Non applicable'))}
      ${l('Votes exprimés', (s.nb_votes_exprimes != null ? s.nb_votes_exprimes + ' sur ' + (s.nb_scrutins_mandat || 0) + ' scrutins' : ''))}
    </tbody></table>` : '';
    imprimerMarqueBlanche(orgMarque, { titre: dep.nomComplet, sousTitre: 'Fiche de synthèse parlementaire', corpsHtml: ident + stats });
  };

  const filtVotes = fiche ? (fiche.derniers_votes || []).filter(v => !voteFilter.trim() || (v.t || '').toLowerCase().includes(voteFilter.toLowerCase())) : [];
  const filtAm = fiche ? (fiche.amendements || []).filter(a => !amFilter.trim() || ((a.t || '') + ' ' + (a.div || '') + ' ' + (a.num || '')).toLowerCase().includes(amFilter.toLowerCase())) : [];
  const filtQ = fiche ? (fiche.questions || []).filter(q => !qFilter.trim() || ((q.t || '') + ' ' + (q.r || '') + ' ' + (q.m || '')).toLowerCase().includes(qFilter.toLowerCase())) : [];

  const nbQuestions = s ? (s.nb_questions_ecrites || 0) + (s.nb_questions_orales || 0) + (s.nb_questions_gouvernement || 0) : 0;
  const TABS = [
    { id:'votes',  label:'Votes' },
    { id:'circo',  label:'Circonscription' },
    { id:'amend',  label:'Amendements' + (s && s.nb_amendements ? ' (' + s.nb_amendements + ')' : '') },
    { id:'quest',  label:'Questions' + (nbQuestions ? ' (' + nbQuestions + ')' : '') },
    { id:'rapports', label:'Rapports' + (s && s.nb_rapports ? ' (' + s.nb_rapports + ')' : '') },
    { id:'equipe', label:'Équipe' },
    { id:'news',   label:'Actualités' + (depNews.length ? ' (' + depNews.length + ')' : '') },
  ];

  const liens = fiche ? fiche.liens : { page_an: 'https://www.assemblee-nationale.fr/dyn/deputes/PA' + dep.id, hatvp: null };
  const commissions = fiche ? (fiche.mandat.commissions || []) : [];

  const skeleton = (h) => <div style={{ height:h, borderRadius:'var(--radius-md)', background:'linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%)', backgroundSize:'200% 100%', animation:'dep-shimmer 1.2s infinite' }} />;

  const filterInput = (value, setValue, placeholder) => (
    <div style={{ display:'flex', alignItems:'center', gap:8, border:'1px solid var(--border)', borderRadius:'var(--radius-md)', padding:'6px 12px', background:'var(--surface)', minWidth:220 }}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color:'var(--text-tertiary)', flex:'none' }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" value={value} onChange={e => setValue(e.target.value)} placeholder={placeholder}
        style={{ border:'none', outline:'none', background:'transparent', fontFamily:'var(--font-sans)', fontSize:12.5, color:'var(--ink)', width:'100%' }} />
      {value && <button onClick={() => setValue('')} style={{ border:'none', background:'none', cursor:'pointer', color:'var(--text-tertiary)', padding:0, display:'flex' }}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>}
    </div>
  );

  const posBadge = (code, big) => {
    const st = DEP_POS_STYLE[code] || DEP_POS_STYLE.abs;
    return <span style={{ fontSize: big ? 11.5 : 11, fontWeight:700, color:st.color, background:st.bg, borderRadius:999, padding: big ? '4px 12px' : '3px 10px', whiteSpace:'nowrap' }}>{DEP_POS_LABELS[code] || code || '—'}</span>;
  };

  const tabHeader = (title, right) => (
    <div style={{ padding:'16px 24px 12px', borderBottom:'1px solid var(--border-subtle)', display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, flexWrap:'wrap' }}>
      <div style={{ fontFamily:'var(--font-sans)', fontSize:16.5, fontWeight:700, color:'var(--ink)' }}>{title}</div>
      {right}
    </div>
  );

  const emptyMsg = (msg) => <div style={{ padding:'42px 24px', textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>{msg}</div>;

  return (
    <div style={{ maxWidth:1480, margin:'0 auto', padding:'28px 24px 64px' }}>
      <style>{`
        @keyframes dep-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .dep-tab-btn{background:none;border:none;cursor:pointer;padding:13px 16px;font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--text-secondary);border-bottom:2px solid transparent;transition:color 120ms,border-color 120ms;white-space:nowrap}
        .dep-tab-btn:hover{color:var(--text)}
        .dep-tab-btn.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}
        .dep-vote-row{padding:14px 24px;border-bottom:1px solid var(--border-subtle);transition:background 100ms}
        .dep-vote-row:hover{background:var(--surface-hover)}
        .dep-vote-row:last-child{border-bottom:none}
        .dep-hdr-btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-md);padding:8px 14px;font-family:var(--font-sans);font-size:12.5px;font-weight:600;color:var(--text-secondary);cursor:pointer;text-decoration:none;transition:border-color 120ms,color 120ms;white-space:nowrap}
        .dep-hdr-btn:hover{border-color:var(--border-strong);color:var(--ink)}
        .dep-fiche-grid{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
        @media (max-width:900px){.dep-fiche-grid{grid-template-columns:1fr}.dep-signaux{flex-direction:column}}
      `}</style>

      {/* Barre retour + actions */}
      <div style={{ marginBottom:24, display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
        <button onClick={onBack} className="dep-hdr-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Retour aux députés
        </button>
        <span style={{ fontSize:12, color:'var(--text-tertiary)', fontFamily:'var(--font-sans)' }}>Assemblée nationale · XVIIe législature</span>
        <div style={{ marginLeft:'auto', display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          <button onClick={copyFiche} className="dep-hdr-btn" disabled={!fiche} style={ copied ? { borderColor:'var(--pos)', color:'var(--pos)' } : !fiche ? { opacity:0.5, cursor:'default' } : {} }>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">{copied ? <polyline points="20 6 9 17 4 12"/> : <><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></>}</svg>
            {copied ? 'Copié !' : 'Copier la fiche'}
          </button>
          {orgMarque && (
            <button onClick={exportFicheCabinet} className="dep-hdr-btn" disabled={!fiche} style={!fiche ? { opacity: 0.5, cursor: 'default' } : {}} title="Fiche de synthèse en marque blanche">
              <Icon n="file-text" s={13} /> Fiche cabinet
            </button>
          )}
          <FicheExportMenu getFiche={() => buildDeputeFiche(dep, exportStats, depNews)} />
        </div>
      </div>

      <div className="dep-fiche-grid">

        {/* ── Colonne gauche : identité & mandat ── */}
        <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'30px 24px 22px', display:'flex', flexDirection:'column', alignItems:'center', gap:13, textAlign:'center' }}>
            <DepAvatar dep={dep} size={110} />
            <div>
              <div style={{ fontFamily:'var(--font-sans)', fontSize:21, fontWeight:800, color:'var(--ink)', letterSpacing:'-0.025em', lineHeight:1.25, marginBottom:5 }}>{dep.nomComplet}</div>
              {dep.groupe && <div style={{ fontSize:13.5, color:'var(--text-secondary)', lineHeight:1.4 }}>{dep.groupe.name}</div>}
            </div>
            <div style={{ display:'flex', gap:7, flexWrap:'wrap', justifyContent:'center' }}>
              {dep.groupe && <span style={{ fontSize:12, fontWeight:700, color:gc, background:gc+'18', border:'1px solid '+gc+'35', borderRadius:999, padding:'4px 13px' }}>{dep.groupe.short}</span>}
              <span style={{ fontSize:12, fontWeight:600, color:'var(--text-secondary)', background:'var(--gray-100)', borderRadius:999, padding:'4px 13px' }}>{dep.female ? 'Députée' : 'Député'}</span>
            </div>

            {/* Liens sortants */}
            <div style={{ display:'flex', gap:8, width:'100%', marginTop:2 }}>
              <a href={liens.page_an} target="_blank" rel="noopener noreferrer" className="dep-hdr-btn" style={{ flex:1, justifyContent:'center' }}>
                Page AN <span style={{ fontSize:10 }}>↗</span>
              </a>
              {liens.hatvp && (
                <a href={liens.hatvp} target="_blank" rel="noopener noreferrer" className="dep-hdr-btn" style={{ flex:1, justifyContent:'center' }} title="Déclaration d'intérêts — HATVP">
                  HATVP <span style={{ fontSize:10 }}>↗</span>
                </a>
              )}
            </div>

            <div style={{ width:'100%', height:1, background:'var(--border)', margin:'4px 0 2px' }} />
            <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:9, textAlign:'left' }}>
              <div style={{ display:'flex', gap:9, fontSize:13, color:'var(--text-secondary)', alignItems:'flex-start' }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color:'var(--text-tertiary)', flex:'none', marginTop:1 }}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                <span>{dep.circonscription}<br/><span style={{ color:'var(--text-tertiary)', fontSize:12 }}>{dep.dept}{dep.region ? ' · ' + dep.region : ''}</span></span>
              </div>
              {commissions.map((c, i) => (
                <div key={i} style={{ display:'flex', gap:9, fontSize:13, color:'var(--text-secondary)', alignItems:'flex-start' }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color:'var(--text-tertiary)', flex:'none', marginTop:1 }}><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 21v-6h6v6"/></svg>
                  <span>{c.nom}{c.qualite && c.qualite !== 'Membre' && <span style={{ display:'block', fontSize:11.5, fontWeight:700, color:'var(--blue-france)' }}>{c.qualite}</span>}</span>
                </div>
              ))}
              {dep.profession && (
                <div style={{ display:'flex', gap:9, fontSize:13, color:'var(--text-secondary)', alignItems:'flex-start' }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color:'var(--text-tertiary)', flex:'none', marginTop:1 }}><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
                  <span>{dep.profession}</span>
                </div>
              )}
              {fiche && fiche.mandat.dateDebut && (
                <div style={{ display:'flex', gap:9, fontSize:13, color:'var(--text-secondary)', alignItems:'flex-start' }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{ color:'var(--text-tertiary)', flex:'none', marginTop:1 }}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  <span>Mandat depuis le {depDateFR(fiche.mandat.dateDebut)}
                    {fiche.mandat.causeMandat && fiche.mandat.causeMandat !== 'élections générales' && (
                      <span style={{ display:'block', fontSize:11.5, color:'var(--amber-700)', fontWeight:600 }}>{fiche.mandat.causeMandat}</span>
                    )}
                  </span>
                </div>
              )}
            </div>
          </div>

          <DeputeGroupesEtudes depId={dep.id} />
          <DeputeTravailleAvec fiche={fiche} />
          <DeputeCRM dep={dep} />

          <div style={{ fontSize:11, color:'var(--text-tertiary)', lineHeight:1.6, paddingLeft:4 }}>
            Source : Assemblée nationale · data.assemblee-nationale.fr · Licence Ouverte 2.0
            {fiche && fiche.updatedAt ? ' · actualisé le ' + depDateFR(fiche.updatedAt) : ''}
          </div>
        </div>

        {/* ── Colonne droite ── */}
        <div style={{ display:'flex', flexDirection:'column', gap:20, minWidth:0 }}>

          {/* Bloc SIGNAUX STRATÉGIQUES */}
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', padding:'20px 24px 22px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16 }}>
              <span style={{ width:8, height:8, borderRadius:2, background:'var(--blue-france)', flex:'none' }} />
              <span style={{ fontSize:11, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'var(--blue-france)' }}>Signaux stratégiques</span>
            </div>
            {ficheLoading ? (
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>{skeleton(56)}{skeleton(56)}{skeleton(90)}</div>
            ) : ficheError || !fiche ? (
              <div style={{ padding:'18px 0', fontSize:13, color:'var(--text-tertiary)' }}>
                Fiche indisponible pour ce député — les données seront régénérées au prochain build quotidien.
              </div>
            ) : (
              <>
                <div className="dep-signaux" style={{ display:'flex', gap:32, flexWrap:'wrap' }}>
                  <DepGauge label="Participation aux scrutins" value={s.taux_participation} moyenne={s.moyenne_groupe_participation} color={gc} />
                  {loyApplicable
                    ? <DepGauge label="Loyauté au groupe" value={s.taux_loyaute} moyenne={s.moyenne_groupe_loyaute} color={gc} />
                    : (
                      <div style={{ flex:1, minWidth:200 }}>
                        <div style={{ fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--text-tertiary)', marginBottom:7 }}>Loyauté au groupe</div>
                        <div style={{ fontSize:13, color:'var(--text-secondary)', background:'var(--gray-50)', border:'1px dashed var(--border)', borderRadius:'var(--radius-md)', padding:'12px 14px' }}>
                          Non applicable — député non inscrit (aucune ligne de groupe à suivre).
                        </div>
                      </div>
                    )}
                </div>
                <div style={{ display:'flex', gap:14, flexWrap:'wrap', marginTop:16, paddingTop:14, borderTop:'1px solid var(--border-subtle)', fontSize:12, color:'var(--text-tertiary)' }}>
                  <span><strong style={{ color:'var(--text-secondary)', fontFamily:'var(--font-mono)' }}>{(s.nb_votes_exprimes || 0).toLocaleString('fr-FR')}</strong> votes exprimés sur <strong style={{ color:'var(--text-secondary)', fontFamily:'var(--font-mono)' }}>{(s.nb_scrutins_mandat || 0).toLocaleString('fr-FR')}</strong> scrutins du mandat</span>
                  {s.nb_delegations > 0 && <span>dont {s.nb_delegations} par délégation</span>}
                  <span><strong style={{ color:'var(--pos)', fontFamily:'var(--font-mono)' }}>{s.pour || 0}</strong> pour · <strong style={{ color:'var(--neg)', fontFamily:'var(--font-mono)' }}>{s.contre || 0}</strong> contre · <strong style={{ color:'var(--amber-700)', fontFamily:'var(--font-mono)' }}>{s.abstention || 0}</strong> abst.</span>
                </div>

                {/* Encadré votes dissidents */}
                {loyApplicable && (
                  <div style={{ marginTop:16, border:'1px solid ' + (rebelles.length ? 'var(--amber-200, #FDE68A)' : 'var(--border)'), background: rebelles.length ? 'var(--amber-50)' : 'var(--gray-50)', borderRadius:'var(--radius-md)', overflow:'hidden' }}>
                    <div style={{ padding:'11px 16px', display:'flex', alignItems:'center', gap:9 }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={rebelles.length ? 'var(--amber-700)' : 'var(--text-tertiary)'} strokeWidth="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                      <span style={{ fontSize:12, fontWeight:700, color: rebelles.length ? 'var(--amber-700)' : 'var(--text-secondary)' }}>
                        {rebelles.length === 0 ? 'Aucun vote dissident détecté' : rebelles.length + ' vote' + (rebelles.length > 1 ? 's' : '') + ' dissident' + (rebelles.length > 1 ? 's' : '') + ' vs la ligne du groupe'}
                      </span>
                      <span style={{ marginLeft:'auto', fontSize:10.5, color:'var(--text-tertiary)' }}>scrutins avec ≥ 15 votants du groupe</span>
                    </div>
                    {rebelles.length > 0 && (
                      <div style={{ maxHeight:230, overflowY:'auto', borderTop:'1px solid var(--border-subtle)', background:'var(--surface)' }}>
                        {rebelles.map((v, i) => (
                          <div key={i} style={{ padding:'10px 16px', borderBottom: i < rebelles.length - 1 ? '1px solid var(--border-subtle)' : 'none', display:'flex', gap:12, alignItems:'flex-start' }}>
                            <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-tertiary)', flex:'none', paddingTop:2 }}>{depDateFR(v.d)}</span>
                            <span style={{ flex:1, fontSize:12.5, color:'var(--ink)', lineHeight:1.4, minWidth:0 }}>
                              {v.t}
                              {v.sol && <span style={{ marginLeft:6, fontSize:10, fontWeight:700, color:'var(--blue-france)', background:'#00009114', borderRadius:999, padding:'1px 7px', whiteSpace:'nowrap' }}>Solennel</span>}
                            </span>
                            <span style={{ flex:'none', display:'flex', gap:5, alignItems:'center' }}>
                              {posBadge(v.p)}
                              <span style={{ fontSize:10, color:'var(--text-tertiary)' }}>vs groupe</span>
                              {posBadge(v.g)}
                            </span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </>
            )}
          </div>

          {/* Onglets */}
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', overflow:'hidden', minHeight:420 }}>
            <div style={{ borderBottom:'1px solid var(--border)', display:'flex', padding:'0 8px', overflowX:'auto' }}>
              {TABS.map(t => (
                <button key={t.id} className={'dep-tab-btn' + (tab === t.id ? ' on' : '')} onClick={() => setTab(t.id)}>{t.label}</button>
              ))}
            </div>

            {ficheLoading && tab !== 'news' && tab !== 'circo' ? (
              <div style={{ padding:24, display:'flex', flexDirection:'column', gap:12 }}>{skeleton(52)}{skeleton(52)}{skeleton(52)}{skeleton(52)}</div>
            ) : (ficheError || !fiche) && tab !== 'news' && tab !== 'circo' ? (
              emptyMsg('Données indisponibles pour ce député. Réessayez plus tard — le fichier sera régénéré au prochain build quotidien.')
            ) : (
              <>
                {/* ── Onglet Votes ── */}
                {tab === 'votes' && (
                  <div>
                    {tabHeader('Derniers scrutins',
                      <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                        {filterInput(voteFilter, setVoteFilter, 'Filtrer par titre de scrutin…')}
                        <span style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-tertiary)', whiteSpace:'nowrap' }}>
                          {filtVotes.length}/{(fiche.derniers_votes || []).length}
                        </span>
                      </div>)}
                    {filtVotes.length === 0 ? emptyMsg(voteFilter ? 'Aucun scrutin ne correspond à « ' + voteFilter + ' ».' : 'Aucune donnée de vote disponible.') :
                      filtVotes.map((v, i) => {
                        const dissident = v.g && (v.p === 'p' || v.p === 'c' || v.p === 'a') && v.p !== v.g;
                        return (
                          <div key={i} className="dep-vote-row">
                            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5, flexWrap:'wrap' }}>
                              <span style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-tertiary)' }}>{depDateFR(v.d)}</span>
                              {v.sol && <span style={{ fontSize:10, fontWeight:700, color:'var(--blue-france)', background:'#00009114', borderRadius:999, padding:'1px 8px' }}>Scrutin solennel</span>}
                              {dissident && <span style={{ fontSize:10, fontWeight:700, color:'var(--amber-700)', background:'var(--amber-50)', border:'1px solid var(--amber-200, #FDE68A)', borderRadius:999, padding:'1px 8px' }}>Dissident</span>}
                            </div>
                            <div style={{ fontSize:13.5, fontWeight:600, color:'var(--ink)', marginBottom:8, lineHeight:1.45 }}>{v.t}</div>
                            <div style={{ display:'flex', gap:7, alignItems:'center', flexWrap:'wrap' }}>
                              {posBadge(v.p, true)}
                              {v.g && <span style={{ fontSize:11, color:'var(--text-tertiary)' }}>ligne du groupe : {(DEP_POS_LABELS[v.g] || v.g).toLowerCase()}</span>}
                              {v.del && <span style={{ fontSize:11, fontWeight:600, color:'var(--text-secondary)', background:'var(--gray-100)', border:'1px solid var(--border)', borderRadius:999, padding:'2px 9px' }}>Par délégation</span>}
                            </div>
                          </div>
                        );
                      })}
                    {fiche.nb_total_derniers_votes > (fiche.derniers_votes || []).length && !voteFilter && (
                      <div style={{ padding:'12px 24px', fontSize:11.5, color:'var(--text-tertiary)', borderTop:'1px solid var(--border-subtle)' }}>
                        {(fiche.derniers_votes || []).length} scrutins les plus récents affichés sur {fiche.nb_total_derniers_votes.toLocaleString('fr-FR')} au total pendant le mandat.
                      </div>
                    )}
                  </div>
                )}

                {/* ── Onglet Amendements ── */}
                {tab === 'amend' && (
                  <div>
                    {tabHeader('Amendements déposés',
                      <div style={{ display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
                        {filterInput(amFilter, setAmFilter, 'Filtrer par texte, article, numéro…')}
                        {s.taux_adoption_amendements != null && (
                          <span style={{ fontSize:11.5, fontWeight:700, color:'var(--pos)', background:'var(--green-50)', borderRadius:999, padding:'4px 12px', whiteSpace:'nowrap' }}>
                            {depPct(s.taux_adoption_amendements)} adoptés
                          </span>
                        )}
                      </div>)}
                    <div style={{ padding:'10px 24px', borderBottom:'1px solid var(--border-subtle)', display:'flex', gap:16, flexWrap:'wrap', fontSize:12, color:'var(--text-tertiary)', background:'var(--surface-sunken)' }}>
                      <span><strong style={{ fontFamily:'var(--font-mono)', color:'var(--ink)' }}>{s.nb_amendements || 0}</strong> déposés</span>
                      <span><strong style={{ fontFamily:'var(--font-mono)', color:'var(--pos)' }}>{s.nb_amendements_adoptes || 0}</strong> adoptés</span>

function DepAvatar({ dep, size = 46 }) {
  const [triedLocal, setTriedLocal] = React.useState(false);
  const [triedRemote, setTriedRemote] = React.useState(false);
  const color = dep.groupe ? dep.groupe.color : '#9AA3AF';
  const localUrl = 'public/photos/' + dep.id + '.jpg';
  const remoteUrl = AN_PHOTO_BASE + dep.id + '.jpg';

  if (!triedRemote) {
    const src = !triedLocal ? localUrl : remoteUrl;
    return (
      <img
        src={src}
        alt={dep.nomComplet}
        onError={() => { if (!triedLocal) { setTriedLocal(true); } else { setTriedRemote(true); } }}

}

function DepPartySelect({ groups, partyState, toggleParty }) {
  const [open, setOpen] = React.useState(false);

    const onDown = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };

    () => [...new Set(deputes.map(d => d.commission).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'fr')),
    [deputes]
  );
  const deptOptions = React.useMemo(

  );

  const filteredDeps = React.useMemo(() => {
    let result = [...deputes];
    if (filterGroupe) result = result.filter(d => d.groupe?.id === filterGroupe);
    if (filterCommission) result = result.filter(d => d.commission === filterCommission);
    if (filterDept) result = result.filter(d => d.dept === filterDept);
    if (filterSexe === 'femme') result = result.filter(d => d.female);
    else if (filterSexe === 'homme') result = result.filter(d => !d.female);
    if (query.trim()) {

      result = result.filter(d =>
        d.nomComplet.toLowerCase().includes(q) ||

        d.prenom.toLowerCase().includes(q) ||
        (d.groupe && (d.groupe.name.toLowerCase().includes(q) || d.groupe.short.toLowerCase().includes(q))) ||
        d.dept.toLowerCase().includes(q) ||
        (d.circonscription && d.circonscription.toLowerCase().includes(q)) ||
        (d.commission && d.commission.toLowerCase().includes(q)) ||
        (d.profession && d.profession.toLowerCase().includes(q))

    else if (sortBy === 'groupe')    result.sort((a, b) => (a.groupe?.name||'zzz').localeCompare(b.groupe?.name||'zzz', 'fr'));
