name: Fetch Veille Générale

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch veille
        run: node scripts/fetch-veille.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add public/data/veille_generale.json
          git diff --staged --quiet || git commit -m "data: update veille $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
