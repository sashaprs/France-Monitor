<style>
/* ── Color tokens ─────────────────────────────────────────── */
:root {
  --white:#FFFFFF; --gray-50:#F7F8FA; --gray-100:#EFF1F4; --gray-150:#E8EBEF;
  --gray-200:#E1E5EA; --gray-300:#D0D5DD; --gray-400:#AEB4BE; --gray-500:#7B828D;
  --gray-600:#565D67; --gray-700:#3B414A; --gray-800:#242931; --gray-900:#12161C;
  --ink:#0B0E14;
  --blue-france:#000091; --blue-900:#0A1F66; --blue-700:#1B43C4; --blue-600:#2563EB;
  --blue-500:#4178F0; --blue-200:#BCD0FB; --blue-100:#DEE8FE; --blue-50:#F1F5FF;
  --red-700:#B00910; --red-600:#E1000F; --red-500:#EF2D3B; --red-100:#FBDDDF; --red-50:#FEF2F2;
  --green-700:#0A6B43; --green-600:#0E8A52; --green-500:#12A862; --green-100:#C8EFD8; --green-50:#EFFAF3;
  --amber-700:#92500B; --amber-600:#C9760D; --amber-100:#FBE6C2; --amber-50:#FEF8EC;
  --bg:var(--white); --surface:var(--white); --surface-sunken:var(--gray-50);
  --surface-raised:var(--white); --surface-hover:var(--gray-50); --surface-active:var(--gray-100);
  --surface-inverse:var(--ink);
  --text:var(--ink); --text-secondary:var(--gray-600); --text-tertiary:var(--gray-500);
  --text-disabled:var(--gray-400); --text-inverse:var(--white); --text-link:var(--blue-600);
  --text-brand:var(--blue-france);
  --border:var(--gray-200); --border-strong:var(--gray-300); --border-subtle:var(--gray-150);
  --border-focus:var(--blue-600); --divider:var(--gray-150);
  --accent:var(--blue-600); --accent-hover:var(--blue-700); --accent-tint:var(--blue-50);
  --accent-tint-strong:var(--blue-100); --on-accent:var(--white);
  --pos:var(--green-600); --pos-tint:var(--green-50); --neg:var(--red-600); --neg-tint:var(--red-50);
  --warn:var(--amber-600); --warn-tint:var(--amber-50); --info:var(--blue-600); --info-tint:var(--blue-50);
  --viz-1:#2563EB; --viz-2:#12A862; --viz-3:#C9760D; --viz-4:#7C5CFC; --viz-5:#E1000F; --viz-6:#0E9BA8;
  --seq-1:#F1F5FF; --seq-2:#DEE8FE; --seq-3:#BCD0FB; --seq-4:#84A8F6;
  --seq-5:#4178F0; --seq-6:#2563EB; --seq-7:#1B43C4; --seq-8:#0A1F66;
}
/* ── Typography tokens ────────────────────────────────────── */
:root {
  --font-sans:'Schibsted Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --fs-display:56px; --fs-h1:36px; --fs-h2:26px; --fs-h3:20px; --fs-h4:17px;
  --fs-body-lg:17px; --fs-body:15px; --fs-sm:13px; --fs-caption:12px; --fs-label:11px;
  --fs-data-xl:44px; --fs-data-lg:30px; --fs-data-md:20px; --fs-data-sm:14px;
  --lh-tight:1.04; --lh-snug:1.2; --lh-normal:1.45; --lh-relaxed:1.65;
  --ls-tighter:-0.03em; --ls-tight:-0.02em; --ls-snug:-0.01em; --ls-normal:0;
  --ls-wide:0.04em; --ls-label:0.08em;
}
/* ── Spacing / radii / shadows / motion ───────────────────── */
:root {
  --space-0:0; --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:20px; --space-6:24px; --space-8:32px; --space-10:40px;
  --space-12:48px; --space-16:64px; --space-20:80px; --space-24:96px;
  --radius-xs:4px; --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
  --radius-xl:20px; --radius-pill:999px;
  --bw-hair:1px; --bw-thick:1.5px;
  --shadow-xs:0 1px 2px rgba(11,14,20,.04);
  --shadow-sm:0 1px 3px rgba(11,14,20,.06),0 1px 2px rgba(11,14,20,.04);
  --shadow-md:0 4px 12px rgba(11,14,20,.06),0 1px 3px rgba(11,14,20,.04);
  --shadow-lg:0 12px 32px rgba(11,14,20,.10),0 2px 6px rgba(11,14,20,.05);
  --shadow-pop:0 16px 48px rgba(11,14,20,.14);
  --ring-focus:0 0 0 3px rgba(37,99,235,.22);
  --sidebar-w:248px; --topbar-h:56px; --panel-w:360px; --container-max:1240px;
  --ease-out:cubic-bezier(.22,1,.36,1); --ease-in-out:cubic-bezier(.65,0,.35,1);
  --dur-fast:120ms; --dur-base:180ms; --dur-slow:280ms;
}
/* ── Base reset ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--font-sans);font-size:var(--fs-body);line-height:var(--lh-relaxed);
  color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
h1,h2,h3,h4,h5,h6,p,figure{margin:0}
a{color:var(--text-link);text-decoration:none}
a:hover{text-decoration:underline}
table,.tabular,[data-numeric]{font-variant-numeric:tabular-nums}
::selection{background:var(--blue-100);color:var(--ink)}
:focus-visible{outline:none;box-shadow:var(--ring-focus);border-radius:var(--radius-sm)}

/* ── App shell ────────────────────────────────────────────── */
html,body{margin:0;background:var(--bg)}
#root{min-height:100vh}
a{text-decoration:none}
.fixed-screen{height:100vh;overflow:hidden}

/* ── Landing ──────────────────────────────────────────────── */
.landing{background:var(--bg)}
.ln-wrap{max-width:var(--container-max);margin:0 auto;padding:0 32px}
.ln-nav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--border)}
.ln-nav-in{max-width:var(--container-max);margin:0 auto;padding:0 32px;height:60px;display:flex;align-items:center;gap:28px}
.ln-links{display:flex;gap:26px;margin-left:14px}
.ln-links a{font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);font-weight:500}
.ln-links a:hover{color:var(--text)}
.ln-nav-cta{margin-left:auto;display:flex;gap:8px;align-items:center}
.ln-hero{padding:76px 0 40px;display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
.ln-pill{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--blue-700);background:var(--blue-50);border:1px solid var(--blue-100);padding:5px 11px;border-radius:999px}
.ln-pill.dark{color:#fff;background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.2)}
.ln-h1{font-family:var(--font-sans);font-size:56px;line-height:1.04;font-weight:700;letter-spacing:-.035em;color:var(--ink);margin:20px 0 0;text-wrap:balance}
.ln-h1 .accent{color:var(--blue-france)}
.ln-h1 .accent-light{color:var(--blue-200)}
.ln-h1.ondark{color:#fff}
.ln-lead{font-family:var(--font-sans);font-size:18px;line-height:1.6;color:var(--text-secondary);margin:20px 0 0;max-width:520px}
.ln-lead.ondark{color:var(--gray-400)}
.ln-hero-cta{display:flex;gap:12px;margin-top:30px}
.ln-nots{display:flex;gap:18px;margin-top:26px}
.ln-not{font-family:var(--font-sans);font-size:13px;color:var(--text-tertiary);display:flex;align-items:center;gap:7px}
.ln-not svg{color:var(--accent)}
.ln-not.ondark{color:var(--gray-400)}
.ln-hero-centered{padding:70px 0 32px;display:flex;flex-direction:column;align-items:center;text-align:center}
.ln-hero-centered .ln-h1{max-width:880px}
.ln-hero-centered .ln-lead{margin-left:auto;margin-right:auto}
.ln-hero-centered .ln-hero-cta,.ln-hero-centered .ln-nots{justify-content:center}
.ln-hero-centered-vis{width:100%;max-width:720px;margin-top:40px}
.ln-hero-dark{margin:24px 0 8px;background:var(--ink);border-radius:var(--radius-xl);padding:56px 48px}
.ln-hero-dark-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center}
.ln-herovis{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);padding:22px}
.ln-hv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ln-hv-lbl{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-tertiary)}
.ln-sources{padding:30px 0 8px;border-top:1px solid var(--border-subtle)}
.ln-src-h{text-align:center;font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary)}
.ln-src-row{display:flex;flex-wrap:wrap;justify-content:center;gap:12px 14px;margin-top:18px}
.ln-src{font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-md);padding:8px 14px}
.ln-section{padding:64px 0}
.ln-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);text-align:center}
.ln-sec-title{font-family:var(--font-sans);font-size:34px;font-weight:700;letter-spacing:-.025em;color:var(--text);text-align:center;margin:10px 0 0;text-wrap:balance}
.ln-sec-sub{font-family:var(--font-sans);font-size:16px;color:var(--text-secondary);text-align:center;max-width:580px;margin:14px auto 0;line-height:1.6}
.ln-feat{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:42px}
.ln-fcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px}
.ln-ficon{width:40px;height:40px;border-radius:var(--radius-md);background:var(--blue-50);color:var(--accent);display:flex;align-items:center;justify-content:center}
.ln-ftitle{font-family:var(--font-sans);font-size:17px;font-weight:600;color:var(--text);margin:16px 0 0}
.ln-ftext{font-family:var(--font-sans);font-size:14px;line-height:1.6;color:var(--text-secondary);margin:8px 0 0}
.ln-pos{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:38px}
.ln-poscard{border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px}
.ln-poscard.yes{background:var(--ink)}
.ln-pos-k{font-family:var(--font-mono);font-size:12px;letter-spacing:.04em}
.ln-poscard.no .ln-pos-k{color:var(--neg)}
.ln-poscard.yes .ln-pos-k{color:var(--blue-200)}
.ln-pos-t{font-family:var(--font-sans);font-size:19px;font-weight:600;margin-top:10px;letter-spacing:-.01em}
.ln-poscard.no .ln-pos-t{color:var(--text)}
.ln-poscard.yes .ln-pos-t{color:#fff}
.ln-pos-d{font-family:var(--font-sans);font-size:14px;line-height:1.55;margin-top:8px}
.ln-poscard.no .ln-pos-d{color:var(--text-secondary)}
.ln-poscard.yes .ln-pos-d{color:var(--gray-400)}
.ln-users{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:38px}
.ln-ucard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:10px}
.ln-uicon{color:var(--accent)}
.ln-uname{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--text)}
.ln-udesc{font-family:var(--font-sans);font-size:13px;color:var(--text-tertiary);line-height:1.5}
.ln-cta{background:var(--ink);border-radius:var(--radius-xl);padding:56px 48px;text-align:center;margin:16px 0 64px}
.ln-cta-t{font-family:var(--font-sans);font-size:36px;font-weight:700;letter-spacing:-.03em;color:#fff;text-wrap:balance}
.ln-cta-s{font-family:var(--font-sans);font-size:16px;color:var(--gray-400);margin:14px auto 0;max-width:480px;line-height:1.6}
.ln-cta-b{display:flex;gap:12px;justify-content:center;margin-top:28px}
.ln-foot{border-top:1px solid var(--border);padding:32px 0;display:flex;align-items:center;justify-content:space-between}
.ln-meta{font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary)}

/* ── Auth ─────────────────────────────────────────────────── */
.auth{display:grid;grid-template-columns:minmax(0,1fr) 1.05fr;height:100vh}
.auth-form-col{display:flex;flex-direction:column;background:var(--bg);overflow-y:auto}
.auth-form-top{padding:28px 40px;flex-shrink:0}
.auth-form-mid{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 40px}
.auth-form-inner{width:100%;max-width:380px}
.auth-form-foot{padding:22px 40px;font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary);flex-shrink:0}
.auth-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.auth-title{font-family:var(--font-sans);font-size:30px;font-weight:700;letter-spacing:-.025em;color:var(--text);margin:8px 0 0}
.auth-sub{font-family:var(--font-sans);font-size:15px;line-height:1.55;color:var(--text-secondary);margin:10px 0 0}
.sso-group{display:flex;flex-direction:column;gap:10px;margin-top:26px}
.auth-or{display:flex;align-items:center;gap:14px;margin:22px 0;font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary)}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-fields{display:flex;flex-direction:column;gap:16px;margin-top:4px}
.af{display:flex;flex-direction:column;gap:6px}
.af-label{font-family:var(--font-sans);font-size:12px;font-weight:500;color:var(--text-secondary)}
.af-box{display:flex;align-items:center;height:44px;padding:0 12px;border-radius:var(--radius-md);background:var(--surface);border:1px solid var(--border);transition:border-color var(--dur-fast),box-shadow var(--dur-fast)}
.af-input{flex:1;border:none;outline:none;background:none;font-family:var(--font-sans);font-size:14px;color:var(--text);height:100%}
.af-eye{border:none;background:none;cursor:pointer;color:var(--text-tertiary);display:inline-flex;padding:4px}
.af-eye:hover{color:var(--text-secondary)}
.auth-row-between{display:flex;align-items:center;justify-content:space-between}
.auth-check{display:flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);cursor:pointer}
.auth-check.terms{align-items:flex-start;line-height:1.5}
.auth-check input{accent-color:var(--accent);width:15px;height:15px;margin-top:1px}
.auth-link{border:none;background:none;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:var(--accent);font-weight:500;padding:0}
.auth-link:hover{color:var(--accent-hover)}
.auth-link.strong{font-weight:600}
.auth-switch{margin-top:24px;font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);text-align:center}
.auth-back{display:inline-flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);padding:0;margin-bottom:18px}
.auth-back:hover{color:var(--text)}
.auth-confirm-icon{width:52px;height:52px;border-radius:50%;background:var(--blue-50);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.auth-status{height:100vh;background:var(--blue-france);display:flex;align-items:center;justify-content:center}
.auth-status-inner{display:flex;flex-direction:column;align-items:center;text-align:center}
.auth-status-t{font-family:var(--font-sans);font-size:22px;font-weight:700;color:#fff;margin-top:28px;letter-spacing:-.02em}
.auth-status-s{font-family:var(--font-sans);font-size:14px;color:var(--blue-200);margin-top:8px}
.auth-spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;animation:fmspin .8s linear infinite;margin-top:40px}
@keyframes fmspin{to{transform:rotate(360deg)}}
.auth-check-circle{width:64px;height:64px;border-radius:50%;background:var(--green-500);display:flex;align-items:center;justify-content:center;margin-top:36px;animation:fmpop .4s var(--ease-out)}
@keyframes fmpop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Dashboard ────────────────────────────────────────────── */
.db-app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden;background:var(--surface-sunken)}
.db-side{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
.db-brand{display:flex;align-items:center;padding:0 16px;height:var(--topbar-h);border-bottom:1px solid var(--border);flex-shrink:0}
.db-side-scroll{overflow-y:auto;padding:12px 10px;flex:1}
.db-side-cat{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary);padding:8px 10px 6px}
.db-mod{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:8px 10px;border:none;background:none;border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);transition:background var(--dur-fast),color var(--dur-fast)}
.db-mod:hover{background:var(--surface-hover);color:var(--text)}
.db-mod.on{background:var(--blue-50);color:var(--blue-700);font-weight:600}
.db-mod svg{flex-shrink:0}
.db-main{display:flex;flex-direction:column;min-width:0;min-height:0}
.db-top{display:flex;align-items:center;gap:16px;height:var(--topbar-h);padding:0 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.db-search{max-width:460px;flex:1}
.db-spacer{flex:1}
.db-actions{display:flex;align-items:center;gap:6px}
.db-dot{position:relative}
.db-dot::after{content:'';position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--red-600);border:1.5px solid var(--surface)}
.db-div{width:1px;height:24px;background:var(--border);margin:0 4px}
.db-avatar-btn{border:none;background:none;cursor:pointer;padding:0;display:inline-flex}
.db-menu-scrim{position:fixed;inset:0;z-index:30}
.db-menu{position:absolute;right:0;top:calc(100% + 8px);width:244px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:8px;z-index:31}
.db-menu-head{display:flex;align-items:center;gap:10px;padding:8px 8px 12px;border-bottom:1px solid var(--border-subtle);margin-bottom:6px}
.db-menu-nm{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--text)}
.db-menu-em{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
.db-menu-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px;border:none;background:none;cursor:pointer;border-radius:var(--radius-md);font-family:var(--font-sans);font-size:14px;color:var(--text-secondary)}
.db-menu-item:hover{background:var(--surface-hover);color:var(--text)}
.db-menu-item.danger{color:var(--neg)}
.db-menu-item.danger:hover{background:var(--red-50)}
.db-menu-sep{height:1px;background:var(--border-subtle);margin:6px 0}
.db-stage{display:grid;grid-template-columns:1fr var(--panel-w);flex:1;min-height:0}
.db-mapwrap{position:relative;padding:22px;min-width:0;display:flex;flex-direction:column;gap:14px;overflow:hidden}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
        </select>
      </TweakRow>
    );
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function Icon({ n, s = 18, color, style = {} }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", n);
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs: { width: s, height: s } });
    }
  }, [n, s]);
  return <span ref={ref} style={{ display: "inline-flex", color, ...style }} />;
}

/* ============================================================
   APP
   ============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hero": "Split",
  "dashboard": "Carte",
  "accent": "#2563EB"
}/*EDITMODE-END*/;

const HERO_MAP = { "Split": "split", "Centré": "centered", "Sombre": "dark" };
const PERSIST = "fm_screen_v1";
const ENTRY_SCREENS = ["landing", "login", "signup", "forgot", "dashboard"];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState(() => {
    const s = localStorage.getItem(PERSIST);
    return ENTRY_SCREENS.includes(s) ? s : "landing";
  });
  const go = React.useCallback((s) => setScreen(s), []);

  React.useEffect(() => {
    if (ENTRY_SCREENS.includes(screen)) localStorage.setItem(PERSIST, screen);
  }, [screen]);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--accent", t.accent);
  }, [t.accent]);

  React.useEffect(() => {
    if (screen === "loading") { const id = setTimeout(() => setScreen("success"), 1500); return () => clearTimeout(id); }
    if (screen === "success") { const id = setTimeout(() => setScreen("dashboard"), 1400); return () => clearTimeout(id); }
  }, [screen]);

  const fixed = screen !== "landing";
  React.useEffect(() => {
    document.getElementById("root").className = fixed ? "fixed-screen" : "";
  }, [fixed]);

  let view;
  if (screen === "landing")   view = <Landing heroVariant={HERO_MAP[t.hero] || "split"} go={go} />;
  else if (screen === "login")    view = <LoginScreen go={go} />;
  else if (screen === "signup")   view = <SignupScreen go={go} />;
  else if (screen === "forgot")   view = <ForgotScreen go={go} />;
  else if (screen === "loading")  view = <AuthStatus phase="loading" />;
  else if (screen === "success")  view = <AuthStatus phase="success" />;
  else if (screen === "dashboard") view = <Dashboard variant={t.dashboard === "Modules" ? "modules" : "terminal"} go={go} />;

  return (
    <>
      {view}
      <TweaksPanel>
        <TweakSection label="Landing — hero" />
        <TweakRadio label="Disposition" value={t.hero} options={["Split", "Centré", "Sombre"]} onChange={(v) => setTweak("hero", v)} />
        <TweakSection label="Dashboard" />
        <TweakRadio label="Vue" value={t.dashboard} options={["Carte", "Modules"]} onChange={(v) => setTweak("dashboard", v)} />
        <TweakSection label="Marque" />
        <TweakColor label="Accent" value={t.accent} options={["#2563EB", "#000091", "#1B43C4", "#0E9BA8"]} onChange={(v) => setTweak("accent", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
