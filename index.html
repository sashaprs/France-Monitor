<style>
/* ── Color tokens ─────────────────────────────────────────── */
:root {
  --white:#FFFFFF; --gray-50:#F7F8FA; --gray-100:#EFF1F4; --gray-150:#E8EBEF;
  --gray-200:#E1E5EA; --gray-300:#D0D5DD; --gray-400:#AEB4BE; --gray-500:#7B828D;
  --gray-600:#565D67; --gray-700:#3B414A; --gray-800:#242931; --gray-900:#12161C;
  --ink:#0B0E14;
  --blue-france:#000091; --blue-900:#0A1F66; --blue-700:#1B43C4; --blue-600:#2563EB;
  --blue-500:#4178F0; --blue-200:#BCD0FB; --blue-100:#DEE8FE; --blue-50:#F1F5FF;
  --red-700:#B00910; --red-600:#E1000F; --red-500:#EF2D3B; --red-100:#FBDDDF; --red-50:#FEF2F2;
  --green-700:#0A6B43; --green-600:#0E8A52; --green-500:#12A862; --green-100:#C8EFD8; --green-50:#EFFAF3;
  --amber-700:#92500B; --amber-600:#C9760D; --amber-100:#FBE6C2; --amber-50:#FEF8EC;
  --bg:var(--white); --surface:var(--white); --surface-sunken:var(--gray-50);
  --surface-raised:var(--white); --surface-hover:var(--gray-50); --surface-active:var(--gray-100);
  --surface-inverse:var(--ink);
  --text:var(--ink); --text-secondary:var(--gray-600); --text-tertiary:var(--gray-500);
  --text-disabled:var(--gray-400); --text-inverse:var(--white); --text-link:var(--blue-600);
  --text-brand:var(--blue-france);
  --border:var(--gray-200); --border-strong:var(--gray-300); --border-subtle:var(--gray-150);
  --border-focus:var(--blue-600); --divider:var(--gray-150);
  --accent:var(--blue-600); --accent-hover:var(--blue-700); --accent-tint:var(--blue-50);
  --accent-tint-strong:var(--blue-100); --on-accent:var(--white);
  --pos:var(--green-600); --pos-tint:var(--green-50); --neg:var(--red-600); --neg-tint:var(--red-50);
  --warn:var(--amber-600); --warn-tint:var(--amber-50); --info:var(--blue-600); --info-tint:var(--blue-50);
  --viz-1:#2563EB; --viz-2:#12A862; --viz-3:#C9760D; --viz-4:#7C5CFC; --viz-5:#E1000F; --viz-6:#0E9BA8;
  --seq-1:#F1F5FF; --seq-2:#DEE8FE; --seq-3:#BCD0FB; --seq-4:#84A8F6;
  --seq-5:#4178F0; --seq-6:#2563EB; --seq-7:#1B43C4; --seq-8:#0A1F66;
}
/* ── Typography tokens ────────────────────────────────────── */
:root {
  --font-sans:'Schibsted Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --fs-display:56px; --fs-h1:36px; --fs-h2:26px; --fs-h3:20px; --fs-h4:17px;
  --fs-body-lg:17px; --fs-body:15px; --fs-sm:13px; --fs-caption:12px; --fs-label:11px;
  --fs-data-xl:44px; --fs-data-lg:30px; --fs-data-md:20px; --fs-data-sm:14px;
  --lh-tight:1.04; --lh-snug:1.2; --lh-normal:1.45; --lh-relaxed:1.65;
  --ls-tighter:-0.03em; --ls-tight:-0.02em; --ls-snug:-0.01em; --ls-normal:0;
  --ls-wide:0.04em; --ls-label:0.08em;
}
/* ── Spacing / radii / shadows / motion ───────────────────── */
:root {
  --space-0:0; --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:20px; --space-6:24px; --space-8:32px; --space-10:40px;
  --space-12:48px; --space-16:64px; --space-20:80px; --space-24:96px;
  --radius-xs:4px; --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
  --radius-xl:20px; --radius-pill:999px;
  --bw-hair:1px; --bw-thick:1.5px;
  --shadow-xs:0 1px 2px rgba(11,14,20,.04);
  --shadow-sm:0 1px 3px rgba(11,14,20,.06),0 1px 2px rgba(11,14,20,.04);
  --shadow-md:0 4px 12px rgba(11,14,20,.06),0 1px 3px rgba(11,14,20,.04);
  --shadow-lg:0 12px 32px rgba(11,14,20,.10),0 2px 6px rgba(11,14,20,.05);
  --shadow-pop:0 16px 48px rgba(11,14,20,.14);
  --ring-focus:0 0 0 3px rgba(37,99,235,.22);
  --sidebar-w:248px; --topbar-h:56px; --panel-w:360px; --container-max:1240px;
  --ease-out:cubic-bezier(.22,1,.36,1); --ease-in-out:cubic-bezier(.65,0,.35,1);
  --dur-fast:120ms; --dur-base:180ms; --dur-slow:280ms;
}
/* ── Base reset ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--font-sans);font-size:var(--fs-body);line-height:var(--lh-relaxed);
  color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
h1,h2,h3,h4,h5,h6,p,figure{margin:0}
a{color:var(--text-link);text-decoration:none}
a:hover{text-decoration:underline}
table,.tabular,[data-numeric]{font-variant-numeric:tabular-nums}
::selection{background:var(--blue-100);color:var(--ink)}
:focus-visible{outline:none;box-shadow:var(--ring-focus);border-radius:var(--radius-sm)}

/* ── App shell ────────────────────────────────────────────── */
html,body{margin:0;background:var(--bg)}
#root{min-height:100vh}
a{text-decoration:none}
.fixed-screen{height:100vh;overflow:hidden}

/* ── Dark Landing ─────────────────────────────────────────── */
.landing{background:#03091A;min-height:100vh;color:#fff}
.ln-wrap{max-width:var(--container-max);margin:0 auto;padding:0 32px;position:relative;z-index:1}

/* Cursor glow */
.ln-cursor-glow{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,247,.07) 0%,transparent 70%);pointer-events:none;top:0;left:0;z-index:0;will-change:transform}

/* Nav — resizable navbar (style Aceternity UI) : pleine largeur transparente
   au repos, se rétracte en pilule flottante avec blur après 100px de scroll. */
.rn-nav{position:sticky;top:12px;z-index:40;width:100%}
.rn-body{position:relative;z-index:60;margin:0 auto;display:none;width:100%;max-width:var(--container-max);flex-direction:row;align-items:center;justify-content:space-between;align-self:flex-start;border-radius:999px;background:transparent;padding:8px 16px;transition:width .5s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1),background .3s,box-shadow .3s;will-change:width,transform}
@media(min-width:1024px){.rn-body{display:flex}}
.rn-body.visible{width:40%;min-width:1020px;transform:translateY(20px);background:rgba(4,10,28,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 0 24px rgba(34,42,53,.06),0 1px 1px rgba(0,0,0,.05),0 0 0 1px rgba(255,255,255,.09),0 0 4px rgba(34,42,53,.08),0 16px 68px rgba(47,48,55,.05),0 1px 0 rgba(255,255,255,.1) inset}
.rn-items{position:absolute;inset:0;display:none;flex:1;flex-direction:row;align-items:center;justify-content:center;gap:4px;font-family:var(--font-sans);font-size:14px;font-weight:500}
@media(min-width:1024px){.rn-items{display:flex}}
.rn-items a{position:relative;z-index:1;padding:8px 16px;color:rgba(255,255,255,.62);transition:color .18s}
.rn-items a:hover{color:#fff;text-decoration:none}
.rn-hover-pill{position:absolute;top:50%;height:36px;transform:translateY(-50%);border-radius:999px;background:rgba(255,255,255,.1);transition:left .3s cubic-bezier(.22,1,.36,1),width .3s cubic-bezier(.22,1,.36,1),opacity .2s;pointer-events:none}
.rn-actions{position:relative;z-index:2;display:flex;align-items:center;gap:14px}
.rn-btn{display:inline-block;position:relative;text-align:center;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font-sans);font-size:14px;font-weight:700;transition:transform .2s,background .2s}
.rn-btn:hover{transform:translateY(-2px)}
.rn-btn.primary{background:#fff;color:#000;box-shadow:0 0 24px rgba(34,42,53,.06),0 1px 1px rgba(0,0,0,.05),0 0 0 1px rgba(34,42,53,.04),0 0 4px rgba(34,42,53,.08),0 16px 68px rgba(47,48,55,.05),0 1px 0 rgba(255,255,255,.1) inset}
.rn-btn.secondary{background:transparent;color:#fff;box-shadow:none}
.rn-mobile{position:relative;z-index:50;margin:0 auto;display:flex;width:100%;max-width:var(--container-max);flex-direction:column;align-items:center;justify-content:space-between;padding:8px 16px;border-radius:16px;transition:width .5s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1),background .3s,box-shadow .3s,border-radius .5s}
@media(min-width:1024px){.rn-mobile{display:none}}
.rn-mobile.visible{width:90%;transform:translateY(20px);border-radius:14px;background:rgba(4,10,28,.82);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 0 24px rgba(34,42,53,.06),0 1px 1px rgba(0,0,0,.05),0 0 0 1px rgba(255,255,255,.09),0 0 4px rgba(34,42,53,.08),0 16px 68px rgba(47,48,55,.05),0 1px 0 rgba(255,255,255,.1) inset}
.rn-mobile-header{display:flex;width:100%;flex-direction:row;align-items:center;justify-content:space-between}
.rn-mobile-toggle{display:flex;background:none;border:none;color:#fff;cursor:pointer;padding:4px}
.rn-mobile-menu{position:absolute;top:60px;left:0;right:0;z-index:50;display:flex;flex-direction:column;align-items:flex-start;gap:18px;border-radius:12px;background:#050B1E;padding:32px 16px;box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.08);opacity:0;visibility:hidden;transform:translateY(-8px);transition:opacity .25s,transform .25s,visibility .25s}
.rn-mobile-menu.open{opacity:1;visibility:visible;transform:translateY(0)}
.rn-mobile-menu a{font-family:var(--font-sans);font-size:15px;font-weight:500;color:rgba(255,255,255,.75)}
.rn-mobile-menu a:hover{color:#fff;text-decoration:none}

/* Hero */
.ln-hero-wrap{position:relative;overflow:visible;padding:0}
.ln-hero-blobs{position:absolute;inset:0;pointer-events:none;z-index:0}
.ln-blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.42}
.ln-blob.b1{width:580px;height:580px;background:radial-gradient(circle,#1B43C4 0%,transparent 70%);top:-200px;left:-140px;animation:lnblob1 18s ease-in-out infinite}
.ln-blob.b2{width:500px;height:500px;background:radial-gradient(circle,#7C5CFC 0%,transparent 70%);top:-80px;right:-100px;animation:lnblob2 22s ease-in-out infinite}
.ln-blob.b3{width:420px;height:420px;background:radial-gradient(circle,#0E6E9A 0%,transparent 70%);bottom:-120px;left:38%;animation:lnblob3 20s ease-in-out infinite}
@keyframes lnblob1{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(55px,-45px) scale(1.08)}75%{transform:translate(-30px,55px) scale(.93)}}
@keyframes lnblob2{0%,100%{transform:translate(0,0) scale(1)}35%{transform:translate(-45px,32px) scale(1.06)}70%{transform:translate(28px,-40px) scale(.95)}}
@keyframes lnblob3{0%,100%{transform:translate(0,0) scale(1)}45%{transform:translate(30px,42px) scale(1.05)}78%{transform:translate(-42px,-22px) scale(.96)}}
@media(prefers-reduced-motion:reduce){.ln-blob{animation:none}}

.ln-hero{padding:96px 0 64px;display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;position:relative;z-index:1}

/* Pill badge */
.ln-pill{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:12px;font-weight:700;color:var(--blue-200);background:rgba(37,99,235,.18);border:1px solid rgba(79,142,247,.35);padding:6px 13px;border-radius:999px;animation:pill-float 4s ease-in-out infinite;letter-spacing:.01em}
@keyframes pill-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@media(prefers-reduced-motion:reduce){.ln-pill{animation:none}}

.ln-h1{font-family:var(--font-sans);font-size:60px;line-height:1.01;font-weight:800;letter-spacing:-.04em;color:#fff;margin:24px 0 0;text-wrap:balance}
.ln-h1 .accent{background:linear-gradient(130deg,#6aa3ff 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ln-h1-encrypted{color:rgba(255,255,255,.32)}
.ln-h1-revealed{color:#fff}
.ln-lead{font-family:var(--font-sans);font-size:18px;line-height:1.68;color:rgba(255,255,255,.55);margin:22px 0 0;max-width:520px}
.ln-hero-cta{display:flex;gap:12px;margin-top:34px;flex-wrap:wrap}
.ln-nots{display:flex;gap:20px;margin-top:28px;flex-wrap:wrap}
.ln-not{font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.42);display:flex;align-items:center;gap:7px}
.ln-not svg{color:#6aa3ff}

/* Hero visual card */
.ln-herovis-wrap{position:relative}
.ln-herovis{background:transparent;border:none;border-radius:var(--radius-xl);padding:22px;transition:transform .35s var(--ease-out)}
.ln-herovis:hover{transform:translateY(-6px)}
.ln-hv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ln-hv-lbl{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.35)}

/* Floating hero badges */
.ln-float-badge{position:absolute;background:rgba(10,20,45,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.14);border-radius:var(--radius-md);padding:9px 14px;font-family:var(--font-mono);font-size:12px;color:#fff;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:2}
.ln-float-badge.f1{right:-18px;top:22%;animation:fb-float1 5s ease-in-out infinite}
.ln-float-badge.f2{left:-18px;bottom:28%;animation:fb-float2 6.5s ease-in-out infinite}
.ln-fbdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
.ln-fbdot.pos{background:#12A862}
.ln-fbdot.neg{background:#E1000F}
@keyframes fb-float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes fb-float2{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}
@media(prefers-reduced-motion:reduce){.ln-float-badge{animation:none}}

/* Sources marquee */
.ln-sources{padding:44px 0 14px;border-top:1px solid rgba(255,255,255,.06);overflow:hidden}
.ln-src-eyebrow{text-align:center;font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:18px}
.ln-marquee-wrap{overflow:hidden;-webkit-mask:linear-gradient(to right,transparent,#000 10%,#000 90%,transparent);mask:linear-gradient(to right,transparent,rgba(0,0,0,1) 10%,rgba(0,0,0,1) 90%,transparent)}
.ln-marquee{display:flex;gap:10px;width:max-content;animation:ln-marquee 28s linear infinite}
@keyframes ln-marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media(prefers-reduced-motion:reduce){.ln-marquee{animation:none}}
.ln-src{font-family:var(--font-mono);font-size:13px;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);border-radius:var(--radius-md);padding:9px 16px;white-space:nowrap;transition:background .22s,border-color .22s,color .22s}
.ln-src:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}

/* Stats bar */
.ln-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-xl);overflow:hidden;margin:48px 0 0}
.ln-stat{background:#03091A;padding:34px 22px;text-align:center;position:relative;transition:background .22s;cursor:default}
.ln-stat::before{content:'';position:absolute;inset:0;opacity:0;background:radial-gradient(circle at 50% 100%,rgba(79,142,247,.14),transparent 75%);transition:opacity .32s;pointer-events:none}
.ln-stat:hover::before{opacity:1}
.ln-stat-n{font-family:var(--font-sans);font-size:46px;font-weight:800;letter-spacing:-.04em;color:#fff;font-variant-numeric:tabular-nums;line-height:1;transition:transform .32s var(--ease-out)}
.ln-stat:hover .ln-stat-n{transform:scale(1.07)}
.ln-stat-l{font-family:var(--font-sans);font-size:13px;font-weight:600;color:rgba(255,255,255,.5);margin-top:7px}
.ln-stat-s{font-family:var(--font-sans);font-size:11px;color:rgba(255,255,255,.28);margin-top:3px}

/* Section base */
.ln-section{padding:76px 0;position:relative;z-index:1}
.ln-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6aa3ff;text-align:center}
.ln-sec-title{font-family:var(--font-sans);font-size:38px;font-weight:800;letter-spacing:-.03em;color:#fff;text-align:center;margin:12px 0 0;text-wrap:balance}
.ln-sec-sub{font-family:var(--font-sans);font-size:16px;color:rgba(255,255,255,.48);text-align:center;max-width:580px;margin:16px auto 0;line-height:1.68}

/* Feature cards */
.ln-feat{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:50px}
.ln-feat-6{grid-template-columns:repeat(3,1fr)}
.ln-fcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg);padding:28px;transition:background .25s,border-color .28s,box-shadow .28s,transform .3s var(--ease-out)}
.ln-fcard:hover{background:rgba(255,255,255,.07);border-color:rgba(106,163,255,.4);box-shadow:0 8px 32px rgba(0,0,0,.35),0 0 0 1px rgba(106,163,255,.08),inset 0 1px 0 rgba(255,255,255,.07);transform:translateY(-4px)}
.ln-ficon{width:44px;height:44px;border-radius:var(--radius-md);background:rgba(106,163,255,.14);color:#6aa3ff;display:flex;align-items:center;justify-content:center;transition:background .25s,transform .3s var(--ease-out)}
.ln-fcard:hover .ln-ficon{background:rgba(106,163,255,.24);transform:scale(1.12) rotate(-4deg)}
.ln-ftitle{font-family:var(--font-sans);font-size:17px;font-weight:700;color:#fff;margin:18px 0 0}
.ln-ftext{font-family:var(--font-sans);font-size:14px;line-height:1.68;color:rgba(255,255,255,.48);margin:8px 0 0}

/* Positioning */
.ln-pos{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:42px}
.ln-poscard{border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg);padding:26px;transition:transform .28s var(--ease-out)}
.ln-poscard.no{background:rgba(255,255,255,.03)}
.ln-poscard.no:hover{transform:translateY(-2px)}
.ln-poscard.yes{background:rgba(37,99,235,.14);border-color:rgba(106,163,255,.35);box-shadow:0 0 40px rgba(37,99,235,.18),inset 0 1px 0 rgba(255,255,255,.08)}
.ln-poscard.yes:hover{transform:translateY(-4px)}
.ln-pos-k{font-family:var(--font-mono);font-size:12px;letter-spacing:.05em}
.ln-poscard.no .ln-pos-k{color:rgba(255,255,255,.28)}
.ln-poscard.yes .ln-pos-k{color:#6aa3ff}
.ln-pos-t{font-family:var(--font-sans);font-size:19px;font-weight:700;margin-top:12px;letter-spacing:-.01em;color:#fff}
.ln-pos-d{font-family:var(--font-sans);font-size:14px;line-height:1.58;margin-top:8px;color:rgba(255,255,255,.48)}

/* Users */
.ln-users{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:42px}
.ln-ucard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-lg);padding:24px;display:flex;flex-direction:column;gap:12px;transition:background .22s,border-color .25s,transform .3s var(--ease-out),box-shadow .28s}
.ln-ucard:hover{background:rgba(255,255,255,.07);border-color:rgba(106,163,255,.35);transform:translateY(-5px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.ln-uicon{color:#6aa3ff}
.ln-uname{font-family:var(--font-sans);font-size:15px;font-weight:700;color:#fff}
.ln-udesc{font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.42);line-height:1.58}

/* CTA banner */
.ln-cta{background:linear-gradient(140deg,rgba(27,67,196,.75) 0%,rgba(124,92,252,.55) 100%);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-xl);padding:76px 52px;text-align:center;margin:16px 0 64px;position:relative;overflow:hidden}
.ln-cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,.09),transparent 65%);pointer-events:none}
.ln-cta::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.ln-cta-t{font-family:var(--font-sans);font-size:42px;font-weight:800;letter-spacing:-.04em;color:#fff;text-wrap:balance;position:relative;z-index:1}
.ln-cta-s{font-family:var(--font-sans);font-size:16px;color:rgba(255,255,255,.62);margin:18px auto 0;max-width:480px;line-height:1.68;position:relative;z-index:1}
.ln-cta-b{display:flex;gap:12px;justify-content:center;margin-top:34px;position:relative;z-index:1;flex-wrap:wrap}

/* Footer */
.ln-foot{border-top:1px solid rgba(255,255,255,.07);padding:34px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.ln-foot-links{display:flex;gap:24px}
.ln-foot-links a{font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.32);transition:color .18s}
.ln-foot-links a:hover{color:rgba(255,255,255,.7);text-decoration:none}
.ln-meta{font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,.22)}

/* Steps */
.ln-steps-section{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-xl);padding:64px 56px}
.ln-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:44px;margin-top:48px;position:relative}
.ln-step-connector{position:absolute;top:26px;left:calc(33.33% + 16px);right:calc(33.33% + 16px);height:1px;background:linear-gradient(to right,rgba(106,163,255,.4),rgba(167,139,250,.4));pointer-events:none}
.ln-step-n{font-family:var(--font-mono);font-size:44px;font-weight:700;color:rgba(106,163,255,.3);letter-spacing:-.02em;line-height:1;transition:color .3s}
.ln-step:hover .ln-step-n{color:rgba(106,163,255,.7)}
.ln-step-t{font-family:var(--font-sans);font-size:17px;font-weight:700;color:#fff;margin-top:14px;letter-spacing:-.01em}
.ln-step-d{font-family:var(--font-sans);font-size:14px;color:rgba(255,255,255,.44);margin-top:8px;line-height:1.68}

/* Testimonials */
.ln-testimonials{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px}
.ln-tcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-xl);padding:32px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:border-color .28s,box-shadow .3s,transform .32s var(--ease-out)}
.ln-tcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(106,163,255,.4),transparent);opacity:0;transition:opacity .3s}
.ln-tcard:hover{border-color:rgba(106,163,255,.3);box-shadow:0 14px 44px rgba(0,0,0,.45),0 0 32px rgba(106,163,255,.1);transform:translateY(-6px)}
.ln-tcard:hover::before{opacity:1}
.ln-tquote-mark{font-family:Georgia,serif;font-size:62px;line-height:.7;color:rgba(106,163,255,.35);margin-bottom:12px;user-select:none;display:block}
.ln-tquote{font-family:var(--font-sans);font-size:14px;line-height:1.82;color:rgba(255,255,255,.58);margin:0;flex:1}
.ln-tauthor{display:flex;align-items:center;gap:12px;margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,.07)}
.ln-tavatar{width:38px;height:38px;border-radius:50%;background:rgba(106,163,255,.18);color:#6aa3ff;font-family:var(--font-sans);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.04em;border:1px solid rgba(106,163,255,.25)}
.ln-tname{font-family:var(--font-sans);font-size:13px;font-weight:700;color:#fff}
.ln-trole{font-family:var(--font-sans);font-size:12px;color:rgba(255,255,255,.38);margin-top:1px}
.ln-torg{color:#6aa3ff;font-weight:600}

/* Pricing */
.ln-pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px;align-items:start}
.ln-pcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-xl);padding:32px;display:flex;flex-direction:column;position:relative;transition:border-color .28s,box-shadow .3s,transform .32s var(--ease-out)}
.ln-pcard:not(.featured):hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);border-color:rgba(255,255,255,.15)}
.ln-pcard.featured{background:linear-gradient(155deg,rgba(37,99,235,.28) 0%,rgba(124,92,252,.18) 100%);border-color:rgba(106,163,255,.45);box-shadow:0 0 0 1px rgba(106,163,255,.22),0 24px 64px rgba(37,99,235,.22),inset 0 1px 0 rgba(255,255,255,.12)}
.ln-pcard.featured:hover{transform:translateY(-6px);box-shadow:0 0 0 1px rgba(106,163,255,.4),0 30px 80px rgba(37,99,235,.3),inset 0 1px 0 rgba(255,255,255,.14)}
.ln-pbadge{display:inline-flex;align-self:flex-start;font-family:var(--font-sans);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(106,163,255,.22);color:#6aa3ff;border:1px solid rgba(106,163,255,.4);border-radius:var(--radius-pill);padding:4px 12px;margin-bottom:18px}
.ln-pname{font-family:var(--font-sans);font-size:17px;font-weight:700;color:#fff;letter-spacing:-.01em}
.ln-psub{font-family:var(--font-sans);font-size:13px;color:rgba(255,255,255,.4);margin-top:4px}
.ln-pprice{margin:24px 0 0;display:flex;align-items:baseline;gap:4px}
.ln-pprice-n{font-family:var(--font-sans);font-size:44px;font-weight:800;letter-spacing:-.04em;color:#fff;font-variant-numeric:tabular-nums}
.ln-pprice-per{font-family:var(--font-sans);font-size:15px;color:rgba(255,255,255,.38)}
.ln-pfeatures{list-style:none;margin:22px 0 28px;padding:0;border-top:1px solid rgba(255,255,255,.07);padding-top:20px;display:flex;flex-direction:column;gap:11px}
.ln-pfeatures li{font-family:var(--font-sans);font-size:14px;color:rgba(255,255,255,.52);display:flex;align-items:flex-start;gap:10px;line-height:1.4}
.ln-pcheck{color:#6aa3ff;flex-shrink:0;display:inline-flex;margin-top:1px}
.ln-pmt{margin-top:auto}

/* FAQ */
.ln-faq{max-width:700px;margin:48px auto 0;border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-xl);overflow:hidden;background:rgba(255,255,255,.02)}
.ln-faq-item{border-bottom:1px solid rgba(255,255,255,.06)}
.ln-faq-item:last-child{border-bottom:none}
.ln-faq-q{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:20px 24px;font-family:var(--font-sans);font-size:15px;font-weight:600;color:rgba(255,255,255,.78);display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .18s,color .18s}
.ln-faq-q:hover{background:rgba(255,255,255,.04);color:#fff}
.ln-faq-q.open{color:#6aa3ff}
.ln-faq-icon{flex-shrink:0;color:rgba(255,255,255,.3);display:inline-flex;transition:color .2s,transform .3s var(--ease-out)}
.ln-faq-q.open .ln-faq-icon{color:#6aa3ff;transform:rotate(45deg)}
.ln-faq-a{padding:0 24px 20px;font-family:var(--font-sans);font-size:14px;line-height:1.78;color:rgba(255,255,255,.44);animation:faq-in .26s cubic-bezier(.22,1,.36,1)}
@keyframes faq-in{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.ln-faq-a{animation:none}}

/* Reveal animation */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .68s cubic-bezier(.22,1,.36,1),transform .68s cubic-bezier(.22,1,.36,1);transition-delay:calc(var(--i,0)*72ms)}
.reveal.in-view{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

/* ── Auth ─────────────────────────────────────────────────── */
.auth{display:grid;grid-template-columns:minmax(0,1fr) 1.05fr;height:100vh}
.auth-form-col{display:flex;flex-direction:column;background:var(--bg);overflow-y:auto}
.auth-form-top{padding:28px 40px;flex-shrink:0}
.auth-form-mid{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 40px}
.auth-form-inner{width:100%;max-width:380px}
.auth-form-foot{padding:22px 40px;font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary);flex-shrink:0}
.auth-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.auth-title{font-family:var(--font-sans);font-size:30px;font-weight:700;letter-spacing:-.025em;color:var(--text);margin:8px 0 0}
.auth-sub{font-family:var(--font-sans);font-size:15px;line-height:1.55;color:var(--text-secondary);margin:10px 0 0}
.sso-group{display:flex;flex-direction:column;gap:10px;margin-top:26px}
.auth-or{display:flex;align-items:center;gap:14px;margin:22px 0;font-family:var(--font-sans);font-size:12px;color:var(--text-tertiary)}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-fields{display:flex;flex-direction:column;gap:16px;margin-top:4px}
.af{display:flex;flex-direction:column;gap:6px}
.af-label{font-family:var(--font-sans);font-size:12px;font-weight:500;color:var(--text-secondary)}
.af-box{display:flex;align-items:center;height:44px;padding:0 12px;border-radius:var(--radius-md);background:var(--surface);border:1px solid var(--border);transition:border-color var(--dur-fast),box-shadow var(--dur-fast)}
.af-input{flex:1;border:none;outline:none;background:none;font-family:var(--font-sans);font-size:14px;color:var(--text);height:100%}
.af-eye{border:none;background:none;cursor:pointer;color:var(--text-tertiary);display:inline-flex;padding:4px}
.af-eye:hover{color:var(--text-secondary)}
.auth-row-between{display:flex;align-items:center;justify-content:space-between}
.auth-check{display:flex;align-items:center;gap:8px;font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);cursor:pointer}
.auth-check.terms{align-items:flex-start;line-height:1.5}
.auth-check input{accent-color:var(--accent);width:15px;height:15px;margin-top:1px}
.auth-link{border:none;background:none;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:var(--accent);font-weight:500;padding:0}
.auth-link:hover{color:var(--accent-hover)}
.auth-link.strong{font-weight:600}
.auth-switch{margin-top:24px;font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);text-align:center}
.auth-back{display:inline-flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer;font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);padding:0;margin-bottom:18px}
.auth-back:hover{color:var(--text)}
.auth-confirm-icon{width:52px;height:52px;border-radius:50%;background:var(--blue-50);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.auth-status{height:100vh;background:var(--blue-france);display:flex;align-items:center;justify-content:center}
.auth-status-inner{display:flex;flex-direction:column;align-items:center;text-align:center}
.auth-status-t{font-family:var(--font-sans);font-size:22px;font-weight:700;color:#fff;margin-top:28px;letter-spacing:-.02em}
.auth-status-s{font-family:var(--font-sans);font-size:14px;color:var(--blue-200);margin-top:8px}
.auth-spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;animation:fmspin .8s linear infinite;margin-top:40px}
@keyframes fmspin{to{transform:rotate(360deg)}}
.auth-check-circle{width:64px;height:64px;border-radius:50%;background:var(--green-500);display:flex;align-items:center;justify-content:center;margin-top:36px;animation:fmpop .4s var(--ease-out)}
@keyframes fmpop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Dashboard ────────────────────────────────────────────── */
.db-app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:100vh;overflow:hidden;background:var(--surface-sunken)}
.db-side{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
.db-brand{display:flex;align-items:center;padding:0 16px;height:var(--topbar-h);border-bottom:1px solid var(--border);flex-shrink:0}
.db-side-scroll{overflow-y:auto;padding:12px 10px;flex:1}
.db-side-cat{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary);padding:8px 10px 6px}
.db-mod{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:8px 10px;border:none;background:none;border-radius:var(--radius-md);cursor:pointer;font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);transition:background var(--dur-fast),color var(--dur-fast)}
.db-mod:hover{background:var(--surface-hover);color:var(--text)}
.db-mod.on{background:var(--blue-50);color:var(--blue-700);font-weight:600}
.db-mod svg{flex-shrink:0}
.db-main{display:flex;flex-direction:column;min-width:0;min-height:0}
.db-top{display:flex;align-items:center;gap:16px;height:var(--topbar-h);padding:0 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.db-search{max-width:460px;flex:1}
.db-spacer{flex:1}
.db-actions{display:flex;align-items:center;gap:6px}
.db-dot{position:relative}
.db-dot::after{content:'';position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--red-600);border:1.5px solid var(--surface)}
.db-div{width:1px;height:24px;background:var(--border);margin:0 4px}
.db-avatar-btn{border:none;background:none;cursor:pointer;padding:0;display:inline-flex}
.db-menu-scrim{position:fixed;inset:0;z-index:30}
.db-menu{position:absolute;right:0;top:calc(100% + 8px);width:244px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:8px;z-index:31}
.db-menu-head{display:flex;align-items:center;gap:10px;padding:8px 8px 12px;border-bottom:1px solid var(--border-subtle);margin-bottom:6px}
.db-menu-nm{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--text)}
.db-menu-em{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
.db-menu-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px;border:none;background:none;cursor:pointer;border-radius:var(--radius-md);font-family:var(--font-sans);font-size:14px;color:var(--text-secondary)}
.db-menu-item:hover{background:var(--surface-hover);color:var(--text)}
.db-menu-item.danger{color:var(--neg)}
.db-menu-item.danger:hover{background:var(--red-50)}
.db-menu-sep{height:1px;background:var(--border-subtle);margin:6px 0}
.db-stage{display:grid;grid-template-columns:1fr var(--panel-w);flex:1;min-height:0}
.db-mapwrap{position:relative;padding:22px;min-width:0;display:flex;flex-direction:column;gap:14px;overflow:hidden}
.db-map-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.db-map-title{font-family:var(--font-sans);font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.db-map-sub{font-family:var(--font-sans);font-size:13px;color:var(--text-tertiary);margin-top:2px}
.db-map-card{position:relative;flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:flex;align-items:center;justify-content:center;min-height:0}
.db-map-card svg.fmap{max-height:100%;width:auto}
.db-layers{position:absolute;top:16px;left:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:9px}
.db-lh{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-tertiary)}
.db-legend{position:absolute;bottom:16px;left:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;box-shadow:var(--shadow-sm)}
.db-legend .db-lh{margin-bottom:6px}
.db-ramp{display:flex;width:150px;height:8px;border-radius:999px;overflow:hidden}
.db-ramp>div{flex:1}
.db-ax{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:4px}
.db-panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.db-panel-head{padding:18px;border-bottom:1px solid var(--border-subtle)}
.db-panel-nm{font-family:var(--font-sans);font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.01em}
.db-panel-meta{display:flex;gap:12px;margin-top:6px;font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)}
.db-panel-body{padding:16px;display:flex;flex-direction:column;gap:14px}
.db-tile-row{display:grid;grid-template-columns:1fr;gap:12px}
.db-blk-lbl{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-tertiary)}
.db-table{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.db-sources{display:flex;flex-wrap:wrap;gap:8px}
.db-scroll{flex:1;overflow-y:auto}
.db-modules{max-width:1180px;margin:0 auto;padding:26px 28px 48px}
.db-mod-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:22px}
.db-mod-eyebrow{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.db-mod-title{font-family:var(--font-sans);font-size:30px;font-weight:700;letter-spacing:-.025em;color:var(--text);margin:6px 0 0}
.db-mod-sub{font-family:var(--font-sans);font-size:14px;color:var(--text-secondary);margin:6px 0 0;max-width:560px}
.db-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.db-kpi-card{text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:12px;transition:box-shadow var(--dur-fast),border-color var(--dur-fast)}
.db-kpi-card:hover{box-shadow:var(--shadow-sm);border-color:var(--border-strong)}
.db-kpi-top{display:flex;align-items:center;justify-content:space-between}
.db-kpi-ico{width:34px;height:34px;border-radius:var(--radius-md);background:var(--blue-50);color:var(--accent);display:flex;align-items:center;justify-content:center}
.db-mod-lower{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-top:16px;align-items:start}
.db-mod-mapcard,.db-mod-rank{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.db-mod-card-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-subtle)}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">

      </div>
      {children}

}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
        </select>
      </TweakRow>
    );
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

/* EncryptedText — effet « déchiffrement » (Aceternity UI, réimplémenté sans
   dépendance) : les caractères défilent aléatoirement puis se révèlent un à
   un, de gauche à droite. `charStyles(i)` permet de styler un caractère
   révélé (utilisé pour le tricolore de « françaises »). */
const ENC_CHARSET = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!<>-_\\/[]{}—=+*^?#";
function EncryptedText({ text, encryptedClassName = "", revealedClassName = "", revealDelayMs = 50, charStyles }) {
  const chars = React.useMemo(() => Array.from(text), [text]);
  const [revealed, setRevealed] = React.useState(0);
  const [, setTick] = React.useState(0);
  const [started, setStarted] = React.useState(false);
  const ref = React.useRef(null);
  const done = revealed >= chars.length;

  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) { setRevealed(chars.length); return; }
    const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setStarted(true); io.disconnect(); } }, { threshold: 0.2 });
    io.observe(el);
    return () => io.disconnect();
  }, [chars.length]);

  React.useEffect(() => {
    if (!started || done) return;
    const reveal = setInterval(() => setRevealed((r) => r + 1), revealDelayMs);
    const scramble = setInterval(() => setTick((t) => t + 1), 40);
    return () => { clearInterval(reveal); clearInterval(scramble); };
  }, [started, done, revealDelayMs]);

  return (
    <span ref={ref} aria-label={text}>
      {chars.map((ch, i) =>
        i < revealed
          ? <span key={i} aria-hidden="true" className={revealedClassName} style={charStyles ? charStyles(i) : undefined}>{ch}</span>
          : <span key={i} aria-hidden="true" className={encryptedClassName}>{ch === " " ? " " : ENC_CHARSET[Math.floor(Math.random() * ENC_CHARSET.length)]}</span>
      )}
    </span>
  );
}

function useReveal() {
  const ref = React.useRef(null);
  const [inView, setInView] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setInView(true); obs.disconnect(); }
    }, { threshold: 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

function AnimCounter({ target, inView }) {
  const [display, setDisplay] = React.useState('0');
  React.useEffect(() => {
    if (!inView) return;
    const raw = target.replace(/[^0-9]/g, '');
    if (!raw) { setDisplay(target); return; }
    const num = parseInt(raw, 10);
    const suffix = target.replace(/[0-9]/g, '');
    let start = null;
    const dur = 1400;
    const raf = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(Math.floor(eased * num) + suffix);
      if (p < 1) requestAnimationFrame(raf);
      else setDisplay(target);
    };
    requestAnimationFrame(raf);
  }, [inView, target]);
  return display;
}

/* ============================================================
   AUTH SCREEN — connexion réelle via Supabase
   Reprend le style de la maquette « Se connecter » et branche
   Google (OAuth) + e-mail/mot de passe.
   ============================================================ */
function AuthScreen({ go, initialMode = 'signin' }) {
  const { Button: Btn } = window.FranceMonitorDesignSystem_5343d8;
  const [mode, setMode] = React.useState(initialMode); // 'signin' | 'signup' | 'forgot'
  const [email, setEmail] = React.useState('');
  const [pw, setPw] = React.useState('');
  const [busy, setBusy] = React.useState(null);         // 'google' | 'email' | null
  const [error, setError] = React.useState('');
  const [info, setInfo] = React.useState('');
  const configured = isSupabaseConfigured();

  const reset = (m) => { setMode(m); setError(''); setInfo(''); };

  async function oauth(provider) {
    setError(''); setInfo('');
    if (!configured) { setError("Supabase n'est pas encore configuré : renseignez SUPABASE_URL et SUPABASE_ANON_KEY dans index.html."); return; }
    setBusy(provider);
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider,
      options: { redirectTo: OAUTH_REDIRECT },
    });
    // En cas de succès, le navigateur est redirigé vers le fournisseur.
    if (error) { setError(error.message); setBusy(null); }
  }

  async function submitEmail(e) {
    e.preventDefault();
    setError(''); setInfo('');
    if (!configured) { setError("Supabase n'est pas encore configuré : renseignez SUPABASE_URL et SUPABASE_ANON_KEY dans index.html."); return; }
    setBusy('email');
    try {
      if (mode === 'forgot') {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: OAUTH_REDIRECT });
        if (error) throw error;
        setInfo("Si un compte existe pour cette adresse, un lien de réinitialisation vient d'être envoyé.");
      } else if (mode === 'signup') {
        const { error } = await supabaseClient.auth.signUp({ email, password: pw });
        if (error) throw error;
        setInfo('Compte créé. Vérifiez votre e-mail pour confirmer votre adresse avant de vous connecter.');
      } else {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pw });
        if (error) throw error;
        // Succès : onAuthStateChange bascule automatiquement vers le dashboard.
      }
    } catch (err) {
      setError(err.message || 'Une erreur est survenue.');
    } finally {
      setBusy(null);
    }
  }

  const title = mode === 'signup' ? 'Créer un compte' : mode === 'forgot' ? 'Mot de passe oublié' : 'Se connecter';
  const sub = mode === 'signup'
    ? 'Quelques secondes suffisent pour accéder à votre terminal.'
    : mode === 'forgot'
      ? 'Saisissez votre e-mail : nous vous enverrons un lien de réinitialisation.'
      : 'Accédez à votre terminal de données publiques françaises.';
  const alertStyle = (tone) => ({
    borderRadius: 'var(--radius-md)', padding: '10px 12px', fontSize: 13, marginBottom: 12, lineHeight: 1.5,
    background: tone === 'err' ? 'var(--red-50)' : 'var(--green-50)',
    color: tone === 'err' ? 'var(--red-700)' : 'var(--green-700)',
    border: '1px solid ' + (tone === 'err' ? 'var(--red-100)' : 'var(--green-100)'),
  });

  return (
    <AuthLayout>
      <button className="auth-back" onClick={() => go('landing')}><Icon n="arrow-left" s={16} /> Retour à l'accueil</button>
      <div className="auth-eyebrow">Accès terminal</div>
      <h1 className="auth-title">{title}</h1>
      <p className="auth-sub">{sub}</p>

      {INVITE_TOKEN_URL && (
        <div style={alertStyle('ok')}>
          Vous avez reçu une invitation à rejoindre une organisation : connectez-vous (ou créez un compte)
          avec l'adresse e-mail invitée pour la rejoindre automatiquement.
        </div>
      )}

      {mode !== 'forgot' && (
        <>
          <div className="sso-group">
            <SSOButton glyph={<GoogleGlyph />} label="Continuer avec Google" onClick={() => oauth('google')} disabled={!!busy && busy !== 'google'} />
          </div>
          <OrDivider>ou avec votre e-mail professionnel</OrDivider>
        </>
      )}

      {error && <div style={alertStyle('err')}>{error}</div>}
      {info && <div style={alertStyle('ok')}>{info}</div>}

      <form className="auth-fields" onSubmit={submitEmail}>
        <AuthField label="E-mail professionnel" type="email" placeholder="prenom@organisation.fr" value={email} onChange={(e) => setEmail(e.target.value)} autoFocus />
        {mode !== 'forgot' && (
          <PasswordField label="Mot de passe" value={pw} onChange={(e) => setPw(e.target.value)} placeholder={mode === 'signup' ? '8 caractères minimum' : '••••••••'} />
        )}
        {mode === 'signin' && (
          <div className="auth-row-between">
            <label className="auth-check"><input type="checkbox" defaultChecked /> Rester connecté</label>
            <button type="button" className="auth-link" onClick={() => reset('forgot')}>Mot de passe oublié ?</button>
          </div>
        )}
        <Btn type="submit" variant="primary" size="lg" fullWidth disabled={busy === 'email'} iconRight={<Icon n="arrow-right" />}>
          {mode === 'signup' ? 'Créer mon compte' : mode === 'forgot' ? 'Envoyer le lien' : 'Se connecter'}
        </Btn>
      </form>

      <div className="auth-switch">
        {mode === 'signin' && <>Pas encore de compte ? <button className="auth-link strong" onClick={() => reset('signup')}>Créer un compte</button></>}
        {mode === 'signup' && <>Déjà un compte ? <button className="auth-link strong" onClick={() => reset('signin')}>Se connecter</button></>}
        {mode === 'forgot' && <>Vous vous souvenez ? <button className="auth-link strong" onClick={() => reset('signin')}>Se connecter</button></>}
      </div>

      {!configured && (
        <div style={{ marginTop: 16, background: 'var(--amber-50)', border: '1px solid var(--amber-100)', color: 'var(--amber-700)', borderRadius: 'var(--radius-md)', padding: '10px 12px', fontSize: 12, lineHeight: 1.55 }}>
          ⚙️ Supabase non configuré — renseignez <code>SUPABASE_URL</code> et <code>SUPABASE_ANON_KEY</code> en haut du script pour activer la connexion.
        </div>
      )}
    </AuthLayout>
  );
}

/* ============================================================
   ORGANISATION — état multi-tenant (Supabase)
   Charge les organisations de l'utilisateur connecté, consomme
   les invitations (token d'URL ?invitation=… puis rattachement
   automatique par e-mail) et expose l'organisation courante.
   Données privées par cabinet : voir supabase/migrations/.
   ============================================================ */
const INVITE_TOKEN_URL = (() => {
  try { return new URLSearchParams(window.location.search).get('invitation'); } catch (e) { return null; }
})();
const ORG_COURANTE_KEY = 'fm_org_courante_v1';

/* Contexte auth + organisation courante, fourni par le Dashboard et consommé
   par les composants profonds (fiche député) sans threading manuel de props
   à travers chaque module. Vaut { user:null, orgState:null } hors connexion. */
const AuthOrgContext = React.createContext({ user: null, orgState: null });

function useOrganisations(session) {
  const userId = session && session.user ? session.user.id : null;
  const [orgs, setOrgs] = React.useState(null);      // null = chargement en cours, [] = aucune
  const [orgId, setOrgId] = React.useState(() => { try { return localStorage.getItem(ORG_COURANTE_KEY); } catch (e) { return null; } });
  const [inviteInfo, setInviteInfo] = React.useState('');
  const tokenRef = React.useRef(INVITE_TOKEN_URL);   // consommé une seule fois par session

  const refresh = React.useCallback(async () => {
    if (!userId || !isSupabaseConfigured()) { setOrgs([]); return []; }
    const { data, error } = await supabaseClient
      .from('utilisateurs_organisations')
      .select('role, invite_le, organisation:organisations(id, nom, logo_url, couleur_accent, plan)')
      .order('invite_le');
    if (error) { console.warn('Organisations : chargement impossible —', error.message); setOrgs([]); return []; }
    const list = (data || []).filter(r => r.organisation).map(r => ({ ...r.organisation, role: r.role }));
    setOrgs(list);
    return list;
  }, [userId]);

  React.useEffect(() => {
    if (!userId || !isSupabaseConfigured()) { setOrgs(userId ? null : []); return; }
    let active = true;
    (async () => {
      // 1. Token d'invitation collé dans l'URL (lien envoyé manuellement par un admin).
      if (tokenRef.current) {
        const token = tokenRef.current; tokenRef.current = null;
        const { error } = await supabaseClient.rpc('fm_accepter_invitation', { p_token: token });
        if (active) setInviteInfo(error ? 'Invitation refusée : ' + error.message : 'Invitation acceptée — bienvenue !');
        try { history.replaceState(null, '', window.location.pathname + window.location.hash); } catch (e) {}
      }
      // 2. Rattachement automatique : toute invitation en attente pour cet e-mail.
      const { data: rejointes } = await supabaseClient.rpc('fm_rejoindre_par_email');
      if (active && rejointes && rejointes.length) setInviteInfo('Invitation acceptée — bienvenue !');
      if (active) await refresh();
    })();
    return () => { active = false; };
  }, [userId, refresh]);

  const org = React.useMemo(() => {
    if (!orgs || !orgs.length) return null;
    return orgs.find(o => o.id === orgId) || orgs[0];
  }, [orgs, orgId]);

  const choisirOrg = React.useCallback((id) => {
    setOrgId(id);
    try { localStorage.setItem(ORG_COURANTE_KEY, id); } catch (e) {}
  }, []);

  return {
    loading: !!userId && orgs === null,
    orgs: orgs || [],
    org,
    role: org ? org.role : null,
    refresh, choisirOrg, inviteInfo,
  };
}

/* ============================================================
   ONBOARDING ORGANISATION — « en attente d'invitation »
   Affiché après connexion quand l'utilisateur n'appartient à
   aucune organisation : il en crée une, revérifie ses
   invitations, ou continue vers les modules publics.
   ============================================================ */
function OrgOnboarding({ user, inviteInfo, onDone, onSkip, onSignOut }) {
  const { Button: Btn } = window.FranceMonitorDesignSystem_5343d8;
  const [nom, setNom] = React.useState('');
  const [busy, setBusy] = React.useState(null);        // 'creer' | 'verifier' | null
  const [error, setError] = React.useState('');
  const [info, setInfo] = React.useState(inviteInfo || '');
  const email = (user && user.email) || '';

  async function creer(e) {
    e.preventDefault();
    setError(''); setInfo(''); setBusy('creer');
    const { error } = await supabaseClient.rpc('fm_creer_organisation', { p_nom: nom });
    setBusy(null);
    if (error) { setError(error.message); return; }
    onDone();
  }

  async function verifier() {
    setError(''); setInfo(''); setBusy('verifier');
    const { data, error } = await supabaseClient.rpc('fm_rejoindre_par_email');
    setBusy(null);
    if (error) { setError(error.message); return; }
    if (data && data.length) { onDone(); return; }
    setInfo('Aucune invitation en attente pour ' + email + '. Demandez à un admin de votre cabinet de vous inviter.');
  }

  const alertStyle = (tone) => ({
    borderRadius: 'var(--radius-md)', padding: '10px 12px', fontSize: 13, marginBottom: 12, lineHeight: 1.5,
    background: tone === 'err' ? 'var(--red-50)' : 'var(--blue-50)',
    color: tone === 'err' ? 'var(--red-700)' : 'var(--blue-700)',
    border: '1px solid ' + (tone === 'err' ? 'var(--red-100)' : 'var(--blue-100)'),
  });

  return (
    <AuthLayout>
      <div className="auth-eyebrow">Votre espace de travail</div>
      <h1 className="auth-title">Rejoindre une organisation</h1>
      <p className="auth-sub">Connecté en tant que <strong>{email}</strong>. Les espaces clients (dossiers, notes, journal d'actions) sont rattachés à une organisation.</p>

      {error && <div style={alertStyle('err')}>{error}</div>}
      {info && <div style={alertStyle('ok')}>{info}</div>}

      <form className="auth-fields" onSubmit={creer}>
        <AuthField label="Créer l'organisation de votre cabinet" type="text" placeholder="Nom du cabinet (ex. Rivington Affaires publiques)"
          value={nom} onChange={(e) => setNom(e.target.value)} />
        <Btn type="submit" variant="primary" size="lg" fullWidth disabled={!nom.trim() || busy === 'creer'} iconRight={<Icon n="arrow-right" />}>
          {busy === 'creer' ? 'Création…' : 'Créer mon organisation'}
        </Btn>
      </form>

      <OrDivider>ou</OrDivider>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <Btn variant="secondary" size="lg" fullWidth disabled={busy === 'verifier'} onClick={verifier}>
          {busy === 'verifier' ? 'Vérification…' : "J'ai été invité·e — vérifier mes invitations"}
        </Btn>
        <button className="auth-link" style={{ alignSelf: 'center' }} onClick={onSkip}>
          Continuer vers les modules publics sans organisation
        </button>
      </div>

      <div className="auth-switch">
        Mauvais compte ? <button className="auth-link strong" onClick={onSignOut}>Se déconnecter</button>
      </div>
    </AuthLayout>
  );
}

/* ============================================================
   MODULE « MON ORGANISATION » — membres, rôles, invitations

/* Carte « Marque blanche » (admin) : logo du cabinet (Supabase Storage),
   nom et couleur d'accent, réutilisés dans les exports PDF. */
function MarqueBlancheCard({ org, orgState, cardStyle, lblStyle, inputStyle }) {
  const { Button: Btn } = window.FranceMonitorDesignSystem_5343d8;
  const [nom, setNom] = React.useState(org.nom || '');
  const [couleur, setCouleur] = React.useState(org.couleur_accent || '#000091');
  const [apercu, setApercu] = React.useState(null);
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);
  const fileRef = React.useRef(null);

  // Aperçu du logo courant (URL signée depuis le bucket privé).
  React.useEffect(() => {
    let alive = true;
    if (!org.logo_url) { setApercu(null); return; }
    supabaseClient.storage.from('logos').createSignedUrl(org.logo_url, 300)
      .then(({ data }) => { if (alive && data) setApercu(data.signedUrl); });
    return () => { alive = false; };
  }, [org.logo_url]);

  async function televerserLogo(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { setMsg({ tone: 'err', text: 'Logo trop lourd (2 Mo maximum).' }); return; }
    setBusy(true); setMsg(null);
    const ext = (file.name.split('.').pop() || 'png').toLowerCase().replace(/[^a-z0-9]/g, '');
    const path = org.id + '/logo.' + ext;
    const up = await supabaseClient.storage.from('logos').upload(path, file, { upsert: true, contentType: file.type });
    if (up.error) { setBusy(false); setMsg({ tone: 'err', text: up.error.message }); return; }
    const { error } = await supabaseClient.from('organisations').update({ logo_url: path }).eq('id', org.id);
    setBusy(false);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setMsg({ tone: 'ok', text: 'Logo mis à jour.' });
    orgState.refresh();
  }

  async function enregistrer() {
    setBusy(true); setMsg(null);
    const { error } = await supabaseClient.from('organisations')
      .update({ nom: nom.trim(), couleur_accent: couleur }).eq('id', org.id);
    setBusy(false);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setMsg({ tone: 'ok', text: 'Paramètres enregistrés.' });
    orgState.refresh();
  }

  const modifie = nom.trim() !== (org.nom || '') || couleur !== (org.couleur_accent || '#000091');

  return (
    <div style={cardStyle}>
      <div style={lblStyle}>Marque blanche</div>
      <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 12, lineHeight: 1.5 }}>
        Logo, nom et couleur d'accent de votre cabinet — repris en en-tête des exports PDF (fiches, notes, journal d'actions).
      </div>

      {msg && (
        <div style={{ borderRadius: 'var(--radius-md)', padding: '8px 11px', fontSize: 12.5, marginBottom: 12,
          background: msg.tone === 'err' ? 'var(--red-50)' : 'var(--green-50)',
          color: msg.tone === 'err' ? 'var(--red-700)' : 'var(--green-700)',
          border: '1px solid ' + (msg.tone === 'err' ? 'var(--red-100)' : 'var(--green-100)') }}>{msg.text}</div>
      )}

      <div style={{ display: 'flex', gap: 16, alignItems: 'center', marginBottom: 14, flexWrap: 'wrap' }}>
        <div style={{ width: 120, height: 60, border: '1px dashed var(--border-strong)', borderRadius: 'var(--radius-md)', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--surface-sunken)', overflow: 'hidden' }}>
          {apercu ? <img src={apercu} alt="Logo" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                  : <span style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>Aucun logo</span>}
        </div>
        <div>
          <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/svg+xml,image/webp" onChange={televerserLogo} style={{ display: 'none' }} />
          <Btn variant="secondary" size="sm" disabled={busy} icon={<Icon n="upload" s={13} />} onClick={() => fileRef.current && fileRef.current.click()}>
            {apercu ? 'Remplacer le logo' : 'Téléverser un logo'}
          </Btn>
          <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 5 }}>PNG, JPG, SVG ou WebP · 2 Mo max</div>
        </div>
      </div>

      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-end' }}>
        <label style={{ display: 'flex', flexDirection: 'column', gap: 4, fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', flex: 1, minWidth: 200 }}>
          Nom du cabinet
          <input type="text" value={nom} onChange={(e) => setNom(e.target.value)} maxLength={120} style={inputStyle} />
        </label>
        <label style={{ display: 'flex', flexDirection: 'column', gap: 4, fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)' }}>
          Couleur d'accent
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
            <input type="color" value={couleur} onChange={(e) => setCouleur(e.target.value)} style={{ width: 40, height: 34, border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', background: 'white', cursor: 'pointer', padding: 2 }} />
            <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-secondary)' }}>{couleur}</span>
          </span>
        </label>
        <Btn variant="primary" size="sm" disabled={busy || !modifie || !nom.trim()} onClick={enregistrer}>Enregistrer</Btn>
      </div>
    </div>
  );
}

function OrganisationModule({ user, orgState }) {
  const { Button: Btn, Badge: Bdg } = window.FranceMonitorDesignSystem_5343d8;
  const org = orgState && orgState.org;
  const estAdmin = !!(orgState && orgState.role === 'admin');
  const [membres, setMembres] = React.useState(null);
  const [invitations, setInvitations] = React.useState(null);
  const [invEmail, setInvEmail] = React.useState('');
  const [invRole, setInvRole] = React.useState('membre');
  const [busy, setBusy] = React.useState(false);
  const [msg, setMsg] = React.useState(null);          // { tone:'ok'|'err', text }
  const [copie, setCopie] = React.useState(null);      // id de l'invitation copiée

  const chargerMembres = React.useCallback(async () => {
    if (!org) return;
    const { data, error } = await supabaseClient.rpc('fm_membres_organisation', { p_org: org.id });
    if (error) { setMsg({ tone: 'err', text: 'Membres : ' + error.message }); return; }
    setMembres(data || []);
  }, [org && org.id]);

  const chargerInvitations = React.useCallback(async () => {
    if (!org || !estAdmin) { setInvitations([]); return; }
    const { data, error } = await supabaseClient
      .from('invitations')
      .select('id, email, role, token, cree_le, expire_le')
      .eq('organisation_id', org.id)
      .is('accepte_le', null)
      .order('cree_le', { ascending: false });
    if (!error) setInvitations(data || []);
  }, [org && org.id, estAdmin]);

  React.useEffect(() => { setMembres(null); setInvitations(null); setMsg(null); chargerMembres(); chargerInvitations(); }, [chargerMembres, chargerInvitations]);

  const lienInvitation = (t) => window.location.origin + window.location.pathname + '?invitation=' + t.token;

  async function inviter(e) {
    e.preventDefault();
    setMsg(null); setBusy(true);
    const { error } = await supabaseClient.from('invitations')
      .insert({ organisation_id: org.id, email: invEmail, role: invRole, invite_par: user.id });
    setBusy(false);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    setInvEmail('');
    setMsg({ tone: 'ok', text: 'Invitation créée — copiez le lien ci-dessous et envoyez-le à votre invité·e.' });
    chargerInvitations();
  }

  async function copier(t) {
    try { await navigator.clipboard.writeText(lienInvitation(t)); setCopie(t.id); setTimeout(() => setCopie(null), 2500); }
    catch (e) { window.prompt('Copiez le lien d\'invitation :', lienInvitation(t)); }
  }

  async function revoquer(t) {
    const { error } = await supabaseClient.from('invitations').delete().eq('id', t.id);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    chargerInvitations();
  }

  async function changerRole(m, role) {
    setMsg(null);
    const { error } = await supabaseClient.from('utilisateurs_organisations')
      .update({ role }).eq('utilisateur_id', m.utilisateur_id).eq('organisation_id', org.id);
    if (error) { setMsg({ tone: 'err', text: error.message }); }
    chargerMembres();
  }

  async function retirer(m) {
    const soi = m.utilisateur_id === user.id;
    if (!window.confirm(soi ? 'Quitter cette organisation ?' : 'Retirer ' + (m.email || 'ce membre') + ' de l\'organisation ?')) return;
    setMsg(null);
    const { error } = await supabaseClient.from('utilisateurs_organisations')
      .delete().eq('utilisateur_id', m.utilisateur_id).eq('organisation_id', org.id);
    if (error) { setMsg({ tone: 'err', text: error.message }); return; }
    if (soi) { orgState.refresh(); } else { chargerMembres(); }
  }

  const inputStyle = { padding: '8px 12px', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: 13, fontFamily: 'var(--font-sans)', outline: 'none', background: 'white' };
  const cardStyle = { border: '1px solid var(--border)', borderRadius: 'var(--radius-md)', background: 'var(--surface)', padding: '18px 20px', marginBottom: 16 };
  const lblStyle = { fontSize: 11, fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase', color: 'var(--text-tertiary)', marginBottom: 10 };

  if (!user) {
    return (
      <div style={{ padding: '24px 28px', maxWidth: 860, margin: '0 auto' }}>
        <div style={{ fontSize: 20, fontWeight: 700 }}>Mon organisation</div>
        <p style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Connectez-vous pour accéder à l'espace de votre cabinet.</p>
      </div>
    );
  }
  if (!org) {
    return (
      <div style={{ padding: '24px 28px', maxWidth: 860, margin: '0 auto' }}>
        <div style={{ fontSize: 20, fontWeight: 700 }}>Mon organisation</div>
        <p style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Vous n'appartenez encore à aucune organisation : créez-en une ou faites-vous inviter (menu du compte → se reconnecter pour relancer l'onboarding).</p>
      </div>
    );
  }

  return (
    <div style={{ padding: '24px 28px', maxWidth: 860, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 4, flexWrap: 'wrap' }}>
        <div style={{ fontSize: 20, fontWeight: 700 }}>{org.nom}</div>
        <Bdg tone="blue">{estAdmin ? 'Admin' : 'Membre'}</Bdg>
        {orgState.orgs.length > 1 && (
          <select value={org.id} onChange={(e) => orgState.choisirOrg(e.target.value)} style={{ ...inputStyle, marginLeft: 'auto', cursor: 'pointer' }}>
            {orgState.orgs.map(o => <option key={o.id} value={o.id}>{o.nom}</option>)}
          </select>
        )}
      </div>
      <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 20 }}>
        Membres, rôles et invitations de votre cabinet. Les données des dossiers clients ne sont visibles que par cette organisation.
      </div>

      {msg && (
        <div style={{ borderRadius: 'var(--radius-md)', padding: '10px 12px', fontSize: 13, marginBottom: 14, lineHeight: 1.5,
          background: msg.tone === 'err' ? 'var(--red-50)' : 'var(--green-50)',
          color: msg.tone === 'err' ? 'var(--red-700)' : 'var(--green-700)',
          border: '1px solid ' + (msg.tone === 'err' ? 'var(--red-100)' : 'var(--green-100)') }}>
          {msg.text}
        </div>
      )}

      <div style={cardStyle}>
        <div style={lblStyle}>Membres{membres ? ' (' + membres.length + ')' : ''}</div>
        {membres === null ? (
          <div style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>Chargement…</div>
        ) : (
          membres.map(m => (
            <div key={m.utilisateur_id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderTop: '1px solid var(--border-subtle)' }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600 }}>{m.nom}{m.utilisateur_id === user.id ? ' (vous)' : ''}</div>
                <div style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>{m.email}</div>
              </div>
              {estAdmin ? (
                <select value={m.role} onChange={(e) => changerRole(m, e.target.value)} style={{ ...inputStyle, padding: '5px 8px', fontSize: 12, cursor: 'pointer' }}>
                  <option value="admin">Admin</option>
                  <option value="membre">Membre</option>
                </select>
              ) : (
                <Bdg tone={m.role === 'admin' ? 'blue' : 'gray'}>{m.role === 'admin' ? 'Admin' : 'Membre'}</Bdg>
              )}
              {(estAdmin || m.utilisateur_id === user.id) && (
                <button onClick={() => retirer(m)} title={m.utilisateur_id === user.id ? 'Quitter l\'organisation' : 'Retirer ce membre'}
                  style={{ border: 'none', background: 'none', color: 'var(--red-600)', cursor: 'pointer', padding: 4 }}>
                  <Icon n={m.utilisateur_id === user.id ? 'log-out' : 'user-minus'} s={15} />
                </button>
              )}
            </div>
          ))
        )}
      </div>

      {estAdmin && (
        <div style={cardStyle}>
          <div style={lblStyle}>Inviter un·e collaborateur·rice</div>
          <form onSubmit={inviter} style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <input type="email" required placeholder="prenom@cabinet.fr" value={invEmail} onChange={(e) => setInvEmail(e.target.value)}
              style={{ ...inputStyle, flex: 1, minWidth: 220 }} />
            <select value={invRole} onChange={(e) => setInvRole(e.target.value)} style={{ ...inputStyle, cursor: 'pointer' }}>
              <option value="membre">Membre</option>
              <option value="admin">Admin</option>
            </select>
            <Btn type="submit" variant="primary" disabled={busy}>{busy ? 'Création…' : 'Créer l\'invitation'}</Btn>
          </form>
          <div style={{ fontSize: 11.5, color: 'var(--text-tertiary)', marginTop: 8, lineHeight: 1.5 }}>
            V1 sans e-mail automatique : un lien est généré, à copier et envoyer vous-même. L'invité·e qui se connecte
            avec cette adresse rejoint l'organisation automatiquement (lien valable 14 jours).
          </div>

          {invitations && invitations.length > 0 && (
            <div style={{ marginTop: 14 }}>
              <div style={lblStyle}>Invitations en attente</div>
              {invitations.map(t => (
                <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderTop: '1px solid var(--border-subtle)' }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{t.email}</div>
                    <div style={{ fontSize: 11.5, color: 'var(--text-tertiary)' }}>
                      {t.role === 'admin' ? 'Admin' : 'Membre'} · expire le {new Date(t.expire_le).toLocaleDateString('fr-FR')}
                    </div>
                  </div>
                  <Btn variant="secondary" size="sm" onClick={() => copier(t)} icon={<Icon n={copie === t.id ? 'check' : 'copy'} s={13} />}>
                    {copie === t.id ? 'Copié !' : 'Copier le lien'}
                  </Btn>
                  <button onClick={() => revoquer(t)} title="Révoquer l'invitation"
                    style={{ border: 'none', background: 'none', color: 'var(--red-600)', cursor: 'pointer', padding: 4 }}>
                    <Icon n="x" s={15} />
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {estAdmin && (
        <MarqueBlancheCard org={org} orgState={orgState} cardStyle={cardStyle} lblStyle={lblStyle} inputStyle={inputStyle} />
      )}
    </div>
  );
}

/* ============================================================
   MODULE « MES DOSSIERS » — espaces clients du cabinet
   Un dossier client = le client final (ex. « Dossier Bayer »).
   Données privées dans Supabase (RLS par organisation) ; les
   parlementaires et dossiers législatifs suivis référencent le
   référentiel public par id textuel (deputes.json / DLR…).
   ============================================================ */
let _legisIndexCachePromise = null;
function useLegisIndex() {
  const [state, setState] = React.useState({ loading: true, dossiers: [] });
  React.useEffect(() => {
    const load = _legisIndexCachePromise
      || (_legisIndexCachePromise = fetch('public/data/legislatif/dossiers-index.json')
            .then(r => r.json()).catch(() => ({ dossiers: [] })));
    let alive = true;
    load.then(d => { if (alive) setState({ loading: false, dossiers: d.dossiers || [] }); });
    return () => { alive = false; };
  }, []);
  return state;
}
