function PPNewsItem({ n, last }) {
  const [hover, setHover] = React.useState(false);
  const clickable = !!n.link;
  const inner = (
    <React.Fragment>
      <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
        <span style={{ fontSize:10, color:'var(--text-tertiary)' }}>{n.date}</span>
        {n.source && <span style={{ fontSize:9.5, fontWeight:600, color:'var(--text-tertiary)', textTransform:'uppercase', letterSpacing:'0.03em' }}>· {n.source}</span>}
      </div>
      <div style={{ fontSize:12.5, color: hover && clickable ? 'var(--accent, #2563EB)' : 'var(--text-primary)', lineHeight:1.5, fontWeight:500, transition:'color .12s' }}>
        {n.title}
        {clickable && <span style={{ marginLeft:5, fontSize:10, color:'var(--text-tertiary)' }}>↗</span>}
      </div>
    </React.Fragment>
  );
  const style = { display:'block', padding:'9px 0', borderBottom: last ? 'none' : '1px solid var(--border-subtle)', textDecoration:'none', cursor: clickable ? 'pointer' : 'default' };
  if (!clickable) return <div style={style}>{inner}</div>;
  return (
    <a href={n.link} target="_blank" rel="noopener noreferrer" style={style}
       onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}>
      {inner}
    </a>
  );
}

const VEILLE_COLORS = ['#2563EB','#0E9BA8','#7C3AED','#0E8A52','#D97706','#E11D48','#14385F','#C0392B'];
function veilleColor(key) {
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;
  return VEILLE_COLORS[h % VEILLE_COLORS.length];
}

function veilleNorm(str) {
  return (str || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
}

function veilleSlug(str) {
  return veilleNorm(str).replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || ('item-' + Date.now());
}

function veilleAgo(ts) {
  if (!ts) return '';
  const m = Math.round((Date.now() - ts) / 60000);
  if (m < 1) return "à l'instant";
  if (m < 60) return 'il y a ' + m + ' min';
  const h = Math.floor(m / 60);
  if (h < 24) return 'il y a ' + h + ' h';
  return 'il y a ' + Math.floor(h / 24) + ' j';
}

function veilleTsFromDate(dateStr) {
  const m = /^(\d{2})\/(\d{2})\/(\d{4})$/.exec(dateStr || '');
  return m ? new Date(+m[3], +m[2] - 1, +m[1]).getTime() : 0;
}

/* Proxys CORS publics essayés dans l'ordre (Google News RSS n'expose pas
   d'en-têtes CORS ; côté navigateur, un relais est indispensable). */
const VEILLE_PROXIES = [
  (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  (u) => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
  (u) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
];

function veilleParseRss(xml, matchTerms) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const items = Array.from(doc.querySelectorAll('item'));
  const news = [];
  for (const it of items) {
    const get = (name) => { const el = it.querySelector(name); return el ? el.textContent.trim() : ''; };
    const source = get('source');
    let title = get('title');
    if (source && title.endsWith(' - ' + source)) title = title.slice(0, -(source.length + 3)).trim();
    else title = title.replace(/ - [^-]+$/, '').trim();
    const link = get('link');
    const pubDate = get('pubDate');
    if (!title || !link) continue;
    if (matchTerms && matchTerms.length) {
      const nt = veilleNorm(title);
      if (!matchTerms.some(m => nt.includes(m))) continue;
    }
    const d = new Date(pubDate);
    news.push({
      date: isNaN(d) ? '' : String(d.getUTCDate()).padStart(2,'0') + '/' + String(d.getUTCMonth()+1).padStart(2,'0') + '/' + d.getUTCFullYear(),
      title, source: source || 'Google Actualités', link, ts: d.getTime() || 0,
    });
  }
  news.sort((a, b) => b.ts - a.ts);
  const seen = new Set(); const out = [];
  for (const n of news) {
    const k = n.title.toLowerCase();
    if (seen.has(k)) continue;
    seen.add(k); out.push(n);
    if (out.length >= 12) break;
  }
  return out;
}

async function veilleFetchLive(rssUrl, matchTerms) {
  let lastErr = null;
  for (const proxy of VEILLE_PROXIES) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 12000);
      const res = await fetch(proxy(rssUrl), { signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const xml = await res.text();
      if (!xml.includes('<rss') && !xml.includes('<item')) throw new Error('Réponse invalide');
      return veilleParseRss(xml, matchTerms);
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('Aucun proxy disponible');
}

/* Cache local des flux (borné à 40 requêtes pour ne pas gonfler localStorage). */
const VEILLE_CACHE_KEY = 'fm_veille_cache_v1';
function veilleCacheRead() {
  try { return JSON.parse(localStorage.getItem(VEILLE_CACHE_KEY)) || {}; } catch (e) { return {}; }
}
function veilleCacheWrite(key, items) {
  try {
    const c = veilleCacheRead();
    c[key] = { ts: Date.now(), items };
    const keys = Object.keys(c);
    if (keys.length > 40) keys.sort((a, b) => c[a].ts - c[b].ts).slice(0, keys.length - 40).forEach(k => delete c[k]);
    localStorage.setItem(VEILLE_CACHE_KEY, JSON.stringify(c));
  } catch (e) {}
}

/* Actualités générales pré-rafraîchies par GitHub Actions. */
let _veilleGenCachePromise = null;
function useVeilleGenerale() {
  const [state, setState] = React.useState({ loading: true, rubriques: {}, updatedAt: null });
  React.useEffect(() => {
    const load = _veilleGenCachePromise
      ? _veilleGenCachePromise
      : (_veilleGenCachePromise = fetch('public/data/veille_generale.json')
          .then(r => r.json())
          .catch(() => ({ rubriques: {}, updatedAt: null })));
    let alive = true;
    load.then(d => { if (alive) setState({ loading: false, rubriques: d.rubriques || {}, updatedAt: d.updatedAt }); });
    return () => { alive = false; };
  }, []);
  return state;
}

/* Préférences : localStorage toujours, Supabase en plus si connecté.
   La copie distante prime au chargement (multi-appareils) ; chaque
   modification est ré-envoyée (debounce) vers `veille_preferences`. */
const VEILLE_PREFS_KEY = 'fm_veille_prefs_v1';
const VEILLE_PREFS_DEFAULT = { sujets: [], personnalites: [], frequence: '30min', digestEmail: false, digestHeure: '08:00' };

function useVeillePrefs(user) {
  const [prefs, setPrefsState] = React.useState(() => {
    try { return { ...VEILLE_PREFS_DEFAULT, ...(JSON.parse(localStorage.getItem(VEILLE_PREFS_KEY)) || {}) }; }
    catch (e) { return VEILLE_PREFS_DEFAULT; }
  });
  const [remoteReady, setRemoteReady] = React.useState(false);
  const saveTimer = React.useRef(null);
  const userId = user && user.id;

  React.useEffect(() => {
    if (!userId || !isSupabaseConfigured()) { setRemoteReady(true); return; }
    let alive = true;
    supabaseClient.from('veille_preferences').select('*').eq('user_id', userId).maybeSingle()
      .then(({ data, error }) => {
        if (!alive) return;
        if (!error && data) {
          const p = {
            sujets: Array.isArray(data.sujets) ? data.sujets : [],
            personnalites: Array.isArray(data.personnalites) ? data.personnalites : [],
            frequence: data.frequence || '30min',
            digestEmail: !!data.digest_email,
            digestHeure: data.digest_heure || '08:00',
          };
          setPrefsState(p);
          try { localStorage.setItem(VEILLE_PREFS_KEY, JSON.stringify(p)); } catch (e) {}
        }
        setRemoteReady(true);
      })
      .catch(() => { if (alive) setRemoteReady(true); });
    return () => { alive = false; };
  }, [userId]);

  const setPrefs = React.useCallback((updater) => {
    setPrefsState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      try { localStorage.setItem(VEILLE_PREFS_KEY, JSON.stringify(next)); } catch (e) {}
      if (userId && isSupabaseConfigured()) {
        clearTimeout(saveTimer.current);
        saveTimer.current = setTimeout(() => {
          supabaseClient.from('veille_preferences').upsert({
            user_id: userId, sujets: next.sujets, personnalites: next.personnalites,
            frequence: next.frequence, digest_email: next.digestEmail, digest_heure: next.digestHeure,
          }).then(({ error }) => { if (error) console.warn('Veille : sauvegarde Supabase impossible —', error.message); });
        }, 800);
      }
      return next;
    });
  }, [userId]);

  return { prefs, setPrefs, remoteReady };
}

function VeilleModule({ user }) {
  const { SourceTag } = window.FranceMonitorDesignSystem_5343d8;
  const { prefs, setPrefs, remoteReady } = useVeillePrefs(user);
  const gen = useVeilleGenerale();
  const { news: ppNews } = usePersonnalitesNews();

  const [tab, setTab] = React.useState('une');            // 'une' | 'watch'
  const [rubrique, setRubrique] = React.useState('une');
  const [filter, setFilter] = React.useState('all');
  const [addPanel, setAddPanel] = React.useState(null);   // null | 'sujet' | 'perso'
  const [feeds, setFeeds] = React.useState({});           // clé -> { loading, items, ts, error }
  const [refreshing, setRefreshing] = React.useState(false);
  const [lastRefresh, setLastRefresh] = React.useState(null);

  const watchItems = React.useMemo(() => ([
    ...prefs.sujets.map(s => ({ key:'s:'+s.id, kind:'sujet', label:s.label, url: veilleRssSearchUrl(s.q || (s.label + ' France')), match: null })),
    ...prefs.personnalites.map(p => ({
      key:'p:'+p.id, kind:'perso', label:p.name, persoId:p.id,
      url: veilleRssSearchUrl('"' + p.name + '"'),
      match: [veilleNorm((p.name || '').split(' ').pop())].filter(Boolean),
    })),
  ]), [prefs.sujets, prefs.personnalites]);

  const freq = VEILLE_FREQS.find(f => f.id === prefs.frequence) || VEILLE_FREQS[3];

  const refreshAll = React.useCallback(async (opts) => {
    const force = !!(opts && opts.force);
    const includeRubrique = !!(opts && opts.includeRubrique);
    const ttl = freq.ms || Infinity;   // en manuel : on ne re-télécharge que sur demande
    const cache = veilleCacheRead();
    const targets = [...watchItems];
    if (includeRubrique) {
      const r = VEILLE_RUBRIQUES.find(x => x.id === rubrique) || VEILLE_RUBRIQUES[0];
      targets.push({ key:'r:'+r.id, kind:'rub', label:r.label, url:r.url, match:null });
    }
    const stale = targets.filter(t => force || !cache[t.key] || (Date.now() - cache[t.key].ts) > ttl);
    if (!stale.length) return;
    setRefreshing(true);
    await Promise.all(stale.map(async t => {
      setFeeds(f => ({ ...f, [t.key]: { ...(f[t.key] || {}), loading: true } }));
      try {
        const items = await veilleFetchLive(t.url, t.match);
        veilleCacheWrite(t.key, items);
        setFeeds(f => ({ ...f, [t.key]: { loading: false, items, ts: Date.now() } }));
      } catch (e) {
        setFeeds(f => ({ ...f, [t.key]: { ...(f[t.key] || {}), loading: false, error: true } }));
      }
    }));
    setRefreshing(false);
    setLastRefresh(Date.now());
  }, [watchItems, freq.ms, rubrique]);

  // Au montage / à chaque évolution de la watchlist : cache local puis réseau si périmé.
  React.useEffect(() => {
    if (!remoteReady) return;
    const cache = veilleCacheRead();
    setFeeds(f => {
      const next = { ...f };
      for (const it of watchItems) {
        if (!next[it.key] && cache[it.key]) next[it.key] = { loading:false, items: cache[it.key].items, ts: cache[it.key].ts };
      }
      return next;
    });
    refreshAll({ force: false, includeRubrique: false });
  }, [remoteReady, refreshAll]);

  // Actualisation périodique selon la fréquence choisie.
  React.useEffect(() => {
    if (!freq.ms) return;
    const t = setInterval(() => refreshAll({ force: false, includeRubrique: true }), Math.max(freq.ms, 60000));
    return () => clearInterval(t);
  }, [freq.ms, refreshAll]);

  const resolveFeed = React.useCallback((it) => {
    const live = feeds[it.key];
    if (live && live.items) return live;
    if (it.kind === 'perso' && ppNews && ppNews[it.persoId] && ppNews[it.persoId].length) {
      return { items: ppNews[it.persoId].map(n => ({ ...n, ts: veilleTsFromDate(n.date) })), ts: null };
    }
    return live || { items: null, loading: true };
  }, [feeds, ppNews]);

  // Flux agrégé de la watchlist (filtrable par élément), dédupliqué par titre.
  const aggregated = React.useMemo(() => {
    const rows = []; const seen = new Set();
    for (const it of watchItems) {
      if (filter !== 'all' && filter !== it.key) continue;
      const feed = resolveFeed(it);
      for (const n of (feed.items || [])) {
        const k = n.title.toLowerCase();
        if (seen.has(k)) continue;
        seen.add(k);
        rows.push({ n, origin: it });
      }
    }
    rows.sort((a, b) => (b.n.ts || 0) - (a.n.ts || 0));
    return rows.slice(0, 60);
  }, [watchItems, filter, resolveFeed]);

  const anyLoading = watchItems.some(it => { const f = resolveFeed(it); return f.loading && !f.items; });

  // Rubrique courante : flux live si déjà rafraîchi, sinon JSON pré-généré.
  const rubLive = feeds['r:' + rubrique];
  const rubItems = (rubLive && rubLive.items) || gen.rubriques[rubrique] || [];
  const rubStamp = rubLive && rubLive.ts ? veilleAgo(rubLive.ts) : (gen.updatedAt ? veilleAgo(new Date(gen.updatedAt).getTime()) : '');

  const removeItem = (it) => {
    if (filter === it.key) setFilter('all');
    if (it.kind === 'sujet') setPrefs(p => ({ ...p, sujets: p.sujets.filter(s => 's:'+s.id !== it.key) }));
    else setPrefs(p => ({ ...p, personnalites: p.personnalites.filter(x => 'p:'+x.id !== it.key) }));
  };
  const addSujet = (s) => setPrefs(p => p.sujets.some(x => x.id === s.id) ? p : ({ ...p, sujets: [...p.sujets, s] }));
  const addPerso = (x) => setPrefs(p => p.personnalites.some(y => y.id === x.id) ? p : ({ ...p, personnalites: [...p.personnalites, x] }));

  const chipStyle = (on, color) => ({
    display:'inline-flex', alignItems:'center', gap:5, padding:'5px 12px', borderRadius:99, cursor:'pointer',
    fontSize:11.5, fontWeight:600, fontFamily:'var(--font-sans)', transition:'all .12s',
    border:'1px solid ' + (on ? (color || 'var(--ink)') : 'var(--border)'),
    background: on ? (color ? hexRgba(color, 0.1) : 'var(--ink)') : 'var(--surface)',
    color: on ? (color || '#fff') : 'var(--text-secondary)',
  });

  return (
    <div style={{ padding:'24px 28px', maxWidth:1100, margin:'0 auto' }}>
      {/* En-tête + contrôles d'actualisation */}
      <div style={{ display:'flex', alignItems:'flex-start', gap:16, marginBottom:16, flexWrap:'wrap' }}>
        <div style={{ flex:1, minWidth:240 }}>
          <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)' }}>Veille médiatique</div>
          <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>Actualité générale et suivi personnalisé de vos sujets et personnalités — Google Actualités</div>
        </div>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:4 }}>
          <div style={{ display:'flex', gap:8 }}>
            <select value={prefs.frequence} onChange={e => setPrefs(p => ({ ...p, frequence: e.target.value }))} title="Fréquence d'actualisation des flux"
              style={{ padding:'8px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', background:'white', cursor:'pointer', outline:'none' }}>
              {VEILLE_FREQS.map(f => <option key={f.id} value={f.id}>{f.label}</option>)}
            </select>
            <button onClick={() => refreshAll({ force: true, includeRubrique: true })} disabled={refreshing}
              style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'8px 16px', borderRadius:'var(--radius-sm)', border:'none', background:'var(--accent, #2563EB)', color:'white', fontSize:12, fontWeight:700, cursor: refreshing ? 'default' : 'pointer', opacity: refreshing ? 0.7 : 1, fontFamily:'var(--font-sans)' }}>
              <Icon n="refresh-cw" s={13} />{refreshing ? 'Actualisation…' : 'Actualiser'}
            </button>
          </div>
          <span style={{ fontSize:10.5, color:'var(--text-tertiary)' }}>
            {lastRefresh ? 'Dernière actualisation ' + veilleAgo(lastRefresh) : (gen.updatedAt ? 'Données ' + veilleAgo(new Date(gen.updatedAt).getTime()) : '')}
          </span>
        </div>
      </div>

      {/* Onglets */}
      <div style={{ display:'inline-flex', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', overflow:'hidden', marginBottom:16 }}>
        {[{ id:'une', label:'À la une' }, { id:'watch', label:'Ma watchlist' + (watchItems.length ? ' (' + watchItems.length + ')' : '') }].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ padding:'7px 18px', fontFamily:'var(--font-sans)', fontSize:13, fontWeight:600, cursor:'pointer', border:'none', background: tab === t.id ? 'var(--ink)' : 'var(--surface)', color: tab === t.id ? '#fff' : 'var(--text-secondary)', transition:'background .14s,color .14s' }}>
            {t.label}
          </button>
        ))}
      </div>

      {tab === 'une' ? (
        <div>
          {/* Rubriques */}
          <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:14 }}>
            {VEILLE_RUBRIQUES.map(r => (
              <button key={r.id} onClick={() => setRubrique(r.id)} style={chipStyle(rubrique === r.id)}>
                <Icon n={r.icon} s={12} />{r.label}
              </button>
            ))}
          </div>
          {gen.loading && !rubItems.length ? (
            <div style={{ fontSize:12, color:'var(--text-tertiary)', padding:'24px 0' }}>Chargement des actualités…</div>
          ) : rubLive && rubLive.loading && !rubItems.length ? (
            <div style={{ fontSize:12, color:'var(--text-tertiary)', padding:'24px 0' }}>Actualisation de la rubrique…</div>
          ) : rubItems.length === 0 ? (
            <div style={{ fontSize:12, color:'var(--text-tertiary)', padding:'24px 0' }}>Aucune actualité disponible pour cette rubrique — utilisez « Actualiser ».</div>
          ) : (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:10 }}>
              {rubItems.map((n, i) => <VeilleNewsCard key={n.link || i} n={n} />)}
            </div>
          )}
          {rubStamp && <div style={{ fontSize:10.5, color:'var(--text-tertiary)', marginTop:10 }}>Rubrique mise à jour {rubStamp}</div>}
        </div>
      ) : (
        <div>
          {/* Boutons d'ajout */}

            <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'40px 24px', textAlign:'center' }}>
              <div style={{ width:52, height:52, borderRadius:99, background:hexRgba('#2563EB',0.08), display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 14px' }}>
                <Icon n="radar" s={24} color="var(--accent, #2563EB)" />
              </div>
              <div style={{ fontSize:15, fontWeight:700, color:'var(--text-primary)' }}>Composez votre veille personnalisée</div>
              <div style={{ fontSize:12.5, color:'var(--text-secondary)', marginTop:6, maxWidth:440, margin:'6px auto 0', lineHeight:1.6 }}>
                Ajoutez des sujets (écologie, retraites, immigration…) ou des personnalités politiques pour retrouver ici toutes leurs dernières actualités, agrégées et triées par date.
              </div>
            </div>
          ) : (
            <div>
              {/* Filtres par élément de watchlist */}
              <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:14 }}>
                <button onClick={() => setFilter('all')} style={chipStyle(filter === 'all')}>Tous</button>
                {watchItems.map(it => {
                  const color = veilleColor(it.key);
                  return (
                    <span key={it.key} style={{ display:'inline-flex', alignItems:'center' }}>
                      <button onClick={() => setFilter(filter === it.key ? 'all' : it.key)} style={{ ...chipStyle(filter === it.key, color), borderTopRightRadius:0, borderBottomRightRadius:0, paddingRight:8 }}>
                        <Icon n={it.kind === 'perso' ? 'user' : 'tag'} s={11} />{it.label}
                      </button>
                      <button onClick={() => removeItem(it)} title={'Ne plus suivre « ' + it.label + ' »'}
                        style={{ display:'inline-flex', alignItems:'center', padding:'5px 7px 5px 5px', borderRadius:'0 99px 99px 0', border:'1px solid var(--border)', borderLeft:'none', background:'var(--surface)', color:'var(--text-tertiary)', cursor:'pointer' }}>
                        <Icon n="x" s={11} />
                      </button>
                    </span>
                  );
                })}
              </div>

              {/* Flux agrégé */}
              <div style={{ background:'white', borderRadius:'var(--radius-lg)', border:'1px solid var(--border-subtle)', padding:'6px 18px' }}>
                {aggregated.length === 0 ? (
                  <div style={{ fontSize:12, color:'var(--text-tertiary)', padding:'18px 0' }}>
                    {anyLoading || refreshing ? 'Chargement de votre veille…' : 'Aucune actualité récupérée pour le moment — utilisez « Actualiser ».'}
                  </div>
                ) : (
                  aggregated.map((row, i) => <VeilleFeedRow key={(row.n.link || row.n.title) + i} n={row.n} origin={row.origin} last={i === aggregated.length - 1} />)
                )}
              </div>
            </div>
          )}

          <VeilleDigestCard prefs={prefs} setPrefs={setPrefs} user={user} />
        </div>
      )}

      <div style={{ marginTop:20 }}>
        <SourceTag source="Google Actualités · flux RSS · actualisation GitHub Actions + navigateur" date={new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})} />
      </div>
    </div>
  );
}

            : module === 'calendrier'

            : module === 'alertes'
            ? <div className="db-scroll"><AlertesModule /></div>
            : module === 'inflation'
            ? <div className="db-scroll"><InflationModule /></div>
            : module === 'carburant'
            ? <div className="db-scroll"><CarburantModule /></div>
            : module === 'gouvernement'
            ? <div className="db-scroll"><GouvernementModule /></div>
            : module === 'assemblee'
            ? <div className="db-scroll"><AssembleeModule /></div>
            : module === 'senat'

            : module === 'partis'
            ? <div className="db-scroll"><PartisModule /></div>
            : module === 'personnalites'

            : module === 'agenda'

            : module === 'deputes'

/* ============================================================
   SUIVI LÉGISLATIF — dossiers, timelines de procédure
   Données : public/data/legislatif/ (build-dossiers.js, GitHub Actions)
   ============================================================ */
const LEGIS_STATUTS = {
  en_commission: { label:'En commission', color:'#4B5563', bg:'#F3F4F6' },
  en_seance:     { label:'En séance',     color:'#000091', bg:'#EEF1FF' },
  en_navette:    { label:'En navette',    color:'#B45309', bg:'#FEF3C7' },
  adopte:        { label:'Adopté',        color:'#047857', bg:'#D1FAE5' },
  promulgue:     { label:'Promulgué',     color:'#065F46', bg:'#A7F3D0' },
  rejete:        { label:'Rejeté',        color:'#B91C1C', bg:'#FEE2E2' },
  retire:        { label:'Retiré',        color:'#6B7280', bg:'#E5E7EB' },
};
/* Pastilles de la frise : AN bleu France, Sénat rouge foncé, CMP violet. */
const LEGIS_CHAMBRES = {
  'AN':           { label:'AN',    color:'#000091' },
  'Sénat':        { label:'Sénat', color:'#8C1D18' },
  'CMP':          { label:'CMP',   color:'#7C3AED' },
  'Gouvernement': { label:'Gouv.', color:'#374151' },
  'CC':           { label:'CC',    color:'#B45309' },
};
const LEGIS_SORTS_AMDT = {
  'Adopté':       '#047857',
  'Rejeté':       '#B91C1C',
  'En cours':     '#1D4ED8',
  'Irrecevable':  '#B45309',
  'Tombé':        '#6B7280',
  'Retiré':       '#6B7280',
  'Non soutenu':  '#9CA3AF',
};

function legisNorm(s) {
  return String(s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}

function LegisStatutBadge({ statut, size = 12 }) {
  const s = LEGIS_STATUTS[statut] || LEGIS_STATUTS.en_commission;
  return (
    <span style={{ fontFamily:'var(--font-sans)', fontSize:size, fontWeight:600, color:s.color,
      background:s.bg, padding:'3px 10px', borderRadius:999, whiteSpace:'nowrap' }}>{s.label}</span>
  );
}

/* Frise verticale des étapes de la procédure. L'étape courante (la dernière)
   est mise en évidence : pastille élargie + halo. */
function LegisTimeline({ etapes }) {
  return (
    <div style={{ position:'relative', paddingLeft:26 }}>
      <div style={{ position:'absolute', left:7, top:8, bottom:8, width:2, background:'var(--border)' }} />
      {etapes.map((e, i) => {
        const ch = LEGIS_CHAMBRES[e.chambre] || LEGIS_CHAMBRES.Gouvernement;
        const courante = i === etapes.length - 1;
        return (
          <div key={i} style={{ position:'relative', padding:'7px 0 7px 4px' }}>
            <span style={{ position:'absolute', left:-26, top: courante ? 9 : 11,
              width: courante ? 16 : 12, height: courante ? 16 : 12, borderRadius:999,
              background:ch.color, border:'2px solid var(--surface)',
              boxShadow: courante ? `0 0 0 3px ${ch.color}33` : 'none' }} />
            <div style={{ display:'flex', alignItems:'baseline', gap:10, flexWrap:'wrap' }}>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-tertiary)', minWidth:78 }}>
                {new Date(e.date + 'T12:00:00').toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' })}
              </span>
              <span style={{ fontFamily:'var(--font-sans)', fontSize:10.5, fontWeight:700, letterSpacing:'0.06em',
                textTransform:'uppercase', color:ch.color }}>{ch.label}</span>
              <span style={{ fontFamily:'var(--font-sans)', fontSize:13.5, fontWeight: courante ? 700 : 500,
                color: courante ? 'var(--ink)' : 'var(--text-secondary)' }}>
                {e.libelle}
                {e.url_document && (
                  <a href={e.url_document} target="_blank" rel="noopener" style={{ marginLeft:8, fontSize:12, color:'var(--blue-france)' }}>JO ↗</a>
                )}
              </span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function LegisDossierDetail({ id, onBack }) {
  const [fiche, setFiche] = React.useState(undefined); // undefined = chargement, null = erreur
  React.useEffect(() => {
    setFiche(undefined);
    fetch(`public/data/legislatif/dossiers/${id}.json`)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(setFiche)
      .catch(() => setFiche(null));
  }, [id]);

  if (fiche === undefined) return <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>Chargement du dossier…</div>;
  if (fiche === null) return (
    <div style={{ padding:40, textAlign:'center' }}>
      <div style={{ color:'var(--text-secondary)', fontSize:14, marginBottom:12 }}>Dossier introuvable.</div>
      <button onClick={onBack} style={{ padding:'8px 16px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'white', cursor:'pointer', fontSize:13 }}>← Retour à la liste</button>
    </div>
  );

  const sorts = fiche.amendements ? Object.entries(fiche.amendements.par_sort).sort((a, b) => b[1] - a[1]) : [];

  return (
    <div style={{ padding:'24px 28px', maxWidth:1200, margin:'0 auto' }}>
      <button onClick={onBack} style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'7px 14px', marginBottom:18,
        border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', background:'white', cursor:'pointer',
        fontFamily:'var(--font-sans)', fontSize:12.5, color:'var(--text-secondary)' }}>
        <Icon n="arrow-left" s={14} /> Dossiers législatifs
      </button>

      <div style={{ marginBottom:22 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:10 }}>
          <LegisStatutBadge statut={fiche.statut} size={12.5} />
          {fiche.procedure && <span style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-tertiary)' }}>{fiche.procedure}</span>}
          {fiche.procedure_acceleree && <span style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:600, color:'#B45309', background:'#FEF3C7', padding:'2px 9px', borderRadius:999 }}>Procédure accélérée</span>}
        </div>
        {/* titre_court est parfois un fragment en minuscules (« sur la justice
            criminelle… ») : on ne s'en sert comme titre que s'il commence par
            une majuscule, sinon le titre complet du dossier prime. */}
        {(() => {
          const courtOk = fiche.titre_court && /^[A-ZÀ-Ý]/.test(fiche.titre_court);
          const h1 = courtOk ? fiche.titre_court : fiche.titre;
          return (
            <>
              <h1 style={{ fontFamily:'var(--font-sans)', fontSize:24, fontWeight:800, letterSpacing:'-0.02em', color:'var(--ink)', margin:'0 0 8px', lineHeight:1.25 }}>
                {h1}
              </h1>
              {courtOk && fiche.titre !== fiche.titre_court && (
                <p style={{ fontFamily:'var(--font-sans)', fontSize:13.5, color:'var(--text-secondary)', margin:'0 0 10px', maxWidth:820 }}>{fiche.titre}</p>
              )}
            </>
          );
        })()}
        <div style={{ display:'flex', gap:16, flexWrap:'wrap', fontFamily:'var(--font-sans)', fontSize:12.5, color:'var(--text-secondary)' }}>
          {fiche.commission && <span>Commission : <strong style={{ color:'var(--ink)' }}>{fiche.commission}</strong></span>}
          {fiche.rapporteur && <span>Rapporteur : <strong style={{ color:'var(--ink)' }}>{fiche.rapporteur}</strong></span>}
          {fiche.loi && fiche.loi.code_loi && <span>Loi n° <strong style={{ color:'var(--ink)' }}>{fiche.loi.code_loi}</strong></span>}
          {fiche.url && <a href={fiche.url} target="_blank" rel="noopener" style={{ color:'var(--blue-france)' }}>Dossier AN ↗</a>}
          {fiche.url_senat && <a href={fiche.url_senat} target="_blank" rel="noopener" style={{ color:'#8C1D18' }}>Dossier Sénat ↗</a>}
          {fiche.loi && fiche.loi.url_legifrance && <a href={fiche.loi.url_legifrance} target="_blank" rel="noopener" style={{ color:'var(--text-secondary)' }}>Légifrance ↗</a>}
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 360px', gap:22, alignItems:'start' }}>
        {/* Frise de la procédure */}
        <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', overflow:'hidden' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 20px', borderBottom:'1px solid var(--border-subtle)' }}>
            <div style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, letterSpacing:'0.09em', textTransform:'uppercase', color:'var(--text-tertiary)' }}>
              Procédure · {fiche.etapes.length} étapes
            </div>
            <div style={{ display:'flex', gap:12 }}>
              {['AN', 'Sénat', 'CMP'].map(c => (
                <span key={c} style={{ display:'inline-flex', alignItems:'center', gap:5, fontFamily:'var(--font-sans)', fontSize:11, color:'var(--text-tertiary)' }}>
                  <span style={{ width:9, height:9, borderRadius:999, background:LEGIS_CHAMBRES[c].color }} />{c}
                </span>
              ))}
            </div>
          </div>
          <div style={{ padding:'18px 20px' }}>
            <LegisTimeline etapes={fiche.etapes} />
          </div>
        </div>

        <div style={{ display:'flex', flexDirection:'column', gap:22 }}>
          {/* Amendements par sort */}
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', overflow:'hidden' }}>
            <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border-subtle)', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
              <div style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, letterSpacing:'0.09em', textTransform:'uppercase', color:'var(--text-tertiary)' }}>Amendements</div>
              {fiche.amendements && <span style={{ fontFamily:'var(--font-mono)', fontSize:13, fontWeight:600, color:'var(--ink)' }}>{fiche.amendements.total}</span>}
            </div>
            {fiche.amendements ? (
              <div style={{ padding:'12px 18px 16px', display:'flex', flexWrap:'wrap', gap:8 }}>
                {sorts.map(([sort, n]) => (
                  <span key={sort} style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:'var(--font-sans)', fontSize:12,
                    color:LEGIS_SORTS_AMDT[sort] || 'var(--text-secondary)', background:'var(--gray-50)', border:'1px solid var(--border-subtle)',
                    padding:'4px 10px', borderRadius:999 }}>
                    <strong style={{ fontFamily:'var(--font-mono)' }}>{n}</strong> {sort}
                  </span>
                ))}
              </div>
            ) : (
              <div style={{ padding:'16px 18px', fontSize:12.5, color:'var(--text-tertiary)' }}>Aucun amendement recensé sur ce dossier.</div>
            )}
          </div>

          {/* Scrutins liés */}
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', overflow:'hidden' }}>
            <div style={{ padding:'14px 18px', borderBottom:'1px solid var(--border-subtle)' }}>
              <div style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, letterSpacing:'0.09em', textTransform:'uppercase', color:'var(--text-tertiary)' }}>
                Scrutins liés · {fiche.scrutins.length}
              </div>
            </div>
            {fiche.scrutins.length === 0 ? (
              <div style={{ padding:'16px 18px', fontSize:12.5, color:'var(--text-tertiary)' }}>Aucun scrutin public rattaché à ce dossier.</div>
            ) : (
              <div style={{ maxHeight:420, overflowY:'auto' }}>
                {fiche.scrutins.slice().reverse().map((s, i, arr) => {
                  const ok = (s.sort || '').includes('adopt');
                  return (
                    <a key={s.numero + '-' + i} href={`https://www.assemblee-nationale.fr/dyn/17/scrutins/${s.numero}`} target="_blank" rel="noopener"
                      style={{ display:'block', padding:'11px 18px', borderBottom: i < arr.length - 1 ? '1px solid var(--border-subtle)' : 'none', textDecoration:'none' }}
                      className="an-row">
                      <div style={{ display:'flex', justifyContent:'space-between', gap:10, marginBottom:3 }}>
                        <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-tertiary)' }}>n° {s.numero} · {s.date}</span>
                        {s.sort && <span style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:600, color: ok ? 'var(--pos)' : 'var(--neg)' }}>{s.sort}</span>}
                      </div>
                      <div style={{ fontFamily:'var(--font-sans)', fontSize:12.5, color:'var(--text-secondary)', lineHeight:1.4 }}>{s.titre}</div>
                      {(s.pour || s.contre) && (
                        <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-tertiary)', marginTop:3 }}>
                          {s.pour} pour · {s.contre} contre{s.abstentions ? ` · ${s.abstentions} abst.` : ''}
                        </div>
                      )}
                    </a>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function LegislatifModule() {
  const [state, setState] = React.useState({ loading:true, dossiers:[], updatedAt:null, fenetre:null });
  const [selectedId, setSelectedId] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [statut, setStatut] = React.useState('tous');
  const [limit, setLimit] = React.useState(60);

  React.useEffect(() => {
    fetch('public/data/legislatif/dossiers-index.json')
      .then(r => r.json())
      .then(d => setState({ loading:false, dossiers:d.dossiers || [], updatedAt:d.updatedAt, fenetre:d.fenetre_mois }))
      .catch(() => setState({ loading:false, dossiers:[], updatedAt:null, fenetre:null }));
  }, []);

  React.useEffect(() => { setLimit(60); }, [search, statut]);

  if (selectedId) return <LegisDossierDetail id={selectedId} onBack={() => setSelectedId(null)} />;

  const q = legisNorm(search.trim());
  const filtered = state.dossiers.filter(d =>
    (statut === 'tous' || d.statut === statut) &&
    (!q || legisNorm(`${d.titre} ${d.titre_court || ''} ${d.commission || ''} ${d.rapporteur || ''}`).includes(q))
  );

  return (
    <div style={{ padding:'24px 28px', maxWidth:1200, margin:'0 auto' }}>
      <style>{`.legis-row:hover{background:var(--surface-hover)}`}</style>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, letterSpacing:'0.09em',
          textTransform:'uppercase', color:'var(--blue-france)', marginBottom:6 }}>Module · Suivi législatif</div>
        <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)' }}>Dossiers législatifs</div>
        <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>
          Timelines de la procédure parlementaire — {state.dossiers.length} dossiers actifs sur les {state.fenetre || 12} derniers mois · XVIIe législature
        </div>
      </div>

      <div style={{ display:'flex', gap:10, marginBottom:14 }}>
        <div style={{ position:'relative', flex:1 }}>
          <Icon n="search" s={13} style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)' }} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher un texte, une commission, un rapporteur…"
            style={{ width:'100%', padding:'8px 10px 8px 30px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', outline:'none', boxSizing:'border-box' }} />
        </div>
      </div>

      <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:18 }}>
        {[['tous', 'Tous'], ...Object.entries(LEGIS_STATUTS).map(([k, v]) => [k, v.label])].map(([k, label]) => (
          <button key={k} onClick={() => setStatut(k)}
            style={{ padding:'5px 12px', borderRadius:999, cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:12, fontWeight:600,
              border:'1px solid ' + (statut === k ? 'var(--blue-france)' : 'var(--border)'),
              background: statut === k ? 'var(--blue-france)' : 'white',
              color: statut === k ? '#fff' : 'var(--text-secondary)' }}>
            {label}
          </button>
        ))}
      </div>

      {state.loading ? (
        <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>Chargement des dossiers…</div>
      ) : filtered.length === 0 ? (
        <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>
          {state.dossiers.length === 0 ? 'Données indisponibles — le build « Suivi législatif » n\'a pas encore été exécuté.' : 'Aucun dossier ne correspond à cette recherche.'}
        </div>
      ) : (
        <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', overflow:'hidden' }}>
          {filtered.slice(0, limit).map((d, i, arr) => (
            <div key={d.id} className="legis-row" onClick={() => setSelectedId(d.id)}
              style={{ display:'grid', gridTemplateColumns:'92px 1fr 130px', gap:14, alignItems:'center', padding:'13px 18px',
                borderBottom: i < arr.length - 1 ? '1px solid var(--border-subtle)' : 'none', cursor:'pointer' }}>
              <span style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-tertiary)' }}>
                {new Date(d.date + 'T12:00:00').toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'2-digit' })}
              </span>
              <div>
                <div style={{ fontFamily:'var(--font-sans)', fontSize:13.5, fontWeight:600, color:'var(--ink)', lineHeight:1.35 }}>
                  {d.titre_court && /^[A-ZÀ-Ý]/.test(d.titre_court) ? d.titre_court : d.titre}
                </div>
                {(d.commission || d.rapporteur) && (
                  <div style={{ fontFamily:'var(--font-sans)', fontSize:11.5, color:'var(--text-tertiary)', marginTop:2 }}>
                    {[d.commission, d.rapporteur].filter(Boolean).join(' · ')}
                  </div>
                )}
              </div>
              <span style={{ justifySelf:'end' }}><LegisStatutBadge statut={d.statut} size={11.5} /></span>
            </div>
          ))}
          {filtered.length > limit && (
            <button onClick={() => setLimit(l => l + 120)}
              style={{ display:'block', width:'100%', padding:'12px', border:'none', borderTop:'1px solid var(--border-subtle)',
                background:'var(--gray-50)', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:12.5, fontWeight:600, color:'var(--blue-france)' }}>
              Afficher plus ({filtered.length - limit} restants)
            </button>
          )}
        </div>
      )}

      <div style={{ marginTop:20 }}>
        <SourceTag source="Assemblée nationale · open data Dossiers législatifs · actualisation GitHub Actions"
          date={state.updatedAt ? new Date(state.updatedAt).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' }) : '—'} />
      </div>
    </div>
  );
}

/* ============================================================
   AMENDEMENTS — recherche par mot-clé sur les dépôts récents
   Données : public/data/legislatif/amendements-recents.json
   (build-amendements-recents.js, fenêtre glissante adaptative)
   ============================================================ */
function AmendementsModule() {
  const [state, setState] = React.useState({ loading:true, amendements:[], dossiers:{}, fenetre:null, updatedAt:null });
  const [search, setSearch] = React.useState('');
  const [fSort, setFSort] = React.useState('tous');
  const [fGroupe, setFGroupe] = React.useState('tous');
  const [fDossier, setFDossier] = React.useState('tous');
  const [limit, setLimit] = React.useState(60);
  const [selectedDep, setSelectedDep] = React.useState(null);
  const [dossierId, setDossierId] = React.useState(null);
  const { deputes } = useANDeputes();

  React.useEffect(() => {
    fetch('public/data/legislatif/amendements-recents.json')
      .then(r => r.json())
      .then(d => setState({ loading:false, amendements:d.amendements || [], dossiers:d.dossiers || {}, fenetre:d.fenetre_jours, updatedAt:d.updatedAt }))
      .catch(() => setState({ loading:false, amendements:[], dossiers:{}, fenetre:null, updatedAt:null }));
  }, []);
  React.useEffect(() => { setLimit(60); }, [search, fSort, fGroupe, fDossier]);

  /* Navigation croisée : fiche député (module Députés) et timeline dossier. */
  if (selectedDep) return <DeputeView dep={selectedDep} onBack={() => setSelectedDep(null)} />;
  if (dossierId) return <LegisDossierDetail id={dossierId} onBack={() => setDossierId(null)} />;

  const groupes = [...new Set(state.amendements.map(a => a.auteur && a.auteur.groupe).filter(Boolean))].sort();
  const sorts = [...new Set(state.amendements.map(a => a.sort).filter(Boolean))].sort();
  const q = legisNorm(search.trim());
  const filtered = state.amendements.filter(a =>
    (fSort === 'tous' || a.sort === fSort) &&
    (fGroupe === 'tous' || (a.auteur && a.auteur.groupe) === fGroupe) &&
    (fDossier === 'tous' || a.dossier_id === fDossier) &&
    (!q || legisNorm(`${a.resume || ''} ${a.article_vise || ''} ${(a.auteur && a.auteur.nom) || ''}`).includes(q))
  );

  const selStyle = { padding:'8px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12,
    fontFamily:'var(--font-sans)', background:'white', cursor:'pointer', outline:'none', maxWidth:260 };

  return (
    <div style={{ padding:'24px 28px', maxWidth:1200, margin:'0 auto' }}>
      <style>{`.amdt-row:hover{background:var(--surface-hover)}`}</style>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, letterSpacing:'0.09em',
          textTransform:'uppercase', color:'var(--blue-france)', marginBottom:6 }}>Module · Suivi législatif</div>
        <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)' }}>Amendements</div>
        <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>
          Recherche par mot-clé — {state.amendements.length.toLocaleString('fr-FR')} amendements déposés sur les {state.fenetre || '…'} derniers jours · XVIIe législature
        </div>
      </div>

      <div style={{ display:'flex', gap:10, marginBottom:14, flexWrap:'wrap' }}>
        <div style={{ position:'relative', flex:'1 1 320px' }}>
          <Icon n="search" s={13} style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--text-tertiary)' }} />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher dans les exposés sommaires, articles visés, auteurs…"
            style={{ width:'100%', padding:'8px 10px 8px 30px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12, fontFamily:'var(--font-sans)', outline:'none', boxSizing:'border-box' }} />
        </div>
        <select value={fSort} onChange={e => setFSort(e.target.value)} style={selStyle}>
          <option value="tous">Tous les sorts</option>
          {sorts.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
        <select value={fGroupe} onChange={e => setFGroupe(e.target.value)} style={selStyle}>
          <option value="tous">Tous les groupes</option>
          {groupes.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
        <select value={fDossier} onChange={e => setFDossier(e.target.value)} style={selStyle}>
          <option value="tous">Tous les dossiers</option>
          {Object.entries(state.dossiers).sort((a, b) => a[1].localeCompare(b[1])).map(([id, t]) => (
            <option key={id} value={id}>{t.length > 60 ? t.slice(0, 59) + '…' : t}</option>
          ))}
        </select>
      </div>

      {state.loading ? (
        <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>Chargement des amendements…</div>
      ) : filtered.length === 0 ? (
        <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>
          {state.amendements.length === 0 ? 'Données indisponibles — le build « Suivi législatif » n\'a pas encore été exécuté.' : 'Aucun amendement ne correspond à ces critères.'}
        </div>
      ) : (
        <>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-tertiary)', marginBottom:10 }}>
            {filtered.length.toLocaleString('fr-FR')} résultat{filtered.length > 1 ? 's' : ''}
          </div>
          <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', overflow:'hidden' }}>
            {filtered.slice(0, limit).map((a, i, arr) => {
              const dep = a.auteur && a.auteur.id ? deputes.find(d => d.id === a.auteur.id) : null;
              const couleurSort = LEGIS_SORTS_AMDT[a.sort] || 'var(--text-secondary)';
              return (
                <div key={a.id} className="amdt-row" style={{ padding:'13px 18px', borderBottom: i < arr.length - 1 ? '1px solid var(--border-subtle)' : 'none' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:5 }}>
                    <span style={{ fontFamily:'var(--font-mono)', fontSize:11.5, color:'var(--text-tertiary)' }}>
                      {new Date(a.date + 'T12:00:00').toLocaleDateString('fr-FR', { day:'2-digit', month:'short' })}
                    </span>
                    <span style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, color:couleurSort,
                      background:'var(--gray-50)', border:`1px solid ${couleurSort}33`, padding:'2px 9px', borderRadius:999 }}>{a.sort}</span>
                    {a.article_vise && <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-secondary)',
                      background:'var(--gray-100)', padding:'2px 8px', borderRadius:4 }}>{a.article_vise}</span>}
                    {a.numero && <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-tertiary)' }}>n° {a.numero}</span>}
                    <span style={{ flex:1 }} />
                    {a.url && <a href={a.url} target="_blank" rel="noopener" style={{ fontFamily:'var(--font-sans)', fontSize:11.5, color:'var(--blue-france)' }}>Voir sur assemblee-nationale.fr ↗</a>}
                  </div>
                  {a.resume && <div style={{ fontFamily:'var(--font-sans)', fontSize:13, color:'var(--ink)', lineHeight:1.45, marginBottom:5 }}>{a.resume}</div>}
                  <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', fontFamily:'var(--font-sans)', fontSize:12 }}>
                    {a.auteur && a.auteur.nom && (
                      dep ? (
                        <button onClick={() => setSelectedDep(dep)} style={{ border:'none', background:'none', padding:0, cursor:'pointer',
                          fontFamily:'var(--font-sans)', fontSize:12, fontWeight:600, color:'var(--blue-france)' }}>
                          {a.auteur.nom}
                        </button>
                      ) : <span style={{ fontWeight:600, color:'var(--text-secondary)' }}>{a.auteur.nom}</span>
                    )}
                    {a.auteur && a.auteur.groupe && <span style={{ color:'var(--text-tertiary)' }}>({a.auteur.groupe})</span>}
                    {a.dossier_id && state.dossiers[a.dossier_id] && (
                      <>
                        <span style={{ color:'var(--text-tertiary)' }}>·</span>
                        <button onClick={() => setDossierId(a.dossier_id)} style={{ border:'none', background:'none', padding:0, cursor:'pointer',
                          fontFamily:'var(--font-sans)', fontSize:12, color:'var(--text-secondary)', textDecoration:'underline', textDecorationColor:'var(--border)' }}>
                          {state.dossiers[a.dossier_id].length > 70 ? state.dossiers[a.dossier_id].slice(0, 69) + '…' : state.dossiers[a.dossier_id]}
                        </button>
                      </>
                    )}
                  </div>
                </div>
              );
            })}
            {filtered.length > limit && (
              <button onClick={() => setLimit(l => l + 120)}
                style={{ display:'block', width:'100%', padding:'12px', border:'none', borderTop:'1px solid var(--border-subtle)',
                  background:'var(--gray-50)', cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:12.5, fontWeight:600, color:'var(--blue-france)' }}>
                Afficher plus ({filtered.length - limit} restants)
              </button>
            )}
          </div>
        </>
      )}

      <div style={{ marginTop:20 }}>
        <SourceTag source="Assemblée nationale · open data Amendements · actualisation GitHub Actions"
          date={state.updatedAt ? new Date(state.updatedAt).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' }) : '—'} />
      </div>
    </div>
  );
}

/* ============================================================
   CALENDRIER PARLEMENTAIRE — vue liste groupée par jour
   Données : public/data/legislatif/calendrier.json
   (build-calendrier.js — AN uniquement, voir encadré Sénat)
   ============================================================ */
function CalendrierModule() {
  const [state, setState] = React.useState({ loading:true, evenements:[], jours:21, senat:null, updatedAt:null });
  const [fType, setFType] = React.useState('tous');
  const [fOrgane, setFOrgane] = React.useState('tous');
  const [dossierId, setDossierId] = React.useState(null);

  React.useEffect(() => {
    fetch('public/data/legislatif/calendrier.json')
      .then(r => r.json())
      .then(d => setState({ loading:false, evenements:d.evenements || [], jours:d.jours, senat:d.senat, updatedAt:d.updatedAt }))
      .catch(() => setState({ loading:false, evenements:[], jours:21, senat:null, updatedAt:null }));
  }, []);

  if (dossierId) return <LegisDossierDetail id={dossierId} onBack={() => setDossierId(null)} />;

  const organes = [...new Set(state.evenements.filter(e => e.type === 'commission').map(e => e.organe).filter(Boolean))].sort();
  const filtered = state.evenements.filter(e =>
    (fType === 'tous' || e.type === fType) &&
    (fOrgane === 'tous' || e.organe === fOrgane)
  );

  /* Regroupement par jour (les événements sont déjà triés). */
  const parJour = [];
  for (const e of filtered) {
    const dernier = parJour[parJour.length - 1];
    if (dernier && dernier.date === e.date) dernier.evenements.push(e);
    else parJour.push({ date: e.date, evenements: [e] });
  }

  return (
    <div style={{ padding:'24px 28px', maxWidth:1000, margin:'0 auto' }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, letterSpacing:'0.09em',
          textTransform:'uppercase', color:'var(--blue-france)', marginBottom:6 }}>Module · Suivi législatif</div>
        <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)' }}>Calendrier parlementaire</div>
        <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>
          Séances publiques et réunions de commission des {state.jours} prochains jours · XVIIe législature
        </div>
      </div>

      {/* Sénat : aucune source open data / RSS / ICS exploitable (vérifié juillet 2026). */}
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', marginBottom:18,
        border:'1px solid #F3D9A4', background:'#FDF6E3', borderRadius:'var(--radius-md)' }}>
        <Icon n="info" s={15} color="#8C6D1F" />
        <span style={{ fontFamily:'var(--font-sans)', fontSize:12.5, color:'#6B5416' }}>
          <strong>Sénat : bientôt disponible.</strong> Le Sénat ne publie pas encore son agenda en open data ; ce calendrier couvre l'Assemblée nationale.
        </span>
      </div>

      <div style={{ display:'flex', gap:10, marginBottom:18, flexWrap:'wrap', alignItems:'center' }}>
        {[['tous', 'Tous'], ['seance', 'Séance publique'], ['commission', 'Commissions']].map(([k, label]) => (
          <button key={k} onClick={() => setFType(k)}
            style={{ padding:'5px 12px', borderRadius:999, cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:12, fontWeight:600,
              border:'1px solid ' + (fType === k ? 'var(--blue-france)' : 'var(--border)'),
              background: fType === k ? 'var(--blue-france)' : 'white',
              color: fType === k ? '#fff' : 'var(--text-secondary)' }}>
            {label}
          </button>
        ))}
        <select value={fOrgane} onChange={e => setFOrgane(e.target.value)}
          style={{ padding:'6px 12px', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)', fontSize:12,
            fontFamily:'var(--font-sans)', background:'white', cursor:'pointer', outline:'none', maxWidth:320 }}>
          <option value="tous">Toutes les commissions</option>
          {organes.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      </div>

      {state.loading ? (
        <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>Chargement du calendrier…</div>
      ) : parJour.length === 0 ? (
        <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>
          {state.evenements.length === 0 ? 'Données indisponibles — le build « Suivi législatif » n\'a pas encore été exécuté.' : 'Aucun événement ne correspond à ces filtres.'}
        </div>
      ) : parJour.map(jour => (
        <div key={jour.date} style={{ marginBottom:22 }}>
          <div style={{ fontFamily:'var(--font-sans)', fontSize:13, fontWeight:700, color:'var(--ink)',
            textTransform:'capitalize', padding:'0 2px 8px', borderBottom:'2px solid var(--blue-france)', marginBottom:0, display:'inline-block' }}>
            {new Date(jour.date + 'T12:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' })}
          </div>
          <div style={{ border:'1px solid var(--border)', borderRadius:'0 var(--radius-lg) var(--radius-lg) var(--radius-lg)', background:'var(--surface)', overflow:'hidden' }}>
            {jour.evenements.map((e, i, arr) => (
              <div key={i} style={{ display:'grid', gridTemplateColumns:'56px 110px 1fr', gap:14, alignItems:'start',
                padding:'12px 16px', borderBottom: i < arr.length - 1 ? '1px solid var(--border-subtle)' : 'none' }}>
                <span style={{ fontFamily:'var(--font-mono)', fontSize:12.5, fontWeight:600, color:'var(--ink)' }}>{e.heure}</span>
                <div style={{ display:'flex', flexDirection:'column', gap:4, alignItems:'flex-start' }}>
                  <span style={{ fontFamily:'var(--font-sans)', fontSize:10.5, fontWeight:700, letterSpacing:'0.05em', textTransform:'uppercase',
                    color: e.type === 'seance' ? '#fff' : 'var(--blue-france)',
                    background: e.type === 'seance' ? 'var(--blue-france)' : '#EEF1FF',
                    padding:'2px 8px', borderRadius:4 }}>
                    {e.type === 'seance' ? 'Séance' : 'Commission'}
                  </span>
                  {e.eventuel && <span style={{ fontFamily:'var(--font-sans)', fontSize:10.5, color:'#8C6D1F', background:'#FDF6E3', padding:'1px 7px', borderRadius:4 }}>sous réserve</span>}
                </div>
                <div>
                  {e.organe && e.type !== 'seance' && (
                    <div style={{ fontFamily:'var(--font-sans)', fontSize:11.5, fontWeight:700, color:'var(--text-secondary)', marginBottom:2 }}>{e.organe}</div>
                  )}
                  <div style={{ fontFamily:'var(--font-sans)', fontSize:13, color:'var(--ink)', lineHeight:1.4 }}>
                    {e.objet || <span style={{ color:'var(--text-tertiary)' }}>Ordre du jour non communiqué</span>}
                  </div>
                  {e.dossier_id && (
                    <button onClick={() => setDossierId(e.dossier_id)} style={{ border:'none', background:'none', padding:0, marginTop:4, cursor:'pointer',
                      fontFamily:'var(--font-sans)', fontSize:12, fontWeight:600, color:'var(--blue-france)' }}>
                      Voir la timeline du dossier →
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}

      <div style={{ marginTop:20 }}>
        <SourceTag source="Assemblée nationale · open data Agenda · actualisation GitHub Actions"
          date={state.updatedAt ? new Date(state.updatedAt).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' }) : '—'} />
      </div>
    </div>
  );
}

/* ============================================================
   ALERTES — événements législatifs détectés par le pipeline
   Données : data/alertes/events/index.json + lots horodatés
   (detect-events.js / match-alerts.js, workflow alertes.yml)
   ============================================================ */
const ALERTES_TYPES = {
  nouveau_dossier:           { label:'Nouveau dossier',   color:'#000091', bg:'#EEF1FF' },
  changement_etape:          { label:'Changement d\'étape', color:'#7C3AED', bg:'#F3EEFC' },
  nouvel_amendement:         { label:'Nouvel amendement', color:'#1D4ED8', bg:'#EFF6FF' },
  sort_amendement:           { label:'Sort d\'amendement', color:'#B45309', bg:'#FEF3C7' },
  inscription_ordre_du_jour: { label:'Ordre du jour',     color:'#047857', bg:'#D1FAE5' },
  resultat_scrutin:          { label:'Scrutin',           color:'#8C1D18', bg:'#FBEAE9' },
};

function AlertesModule() {
  const [lots, setLots] = React.useState(undefined);   // undefined = chargement
  const [profils, setProfils] = React.useState({});    // id → nom
  const [fType, setFType] = React.useState('tous');
  const [dossierId, setDossierId] = React.useState(null);

  React.useEffect(() => {
    /* Index des lots, puis contenu des 10 plus récents en parallèle. */
    fetch('data/alertes/events/index.json')
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(idx => Promise.all((idx.lots || []).slice(0, 10).map(l =>
        fetch(`data/alertes/events/${l.fichier}`).then(r => r.json())
          .then(lot => ({ ...l, evenements: lot.evenements }))
          .catch(() => null)
      )))
      .then(charges => setLots(charges.filter(Boolean)))
      .catch(() => setLots([]));
    fetch('config/veille-profils.json')
      .then(r => r.json())
      .then(c => setProfils(Object.fromEntries((c.profils || []).map(p => [p.id, p.nom || p.id]))))
      .catch(() => {});
  }, []);

  if (dossierId) return <LegisDossierDetail id={dossierId} onBack={() => setDossierId(null)} />;

  const tousEvenements = (lots || []).flatMap(l => l.evenements.map(e => ({ ...e, __lot: l.genere_le })));
  const filtered = fType === 'tous' ? tousEvenements : tousEvenements.filter(e => e.type === fType);

  return (
    <div style={{ padding:'24px 28px', maxWidth:1000, margin:'0 auto' }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, letterSpacing:'0.09em',
          textTransform:'uppercase', color:'var(--blue-france)', marginBottom:6 }}>Module · Suivi législatif</div>
        <div style={{ fontSize:20, fontWeight:700, color:'var(--text-primary)' }}>Alertes</div>
        <div style={{ fontSize:13, color:'var(--text-secondary)', marginTop:2 }}>
          Événements détectés entre deux exécutions du pipeline — dossiers, amendements, ordres du jour, scrutins
        </div>
      </div>

      {/* La configuration des profils n'a pas encore d'interface dédiée. */}
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', marginBottom:18,
        border:'1px solid var(--border)', background:'var(--gray-50)', borderRadius:'var(--radius-md)' }}>
        <Icon n="settings-2" s={15} color="var(--text-tertiary)" />
        <span style={{ fontFamily:'var(--font-sans)', fontSize:12.5, color:'var(--text-secondary)' }}>
          Les profils d'alerte (mots-clés, dossiers suivis, e-mail, Slack) se configurent pour l'instant dans
          <code style={{ fontFamily:'var(--font-mono)', fontSize:11.5, background:'var(--gray-100)', padding:'1px 6px', borderRadius:4, margin:'0 4px' }}>config/veille-profils.json</code>
          du dépôt GitHub.
        </span>
      </div>

      <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:18 }}>
        {[['tous', 'Tous'], ...Object.entries(ALERTES_TYPES).map(([k, v]) => [k, v.label])].map(([k, label]) => (
          <button key={k} onClick={() => setFType(k)}
            style={{ padding:'5px 12px', borderRadius:999, cursor:'pointer', fontFamily:'var(--font-sans)', fontSize:12, fontWeight:600,
              border:'1px solid ' + (fType === k ? 'var(--blue-france)' : 'var(--border)'),
              background: fType === k ? 'var(--blue-france)' : 'white',
              color: fType === k ? '#fff' : 'var(--text-secondary)' }}>
            {label}
          </button>
        ))}
      </div>

      {lots === undefined ? (
        <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>Chargement des alertes…</div>
      ) : filtered.length === 0 ? (
        <div style={{ padding:40, textAlign:'center', color:'var(--text-tertiary)', fontSize:13 }}>
          {tousEvenements.length === 0
            ? 'Aucun événement détecté pour l\'instant — le moteur d\'alertes n\'a pas encore tourné ou rien n\'a changé.'
            : 'Aucun événement de ce type dans les derniers lots.'}
        </div>
      ) : (
        <div style={{ border:'1px solid var(--border)', borderRadius:'var(--radius-lg)', background:'var(--surface)', overflow:'hidden' }}>
          {filtered.map((e, i, arr) => {
            const t = ALERTES_TYPES[e.type] || { label:e.type, color:'var(--text-secondary)', bg:'var(--gray-100)' };
            return (
              <div key={e.id + '-' + i} style={{ padding:'13px 18px', borderBottom: i < arr.length - 1 ? '1px solid var(--border-subtle)' : 'none' }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:5 }}>
                  <span style={{ fontFamily:'var(--font-sans)', fontSize:11, fontWeight:700, color:t.color, background:t.bg,
                    padding:'2px 9px', borderRadius:999 }}>{t.label}</span>
                  <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--text-tertiary)' }}>
                    {new Date(e.__lot).toLocaleString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })}
                  </span>
                  <span style={{ flex:1 }} />
                  {(e.profils || []).map(p => (
                    <span key={p} title={`Profil matché : ${profils[p] || p}`}
                      style={{ fontFamily:'var(--font-sans)', fontSize:10.5, fontWeight:600, color:'#047857', background:'#D1FAE5',
                        padding:'2px 8px', borderRadius:999 }}>
                      ✓ {profils[p] || p}
                    </span>
                  ))}
                </div>
                <div style={{ fontFamily:'var(--font-sans)', fontSize:13.5, fontWeight:600, color:'var(--ink)', lineHeight:1.4 }}>
                  {e.url ? <a href={e.url} target="_blank" rel="noopener" style={{ color:'var(--ink)' }}>{e.titre} ↗</a> : e.titre}
                </div>
                {e.detail && <div style={{ fontFamily:'var(--font-sans)', fontSize:12.5, color:'var(--text-secondary)', lineHeight:1.45, marginTop:3 }}>{e.detail}</div>}
                {e.dossier_id && (
                  <button onClick={() => setDossierId(e.dossier_id)} style={{ border:'none', background:'none', padding:0, marginTop:4, cursor:'pointer',
                    fontFamily:'var(--font-sans)', fontSize:12, fontWeight:600, color:'var(--blue-france)' }}>
                    Voir la timeline du dossier →
                  </button>
                )}
              </div>
            );
          })}
        </div>
      )}

      <div style={{ marginTop:20 }}>
        <SourceTag source="Moteur d'alertes NomosLab · detect-events / match-alerts · GitHub Actions"
          date={lots && lots.length ? new Date(lots[0].genere_le).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' }) : '—'} />
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hero": "Split",
  "dashboard": "Carte",
  "accent": "#2563EB"
}/*EDITMODE-END*/;

const HERO_MAP = { "Split": "split", "Centré": "centered", "Sombre": "dark" };
const PERSIST = "fm_screen_v1";
const ENTRY_SCREENS = ["landing", "login", "signup", "forgot", "dashboard"];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // Navigation publique : 'landing' | 'login' | 'signup' | 'forgot' | 'apercu' (dashboard sans compte).
  // Un lien d'invitation (?invitation=…) ouvre directement l'écran de création de compte.
  const [screen, setScreen] = React.useState(INVITE_TOKEN_URL ? "signup" : "landing");
  const [session, setSession] = React.useState(undefined); // undefined = vérification en cours, null = déconnecté, objet = connecté
  const orgState = useOrganisations(session);
  const [orgSkip, setOrgSkip] = React.useState(false);     // « continuer sans organisation »
  const go = React.useCallback((s) => setScreen(s), []);

  // Session Supabase : source de vérité pour l'accès au dashboard. Aucune
  // persistance manuelle en localStorage — Supabase s'en charge lui-même.
  React.useEffect(() => {
    if (!supabaseClient) { setSession(null); return; }
    let active = true;
    supabaseClient.auth.getSession().then(({ data }) => { if (active) setSession(data.session ?? null); });
    const { data: sub } = supabaseClient.auth.onAuthStateChange((_event, s) => { if (active) setSession(s ?? null); });
    return () => { active = false; sub.subscription.unsubscribe(); };
  }, []);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--accent", t.accent);
  }, [t.accent]);

  const signedIn = !!session;
  const fixed = session === undefined || signedIn || screen !== "landing";
  React.useEffect(() => {
    document.getElementById("root").className = fixed ? "fixed-screen" : "";
  }, [fixed]);

  let view;
  if (session === undefined) {
    view = <AuthStatus phase="loading" />;   // vérification de la session en cours
  } else if (signedIn) {
    if (orgState.loading) {
      view = <AuthStatus phase="loading" />; // chargement des organisations / invitations
    } else if (!orgState.org && !orgSkip) {
      view = <OrgOnboarding user={session.user} inviteInfo={orgState.inviteInfo}
                            onDone={orgState.refresh} onSkip={() => setOrgSkip(true)}
                            onSignOut={() => supabaseClient && supabaseClient.auth.signOut()} />;
    } else {
      view = <Dashboard variant={t.dashboard === "Modules" ? "modules" : "terminal"} go={go}
                        user={session.user} orgState={orgState}
                        onSignOut={() => supabaseClient && supabaseClient.auth.signOut()} />;
    }
  } else if (screen === "apercu") {
    // Modules publics accessibles sans compte ; les espaces clients exigent une connexion.
    view = <Dashboard variant={t.dashboard === "Modules" ? "modules" : "terminal"} go={go}
                      user={null} orgState={null} onSignOut={null} />;
  } else if (screen === "landing") {
    view = <Landing heroVariant={HERO_MAP[t.hero] || "split"} go={go} />;
  } else {
    view = <AuthScreen go={go} initialMode={screen === "signup" ? "signup" : screen === "forgot" ? "forgot" : "signin"} />;
  }

  return (
    <>
      {view}
      <TweaksPanel>
        <TweakSection label="Landing — hero" />
        <TweakRadio label="Disposition" value={t.hero} options={["Split", "Centré", "Sombre"]} onChange={(v) => setTweak("hero", v)} />
        <TweakSection label="Dashboard" />
        <TweakRadio label="Vue" value={t.dashboard} options={["Carte", "Modules"]} onChange={(v) => setTweak("dashboard", v)} />
        <TweakSection label="Marque" />
        <TweakColor label="Accent" value={t.accent} options={["#2563EB", "#000091", "#1B43C4", "#0E9BA8"]} onChange={(v) => setTweak("accent", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
